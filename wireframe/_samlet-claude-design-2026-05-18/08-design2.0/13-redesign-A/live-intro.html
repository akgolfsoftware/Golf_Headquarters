<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>LiveSessionIntroModal</title></head>
<body style="background: #0A1F18; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #FAFAF7;">

<div style="text-align: center; max-width: 600px; padding: 40px;">

  <div style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 24px;">Live Session · klar til start</div>

  <h1 style="font-family: var(--font-display); font-size: 56px; font-weight: 600; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 16px;">
    <em style="color: var(--accent); font-weight: 400; font-style: italic;">Putte-økt</em><br>
    3 stasjoner · 30 min
  </h1>

  <p style="font-size: 16px; color: rgba(250,250,247,0.65); max-width: 460px; margin: 0 auto 40px; line-height: 1.6;">
    Bygd for Markus R denne uken. Pyramide-fokus: <span style="color: var(--accent);">SLAG (60%)</span>. Stasjoner stilles inn på 2m, 5m og 10m.
  </p>

  <div style="display: flex; justify-content: center; gap: 12px; margin-bottom: 40px;">
    <div style="background: rgba(255,255,255,0.06); border-radius: 12px; padding: 16px 24px; min-width: 110px;">
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; color: rgba(250,250,247,0.55); text-transform: uppercase;">Stasjoner</div>
      <div style="font-family: var(--font-mono); font-size: 28px; font-weight: 600; margin-top: 4px;">3</div>
    </div>
    <div style="background: rgba(255,255,255,0.06); border-radius: 12px; padding: 16px 24px; min-width: 110px;">
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; color: rgba(250,250,247,0.55); text-transform: uppercase;">Slag totalt</div>
      <div style="font-family: var(--font-mono); font-size: 28px; font-weight: 600; margin-top: 4px;">60</div>
    </div>
    <div style="background: rgba(255,255,255,0.06); border-radius: 12px; padding: 16px 24px; min-width: 110px;">
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; color: rgba(250,250,247,0.55); text-transform: uppercase;">Tid</div>
      <div style="font-family: var(--font-mono); font-size: 28px; font-weight: 600; margin-top: 4px;">30 m</div>
    </div>
  </div>

  <button style="background: var(--accent); color: var(--text); border: 0; padding: 18px 44px; border-radius: 999px; font-family: var(--font-display); font-size: 18px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 32px rgba(209,248,67,0.30);">
    Start →
  </button>

  <div style="margin-top: 24px;">
    <button style="background: transparent; color: rgba(250,250,247,0.55); border: 0; padding: 8px 16px; font-size: 13px; cursor: pointer;">Avbryt</button>
  </div>

</div>

</body>
</html>
