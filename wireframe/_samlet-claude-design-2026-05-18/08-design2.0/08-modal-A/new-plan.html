<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>NewPlanModal</title></head>
<body style="background: rgba(10,31,24,0.5); padding: 80px 40px;">
<div class="modal" style="background: white; border-radius: 20px; max-width: 600px; margin: 0 auto; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);">

  <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
    <div>
      <span class="page-eyebrow">Steg 1 av 4</span>
      <h2 style="font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin-top: 4px;">Ny <em style="color: var(--primary); font-weight: 400;">treningsplan</em></h2>
    </div>
    <button style="background: transparent; border: 0; font-size: 24px; cursor: pointer; color: var(--text-secondary); line-height: 1;">×</button>
  </div>

  <div style="display: flex; gap: 6px; margin: 20px 0 28px;">
    <div style="flex: 1; height: 4px; background: var(--primary); border-radius: 2px;"></div>
    <div style="flex: 1; height: 4px; background: var(--border); border-radius: 2px;"></div>
    <div style="flex: 1; height: 4px; background: var(--border); border-radius: 2px;"></div>
    <div style="flex: 1; height: 4px; background: var(--border); border-radius: 2px;"></div>
  </div>

  <div style="margin-bottom: 20px;">
    <label class="card-label" style="display: block; margin-bottom: 8px;">Velg spiller</label>
    <div style="display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg);">
      <span class="avatar">MR</span>
      <div style="flex: 1;">
        <b style="font-size: 14px;">Markus Roinaas Pedersen</b>
        <div style="font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);">U18 · HCP 2.4 · WANG Toppidrett</div>
      </div>
      <span class="player-tier tier-elite">ELITE</span>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
    <div>
      <label class="card-label" style="display: block; margin-bottom: 8px;">Fra dato</label>
      <div style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-family: var(--font-mono); font-size: 13px;">12. mai 2026</div>
    </div>
    <div>
      <label class="card-label" style="display: block; margin-bottom: 8px;">Til dato</label>
      <div style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-family: var(--font-mono); font-size: 13px;">31. okt 2026</div>
    </div>
  </div>

  <div style="margin-bottom: 8px;">
    <label class="card-label" style="display: block; margin-bottom: 8px;">Plantype</label>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
      <div style="padding: 14px 12px; border: 2px solid var(--primary); border-radius: 12px; text-align: center; background: rgba(0,88,64,0.04);">
        <b style="font-size: 13px;">Sesongplan</b>
        <div style="font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 4px;">5 perioder</div>
      </div>
      <div style="padding: 14px 12px; border: 1px solid var(--border); border-radius: 12px; text-align: center;">
        <b style="font-size: 13px;">Mikrosyklus</b>
        <div style="font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 4px;">4 uker</div>
      </div>
      <div style="padding: 14px 12px; border: 1px solid var(--border); border-radius: 12px; text-align: center;">
        <b style="font-size: 13px;">Custom</b>
        <div style="font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 4px;">Bygg fra null</div>
      </div>
    </div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border);">
    <button class="btn btn-ghost">Avbryt</button>
    <div style="display: flex; gap: 8px;">
      <button class="btn btn-ghost" disabled style="opacity: 0.5;">Tilbake</button>
      <button class="btn btn-primary">Neste →</button>
    </div>
  </div>

</div>
</body>
</html>
