<style>
@keyframes shim{0%{background-position:-280px 0;}100%{background-position:280px 0;}}
.sk{background:linear-gradient(90deg,var(--surface-alt) 0%,var(--line-soft) 50%,var(--surface-alt) 100%);background-size:560px 100%;animation:shim 1.4s infinite linear;border-radius:6px;}
body.dark .sk{background:linear-gradient(90deg,#1A201E 0%,#252B29 50%,#1A201E 100%);background-size:560px 100%;}
.fac-strip{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;}
.fs-thumb{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--surface-alt),var(--line));display:flex;align-items:center;justify-content:center;color:var(--ink-muted);}
.fs-name{font-family:var(--font-tight);font-size:14px;font-weight:600;}
.fs-sub{font-size:11.5px;color:var(--ink-muted);font-family:var(--font-mono);}
.wk-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cal-grid{display:grid;grid-template-columns:42px repeat(7,1fr);border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface-card);}
.cal-head>div{padding:8px 4px;text-align:center;border-bottom:1px solid var(--line);border-right:1px solid var(--line-soft);background:var(--surface);}
.cal-head>div:last-child{border-right:0;}.cal-head>div:first-child{background:var(--surface-alt);}
.cal-dow{font-family:var(--font-mono);font-size:9.5px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.cal-date{font-family:var(--font-tight);font-size:13px;font-weight:600;}
.cal-time{padding:4px;font-family:var(--font-mono);font-size:10px;color:var(--ink-subtle);text-align:right;border-right:1px solid var(--line);background:var(--surface-alt);display:flex;align-items:center;justify-content:flex-end;border-bottom:1px solid var(--line-soft);}
.slot-sk{height:26px;border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);position:relative;}
.slot-sk:last-child{border-right:0;}
.slot-sk::after{content:'';position:absolute;inset:4px;border-radius:4px;background:linear-gradient(90deg,var(--surface-alt) 0%,var(--line-soft) 50%,var(--surface-alt) 100%);background-size:280px 100%;animation:shim 1.4s infinite linear;}
.load-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--brand-primary-soft);border-radius:999px;font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--brand-primary-deep);}
.spinner{width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.legend{display:flex;gap:14px;margin-top:10px;}
.legend .sk{height:10px;width:90px;border-radius:3px;}
</style></head>
