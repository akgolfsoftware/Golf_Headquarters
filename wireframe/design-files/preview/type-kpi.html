<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 32px;background:var(--surface);display:flex;align-items:center;gap:48px}
  .num{font-family:'JetBrains Mono';font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-.01em;color:#0A1F18}
  .delta{color:#1A7D56}
  .meta{font-family:'Inter';font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-subtle);margin-top:6px}
  .group{display:flex;flex-direction:column}
  .row{display:flex;gap:24px;align-items:baseline}
</style>
</head><body>
  <div class="group">
    <div class="row">
      <span class="num" style="font-size:48px">12,4</span>
      <span class="num delta" style="font-size:32px">+2,3</span>
      <span class="num" style="font-size:48px">87%</span>
    </div>
    <div class="meta">JetBrains Mono · 32–48 · tabular-nums</div>
  </div>
</body></html>
