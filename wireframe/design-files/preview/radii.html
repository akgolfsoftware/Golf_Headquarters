<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px 28px;background:var(--surface);display:flex;gap:24px;align-items:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .swatch{background:#fff;border:1px solid #E5E3DD}
  .lbl{font-family:'Inter';font-size:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-subtle)}
  .val{font-family:'JetBrains Mono';font-size:10px;color:var(--ink-muted)}
</style></head><body>
  <div class="item"><div class="swatch" style="width:64px;height:64px;border-radius:8px"></div><div class="lbl">Tight</div><div class="val">8px</div></div>
  <div class="item"><div class="swatch" style="width:64px;height:64px;border-radius:10px"></div><div class="lbl">Input</div><div class="val">10px</div></div>
  <div class="item"><div class="swatch" style="width:64px;height:64px;border-radius:12px"></div><div class="lbl">Control</div><div class="val">12px</div></div>
  <div class="item"><div class="swatch" style="width:64px;height:64px;border-radius:20px"></div><div class="lbl">Card</div><div class="val">20px</div></div>
  <div class="item"><div class="swatch" style="width:64px;height:64px;border-radius:50%"></div><div class="lbl">Pill</div><div class="val">100px</div></div>
</body></html>
