<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--surface);display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .card{padding:18px;border-radius:20px}
  .flush{background:transparent}
  .standard{background:#fff;border:1px solid #E5E3DD;box-shadow:0 1px 2px rgba(15,31,24,.04),0 4px 12px rgba(15,31,24,.04)}
  .featured{background:rgba(209,248,67,.12);border:1px solid #E5E3DD;box-shadow:0 1px 2px rgba(15,31,24,.06),0 14px 32px rgba(15,31,24,.08)}
  .lbl{font-family:'Inter';font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-subtle);margin-bottom:6px}
  .ttl{font-family:'Inter Tight';font-size:16px;font-weight:600;color:#0A1F18;margin-bottom:6px}
  .body{font-family:'Inter';font-size:13px;color:#5E5C57;line-height:1.5}
</style></head><body>
  <div class="card flush"><div class="lbl">Flush</div><div class="ttl">Transparent</div><div class="body">Inline content. No border, no shadow.</div></div>
  <div class="card standard"><div class="lbl">Standard</div><div class="ttl">White + line</div><div class="body">Default card. Hairline border, soft elevation.</div></div>
  <div class="card featured"><div class="lbl">Featured</div><div class="ttl">Lime tint</div><div class="body">CTA + highlights. Lifted shadow.</div></div>
</body></html>
