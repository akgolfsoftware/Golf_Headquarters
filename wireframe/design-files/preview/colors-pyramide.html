<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--surface)}.row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.s{padding:14px;border-radius:14px;color:#fff;border:1px solid var(--line)}.s.slag{color:var(--brand-accent-on)}.lbl{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.04em}.name{font-family:var(--font-body);font-size:11px;opacity:.85;margin-top:2px}.hex{font-family:var(--font-mono);font-size:10px;margin-top:14px;opacity:.75}</style>
</head><body><div class="row">
<div class="s" style="background:var(--pyr-fys)"><div class="lbl">FYS</div><div class="name">Fysisk</div><div class="hex">#005840</div></div>
<div class="s" style="background:var(--pyr-tek)"><div class="lbl">TEK</div><div class="name">Teknikk</div><div class="hex">#1A7D56</div></div>
<div class="s slag" style="background:var(--pyr-slag)"><div class="lbl">SLAG</div><div class="name">Slagprogresjon</div><div class="hex">#D1F843</div></div>
<div class="s" style="background:var(--pyr-spill)"><div class="lbl">SPILL</div><div class="name">Banespill</div><div class="hex">#B8852A</div></div>
<div class="s" style="background:var(--pyr-turn)"><div class="lbl">TURN</div><div class="name">Turnering</div><div class="hex">#5E5C57</div></div>
</div></body></html>
