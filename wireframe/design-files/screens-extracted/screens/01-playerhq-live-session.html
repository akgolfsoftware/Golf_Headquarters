<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<title>PlayerHQ — Live Session</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="../_shared/arketype-e.css" />
<style>
  /* Live Session-specific */
  .ls-counter { font-size: 120px; }
  .ls-ring-bg { stroke: rgba(255,255,255,0.06); }
  .ls-ring-fg { stroke: var(--e-lime); stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
  .ls-instruct {
    text-align:center; color: var(--e-muted); font-size: 14px;
    letter-spacing: 0.04em; animation: pulse-fade 1.8s ease-in-out infinite;
  }
  @keyframes pulse-fade { 0%,100% { opacity: 0.4 } 50% { opacity: 0.95 } }
  .ls-pause-overlay {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .ls-pause-text { font-family:'Instrument Serif'; font-style:italic; font-size: 96px; letter-spacing:0.04em; }
  .ls-toast {
    position:absolute; top: 72px; left:50%; transform:translateX(-50%);
    background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
    color: var(--e-fg); font-size: 12px; padding: 8px 14px; border-radius: 999px;
    backdrop-filter: blur(8px);
  }
  .ls-done-glow circle.ls-ring-fg {
    stroke: var(--e-lime);
    filter: drop-shadow(0 0 24px rgba(209,248,67,0.55));
  }
  .ls-fail-ring circle.ls-ring-fg { stroke: var(--e-red); }
</style>
</head>
<body style="background:var(--surface);margin:0;padding:0">
<div class="e-frame e-grain" style="margin-top:18px">
      <div class="e-topbar">
        <div class="e-left">
          <span class="e-live"><span class="pulse"></span>Live</span>
          <span class="e-pyr e-pyr--tek"><span class="e-pyr-dot"></span>TEK · Driver</span>
        </div>
        <div class="e-center">Økt 12 av 18 — Sommer-toppform</div>
        <div class="e-right"><span class="e-close">×</span></div>
      </div>
      <div class="e-stage">
        <div style="display:flex; flex-direction:column; align-items:center; gap:28px">
          <div class="e-ring">
            <svg viewBox="0 0 320 320">
              <circle cx="160" cy="160" r="148" fill="none" stroke-width="4" class="ls-ring-bg"></circle>
            </svg>
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
              <div class="e-counter ls-counter">0</div>
              <div style="font-size:14px;color:var(--e-muted)">av 30 rep</div>
            </div>
          </div>
          <div class="ls-instruct">Tap for å logge rep ↓</div>
        </div>
      </div>
      <div class="e-bottombar">
        <button class="e-btn e-btn--secondary" style="flex:1 1 0">Pause</button>
        <button class="e-btn e-btn--primary e-btn--xl" style="flex:1 1 0">Neste rep →</button>
      </div>
    </div>
</body>
</html>
