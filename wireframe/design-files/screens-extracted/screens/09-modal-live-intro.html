<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<title>Modal — LiveIntroModal</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="../_shared/arketype-e.css" />
<style>
  /* Fullscreen live-modal — Screen 1 av 4 i Live Session-flyten.
     Pre-flight intro for ÉN konkret økt. Én eneste handling: Start økt → */
  .li-shell { position:absolute; inset:0; display:flex; flex-direction:column; }
  .li-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 24px 28px 0;
  }
  .li-mini {
    display:flex; align-items:center; gap: 10px;
    font-family:'JetBrains Mono'; font-size: 10px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--e-muted);
  }
  .li-mini .track {
    width: 96px; height: 4px; border-radius: 999px;
    background: rgba(255,255,255,0.06); overflow:hidden; position: relative;
  }
  .li-mini .track::after {
    content:""; position:absolute; inset:0 75% 0 0; background: var(--e-lime);
    border-radius: 999px;
  }
  .li-stage {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding: 24px 28px 28px;
  }
  .li-body { width: 100%; max-width: 480px; text-align: center; }

  .li-eyebrow {
    font-family:'JetBrains Mono'; font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--e-muted);
    display:inline-flex; align-items:center; gap: 10px;
    margin-bottom: 20px;
  }
  .li-eyebrow .sep { color: var(--e-muted-2); }
  .li-eyebrow .layer { color: var(--e-lime); }

  .li-title {
    font-family:'Instrument Serif'; font-weight: 400; font-style: italic;
    font-size: 72px; line-height: 0.95; letter-spacing: -0.02em;
    margin: 0; color: var(--e-fg);
  }
  .li-subtitle {
    font-family:'Instrument Serif'; font-style: italic;
    font-size: 28px; color: var(--e-lime);
    line-height: 1; margin: 10px 0 0;
  }

  .li-meta {
    margin: 32px 0 0;
    font-family:'JetBrains Mono'; font-size: 13px; letter-spacing: 0.06em;
    color: var(--e-fg);
    display:inline-flex; align-items:center; gap: 14px;
  }
  .li-meta .sep { color: var(--e-muted-2); }
  .li-meta strong { color: var(--e-lime); font-weight: 500; }

  .li-tip {
    margin: 36px auto 0; max-width: 420px;
    padding: 14px 18px; text-align: left;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--e-border);
    border-radius: 14px;
    display:flex; gap: 12px;
  }
  .li-tip .ic {
    width: 28px; height: 28px; border-radius: 999px;
    background: rgba(209,248,67,0.10); color: var(--e-lime);
    display:inline-flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono'; font-size: 12px; flex: 0 0 28px;
  }
  .li-tip .lbl {
    font-family:'JetBrains Mono'; font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--e-muted);
    margin-bottom: 4px;
  }
  .li-tip p {
    margin: 0; font-family:'Instrument Serif'; font-style: italic;
    font-size: 15px; line-height: 1.45; color: var(--e-fg);
  }
  .li-tip .author { font-size: 11px; color: var(--e-muted); font-style: normal; font-family:'Inter Tight'; }

  .li-cta-row {
    padding: 28px; display:flex; justify-content: center;
  }
  .li-cta {
    min-width: 320px; height: 72px;
    font-size: 16px; font-weight: 600;
    border-radius: 999px;
  }

  .li-close {
    width:40px; height:40px; border-radius:999px;
    display:inline-flex; align-items:center; justify-content:center;
    background: rgba(255,255,255,0.04); color: var(--e-fg);
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer;
  }

  /* skeleton */
  .skel {
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.10) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%; animation: skel 1.5s linear infinite;
    border-radius: 8px;
  }
  @keyframes skel { from { background-position: 200% 0 } to { background-position: -200% 0 } }
</style>
</head>
<body style="background:var(--surface);margin:0;padding:0">
<div class="e-frame e-grain" style="margin-top:18px">
      <div class="li-shell">
        <div class="li-header">
          <div class="li-mini"><div class="track"></div><span>1 / 4 · forberedelse</span></div>
          <span class="li-close">×</span>
        </div>
        <div class="li-stage">
          <div class="li-body">
            <div class="li-eyebrow">
              <span>Sommer-toppform</span><span class="sep">·</span><span class="layer">TEK</span>
            </div>
            <h1 class="li-title">Putte-økt</h1>
            <div class="li-subtitle">3 stasjoner</div>
            <div class="li-meta">
              <span>~<strong>30 min</strong></span>
              <span class="sep">·</span>
              <span><strong>60 reps</strong> planlagt</span>
            </div>
            <div class="li-tip">
              <div class="ic">AK</div>
              <div>
                <div class="lbl">Coach-tip</div>
                <p>"Hold tempo gjennom hele putten — ikke akselerer på treffpunktet."</p>
                <span class="author">— Anders K · 2 dager siden</span>
              </div>
            </div>
          </div>
        </div>
        <div class="li-cta-row">
          <button class="e-btn e-btn--lime li-cta">Start økt →</button>
        </div>
      </div>
    </div>
</body>
</html>
