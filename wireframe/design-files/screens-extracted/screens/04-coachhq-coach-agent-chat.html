<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<title>CoachHQ — Coach Agent Chat</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="../_shared/arketype-e.css" />
<style>
  .cc-feed {
    width: 720px; height: 100%;
    margin: 0 auto;
    padding: 24px 0 32px;
    display: flex; flex-direction: column; gap: 16px;
    overflow:hidden;
  }
  .cc-msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
  .cc-msg.coach {
    align-self: flex-end;
    background: var(--e-surface-2); border-bottom-right-radius: 4px;
    max-width: 70%;
  }
  .cc-msg.agent {
    align-self: flex-start;
    background: var(--e-surface); border-bottom-left-radius: 4px;
  }
  .cc-agent-row { display:flex; align-items:flex-start; gap: 12px; align-self: flex-start; max-width: 85%; }
  .cc-avatar {
    width:32px; height:32px; border-radius:10px;
    background: var(--e-lime); color:#0A1F18;
    display:flex; align-items:center; justify-content:center;
    font-family:'Inter Tight'; font-weight:700; font-size:10px; letter-spacing:.04em;
    flex: 0 0 32px;
  }
  .cc-actions {
    display:flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
  }
  .cc-action-btn {
    background: transparent; border:1px solid var(--e-border);
    color: var(--e-fg); font-size: 12px; padding: 6px 12px;
    border-radius: 999px; cursor:pointer; font-family: 'Inter Tight';
  }
  .cc-action-btn.primary { color: var(--e-lime); border-color: rgba(209,248,67,0.3); }

  .cc-input-wrap {
    position:absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    width: 720px; max-width: calc(100% - 32px);
    background: var(--e-surface-2); border: 1px solid var(--e-border);
    border-radius: 999px; padding: 8px 8px 8px 20px;
    display:flex; align-items:center; gap: 8px;
  }
  .cc-input-wrap input {
    flex:1; background: transparent; border:0; outline:0;
    color: var(--e-fg); font-size: 14px; font-family: 'Inter Tight';
    padding: 12px 0;
  }
  .cc-mic { width: 36px; height:36px; border-radius:999px; background: rgba(255,255,255,0.04); display:flex;align-items:center;justify-content:center; }
  .cc-send { width:44px; height:44px; border-radius: 999px; background: var(--e-lime); color: #0A1F18; display:flex; align-items:center; justify-content:center; font-size: 16px; }

  .cc-dots { display:inline-flex; gap: 4px; }
  .cc-dots span {
    width:6px; height:6px; border-radius:999px; background: var(--e-muted);
    animation: cc-jump 1.2s ease-in-out infinite;
  }
  .cc-dots span:nth-child(2) { animation-delay: 0.15s }
  .cc-dots span:nth-child(3) { animation-delay: 0.3s }
  @keyframes cc-jump { 0%,80%,100% { transform:translateY(0); opacity:.4 } 40% { transform:translateY(-4px); opacity:1 } }

  /* tom-state chips */
  .cc-empty {
    display:flex; flex-direction:column; align-items:center; gap: 32px;
    padding: 0 32px; max-width: 720px;
  }
  .cc-empty .title {
    font-family:'Instrument Serif'; font-style:italic; font-size: 48px;
    text-align: center; line-height: 1.1; text-wrap: balance;
  }
  .cc-chip-grid {
    display:grid; grid-template-columns: 1fr 1fr; gap: 12px; width:100%;
  }
  .cc-chip {
    text-align: left; padding: 18px 20px;
    background: var(--e-surface); border: 1px solid var(--e-border);
    border-radius: 14px; font-size: 14px; color: var(--e-fg);
    cursor: pointer; line-height:1.4;
  }

  /* slash popover */
  .cc-slash {
    position:absolute; bottom: 96px; left:50%; transform: translateX(-50%);
    width: 480px; background: var(--e-surface); border:1px solid var(--e-border);
    border-radius: 14px; padding: 8px; z-index: 10;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
  }
  .cc-slash-item {
    display:flex; gap: 12px; align-items: center; padding: 12px 14px;
    border-radius: 10px; font-size: 13px;
  }
  .cc-slash-item.is-hl { background: rgba(209,248,67,0.06); }
  .cc-slash-item .cmd { font-family:'JetBrains Mono'; color: var(--e-lime); font-size: 12px; }
  .cc-slash-item .desc { color: var(--e-muted); font-size: 12px; margin-left: auto }
</style>
</head>
<body style="background:var(--surface);margin:0;padding:0">
<div class="e-frame is-soft e-grain" style="margin-top:18px">
      <div class="e-topbar">
        <div class="e-left">
          <span class="e-live"><span class="pulse"></span>Coach Agent</span>
        </div>
        <div class="e-center">0 av 50 meldinger denne måneden</div>
        <div class="e-right"><span class="e-close">×</span></div>
      </div>
      <div class="e-stage">
        <div class="cc-empty">
          <div class="cc-avatar" style="width:56px;height:56px;border-radius:16px;font-size:14px">AK</div>
          <div class="title">Hva vil du gjøre i dag,<br/><em style="color:var(--e-lime);font-style:italic">Anders</em>?</div>
          <div class="cc-chip-grid">
            <button class="cc-chip">Hvem trenger oppmerksomhet i dag?</button>
            <button class="cc-chip">Lag treningsplan for Markus i juni</button>
            <button class="cc-chip">Vis spillere som ikke har trent på 14 dager</button>
            <button class="cc-chip">Generer ukentlig rapport</button>
          </div>
        </div>
      </div>
      <div class="cc-input-wrap">
        <span class="cc-mic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></span>
        <input placeholder="Spør om dine spillere ..." />
        <span class="cc-send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></span>
      </div>
    </div>
</body>
</html>
