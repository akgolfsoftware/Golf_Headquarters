<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Modal — AvatarUploadModal · 6-D/5</title>
<link rel="stylesheet" href="../_shared/arketype-f.css">
<style>
  .stage{position:relative;width:100%;min-height:760px;background:linear-gradient(135deg,#EDEAE2 0%,#F5F2EA 100%);display:flex;align-items:center;justify-content:center;padding:40px}
  .behind{position:absolute;inset:0;background:linear-gradient(135deg,#EDEAE2 0%,#F5F2EA 100%);filter:blur(1px) brightness(.96);display:flex;align-items:center;justify-content:center;color:var(--ink-subtle);font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  .scrim{position:absolute;inset:0;background:rgba(10,31,24,.40);backdrop-filter:blur(6px)}

  .modal{position:relative;width:540px;background:var(--surface-card);border-radius:18px;box-shadow:0 32px 80px rgba(10,31,24,.30),0 4px 16px rgba(10,31,24,.10);overflow:hidden;border:1px solid var(--line)}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 26px 0;gap:14px}
  .modal-head .l h2{font-family:var(--font-display);font-size:22px;font-weight:500;letter-spacing:-.02em;color:var(--ink);margin:0 0 4px}
  .modal-head .l h2 em{font-style:italic;color:var(--ink-muted);font-weight:400;font-size:16px}
  .modal-head .l .sub{font-size:12px;color:var(--ink-muted);line-height:1.5;max-width:380px}
  .modal-head .x{width:32px;height:32px;border-radius:8px;background:var(--surface-alt);color:var(--ink-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:var(--font-mono);font-size:16px;flex-shrink:0;border:none}
  .modal-head .x:hover{background:var(--line);color:var(--ink)}

  .steps{display:flex;gap:6px;padding:14px 26px 0}
  .step-dot{flex:1;height:3px;border-radius:100px;background:var(--surface-alt)}
  .step-dot.done{background:var(--brand-primary)}
  .step-dot.now{background:var(--brand-primary)}

  .modal-body{padding:20px 26px 22px}

  /* Drop-zone */
  .drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:48px 24px;border:2px dashed var(--line);border-radius:14px;background:var(--surface-alt);color:var(--ink-muted);cursor:pointer;transition:all .15s}
  .drop:hover{border-color:var(--brand-primary);background:var(--accent-bg)}
  .drop.active{border-color:var(--brand-primary);background:var(--accent-bg);color:var(--brand-primary)}
  .drop .ic{width:48px;height:48px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--brand-primary)}
  .drop.active .ic{background:var(--brand-primary);color:var(--brand-accent);border-color:var(--brand-primary)}
  .drop .t{font-size:14px;font-weight:500;color:var(--ink)}
  .drop.active .t{color:var(--brand-primary)}
  .drop .h{font-size:11px;color:var(--ink-subtle);font-family:var(--font-mono);letter-spacing:.04em}
  .drop .browse{font-family:var(--font-mono);font-size:11px;color:var(--brand-primary);text-decoration:underline;letter-spacing:.04em}

  .constraints{display:flex;justify-content:center;gap:18px;margin-top:12px;font-family:var(--font-mono);font-size:10px;color:var(--ink-subtle);letter-spacing:.04em;text-transform:uppercase}
  .constraints span{display:inline-flex;align-items:center;gap:4px}
  .constraints span::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--ink-disabled)}

  /* Crop step */
  .crop-area{display:grid;grid-template-columns:1fr 180px;gap:18px}
  .crop-stage{position:relative;width:100%;aspect-ratio:1;background:#0A1F18;border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .crop-img{position:absolute;inset:0;background:radial-gradient(circle at 40% 35%,#5b7466 0%,#2b3f37 60%,#0e1d18 100%);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-style:italic;font-size:60px;color:rgba(245,244,238,.45);letter-spacing:-.02em}
  .crop-circle{position:absolute;inset:14%;border-radius:50%;border:2px solid rgba(255,255,255,.85);box-shadow:0 0 0 9999px rgba(10,31,24,.55);pointer-events:none}
  .crop-circle::after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 38% 32%,#5b7466 0%,#2b3f37 60%,#0e1d18 100%)}
  .crop-circle::before{content:"";position:absolute;inset:0;border-radius:50%;border:1px dashed rgba(212,210,126,.5)}
  .crop-handles{position:absolute;inset:14%;pointer-events:none}
  .crop-handles .h{position:absolute;width:10px;height:10px;background:#fff;border-radius:2px;border:1.5px solid var(--brand-primary)}
  .crop-handles .h.tl{top:-5px;left:-5px}
  .crop-handles .h.tr{top:-5px;right:-5px}
  .crop-handles .h.bl{bottom:-5px;left:-5px}
  .crop-handles .h.br{bottom:-5px;right:-5px}

  .crop-side{display:flex;flex-direction:column;gap:14px}
  .crop-side .pv-title{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-subtle)}
  .pv-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-soft)}
  .pv-row:last-child{border-bottom:none}
  .pv-row .av{background:radial-gradient(circle at 38% 32%,#5b7466 0%,#2b3f37 60%,#0e1d18 100%);border:1px solid var(--line);font-family:var(--font-display);color:rgba(245,244,238,.45);font-style:italic;display:flex;align-items:center;justify-content:center}
  .pv-row .av.xl{width:80px;height:80px;border-radius:50%;font-size:28px}
  .pv-row .av.md{width:40px;height:40px;border-radius:50%;font-size:14px}
  .pv-row .av.sm{width:24px;height:24px;border-radius:50%;font-size:9px}
  .pv-row .av.sq{border-radius:8px;width:32px;height:32px;font-size:11px}
  .pv-row .lbl{font-size:11px;color:var(--ink-subtle);font-family:var(--font-mono);letter-spacing:.04em}

  /* Sliders */
  .slider-row{display:grid;grid-template-columns:80px 1fr 48px;gap:12px;align-items:center;padding:10px 0;border-top:1px solid var(--line-soft)}
  .slider-row .l{font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);letter-spacing:.04em}
  .slider-row .bar{position:relative;height:5px;background:var(--surface-alt);border-radius:100px;border:1px solid var(--line)}
  .slider-row .bar .fill{position:absolute;left:0;top:-1px;bottom:-1px;background:var(--brand-primary);border-radius:100px}
  .slider-row .bar .thumb{position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid var(--brand-primary);top:-6px;transform:translateX(-50%)}
  .slider-row .v{font-family:var(--font-mono);font-size:12px;color:var(--ink);text-align:right;font-weight:500}

  /* Footer */
  .modal-foot{padding:14px 26px;background:var(--surface-alt);border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}
  .modal-foot .l{font-family:var(--font-mono);font-size:11px;color:var(--ink-subtle);letter-spacing:.04em}
  .modal-foot .r{display:flex;gap:8px}

  /* error */
  .err-banner{display:flex;gap:10px;padding:12px 14px;background:var(--status-danger-bg);border:1px solid rgba(163,45,45,.20);border-radius:10px;color:var(--status-danger);font-size:12px;line-height:1.5;margin-bottom:14px}
  .err-banner .ic{width:18px;height:18px;flex-shrink:0;color:var(--status-danger)}

  /* progress */
  .upl{display:flex;flex-direction:column;gap:8px;padding:14px;background:var(--accent-bg);border:1px solid rgba(0,88,64,.18);border-radius:10px}
  .upl .row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink)}
  .upl .row .nm{font-weight:500}
  .upl .row .v{font-family:var(--font-mono);font-size:11px;color:var(--brand-primary)}
  .upl .bar{height:5px;background:rgba(0,88,64,.15);border-radius:100px;overflow:hidden}
  .upl .bar .fill{height:100%;background:var(--brand-primary);border-radius:100px;width:62%}

  /* Done state */
  .done-state{display:flex;flex-direction:column;align-items:center;gap:14px;padding:32px 24px;text-align:center}
  .done-state .check{width:64px;height:64px;border-radius:50%;background:var(--status-success-bg);color:var(--status-success);display:flex;align-items:center;justify-content:center}
  .done-state .t{font-family:var(--font-display);font-size:22px;font-weight:500;letter-spacing:-.01em;color:var(--ink);margin:0}
  .done-state .t em{font-style:italic;color:var(--ink-muted);font-weight:400}
  .done-state .d{font-size:13px;color:var(--ink-muted);max-width:340px;line-height:1.55}

  /* Mobile bottom-sheet */
  .mob-stage{position:relative;background:#EDEAE2;height:760px;display:flex;align-items:flex-end;justify-content:center;padding:0}
  .mob-scrim{position:absolute;inset:0;background:rgba(10,31,24,.45);backdrop-filter:blur(4px)}
  .mob-sheet{position:relative;width:100%;max-width:380px;background:#fff;border-radius:20px 20px 0 0;padding:18px 20px 32px;display:flex;flex-direction:column;gap:14px;box-shadow:0 -20px 60px rgba(10,31,24,.20)}
  .mob-sheet .grab{align-self:center;width:36px;height:4px;background:var(--line);border-radius:100px}
</style>
</head>
<body style="background:var(--surface);margin:0;padding:0">
<section class="ab" data-screen-label="01 Modal — drop">
    <div class="ab-frame" style="padding:0">
      <div class="stage">
        <div class="behind">PROFIL-SIDEN BAK — BLURRET</div>
        <div class="scrim"></div>
        <div class="modal">
          <div class="modal-head">
            <div class="l">
              <h2>Nytt profilbilde. <em>3 steg.</em></h2>
              <div class="sub">Slipp bildet eller velg fra maskin. Du beskjærer etterpå. JPG, PNG eller WebP — maks 5 MB.</div>
            </div>
            <button class="x">×</button>
          </div>
          <div class="steps"><div class="step-dot now"></div><div class="step-dot"></div><div class="step-dot"></div></div>
          <div class="modal-body">
            <div class="drop active">
              <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
              <div class="t">Slipp <strong style="color:var(--brand-primary);font-weight:600">portrett-final.jpg</strong> her</div>
              <div class="h">eller <span class="browse">bla i filer</span></div>
            </div>
            <div class="constraints">
              <span>JPG · PNG · WebP</span>
              <span>maks 5 MB</span>
              <span>min. 400 × 400</span>
              <span>auto-rotert med EXIF</span>
            </div>
          </div>
          <div class="modal-foot">
            <span class="l">PERSONVERN · BILDE BRUKES KUN INTERNT</span>
            <div class="r"><button class="btn btn-ghost btn-sm">Avbryt</button><button class="btn btn-primary btn-sm" disabled style="opacity:.55">Neste →</button></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ 02 Crop step ============ -->
</body>
</html>
