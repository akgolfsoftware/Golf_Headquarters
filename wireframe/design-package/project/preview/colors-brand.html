<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--surface)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#fff}
  .swatch{height:64px}
  .info{padding:8px 10px}
  .name{font-family:'Inter';font-size:11px;font-weight:500;color:var(--ink)}
  .hex{font-family:'JetBrains Mono';font-size:10px;color:var(--ink-muted);margin-top:2px}
</style>
</head><body>
  <div class="grid">
    <div class="sw"><div class="swatch" style="background:#005840"></div><div class="info"><div class="name">Primary</div><div class="hex">#005840</div></div></div>
    <div class="sw"><div class="swatch" style="background:#00472f"></div><div class="info"><div class="name">Primary Hover</div><div class="hex">#00472f</div></div></div>
    <div class="sw"><div class="swatch" style="background:#003B2A"></div><div class="info"><div class="name">Primary Deep</div><div class="hex">#003B2A</div></div></div>
    <div class="sw"><div class="swatch" style="background:#D1F843"></div><div class="info"><div class="name">Accent (Lime)</div><div class="hex">#D1F843</div></div></div>
    <div class="sw"><div class="swatch" style="background:#C2EE2F"></div><div class="info"><div class="name">Accent Hover</div><div class="hex">#C2EE2F</div></div></div>
    <div class="sw"><div class="swatch" style="background:#0A1F18"></div><div class="info"><div class="name">Accent On / Ink</div><div class="hex">#0A1F18</div></div></div>
    <div class="sw"><div class="swatch" style="background:#ECFCC0"></div><div class="info"><div class="name">Accent Soft</div><div class="hex">#ECFCC0</div></div></div>
    <div class="sw"><div class="swatch" style="background:#E8F0EC"></div><div class="info"><div class="name">Primary Soft</div><div class="hex">#E8F0EC</div></div></div>
  </div>
</body></html>
