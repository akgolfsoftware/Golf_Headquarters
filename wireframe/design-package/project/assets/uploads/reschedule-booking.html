<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>RescheduleBookingModal</title></head>
<body style="background: rgba(10,31,24,0.5); padding: 60px 40px;">
<div class="modal" style="background: white; border-radius: 20px; max-width: 600px; margin: 0 auto; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);">

  <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
    <div>
      <span class="page-eyebrow">Booking #BKG-2026-0429</span>
      <h2 style="font-family: var(--font-display); font-size: 22px; font-weight: 600; margin-top: 4px;">Endre <em style="color: var(--primary); font-weight: 400;">tidspunkt</em></h2>
    </div>
    <button style="background: transparent; border: 0; font-size: 24px; cursor: pointer; color: var(--text-secondary);">×</button>
  </div>

  <div style="background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px;">
    <div class="card-label" style="margin-bottom: 8px;">Nåværende booking</div>
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <b style="font-size: 15px; display: block;">Onsdag 13. mai 17:00</b>
        <div style="font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); margin-top: 2px;">Mulligan Fredrikstad · 60 min · Anders K</div>
      </div>
      <span style="text-decoration: line-through; color: var(--text-muted); font-family: var(--font-mono);">800 kr</span>
    </div>
  </div>

  <div style="text-align: center; color: var(--text-secondary); margin-bottom: 16px;">↓</div>

  <div style="margin-bottom: 20px;">
    <label class="card-label" style="display: block; margin-bottom: 10px;">Ny dato</label>
    <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px;"><div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary);">MAN</div><div style="font-family: var(--font-display); font-size: 14px; font-weight: 600;">18</div></div>
      <div style="text-align: center; padding: 10px 6px; border: 2px solid var(--primary); border-radius: 10px; background: rgba(0,88,64,0.06);"><div style="font-family: var(--font-mono); font-size: 9px; color: var(--primary); font-weight: 600;">TIR</div><div style="font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--primary);">19</div></div>
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px;"><div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary);">ONS</div><div style="font-family: var(--font-display); font-size: 14px; font-weight: 600;">20</div></div>
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px;"><div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary);">TOR</div><div style="font-family: var(--font-display); font-size: 14px; font-weight: 600;">21</div></div>
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px;"><div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary);">FRE</div><div style="font-family: var(--font-display); font-size: 14px; font-weight: 600;">22</div></div>
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px; opacity: 0.4;"><div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary);">LØR</div><div style="font-family: var(--font-display); font-size: 14px; font-weight: 600;">23</div></div>
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px; opacity: 0.4;"><div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary);">SØN</div><div style="font-family: var(--font-display); font-size: 14px; font-weight: 600;">24</div></div>
    </div>
  </div>

  <div style="margin-bottom: 20px;">
    <label class="card-label" style="display: block; margin-bottom: 10px;">Nytt klokkeslett · tirsdag 19. mai</label>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;">
      <button style="padding: 12px 6px; border: 1px solid var(--border); border-radius: 10px; background: white; font-family: var(--font-mono); font-size: 13px;">14:00</button>
      <button style="padding: 12px 6px; border: 1px solid var(--border); border-radius: 10px; background: white; font-family: var(--font-mono); font-size: 13px;">15:00</button>
      <button style="padding: 12px 6px; border: 2px solid var(--primary); border-radius: 10px; background: rgba(0,88,64,0.06); font-family: var(--font-mono); font-size: 13px; color: var(--primary); font-weight: 600;">16:30</button>
      <button style="padding: 12px 6px; border: 1px solid var(--border); border-radius: 10px; background: white; font-family: var(--font-mono); font-size: 13px;">18:00</button>
    </div>
  </div>

  <div style="background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.20); border-radius: 12px; padding: 12px 14px; font-size: 12px; color: #92400E; margin-bottom: 8px;">
    Endring innenfor 24t kan koste 200 kr. Endrer du nå (>48t igjen): <b>gratis</b>.
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);">
    <button class="btn btn-ghost" style="color: var(--danger); border-color: rgba(239,68,68,0.3);">Avbestill økt</button>
    <div style="display: flex; gap: 8px;">
      <button class="btn btn-ghost">Tilbake</button>
      <button class="btn btn-primary">Endre →</button>
    </div>
  </div>

</div>
</body>
</html>
