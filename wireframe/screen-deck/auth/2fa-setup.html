<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Sikre kontoen — AK Golf</title>
<link rel="stylesheet" href="../base.css">
<style>
  body { background: linear-gradient(180deg, #FAFAF7 0%, #F0F2F0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .auth-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--r-card); padding: 40px; width: 100%; max-width: 480px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
  .auth-logo { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 20px; }
  .auth-logo em { font-style: italic; font-weight: 400; color: var(--primary); }
  .step-bar { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 18px; }
  .step-dots { display: flex; gap: 6px; }
  .step-dot { width: 24px; height: 4px; border-radius: 2px; background: var(--border); }
  .step-dot.done { background: var(--primary); }
  .step-dot.current { background: var(--accent); }
  .auth-title { font-family: var(--font-display); font-size: 26px; font-weight: 600; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 6px; }
  .auth-title em { font-style: italic; font-weight: 400; color: var(--primary); }
  .auth-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 22px; line-height: 1.5; }
  .qr-wrap { display: flex; justify-content: center; padding: 20px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-card); margin-bottom: 16px; }
  .qr-grid { display: grid; grid-template-columns: repeat(8, 18px); grid-template-rows: repeat(8, 18px); gap: 0; padding: 8px; background: white; border-radius: 6px; }
  .qr-grid i { display: block; }
  .qr-grid i.on { background: #0A1F18; }
  .manual-code { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.10em; text-align: center; padding: 10px; background: var(--bg); border-radius: var(--r-btn); color: var(--text); margin-bottom: 22px; border: 1px dashed var(--border-strong); }
  .manual-code b { color: var(--primary); }
  .form-label { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 6px; }
  .form-input { width: 100%; padding: 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 18px; font-family: var(--font-mono); letter-spacing: 0.30em; text-align: center; }
  .form-input:focus { outline: 0; border-color: var(--primary); }
  .btn-full { width: 100%; justify-content: center; padding: 13px; font-size: 14px; font-weight: 600; margin-top: 18px; }
  .auth-skip { display: block; text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 14px; text-decoration: none; }
  .auth-skip:hover { color: var(--text-secondary); }
  .auth-meta { text-align: center; margin-top: 24px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--text-muted); }
  .auth-meta a { color: var(--text-muted); text-decoration: none; margin: 0 6px; }
</style>
</head>
<body>
<div>
  <div class="auth-card">
    <div class="auth-logo">AK <em>Golf</em></div>
    <div class="step-bar">
      <span>Steg 1 av 3</span>
      <div class="step-dots"><i class="step-dot current"></i><i class="step-dot"></i><i class="step-dot"></i></div>
    </div>
    <h1 class="auth-title"><em>Sikre</em> kontoen din</h1>
    <p class="auth-sub">Skann QR-koden i din authenticator-app (Google Authenticator, Authy eller 1Password).</p>

    <div class="qr-wrap">
      <div class="qr-grid">
        <i class="on"></i><i class="on"></i><i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i><i class="on"></i>
        <i class="on"></i><i></i><i class="on"></i><i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i>
        <i class="on"></i><i class="on"></i><i></i><i></i><i class="on"></i><i class="on"></i><i class="on"></i><i></i>
        <i></i><i class="on"></i><i></i><i class="on"></i><i></i><i></i><i class="on"></i><i class="on"></i>
        <i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i><i class="on"></i><i></i><i></i>
        <i></i><i class="on"></i><i class="on"></i><i></i><i></i><i class="on"></i><i class="on"></i><i></i>
        <i class="on"></i><i></i><i></i><i class="on"></i><i class="on"></i><i></i><i class="on"></i><i class="on"></i>
        <i class="on"></i><i class="on"></i><i></i><i></i><i></i><i class="on"></i><i></i><i class="on"></i>
      </div>
    </div>

    <div class="manual-code">Eller skriv inn manuelt: <b>AKBL-2026-MARKUS</b></div>

    <label class="form-label">Verifikasjonskode (6 siffer)</label>
    <input class="form-input" maxlength="6" value="284 691" placeholder="000 000">

    <a class="btn btn-primary btn-full" href="../coachhq/settings-sikkerhet.html">Bekreft og aktiver</a>
    <a href="../coachhq/settings-sikkerhet.html" class="auth-skip">Hopp over for nå</a>
  </div>
  <div class="auth-meta">
    <a href="#">Trenger hjelp?</a> · <a href="#">Personvern</a> · <a href="#">Vilkår</a>
  </div>
</div>
</body>
</html>
