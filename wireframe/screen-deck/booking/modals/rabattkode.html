<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>Modal · Rabattkode</title></head>
<body style="background: rgba(10,31,23,0.50); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">

<div style="background: white; border-radius: var(--r-card); width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.20); overflow: hidden;">

  <div style="padding: 24px 28px 16px; display: flex; justify-content: space-between; align-items: start;">
    <div>
      <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary);">Modal</span>
      <h2 style="font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin-top: 4px;">Skriv inn <em style="color: var(--primary); font-weight: 400;">rabattkode</em></h2>
    </div>
    <button style="background: transparent; border: 0; font-size: 22px; color: var(--text-secondary); cursor: pointer; line-height: 1;">×</button>
  </div>

  <div style="padding: 0 28px 24px;">
    <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">Har du en kampanjekode eller bedriftsrabatt? Skriv den inn her.</p>

    <label style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 6px;">Kode</label>
    <div style="display: flex; gap: 8px;">
      <input type="text" value="SUMMER25" style="flex: 1; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 14px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em;">
      <button class="btn btn-primary">Bruk →</button>
    </div>

    <div class="card" style="margin-top: 16px; background: rgba(16,185,129,0.06); border-color: var(--success);">
      <div style="display: flex; gap: 12px; align-items: start;">
        <div style="width: 32px; height: 32px; background: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; flex-shrink: 0;">✓</div>
        <div style="flex: 1;">
          <b style="font-family: var(--font-display); font-size: 14px; color: var(--success);">Kode SUMMER25 godkjent</b>
          <p style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">25 % avslag på ordinær pris.<br>Ny pris: <b style="color: var(--text);">1 650 kr</b> (spar 550 kr)</p>
        </div>
      </div>
    </div>
  </div>

  <div style="padding: 16px 28px; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
    <small style="font-size: 11px; color: var(--text-secondary);">Gyldig én gang per kunde · utløper 30. juni 2026</small>
    <button class="btn btn-primary">Bekreft →</button>
  </div>

</div>

</body></html>
