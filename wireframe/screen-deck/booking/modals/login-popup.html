<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>Modal · Logg inn</title></head>
<body style="background: rgba(10,31,23,0.50); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">

<div style="background: white; border-radius: var(--r-card); width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.20); overflow: hidden;">

  <div style="padding: 28px 28px 16px; display: flex; justify-content: space-between; align-items: start;">
    <div>
      <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary);">Konto kreves</span>
      <h2 style="font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin-top: 4px;">Logg inn for å <em style="color: var(--primary); font-weight: 400;">booke</em></h2>
      <p style="font-size: 13px; color: var(--text-secondary); margin-top: 6px;">Du får tilgang til klippekort, fakturaer og raskere booking neste gang.</p>
    </div>
    <button style="background: transparent; border: 0; font-size: 22px; color: var(--text-secondary); cursor: pointer; line-height: 1;">×</button>
  </div>

  <div style="padding: 0 28px 24px;">
    <div style="display: flex; flex-direction: column; gap: 12px;">
      <div>
        <label style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 6px;">E-post</label>
        <input type="email" placeholder="navn@eksempel.no" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 14px; font-family: inherit;">
      </div>
      <div>
        <label style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 6px;">Passord</label>
        <input type="password" placeholder="••••••••" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 14px; font-family: inherit;">
      </div>
      <div style="text-align: right;">
        <a href="#" style="color: var(--primary); font-size: 12px; text-decoration: none;">Glemt passord?</a>
      </div>
    </div>

    <button class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px; margin-top: 16px; font-weight: 600;">Logg inn →</button>

    <div style="display: flex; align-items: center; gap: 12px; margin: 18px 0; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-muted);">
      <span style="flex: 1; height: 1px; background: var(--border);"></span>
      <span>Eller</span>
      <span style="flex: 1; height: 1px; background: var(--border);"></span>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
      <button class="btn btn-ghost" style="justify-content: center; padding: 10px;">BankID</button>
      <button class="btn btn-ghost" style="justify-content: center; padding: 10px;">Google</button>
      <button class="btn btn-ghost" style="justify-content: center; padding: 10px;">Apple</button>
    </div>
  </div>

  <div style="padding: 14px 28px; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
    <span style="color: var(--text-secondary);">Ny her? <a href="../kunde-ny.html" style="color: var(--primary); text-decoration: none;">Registrer →</a></span>
    <a href="../kunde-ny.html" style="color: var(--text-secondary); text-decoration: none; font-size: 12px;">Eller fortsett som gjest →</a>
  </div>

</div>

</body></html>
