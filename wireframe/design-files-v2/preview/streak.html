<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px 28px;background:var(--surface)}
  .grid{display:grid;grid-template-columns:repeat(7,28px);gap:8px;justify-content:start}
  .day{font-family:'Inter';font-size:9px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-subtle);text-align:center;padding-bottom:2px}
  .dot{width:28px;height:28px;border-radius:50%}
  .done{background:#1A7D56}
  .miss{background:#E5E3DD}
  .today{background:#D1F843;box-shadow:0 0 0 3px rgba(209,248,67,.25)}
  .legend{display:flex;gap:18px;margin-top:14px}
  .key{display:flex;align-items:center;gap:6px;font-family:'Inter';font-size:11px;color:#5E5C57}
  .kdot{width:10px;height:10px;border-radius:50%}
</style></head><body>
  <div class="grid">
    <div class="day">Ma</div><div class="day">Ti</div><div class="day">On</div><div class="day">To</div><div class="day">Fr</div><div class="day">Lø</div><div class="day">Sø</div>
    <div class="dot done"></div><div class="dot done"></div><div class="dot miss"></div><div class="dot done"></div><div class="dot done"></div><div class="dot miss"></div><div class="dot done"></div>
    <div class="dot done"></div><div class="dot miss"></div><div class="dot done"></div><div class="dot done"></div><div class="dot done"></div><div class="dot today"></div><div class="dot miss"></div>
  </div>
  <div class="legend">
    <div class="key"><div class="kdot done"></div>Gjennomført</div>
    <div class="key"><div class="kdot miss"></div>Ikke gjort</div>
    <div class="key"><div class="kdot today"></div>I dag</div>
  </div>
</body></html>
