<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>body{margin:0;padding:18px;background:var(--surface);display:flex;gap:24px;align-items:center}
.frame{background:#fff;border:1px solid var(--line);border-radius:var(--radius-card);padding:12px 14px;box-shadow:var(--shadow-card)}</style>
</head><body>
<div class="frame" id="ringa"></div>
<div class="frame" id="ringb" style="flex:1"></div>
<script type="text/babel" src="../ui_kits/_shared/PyramideRinger.jsx"></script>
<script type="text/babel">
const sample = { fys: 0.82, tek: 0.65, slag: 0.48, spill: 0.34, turn: 0.18 };
ReactDOM.createRoot(document.getElementById('ringa')).render(
  <PyramideRinger size={130} progress={sample} showLabels />
);
ReactDOM.createRoot(document.getElementById('ringb')).render(
  <div style={{display:'flex',gap:18,alignItems:'center'}}>
    <PyramideRinger size={120} progress={sample} />
    <div style={{flex:1}}><PyramideLegend progress={sample} dense /></div>
  </div>
);
</script>
</body></html>
