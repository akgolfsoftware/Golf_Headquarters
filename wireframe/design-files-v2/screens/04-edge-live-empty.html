<!doctype html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<title>04 — Live Empty</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #0A1F18; color: #fff; overflow: hidden; }
  .screen {
    width: 100vw; min-height: 100vh; height: 100vh; background: #0A1F18;
    display: grid; grid-template-rows: 56px 1fr; position: relative; overflow: hidden;
  }
  .screen::before {
    content: ""; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 60%);
    pointer-events: none;
  }

  /* top bar */
  .top { display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid rgba(255,255,255,0.06); position: relative; z-index: 2; }
  .top-l { flex: 1; display: flex; align-items: center; gap: 10px; }
  .ended-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 100px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
    font: 600 11px/1 'Inter'; color: rgba(255,255,255,0.65); letter-spacing: 0.10em; text-transform: uppercase;
  }
  .ended-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.35); }
  .top-time { font: 500 12px/1 'JetBrains Mono'; color: rgba(255,255,255,0.55); font-variant-numeric: tabular-nums; }

  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.20); background: transparent;
    display: inline-flex; align-items: center; justify-content: center; color: #fff; cursor: pointer;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.10); }

  /* center */
  .center { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; position: relative; z-index: 1; text-align: center; }

  .icon-circle {
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
    display: inline-flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.40);
  }
  .icon-circle svg { width: 64px; height: 64px; stroke-width: 1.5; }

  .title {
    margin-top: 40px;
    font: italic 400 36px/1.2 'Inter Tight';
    letter-spacing: -0.02em; color: #fff;
  }
  .subtitle {
    margin-top: 16px; max-width: 480px;
    font: 400 16px/1.5 'Inter'; color: rgba(255,255,255,0.70);
  }

  .suggestions {
    margin-top: 32px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    width: 600px;
  }
  .suggest {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 18px; border-radius: 12px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.92); text-decoration: none;
    font: 500 14px/1 'Inter'; cursor: pointer;
    transition: background var(--duration-micro) var(--ease-out), border-color var(--duration-micro) var(--ease-out);
  }
  .suggest:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.25); }
  .suggest .arrow { color: rgba(255,255,255,0.50); display: inline-flex; }

  svg.lucide { stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<div class="screen" data-screen-label="04 Live Empty">

  <div class="top">
    <div class="top-l">
      <span class="ended-pill"><span class="ended-dot"></span>Avsluttet</span>
      <span class="top-time">14:42</span>
    </div>
    <button class="icon-btn" aria-label="Lukk">
      <svg class="lucide" viewBox="0 0 24 24" width="18" height="18"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="center">
    <div class="icon-circle">
      <svg class="lucide" viewBox="0 0 24 24"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
    </div>

    <div class="title">Ingen aktiv økt her.</div>
    <div class="subtitle">Økten er enten ferdig eller ikke startet enda. Velg en vei tilbake.</div>

    <div class="suggestions">
      <a class="suggest" href="#hjem">Tilbake til hjem <span class="arrow"><svg class="lucide" viewBox="0 0 24 24" width="14" height="14"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span></a>
      <a class="suggest" href="#plan">Se planen <span class="arrow"><svg class="lucide" viewBox="0 0 24 24" width="14" height="14"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span></a>
      <a class="suggest" href="#ny">Logg ny økt <span class="arrow"><svg class="lucide" viewBox="0 0 24 24" width="14" height="14"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span></a>
    </div>
  </div>

</div>
</body>
</html>
