<!-- @dsCard group="Tall/KPI" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sparkline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); margin:0; padding:28px; }
  h2{ font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 12px; }
  .stack{ max-width:420px; margin-bottom:26px; }
  .spark-row{ display:flex; align-items:center; gap:14px; padding:11px 14px; border:1px solid var(--border); border-radius:var(--r-md); background:var(--paper); margin-bottom:8px; }
  .sr-lbl{ font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-2); width:78px; flex:none; }
  .sr-graph{ flex:1; height:30px; }
  .sr-graph svg{ width:100%; height:30px; display:block; }
  .sr-val{ font-family:var(--mono); font-size:16px; font-weight:600; font-variant-numeric:tabular-nums; width:62px; text-align:right; flex:none; }
  .up{ color:var(--up); } .down{ color:var(--down); }

  .dark-wrap{ background:var(--t-bg); padding:22px; border-radius:var(--r-lg); }
  .dark-wrap .spark-row{ background:var(--t-bg-2); border-color:var(--t-line); }
  .dark-wrap .sr-lbl{ color:var(--t-fg-3); }
  .dark-wrap .sr-val{ color:var(--t-fg); }
  .dark-wrap .tu{ color:var(--t-up); } .dark-wrap .td{ color:var(--t-down); }
</style>
</head>
<body>
  <h2>Lyst tema — opptrend · nedtrend · flat</h2>
  <div class="stack">
    <div class="spark-row">
      <span class="sr-lbl">SG total</span>
      <div class="sr-graph">
        <svg viewBox="0 0 120 30" preserveAspectRatio="none">
          <defs><linearGradient id="gu" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--lime-deep)" stop-opacity=".28"/><stop offset="1" stop-color="var(--lime-deep)" stop-opacity="0"/></linearGradient></defs>
          <polyline points="0,24 20,22 40,23 60,16 80,12 100,8 120,3" fill="none" stroke="var(--lime-deep)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polygon points="0,24 20,22 40,23 60,16 80,12 100,8 120,3 120,30 0,30" fill="url(#gu)"/>
          <circle cx="120" cy="3" r="2.4" fill="var(--lime-deep)"/>
        </svg>
      </div>
      <span class="sr-val up">+1,8</span>
    </div>
    <div class="spark-row">
      <span class="sr-lbl">Putts</span>
      <div class="sr-graph">
        <svg viewBox="0 0 120 30" preserveAspectRatio="none">
          <defs><linearGradient id="gd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--down)" stop-opacity=".22"/><stop offset="1" stop-color="var(--down)" stop-opacity="0"/></linearGradient></defs>
          <polyline points="0,6 20,8 40,7 60,13 80,15 100,20 120,25" fill="none" stroke="var(--down)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polygon points="0,6 20,8 40,7 60,13 80,15 100,20 120,25 120,30 0,30" fill="url(#gd)"/>
          <circle cx="120" cy="25" r="2.4" fill="var(--down)"/>
        </svg>
      </div>
      <span class="sr-val down">30,1</span>
    </div>
    <div class="spark-row">
      <span class="sr-lbl">Driving</span>
      <div class="sr-graph">
        <svg viewBox="0 0 120 30" preserveAspectRatio="none">
          <polyline points="0,15 20,14 40,16 60,15 80,15 100,14 120,15" fill="none" stroke="var(--muted-2)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="120" cy="15" r="2.4" fill="var(--muted-2)"/>
        </svg>
      </div>
      <span class="sr-val" style="color:var(--muted)">271</span>
    </div>
  </div>

  <h2>Mørk terminal</h2>
  <div class="dark-wrap dark">
    <div class="stack" style="margin-bottom:0">
      <div class="spark-row">
        <span class="sr-lbl">Form</span>
        <div class="sr-graph">
          <svg viewBox="0 0 120 30" preserveAspectRatio="none">
            <defs><linearGradient id="gtu" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--lime)" stop-opacity=".22"/><stop offset="1" stop-color="var(--lime)" stop-opacity="0"/></linearGradient></defs>
            <polyline points="0,25 20,21 40,22 60,15 80,11 100,7 120,3" fill="none" stroke="var(--lime)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <polygon points="0,25 20,21 40,22 60,15 80,11 100,7 120,3 120,30 0,30" fill="url(#gtu)"/>
            <circle cx="120" cy="3" r="2.4" fill="var(--lime)"/>
          </svg>
        </div>
        <span class="sr-val tu">94</span>
      </div>
      <div class="spark-row">
        <span class="sr-lbl">GIR</span>
        <div class="sr-graph">
          <svg viewBox="0 0 120 30" preserveAspectRatio="none">
            <polyline points="0,8 20,9 40,11 60,12 80,16 100,18 120,22" fill="none" stroke="var(--t-down)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="120" cy="22" r="2.4" fill="var(--t-down)"/>
          </svg>
        </div>
        <span class="sr-val td">68 %</span>
      </div>
    </div>
  </div>
</body>
</html>
