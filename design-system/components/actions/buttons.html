<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Knapper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); margin:0; padding:28px; }
  h2{ font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 12px; }
  .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:22px; }
  .btn{ font-family:var(--sans); font-weight:600; border:1px solid transparent; border-radius:var(--r-md); cursor:pointer; transition:filter .15s ease, background .15s ease; }
  .sm{ height:36px; padding:0 14px; font-size:13px; } .md{ height:44px; padding:0 18px; font-size:15px; } .lg{ height:52px; padding:0 22px; font-size:16px; }
  .primary{ background:var(--forest); color:var(--lime); }
  .primary:hover{ filter:brightness(1.08); }
  .accent{ background:var(--lime); color:var(--forest); font-weight:700; }
  .accent:hover{ filter:brightness(1.05); }
  .secondary{ background:var(--sand); color:var(--ink); border-color:var(--border); }
  .ghost{ background:transparent; color:var(--ink); }
  .ghost:hover{ background:var(--sand); }
  .pill{ border-radius:var(--r-full); font-family:var(--mono); font-weight:700; font-size:12px; letter-spacing:.06em; text-transform:uppercase; }
  .dark-wrap{ background:var(--t-bg); padding:22px; border-radius:var(--r-lg); }
</style>
</head>
<body>
  <h2>Standard (radius-14, setningsstart)</h2>
  <div class="row">
    <button class="btn md primary">Start dagens økt</button>
    <button class="btn md accent">Lagre</button>
    <button class="btn md secondary">Avbryt</button>
    <button class="btn md ghost">Mer</button>
  </div>

  <h2>Størrelser — sm 36 · md 44 · lg 52</h2>
  <div class="row">
    <button class="btn sm primary">Liten</button>
    <button class="btn md primary">Medium</button>
    <button class="btn lg primary">Stor</button>
  </div>

  <h2>Pill (signatur-CTA · chips · filter)</h2>
  <div class="row">
    <button class="btn md accent pill">Book økt</button>
    <button class="btn sm secondary pill">Alle</button>
    <button class="btn sm secondary pill">Putting</button>
  </div>

  <h2>Mørkt (AgencyOS · terminal)</h2>
  <div class="dark-wrap dark">
    <div class="row" style="margin:0">
      <button class="btn md accent">Tildel plan</button>
      <button class="btn md primary" style="background:var(--t-bg-3);color:var(--lime);border-color:var(--t-line-2)">Sekundær</button>
      <button class="btn md ghost" style="color:var(--t-fg);">Avvis</button>
    </div>
  </div>
</body>
</html>
