<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eyebrow — Identitet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); margin: 0; padding: 28px; }
  h2 { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }
  .group { margin-bottom: 34px; }
  .row { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }

  .eyebrow {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    letter-spacing: .16em; text-transform: uppercase; color: var(--muted-2);
  }
  .eyebrow.forest { color: var(--forest); }

  .eyebrow-chip {
    display: inline-flex; align-items: center;
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    letter-spacing: .16em; text-transform: uppercase;
    color: var(--lime); background: var(--forest);
    padding: 5px 11px; border-radius: var(--r-full);
  }

  .dark { background: var(--t-bg); padding: 22px; border-radius: var(--r-lg); }
  .dark h2 { color: var(--t-fg-3); }
  .dark .eyebrow { color: var(--t-fg-3); }
</style>
</head>
<body>

<div class="group">
  <h2>Muted (default)</h2>
  <div class="row">
    <span class="eyebrow">Hvem trenger meg</span>
    <span class="eyebrow">Strokes gained</span>
    <span class="eyebrow">Dagens økt</span>
  </div>
</div>

<div class="group">
  <h2>Forest-farget</h2>
  <div class="row">
    <span class="eyebrow forest">Hvem trenger meg</span>
    <span class="eyebrow forest">Strokes gained</span>
    <span class="eyebrow forest">Dagens økt</span>
  </div>
</div>

<div class="group">
  <h2>Lime-på-forest chip</h2>
  <div class="row">
    <span class="eyebrow-chip">Hvem trenger meg</span>
    <span class="eyebrow-chip">Strokes gained</span>
    <span class="eyebrow-chip">Dagens økt</span>
  </div>
</div>

<div class="dark">
  <h2>Mørkt (AgencyOS)</h2>
  <div class="row">
    <span class="eyebrow">Hvem trenger meg</span>
    <span class="eyebrow forest" style="color:var(--lime)">Strokes gained</span>
    <span class="eyebrow-chip">Dagens økt</span>
  </div>
</div>

</body>
</html>
