<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dots — Identitet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); margin: 0; padding: 28px; }
  h2 { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }
  .group { margin-bottom: 34px; }
  .row { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .lbl { display: inline-flex; align-items: center; gap: 8px; }
  .live-txt { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--forest); }
  .pres-txt { font-size: 13px; color: var(--muted); }

  @keyframes pulse { 50% { opacity: .4; } }

  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--lime);
    box-shadow: 0 0 0 3px var(--lime-bg); animation: pulse 1.6s infinite;
  }
  .pulse-dot.forest { background: var(--ok); box-shadow: 0 0 0 3px rgba(26,125,86,.18); }

  .presence { border-radius: 50%; }
  .presence.online { background: var(--ok); }
  .presence.away { background: var(--warn); }
  .presence.offline { background: var(--muted-2); }
  .p8 { width: 8px; height: 8px; }
  .p10 { width: 10px; height: 10px; }
  .p12 { width: 12px; height: 12px; }

  /* Avatar med presence-prikk i hjørnet */
  .av-wrap { position: relative; width: 44px; height: 44px; }
  .av-ring { width: 44px; height: 44px; border-radius: var(--r-full); padding: 3px;
    background: linear-gradient(135deg, var(--forest), var(--forest-deep)); }
  .av-inner { width: 100%; height: 100%; border-radius: var(--r-full); background: var(--forest-deep);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 14px; color: var(--lime); }
  .corner { position: absolute; right: -1px; bottom: -1px; width: 13px; height: 13px;
    border-radius: 50%; border: 2.5px solid var(--cream); }
  .corner.online { background: var(--ok); }
  .corner.away { background: var(--warn); }
  .corner.offline { background: var(--muted-2); }

  .dark { background: var(--t-bg); padding: 22px; border-radius: var(--r-lg); }
  .dark h2 { color: var(--t-fg-3); }
  .dark .live-txt { color: var(--lime); }
  .dark .pres-txt { color: var(--t-fg-2); }
  .dark .corner { border-color: var(--t-bg); }
</style>
</head>
<body>

<div class="group">
  <h2>PulseDot · live-puls</h2>
  <div class="row">
    <span class="lbl"><span class="pulse-dot"></span><span class="live-txt">Live nå</span></span>
    <span class="lbl"><span class="pulse-dot forest"></span><span class="live-txt">Økt pågår</span></span>
  </div>
</div>

<div class="group">
  <h2>PresenceDot · solide statusprikker</h2>
  <div class="row">
    <span class="lbl"><span class="presence online p10"></span><span class="pres-txt">Online</span></span>
    <span class="lbl"><span class="presence away p10"></span><span class="pres-txt">Borte</span></span>
    <span class="lbl"><span class="presence offline p10"></span><span class="pres-txt">Offline</span></span>
  </div>
  <div class="row" style="margin-top:14px">
    <span class="presence online p8"></span>
    <span class="presence online p10"></span>
    <span class="presence online p12"></span>
  </div>
</div>

<div class="group">
  <h2>Presence på avatar-hjørne</h2>
  <div class="row">
    <span class="av-wrap"><span class="av-ring"><span class="av-inner">ØR</span></span><span class="corner online"></span></span>
    <span class="av-wrap"><span class="av-ring"><span class="av-inner">ØR</span></span><span class="corner away"></span></span>
    <span class="av-wrap"><span class="av-ring"><span class="av-inner">ØR</span></span><span class="corner offline"></span></span>
  </div>
</div>

<div class="dark">
  <h2>Mørkt (AgencyOS)</h2>
  <div class="row">
    <span class="lbl"><span class="pulse-dot"></span><span class="live-txt">Live nå</span></span>
    <span class="lbl"><span class="presence online p10"></span><span class="pres-txt">Online</span></span>
    <span class="av-wrap"><span class="av-ring"><span class="av-inner">ØR</span></span><span class="corner online"></span></span>
  </div>
</div>

</body>
</html>
