<!-- @dsCard group="Identitet" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Greeting — Identitet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); margin: 0; padding: 28px; }
  h2 { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }
  .group { margin-bottom: 34px; }

  .eyebrow {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    letter-spacing: .16em; text-transform: uppercase; color: var(--muted-2);
    display: block; margin-bottom: 10px;
  }
  .greeting {
    font-family: var(--disp); font-size: 42px; font-weight: 700;
    letter-spacing: -0.035em; line-height: 1.05; margin: 0;
  }
  .greeting em { font-style: italic; color: var(--forest); font-weight: 500; }

  .dark { background: var(--t-bg); padding: 22px; border-radius: var(--r-lg); }
  .dark h2 { color: var(--t-fg-3); }
  .dark .eyebrow { color: var(--t-fg-3); }
  .dark .greeting { color: var(--t-fg); }
  .dark .greeting em { color: var(--lime); }
</style>
</head>
<body>

<div class="group">
  <h2>Standard (lyst)</h2>
  <span class="eyebrow">Uke 25 · Tirsdag 17. juni</span>
  <p class="greeting">Hei, <em>Øyvind.</em></p>
</div>

<div class="group">
  <h2>Coach-variant</h2>
  <span class="eyebrow">God morgen</span>
  <p class="greeting">Klar for dagen, <em>Anders?</em></p>
</div>

<div class="dark">
  <h2>Mørkt (AgencyOS) · em i lime</h2>
  <span class="eyebrow">Uke 25 · Tirsdag 17. juni</span>
  <p class="greeting">Hei, <em>Anders.</em></p>
</div>

</body>
</html>
