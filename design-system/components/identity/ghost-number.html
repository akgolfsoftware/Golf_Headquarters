<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ghost Number — Identitet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); margin: 0; padding: 28px; }
  h2 { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }
  .group { margin-bottom: 34px; }
  .grid { display: flex; gap: 18px; flex-wrap: wrap; }

  .kpi {
    position: relative; overflow: hidden;
    width: 220px; min-height: 130px;
    background: var(--paper); border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 18px; box-shadow: var(--sh-sm);
  }
  .ghost {
    position: absolute; right: -8px; bottom: -22px; margin: 0;
    font-family: var(--mono); font-weight: 700; font-size: 96px; line-height: 1;
    letter-spacing: -0.04em; color: var(--border); user-select: none; pointer-events: none;
  }
  .ghost.forest { color: var(--forest); opacity: .07; }
  .kpi-content { position: relative; z-index: 1; }
  .kpi-label { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted-2); margin: 0 0 6px; }
  .kpi-value { font-family: var(--disp); font-size: 38px; font-weight: 700; letter-spacing: -0.03em;
    margin: 0; line-height: 1; }
  .kpi-value .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .kpi-delta { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--ok);
    margin: 8px 0 0; }

  .dark { background: var(--t-bg); padding: 22px; border-radius: var(--r-lg); }
  .dark h2 { color: var(--t-fg-3); }
  .dark .kpi { background: var(--t-bg-3); border-color: var(--t-line-2); box-shadow: none; }
  .dark .ghost { color: var(--t-line-2); }
  .dark .ghost.lime { color: var(--lime); opacity: .08; }
  .dark .kpi-label { color: var(--t-fg-3); }
  .dark .kpi-value { color: var(--t-fg); }
  .dark .kpi-delta { color: var(--t-up); }
</style>
</head>
<body>

<div class="group">
  <h2>Ghost-number bak KPI · lyst</h2>
  <div class="grid">
    <div class="kpi">
      <p class="ghost" style="font-family:var(--mono)">48,3</p>
      <div class="kpi-content">
        <p class="kpi-label">Snittscore</p>
        <p class="kpi-value"><span class="num">48,3</span></p>
        <p class="kpi-delta">▲ 1,2 sist 30 d</p>
      </div>
    </div>
    <div class="kpi">
      <p class="ghost forest" style="font-family:var(--mono)">+2,4</p>
      <div class="kpi-content">
        <p class="kpi-label">SG totalt</p>
        <p class="kpi-value"><span class="num">+2,4</span></p>
        <p class="kpi-delta">▲ 0,6 sist runde</p>
      </div>
    </div>
  </div>
</div>

<div class="dark">
  <h2>Ghost-number · mørkt (AgencyOS)</h2>
  <div class="grid">
    <div class="kpi">
      <p class="ghost" style="font-family:var(--mono)">48,3</p>
      <div class="kpi-content">
        <p class="kpi-label">Snittscore</p>
        <p class="kpi-value"><span class="num">48,3</span></p>
        <p class="kpi-delta">▲ 1,2 sist 30 d</p>
      </div>
    </div>
    <div class="kpi">
      <p class="ghost lime" style="font-family:var(--mono)">12</p>
      <div class="kpi-content">
        <p class="kpi-label">Aktive spillere</p>
        <p class="kpi-value"><span class="num">12</span></p>
        <p class="kpi-delta">▲ 3 denne uka</p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
