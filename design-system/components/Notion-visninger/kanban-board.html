<!-- @dsCard group="Notion-visninger" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
.lc{ max-width:620px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
.lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
.lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
.lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
.lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
.lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
.lc-sub b{ color:var(--ink); font-weight:600; }
.hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
.hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

/* KANBAN */
.kb-cols{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.kb-col{ background:var(--cream-2); border:1px solid var(--border-soft); border-radius:var(--r-md); padding:11px; min-height:120px; transition:.15s; }
.kb-col.drag-over{ border-color:var(--lime-dim); background:var(--lime-bg); box-shadow:inset 0 0 0 1px var(--lime-dim); }
.kb-col-h{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.kb-col-h .ct{ font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:600; }
.kb-col-h .cn{ font-family:var(--mono); font-size:10px; font-weight:700; background:var(--sand); color:var(--muted); border-radius:var(--r-full); padding:1px 8px; min-width:22px; text-align:center; }
.kb-card{ background:var(--paper); border:1px solid var(--border); border-radius:var(--r-sm); padding:11px; margin-bottom:8px; cursor:grab; box-shadow:var(--sh-sm); transition:transform .14s, box-shadow .14s; }
.kb-card:hover{ transform:translateY(-2px); box-shadow:var(--sh-md); }
.kb-card.dragging{ opacity:.4; }
.kb-card .kc-t{ font-weight:600; font-size:12.5px; margin-bottom:6px; }
.kb-card .kc-m{ display:flex; align-items:center; justify-content:space-between; }
.kb-card .kc-tag{ font-family:var(--mono); font-size:8.5px; letter-spacing:.04em; text-transform:uppercase; padding:2px 6px; border-radius:4px; background:var(--sand); color:var(--muted); }
.kb-card .kc-tag.arg{ background:var(--lime-bg-2); color:var(--forest); }
.kb-card .kc-av{ width:22px; height:22px; border-radius:var(--r-full); background:var(--forest); color:var(--lime); display:grid; place-items:center; font-family:var(--mono); font-size:8.5px; font-weight:700; }
</style>
</head>
<body>

<div class="lc">
  <div class="lc-h"><span class="ti">Kanban<em>Board</em></span><span class="lc-num">02 · OPPGAVER</span></div>
  <div class="lc-sub">Dra kort mellom kolonner — <b>antall teller automatisk</b>. Hover løfter kortet.</div>
  <div class="kb-cols" id="kanban">
    <div class="kb-col" data-col="todo">
      <div class="kb-col-h"><span class="ct">Å gjøre</span><span class="cn">2</span></div>
      <div class="kb-card" draggable="true"><div class="kc-t">Send ukesplan til Øyvind</div><div class="kc-m"><span class="kc-tag arg">ARG</span><span class="kc-av">AK</span></div></div>
      <div class="kb-card" draggable="true"><div class="kc-t">Gjennomgå TrackMan-data</div><div class="kc-m"><span class="kc-tag">OTT</span><span class="kc-av">AK</span></div></div>
    </div>
    <div class="kb-col" data-col="doing">
      <div class="kb-col-h"><span class="ct">Pågår</span><span class="cn">1</span></div>
      <div class="kb-card" draggable="true"><div class="kc-t">Skriv coach-notat</div><div class="kc-m"><span class="kc-tag">PUTT</span><span class="kc-av">AK</span></div></div>
    </div>
    <div class="kb-col" data-col="done">
      <div class="kb-col-h"><span class="ct">Ferdig</span><span class="cn">1</span></div>
      <div class="kb-card" draggable="true"><div class="kc-t">Book test-uke</div><div class="kc-m"><span class="kc-tag">FYS</span><span class="kc-av">AK</span></div></div>
    </div>
  </div>
  <div class="hint">Dra og slipp et kort</div>
</div>

<script>
function wireKanban(rootId, cardSel){
  const root=document.getElementById(rootId);
  let dragged=null;
  root.querySelectorAll(cardSel).forEach(makeDraggable);
  function makeDraggable(card){
    card.addEventListener('dragstart', ()=>{ dragged=card; card.classList.add('dragging'); });
    card.addEventListener('dragend', ()=>{ card.classList.remove('dragging'); dragged=null; recount(); });
  }
  root.querySelectorAll('[data-col]').forEach(col=>{
    col.addEventListener('dragover', e=>{ e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', ()=> col.classList.remove('drag-over'));
    col.addEventListener('drop', e=>{
      e.preventDefault(); col.classList.remove('drag-over');
      if(dragged) col.appendChild(dragged);
      recount();
    });
  });
  function recount(){
    root.querySelectorAll('[data-col]').forEach(col=>{
      const n=col.querySelectorAll(cardSel).length;
      col.querySelector('.cn').textContent=n;
    });
  }
}
wireKanban('kanban', '.kb-card');
</script>
</body>
</html>
