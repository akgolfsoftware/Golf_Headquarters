<!-- @dsCard group="Notion-visninger" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
.lc{ max-width:620px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
.lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
.lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
.lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
.lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
.lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
.lc-sub b{ color:var(--ink); font-weight:600; }
.hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
.hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

/* HEATMAP CALENDAR */
.hm{ display:flex; gap:3px; overflow-x:auto; padding-bottom:4px; }
.hm-wk{ display:flex; flex-direction:column; gap:3px; }
.hm-cell{ width:15px; height:15px; border-radius:3px; border:1px solid var(--border-soft); cursor:pointer; transition:transform .1s; }
.hm-cell:hover{ transform:scale(1.25); border-color:var(--forest); }
.l0{ background:var(--sand); } .l1{ background:rgba(209,248,67,.25); } .l2{ background:rgba(209,248,67,.5); } .l3{ background:rgba(0,88,64,.55); } .l4{ background:var(--forest); }
.hm-leg{ display:flex; align-items:center; gap:5px; justify-content:flex-end; margin-top:12px; font-family:var(--mono); font-size:9px; color:var(--muted-2); }
.hm-leg i{ width:13px; height:13px; border-radius:3px; border:1px solid var(--border-soft); display:inline-block; }
.hm-months{ display:flex; gap:3px; margin-bottom:6px; font-family:var(--mono); font-size:9px; color:var(--muted-2); padding-left:2px; }

/* tooltip */
.tip{ position:fixed; z-index:500; pointer-events:none; opacity:0; transform:translateY(4px); transition:opacity .12s, transform .12s; background:#0A1410; color:#EAF2EC; border:1px solid #243A2E; border-radius:8px; padding:9px 11px; box-shadow:var(--sh-lg); font-size:11.5px; max-width:230px; line-height:1.45; }
.tip.show{ opacity:1; transform:translateY(0); }
.tip .tt-h{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--lime); margin-bottom:4px; }
.tip .tt-r{ display:flex; justify-content:space-between; gap:14px; font-family:var(--mono); font-size:10.5px; color:#9DB0A4; }
.tip .tt-r b{ color:#EAF2EC; }
</style>
</head>
<body>

<div class="lc">
  <div class="lc-h"><span class="ti">Heatmap<em>Calendar</em></span><span class="lc-num">12 UKER</span></div>
  <div class="lc-sub">GitHub-stil aktivitet. <b>Hover en dag</b> for økter og minutter. Mørkere = mer trent.</div>
  <div class="hm-months" id="hmMonths"></div>
  <div class="hm" id="heatmap"></div>
  <div class="hm-leg"><span>Mindre</span><i class="l0"></i><i class="l1"></i><i class="l2"></i><i class="l3"></i><i class="l4"></i><span>Mer</span></div>
  <div class="hint">Hover en rute for dagens økter</div>
</div>

<div class="tip" id="tip"></div>

<script>
function nf(v,d=1){ return v.toLocaleString('nb-NO',{minimumFractionDigits:d,maximumFractionDigits:d}); }
const tip=document.getElementById('tip');
function showTip(html,e){ tip.innerHTML=html; tip.classList.add('show'); positionTip(e); }
function positionTip(e){ const pad=14,r=tip.getBoundingClientRect(); let x=e.clientX+pad,y=e.clientY+pad; if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-pad; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-pad; tip.style.left=x+'px'; tip.style.top=y+'px'; }
function hideTip(){ tip.classList.remove('show'); }

(function(){
  const hm=document.getElementById('heatmap');
  const months=document.getElementById('hmMonths');
  const monthNames=['Apr','Apr','Apr','Mai','Mai','Mai','Mai','Jun','Jun','Jun','Jun','Jun'];
  const dayLabels=['mandag','tirsdag','onsdag','torsdag','fredag','lørdag','søndag'];
  let seed=7;
  function rnd(){ seed=(seed*9301+49297)%233280; return seed/233280; }
  for(let w=0; w<12; w++){
    const col=document.createElement('div'); col.className='hm-wk';
    for(let d=0; d<7; d++){
      const cell=document.createElement('div');
      const r=rnd();
      let lvl = r<0.32?0 : r<0.55?1 : r<0.75?2 : r<0.9?3 : 4;
      if(d===6 && r<0.7) lvl=0;
      cell.className='hm-cell l'+lvl;
      const mins=[0,30,45,75,110][lvl];
      const sessions=[0,1,1,2,3][lvl];
      const label = `${dayLabels[d]}, uke ${24-11+w<1?52+(24-11+w):24-11+w}`;
      cell.addEventListener('mousemove', e=>{
        showTip(`<div class="tt-h">${label}</div>`+
          (sessions? `<div class="tt-r"><span>Økter</span><b>${sessions}</b></div><div class="tt-r"><span>Minutter</span><b>${mins}</b></div>`
                   : `<div class="tt-r"><span>Hviledag</span><b>—</b></div>`), e);
      });
      cell.addEventListener('mouseleave', hideTip);
      col.appendChild(cell);
    }
    hm.appendChild(col);
    const m=document.createElement('span'); m.style.flex='1'; m.textContent = (w===0||monthNames[w]!==monthNames[w-1])?monthNames[w]:'';
    months.appendChild(m);
  }
})();
</script>
</body>
</html>
