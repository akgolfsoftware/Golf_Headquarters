<!-- @dsCard group="Data-viz" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SgBar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
  .lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
  .lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
  .lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
  .lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
  .lc-sub b{ color:var(--ink); font-weight:600; }
  .hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
  .hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

  .tip{ position:fixed; z-index:500; pointer-events:none; opacity:0; transform:translateY(4px); transition:opacity .12s, transform .12s; background:#0A1410; color:#EAF2EC; border:1px solid #243A2E; border-radius:8px; padding:9px 11px; box-shadow:var(--sh-lg); font-size:11.5px; max-width:230px; line-height:1.45; }
  .tip.show{ opacity:1; transform:translateY(0); }
  .tip .tt-h{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--lime); margin-bottom:4px; }
  .tip .tt-r{ display:flex; justify-content:space-between; gap:14px; font-family:var(--mono); font-size:10.5px; color:#9DB0A4; }
  .tip .tt-r b{ color:#EAF2EC; }

  .sgr{ display:grid; grid-template-columns:52px 1fr 48px; gap:11px; align-items:center; margin-bottom:11px; }
  .sgr .lbl{ font-family:var(--mono); font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.04em; }
  .sgr .track{ height:14px; background:var(--sand); border:1px solid var(--border); border-radius:var(--r-full); position:relative; overflow:hidden; cursor:pointer; }
  .sgr .zero{ position:absolute; left:50%; top:-2px; bottom:-2px; width:1.5px; background:var(--muted-2); opacity:.35; z-index:2; }
  .sgr .fill{ position:absolute; top:1px; bottom:1px; width:0; border-radius:var(--r-full); transition:width .6s cubic-bezier(.22,1,.36,1); }
  .sgr .fill.pos{ left:50%; background:linear-gradient(90deg,var(--forest),var(--up)); }
  .sgr .fill.neg{ right:50%; background:linear-gradient(90deg,#d98f8f,var(--urgent)); }
  .sgr .val{ font-family:var(--mono); font-size:12px; font-weight:600; text-align:right; }
  .sgr .val.pos{ color:var(--up); } .sgr .val.neg{ color:var(--down); }
</style>
</head>
<body>
  <div class="lc">
    <div class="lc-h"><span class="ti">Sg<em>Bar</em></span><span class="lc-num">STROKES GAINED</span></div>
    <div class="lc-sub">Kompakt SG-fordeling med <b>null-akse i midten</b>. Grønn høyre = over baseline, rød venstre = under. Hover for verdi.</div>
    <div id="sgRows"></div>
    <div class="hint">Hover en bar for vs baseline</div>
  </div>

  <div class="tip" id="tip"></div>
<script>
function nf(v,d=1){ return v.toLocaleString('nb-NO',{minimumFractionDigits:d,maximumFractionDigits:d}); }
const tip=document.getElementById('tip');
function showTip(html,e){ tip.innerHTML=html; tip.classList.add('show'); positionTip(e); }
function positionTip(e){ const pad=14,r=tip.getBoundingClientRect(); let x=e.clientX+pad,y=e.clientY+pad; if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-pad; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-pad; tip.style.left=x+'px'; tip.style.top=y+'px'; }
function hideTip(){ tip.classList.remove('show'); }
(function(){
  const rows=[
    {key:'OTT', name:'Off the tee', val:0.7},
    {key:'APP', name:'Approach', val:0.9},
    {key:'ARG', name:'Around green', val:-0.4},
    {key:'PUTT', name:'Putting', val:0.5},
  ];
  const root=document.getElementById('sgRows');
  const MAX=1.0;
  rows.forEach((r,i)=>{
    const pos=r.val>=0;
    const w=Math.min(Math.abs(r.val)/MAX*50,50);
    const el=document.createElement('div'); el.className='sgr';
    el.innerHTML=`
      <span class="lbl">${r.key}</span>
      <div class="track"><span class="zero"></span><span class="fill ${pos?'pos':'neg'}" style="width:0"></span></div>
      <span class="val ${pos?'pos':'neg'}">${pos?'+':''}${nf(r.val)}</span>`;
    root.appendChild(el);
    requestAnimationFrame(()=> setTimeout(()=>{ el.querySelector('.fill').style.width=w+'%'; }, 120+i*80));
    const track=el.querySelector('.track');
    track.addEventListener('mousemove', e=> showTip(
      `<div class="tt-h">${r.key} · ${r.name}</div>`+
      `<div class="tt-r"><span>SG</span><b style="color:${pos?'#4FD08A':'#F0683E'}">${pos?'+':''}${nf(r.val)}</b></div>`+
      `<div class="tt-r"><span>vs baseline</span><b>${pos?'over':'under'}</b></div>`, e));
    track.addEventListener('mouseleave', hideTip);
  });
})();
</script>
</body>
</html>
