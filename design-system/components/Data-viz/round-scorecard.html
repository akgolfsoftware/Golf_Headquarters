<!-- @dsCard group="Data-viz" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RoundScorecard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .lc{ max-width:720px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
  .lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
  .lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
  .lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
  .lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
  .lc-sub b{ color:var(--ink); font-weight:600; }
  .hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
  .hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

  .tip{ position:fixed; z-index:500; pointer-events:none; opacity:0; transform:translateY(4px); transition:opacity .12s, transform .12s; background:#0A1410; color:#EAF2EC; border:1px solid #243A2E; border-radius:8px; padding:9px 11px; box-shadow:var(--sh-lg); font-size:11.5px; max-width:230px; line-height:1.45; }
  .tip.show{ opacity:1; transform:translateY(0); }
  .tip .tt-h{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--lime); margin-bottom:4px; }
  .tip .tt-r{ display:flex; justify-content:space-between; gap:14px; font-family:var(--mono); font-size:10.5px; color:#9DB0A4; }
  .tip .tt-r b{ color:#EAF2EC; }

  .sc-wrap{ overflow-x:auto; border:1px solid var(--border); border-radius:var(--r-md); }
  table.sc{ width:100%; border-collapse:collapse; font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:12px; }
  table.sc th, table.sc td{ padding:8px 6px; text-align:center; border-bottom:1px solid var(--border-soft); border-right:1px solid var(--border-soft); white-space:nowrap; }
  table.sc th{ font-size:9px; letter-spacing:.04em; text-transform:uppercase; color:var(--muted-2); font-weight:600; background:var(--cream-2); }
  table.sc td:first-child, table.sc th:first-child{ text-align:left; font-family:var(--sans); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:600; position:sticky; left:0; background:var(--paper); border-right:1px solid var(--border); }
  table.sc th:first-child{ background:var(--cream-2); }
  table.sc .sum{ font-weight:700; background:var(--cream-2); color:var(--ink); }
  table.sc th.sum{ color:var(--forest); }
  table.sc tr:last-child td{ border-bottom:0; }
  .par-row td{ color:var(--muted); }
  .sc-cell{ cursor:pointer; font-weight:700; color:var(--ink); }
  .sc-cell.birdie{ background:var(--lime); color:var(--forest-deep); }
  .sc-cell.eagle{ background:var(--lime-deep); color:var(--forest-deep); box-shadow:inset 0 0 0 1.5px var(--forest); }
  .sc-cell.bogey{ background:rgba(163,45,45,.12); color:var(--down); }
</style>
</head>
<body>
  <div class="lc">
    <div class="lc-h"><span class="ti">Round<em>Scorecard</em></span><span class="lc-num">BOSSUM · 71 (−1)</span></div>
    <div class="lc-sub">Full scorekort med <b>Ut / Inn / Tot</b> summert. Birdie = lime, bogey = rød tone, eagle uthevet. Hover en celle for SG.</div>
    <div class="sc-wrap">
      <table class="sc" id="scTable"></table>
    </div>
    <div class="hint">Hover en score-celle for SG på hullet</div>
  </div>

  <div class="tip" id="tip"></div>
<script>
function nf(v,d=1){ return v.toLocaleString('nb-NO',{minimumFractionDigits:d,maximumFractionDigits:d}); }
const tip=document.getElementById('tip');
function showTip(html,e){ tip.innerHTML=html; tip.classList.add('show'); positionTip(e); }
function positionTip(e){ const pad=14,r=tip.getBoundingClientRect(); let x=e.clientX+pad,y=e.clientY+pad; if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-pad; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-pad; tip.style.left=x+'px'; tip.style.top=y+'px'; }
function hideTip(){ tip.classList.remove('show'); }
(function(){
  const holes=[
    [4,3],[5,4],[4,4],[3,3],[4,4],[4,5],[5,4],[3,3],[4,5],
    [4,4],[3,2],[5,4],[4,4],[4,4],[3,3],[5,5],[4,4],[4,6]
  ];
  const sg=[0.4,0.9,0,0.2,0,-0.6,0.5,0,-0.4, 0,1.1,0.7,0,0.1,0.3,0,0,-0.8];
  function cls(par,sc){ const d=sc-par; if(d<=-2)return'eagle'; if(d===-1)return'birdie'; if(d===0)return'par'; return'bogey'; }
  function sum(arr,from,to,idx){ let s=0; for(let i=from;i<to;i++) s+=holes[i][idx]; return s; }
  const outPar=sum(holes,0,9,0), inPar=sum(holes,9,18,0);
  const outSc=sum(holes,0,9,1), inSc=sum(holes,9,18,1);
  const totPar=outPar+inPar, totSc=outSc+inSc;
  const table=document.getElementById('scTable');

  // header
  let head='<tr><th>Hull</th>';
  for(let i=1;i<=9;i++) head+=`<th>${i}</th>`;
  head+='<th class="sum">Ut</th>';
  for(let i=10;i<=18;i++) head+=`<th>${i}</th>`;
  head+='<th class="sum">Inn</th><th class="sum">Tot</th></tr>';

  // par row
  let parRow='<tr class="par-row"><td>Par</td>';
  for(let i=0;i<9;i++) parRow+=`<td>${holes[i][0]}</td>`;
  parRow+=`<td class="sum">${outPar}</td>`;
  for(let i=9;i<18;i++) parRow+=`<td>${holes[i][0]}</td>`;
  parRow+=`<td class="sum">${inPar}</td><td class="sum">${totPar}</td></tr>`;

  // score row
  function scoreCell(i){
    const [par,sc]=holes[i]; const c=cls(par,sc);
    return `<td class="sc-cell ${c}" data-i="${i}">${sc}</td>`;
  }
  let scRow='<tr><td>Score</td>';
  for(let i=0;i<9;i++) scRow+=scoreCell(i);
  scRow+=`<td class="sum">${outSc}</td>`;
  for(let i=9;i<18;i++) scRow+=scoreCell(i);
  scRow+=`<td class="sum">${inSc}</td><td class="sum">${totSc}</td></tr>`;

  table.innerHTML=head+parRow+scRow;

  table.querySelectorAll('.sc-cell').forEach(cell=>{
    const i=+cell.dataset.i; const [par,sc]=holes[i]; const dlt=sc-par;
    const dtxt = dlt===0?'Par':(dlt>0?`+${dlt} bogey`:(dlt===-1?'Birdie':'Eagle'));
    const sgv=sg[i];
    cell.addEventListener('mousemove', e=> showTip(
      `<div class="tt-h">Hull ${i+1} · Par ${par}</div>`+
      `<div class="tt-r"><span>Score</span><b>${sc} (${dtxt})</b></div>`+
      `<div class="tt-r"><span>SG hull</span><b style="color:${sgv>=0?'#4FD08A':'#F0683E'}">${sgv>=0?'+':''}${nf(sgv,1)}</b></div>`, e));
    cell.addEventListener('mouseleave', hideTip);
  });
})();
</script>
</body>
</html>
