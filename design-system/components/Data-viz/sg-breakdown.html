<!-- @dsCard group="Data-viz" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SgBreakdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .lc{ max-width:520px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
  .lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
  .lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
  .lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
  .lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
  .lc-sub b{ color:var(--ink); font-weight:600; }
  .hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
  .hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

  .sgb-row{ margin-bottom:13px; cursor:pointer; }
  .sgb-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .sgb-nm{ font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:7px; }
  .sgb-nm .chev{ transition:transform .2s; color:var(--muted-2); }
  .sgb-row.open .sgb-nm .chev{ transform:rotate(90deg); }
  .sgb-v{ font-family:var(--mono); font-size:12.5px; font-weight:600; }
  .sgb-v.pos{ color:var(--up); } .sgb-v.neg{ color:var(--down); }
  .sgb-track{ height:11px; background:var(--sand); border:1px solid var(--border); border-radius:var(--r-full); position:relative; overflow:hidden; }
  .sgb-zero{ position:absolute; left:50%; top:-2px; bottom:-2px; width:1.5px; background:var(--muted-2); opacity:.35; z-index:2; }
  .sgb-fill{ position:absolute; top:1px; bottom:1px; border-radius:var(--r-full); transition:width .5s cubic-bezier(.22,1,.36,1); }
  .sgb-fill.pos{ left:50%; background:linear-gradient(90deg,var(--forest),var(--up)); }
  .sgb-fill.neg{ right:50%; background:linear-gradient(90deg,#d98f8f,var(--urgent)); }
  .sgb-detail{ display:none; padding:8px 0 4px 22px; }
  .sgb-row.open .sgb-detail{ display:block; animation:fadein .25s; }
  @keyframes fadein{ from{ opacity:0; transform:translateY(4px); } to{ opacity:1; transform:translateY(0); } }
  .sgb-d{ display:grid; grid-template-columns:64px 1fr 44px; gap:8px; align-items:center; margin-bottom:6px; }
  .sgb-d .dl{ font-family:var(--mono); font-size:10px; color:var(--muted-2); }
  .sgb-d .dt2{ height:6px; background:var(--sand); border-radius:3px; position:relative; overflow:hidden; }
  .sgb-d .dt2 .mid{ position:absolute; left:50%; top:0; bottom:0; width:1px; background:var(--muted-2); opacity:.3; }
  .sgb-d .dt2 i{ position:absolute; top:0; bottom:0; border-radius:2px; }
  .sgb-d .dv{ font-family:var(--mono); font-size:10.5px; font-weight:600; text-align:right; }
</style>
</head>
<body>
  <div class="lc">
    <div class="lc-h"><span class="ti">Sg<em>Breakdown</em></span><span class="lc-num">SISTE 10 RUNDER</span></div>
    <div class="lc-sub"><b>Klikk en bar</b> for å bore inn til delkategori. Grønn = over baseline, rød = under. Null-akse i midten.</div>
    <div id="sgBreak"></div>
    <div class="hint">Klikk OTT / APP / ARG / PUTT for å ekspandere</div>
  </div>

<script>
function nf(v,d=1){ return v.toLocaleString('nb-NO',{minimumFractionDigits:d,maximumFractionDigits:d}); }
(function(){
  const cats=[
    {key:'OTT', name:'Off the tee', val:0.7, det:[['Driver',0.6],['Trewood',0.2],['Hybrid',-0.1]]},
    {key:'APP', name:'Approach', val:0.9, det:[['150–180 m',0.5],['120–150 m',0.3],['<120 m',0.1]]},
    {key:'ARG', name:'Around green', val:-0.4, det:[['Chip',-0.2],['Pitch',-0.3],['Bunker',0.1]]},
    {key:'PUTT', name:'Putting', val:0.5, det:[['1–3 m',0.4],['3–6 m',0.2],['>6 m',-0.1]]},
  ];
  const root=document.getElementById('sgBreak');
  const MAX=1.0;
  cats.forEach(c=>{
    const row=document.createElement('div'); row.className='sgb-row';
    const pos=c.val>=0;
    const w=Math.min(Math.abs(c.val)/MAX*50,50);
    let detHtml = c.det.map(d=>{
      const dp=d[1]>=0; const dw=Math.min(Math.abs(d[1])/0.7*50,50);
      return `<div class="sgb-d"><span class="dl">${d[0]}</span>
        <div class="dt2"><span class="mid"></span><i style="${dp?'left:50%':'right:50%'};width:${dw}%;background:${dp?'var(--up)':'var(--urgent)'};"></i></div>
        <span class="dv" style="color:${dp?'var(--up)':'var(--down)'}">${dp?'+':''}${nf(d[1])}</span></div>`;
    }).join('');
    row.innerHTML=`
      <div class="sgb-top">
        <span class="sgb-nm"><svg class="chev" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m9 18 6-6-6-6"/></svg>${c.key} <span style="font-weight:400;color:var(--muted-2);font-size:11px;">· ${c.name}</span></span>
        <span class="sgb-v ${pos?'pos':'neg'}">${pos?'+':''}${nf(c.val)}</span>
      </div>
      <div class="sgb-track"><span class="sgb-zero"></span><span class="sgb-fill ${pos?'pos':'neg'}" style="width:0"></span></div>
      <div class="sgb-detail">${detHtml}</div>`;
    root.appendChild(row);
    requestAnimationFrame(()=>{ setTimeout(()=>{ row.querySelector('.sgb-fill').style.width=w+'%'; },120); });
    row.querySelector('.sgb-top').addEventListener('click', ()=> row.classList.toggle('open'));
  });
})();
</script>
</body>
</html>
