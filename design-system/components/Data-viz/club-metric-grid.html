<!-- @dsCard group="Data-viz" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClubMetricGrid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
  .lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
  .lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
  .lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
  .lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
  .lc-sub b{ color:var(--ink); font-weight:600; }
  .hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
  .hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

  .cm-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:11px; }
  @media(min-width:560px){ .cm-grid{ grid-template-columns:repeat(4,1fr); } }
  .cm-card{ border:1px solid var(--border); border-radius:var(--r-md); background:var(--cream-2); padding:12px; cursor:pointer; transition:transform .14s, border-color .14s, box-shadow .14s; }
  .cm-card:hover{ transform:translateY(-3px); box-shadow:var(--sh-md); }
  .cm-card.sel{ border-color:var(--lime-deep); box-shadow:0 0 0 1px var(--lime-deep); background:var(--paper); }
  .cm-nm{ font-size:11.5px; font-weight:600; margin-bottom:8px; }
  .cm-carry{ font-family:var(--mono); font-size:24px; font-weight:700; color:var(--forest); line-height:1; }
  .cm-carry small{ font-size:10px; color:var(--muted-2); font-weight:500; }
  .cm-rows{ margin-top:10px; display:flex; flex-direction:column; gap:4px; }
  .cm-r{ display:flex; justify-content:space-between; font-family:var(--mono); font-size:9.5px; color:var(--muted); }
  .cm-r b{ color:var(--ink); font-weight:600; }
  .cm-sel-line{ margin-top:14px; font-family:var(--mono); font-size:10.5px; color:var(--muted); }
  .cm-sel-line b{ color:var(--forest); }
</style>
</head>
<body>
  <div class="lc">
    <div class="lc-h"><span class="ti">ClubMetric<em>Grid</em></span><span class="lc-num">TRACKMAN</span></div>
    <div class="lc-sub">TrackMan-snitt per kølle: carry, ballhastighet, launch og spin. <b>Klikk en kølle</b> for å velge den.</div>
    <div class="cm-grid" id="cmGrid"></div>
    <div class="cm-sel-line" id="cmSel">Valgt kølle: <b>ingen</b></div>
    <div class="hint">Klikk en kølle for å velge</div>
  </div>

<script>
function nf(v,d=1){ return v.toLocaleString('nb-NO',{minimumFractionDigits:d,maximumFractionDigits:d}); }
(function(){
  const clubs=[
    {nm:'Driver', carry:268, speed:251, launch:11.4, spin:2450},
    {nm:'Trewood 3', carry:238, speed:232, launch:10.2, spin:3100},
    {nm:'Hybrid', carry:212, speed:218, launch:12.1, spin:3650},
    {nm:'Jern 5', carry:188, speed:201, launch:14.0, spin:4900},
    {nm:'Jern 7', carry:162, speed:182, launch:17.2, spin:6200},
    {nm:'Jern 9', carry:138, speed:165, launch:21.5, spin:7600},
    {nm:'PW', carry:118, speed:148, launch:25.8, spin:8900},
    {nm:'56°', carry:88, speed:118, launch:30.4, spin:10200},
  ];
  const root=document.getElementById('cmGrid');
  const sel=document.getElementById('cmSel');
  clubs.forEach(c=>{
    const el=document.createElement('div'); el.className='cm-card';
    el.innerHTML=`
      <div class="cm-nm">${c.nm}</div>
      <div class="cm-carry">${c.carry}<small> m</small></div>
      <div class="cm-rows">
        <div class="cm-r"><span>Ballfart</span><b>${c.speed} km/t</b></div>
        <div class="cm-r"><span>Launch</span><b>${nf(c.launch)}°</b></div>
        <div class="cm-r"><span>Spin</span><b>${c.spin.toLocaleString('nb-NO')} rpm</b></div>
      </div>`;
    root.appendChild(el);
    el.addEventListener('click', ()=>{
      root.querySelectorAll('.cm-card').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
      sel.innerHTML=`Valgt kølle: <b>${c.nm}</b> · ${c.carry} m carry`;
    });
  });
})();
</script>
</body>
</html>
