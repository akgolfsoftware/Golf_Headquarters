<!-- @dsCard group="Gamification" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
.lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
.lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
.lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
.lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
.lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
.lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
.lc-sub b{ color:var(--ink); font-weight:600; }
.hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
.hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

/* 13 · LEVEL LADDER */
.ll{ display:flex; flex-direction:column-reverse; gap:3px; }
.ll-step{ display:grid; grid-template-columns:36px 1fr auto; align-items:center; gap:11px; padding:9px 12px; border-radius:var(--r-sm); border:1px solid transparent; position:relative; }
.ll-step .lc2{ font-family:var(--mono); font-size:16px; font-weight:700; color:var(--muted-2); text-align:center; }
.ll-step .ln{ font-size:12.5px; color:var(--muted); }
.ll-step .lr{ font-family:var(--mono); font-size:10px; color:var(--muted-2); }
.ll-step.passed .lc2{ color:var(--forest); }
.ll-step.here{ background:var(--forest); border-color:var(--forest); }
.ll-step.here .lc2,.ll-step.here .ln,.ll-step.here .lr{ color:var(--lime); }
.ll-step.next{ border-color:var(--lime-dim); border-style:dashed; }
.ll-step.next .lc2{ color:var(--forest); }
.ll-here-tag{ font-family:var(--mono); font-size:8.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; background:var(--lime); color:var(--forest-deep); padding:2px 7px; border-radius:4px; }
.ll-next-tag{ font-family:var(--mono); font-size:8.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--forest); }
</style>
</head>
<body>
<div class="lc">
  <div class="lc-h"><span class="ti">Level<em>Ladder</em></span><span class="lc-num">A–K NIVÅ</span></div>
  <div class="lc-sub">Snittscore-stige. <b>«Du er her»</b> markert, neste trinn highlightet med hva som kreves.</div>
  <div class="ll" id="ladder"></div>
  <div class="hint">Stigen leses nedenfra og opp</div>
</div>

<script>
(function(){
  // A–K snittscore-bånd (illustrativt — grenser ikke låst)
  const steps=[
    {c:'A', n:'Sub-68 snitt', r:'Verdenselite', state:'future'},
    {c:'B', n:'68–70', r:'Tour-nivå', state:'future'},
    {c:'C', n:'70–72', r:'Nasjonal elite', state:'next'},
    {c:'D', n:'72–74', r:'Toppjunior', state:'here'},
    {c:'E', n:'74–77', r:'Regional', state:'passed'},
    {c:'F', n:'77–80', r:'Klubbelite', state:'passed'},
  ];
  const root=document.getElementById('ladder');
  steps.forEach(s=>{
    const el=document.createElement('div');
    el.className='ll-step '+s.state;
    let tag = s.state==='here'?'<span class="ll-here-tag">Du er her</span>'
            : s.state==='next'?'<span class="ll-next-tag">Neste → −2,1 slag</span>':'';
    el.innerHTML=`<span class="lc2">${s.c}</span><span class="ln"><b style="font-weight:600;color:inherit">${s.n}</b> · ${s.r}</span>${tag}`;
    root.appendChild(el);
  });
})();
</script>
</body>
</html>
