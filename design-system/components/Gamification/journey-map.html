<!-- @dsCard group="Gamification" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
.lc{ max-width:720px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
.lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
.lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
.lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
.lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
.lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
.lc-sub b{ color:var(--ink); font-weight:600; }
.hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
.hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

/* 16 · JOURNEY MAP */
.jm{ overflow-x:auto; padding:6px 0 14px; }
.jm-track{ display:flex; align-items:center; min-width:560px; position:relative; }
.jm-node{ display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; position:relative; z-index:2; cursor:pointer; }
.jm-line{ position:absolute; top:19px; left:8%; right:8%; height:2px; background:var(--border); z-index:1; }
.jm-line .done{ position:absolute; left:0; top:0; bottom:0; background:var(--forest); border-radius:2px; }
.jm-dot{ width:40px; height:40px; border-radius:var(--r-full); display:grid; place-items:center; border:2px solid var(--border); background:var(--paper); color:var(--muted-2); }
.jm-node.done .jm-dot{ background:var(--forest); border-color:var(--forest); color:var(--lime); }
.jm-node.now .jm-dot{ border-color:var(--lime-deep); color:var(--forest); box-shadow:0 0 0 4px var(--lime-bg); animation:nowpulse 2s infinite; }
@keyframes nowpulse{ 0%,100%{ box-shadow:0 0 0 4px var(--lime-bg); } 50%{ box-shadow:0 0 0 8px var(--lime-bg); } }
.jm-node .jl{ font-family:var(--mono); font-size:9px; letter-spacing:.04em; text-transform:uppercase; color:var(--muted-2); text-align:center; max-width:78px; line-height:1.25; }
.jm-node.done .jl,.jm-node.now .jl{ color:var(--ink); }
.jm-info{ margin-top:14px; padding:13px 15px; background:var(--cream-2); border:1px solid var(--border-soft); border-radius:var(--r-md); border-left:3px solid var(--lime); }
.jm-info .ji-h{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-2); margin-bottom:5px; }
.jm-info .ji-t{ font-family:var(--disp); font-size:16px; font-weight:700; margin-bottom:4px; }
.jm-info .ji-d{ font-size:12.5px; color:var(--muted); }
</style>
</head>
<body>
<div class="lc">
  <div class="lc-h"><span class="ti">Journey<em>Map</em></span><span class="lc-num">UTVIKLINGSVEI</span></div>
  <div class="lc-sub">Veien mot toppen som et horisontalt kart. Fullførte etapper er fylt, <b>«nå» pulserer</b>, fremtidige er låst. Klikk en etappe.</div>
  <div class="jm">
    <div class="jm-track" id="journey">
      <div class="jm-line"><div class="done" id="jmDone" style="width:0"></div></div>
    </div>
  </div>
  <div class="jm-info" id="jmInfo">
    <div class="ji-h">NÅVÆRENDE ETAPPE</div>
    <div class="ji-t">Nasjonal elite</div>
    <div class="ji-d">Topp 10 på Srixon Tour. Neste: internasjonal debut — WAGR under 1500.</div>
  </div>
  <div class="hint">Klikk en sjekkpunkt på kartet</div>
</div>

<script>
(function(){
  const stages=[
    {l:'Klubbjunior', state:'done', t:'Klubbjunior', d:'Fullført 2022. Etablerte HCP under 10 og fast treningsrutine.'},
    {l:'Regional elite', state:'done', t:'Regional elite', d:'Fullført 2024. Topp 5 i kretsmesterskap, HCP under 6.'},
    {l:'Nasjonal elite', state:'now', t:'Nasjonal elite', d:'Topp 10 på Srixon Tour. Neste: internasjonal debut — WAGR under 1500.'},
    {l:'Internasjonal', state:'locked', t:'Internasjonal', d:'Låst. Krever WAGR < 1500 og 3 internasjonale starter.'},
    {l:'Tour-kort', state:'locked', t:'Tour-kort', d:'Låst. Sluttmål — proff tour-kort via Q-school eller ranking.'},
  ];
  const track=document.getElementById('journey');
  const doneCount=stages.filter(s=>s.state==='done').length;
  const nowIdx=stages.findIndex(s=>s.state==='now');
  stages.forEach((s,i)=>{
    const node=document.createElement('div'); node.className='jm-node '+s.state;
    let ic = s.state==='done'? '<path d="M20 6 9 17l-5-5"/>' : s.state==='now'? '<circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/>' : '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
    node.innerHTML=`<span class="jm-dot"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${ic}</svg></span><span class="jl">${s.l}</span>`;
    node.addEventListener('click', ()=>{
      document.getElementById('jmInfo').innerHTML=
        `<div class="ji-h">${s.state==='done'?'FULLFØRT':s.state==='now'?'NÅVÆRENDE ETAPPE':'LÅST ETAPPE'}</div><div class="ji-t">${s.t}</div><div class="ji-d">${s.d}</div>`;
    });
    track.appendChild(node);
  });
  // progress line to "now"
  const pct = (nowIdx/(stages.length-1))*100;
  setTimeout(()=>{ document.getElementById('jmDone').style.transition='width 1s ease'; document.getElementById('jmDone').style.width=pct+'%'; }, 300);
})();
</script>
</body>
</html>
