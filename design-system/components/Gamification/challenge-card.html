<!-- @dsCard group="Gamification" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
.lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
.lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
.lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
.lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
.lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
.lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
.lc-sub b{ color:var(--ink); font-weight:600; }
.hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
.hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

/* CHALLENGE CARD */
.cc{ border:1px solid var(--border); border-radius:var(--r-md); background:var(--cream-2); padding:18px; position:relative; overflow:hidden; }
.cc-eyebrow{ font-family:var(--mono); font-size:9.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--forest); display:inline-flex; align-items:center; gap:6px; margin-bottom:9px; }
.cc-eyebrow .d{ width:6px; height:6px; border-radius:50%; background:var(--lime-deep); }
.cc-title{ font-family:var(--disp); font-size:21px; font-weight:700; letter-spacing:-0.02em; line-height:1.12; margin-bottom:14px; max-width:340px; }
.cc-prog-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px; }
.cc-prog-lab{ font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); }
.cc-prog-val{ font-family:var(--mono); font-size:13px; font-weight:600; color:var(--ink); }
.cc-prog-val small{ color:var(--muted-2); font-weight:400; }
.cc-track{ height:10px; background:var(--sand); border:1px solid var(--border); border-radius:var(--r-full); overflow:hidden; }
.cc-fill{ height:100%; width:0; border-radius:var(--r-full); background:linear-gradient(90deg,var(--forest),var(--lime-deep)); transition:width 1.1s cubic-bezier(.22,1,.36,1); }
.cc-meta{ display:flex; align-items:center; gap:14px; margin-top:16px; flex-wrap:wrap; }
.cc-deadline{ font-family:var(--mono); font-size:11px; font-weight:600; color:var(--warn); display:inline-flex; align-items:center; gap:6px; }
.cc-reward{ font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.02em; color:var(--forest); background:var(--lime); padding:5px 10px; border-radius:var(--r-full); display:inline-flex; align-items:center; gap:6px; }
.cc-foot{ display:flex; align-items:center; justify-content:space-between; margin-top:18px; gap:12px; }
.cc-status{ font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); }
.cc-btn{ font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:9px 18px; border-radius:var(--r-full); border:1px solid var(--forest); background:var(--forest); color:var(--lime); cursor:pointer; transition:.15s; }
.cc-btn:hover{ filter:brightness(1.08); }
.cc-btn.active{ background:var(--lime); border-color:var(--lime); color:var(--forest-deep); }
</style>
</head>
<body>
<div class="lc">
  <div class="lc-h"><span class="ti">Challenge<em>Card</em></span><span class="lc-num">UKENS UTFORDRING</span></div>
  <div class="lc-sub">En tidsbegrenset utfordring med <b>animert fremdrift</b>, frist og belønning. Trykk knappen for å akseptere.</div>

  <div class="cc">
    <div class="cc-eyebrow"><span class="d"></span>Ukens utfordring · ARG</div>
    <div class="cc-title">50 wedge-slag innenfor ±3 m</div>

    <div class="cc-prog-top">
      <span class="cc-prog-lab">Fremdrift</span>
      <span class="cc-prog-val mono" id="ccVal">34<small> / 50</small></span>
    </div>
    <div class="cc-track"><div class="cc-fill" id="ccFill"></div></div>

    <div class="cc-meta">
      <span class="cc-deadline mono">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        3 dager igjen
      </span>
      <span class="cc-reward mono">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
        +1 nivå Wedge-mestring
      </span>
    </div>

    <div class="cc-foot">
      <span class="cc-status" id="ccStatus">Ikke startet</span>
      <button class="cc-btn" id="ccBtn">Aksepter</button>
    </div>
  </div>

  <div class="hint">Trykk for å akseptere / sette på pågår</div>
</div>

<script>
(function(){
  const fill=document.getElementById('ccFill');
  const btn=document.getElementById('ccBtn');
  const status=document.getElementById('ccStatus');
  const pct=34/50*100;
  // animate progress on load
  requestAnimationFrame(()=> setTimeout(()=>{ fill.style.width=pct+'%'; }, 200));
  let accepted=false;
  btn.addEventListener('click', ()=>{
    accepted=!accepted;
    btn.classList.toggle('active', accepted);
    btn.textContent = accepted ? 'Pågår' : 'Aksepter';
    status.textContent = accepted ? 'Pågår · 34 av 50' : 'Ikke startet';
  });
})();
</script>
</body>
</html>
