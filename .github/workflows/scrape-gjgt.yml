name: Scrape GJGT (internasjonal junior)

# Henter terminliste + norske deltakere fra Global Junior Golf
# (globaljuniorgolflive.com). Delsystem B — se docs/turnering-datakilder.md.
# Deltakerlister endres sakte (påmelding), så daglig er nok.

on:
  schedule:
    - cron: "30 5 * * *" # daglig 05:30 UTC
  workflow_dispatch:

concurrency:
  group: scrape-gjgt
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Import GJGT
        run: npx tsx scripts/import-gjgt.ts
