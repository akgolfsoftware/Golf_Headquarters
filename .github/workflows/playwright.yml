name: Playwright E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL å teste mot (default = Vercel prod)"
        required: false
        default: "https://akgolf-hq.vercel.app"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium webkit --with-deps

      - name: Run Playwright tests mot prod
        run: npx playwright test
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'https://akgolf-hq.vercel.app' }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
