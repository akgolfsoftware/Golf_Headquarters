<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <title>Booking — AK Golf</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="booking.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.453.0"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Icon({ name, size = 18, color }) {
      return <i data-lucide={name} style={{ width: size, height: size, color: color || "currentColor", display: "inline-flex", strokeWidth: 1.5 }} />;
    }

    const HERO_PHOTO  = "https://images.unsplash.com/photo-1535131749006-b7f58c99034b?w=900&q=80&auto=format&fit=crop";
    const ANDERS_PHOTO = "https://images.unsplash.com/photo-1622396090108-c4fdf3023bca?w=600&q=80&auto=format&fit=crop";
    const MARKUS_PHOTO = "https://images.unsplash.com/photo-1592919505780-303950717480?w=600&q=80&auto=format&fit=crop";

    const PACKAGES = [
      { id: "flex",      coach: "Markus Røinås Pedersen", eb: "Drop-in · 20 min",         nm: "Flex 20 min",       meta: "Junior coach · kort drill", price: "300",   unit: "kr",     photo: MARKUS_PHOTO },
      { id: "perf",      coach: "Anders Kristiansen",     eb: "Performance · 50 min",     nm: "Performance",       meta: "Head coach · 2 økter / mnd", price: "1 300", unit: "kr/mnd", photo: ANDERS_PHOTO },
      { id: "perfpro",   coach: "Anders Kristiansen",     eb: "Performance Pro · 90 min", nm: "Performance Pro",   meta: "Head coach · 4 økter + SG",  price: "2 300", unit: "kr/mnd", photo: ANDERS_PHOTO },
    ];

    function StatusBar({ onPhoto = false }) {
      return (
        <div className={"statusbar " + (onPhoto ? "on-photo" : "")}>
          <span>9:41</span>
          <span className="right">
            <span style={{ fontSize: 10 }}>●●●●</span>
            <span style={{ marginLeft: 4, fontSize: 11 }}>5G</span>
            <span style={{ marginLeft: 6, padding: "2px 5px", border: "1.5px solid currentColor", borderRadius: 4, fontSize: 9, fontWeight: 700 }}>87</span>
          </span>
        </div>
      );
    }

    function BottomNav({ active = "book" }) {
      const items = [
        { key: "home",  icon: "home",          label: "Hjem" },
        { key: "book",  icon: "calendar-plus", label: "Book" },
        { key: "plan",  icon: "calendar-days", label: "Plan" },
        { key: "me",    icon: "user-round",    label: "Deg" },
      ];
      return (
        <nav className="bottomnav">
          {items.map(it => (
            <button key={it.key} className={"bn-item " + (active === it.key ? "active" : "")}>
              <span className="bn-icon"><Icon name={it.icon} size={17} /></span>
              {it.label}
            </button>
          ))}
        </nav>
      );
    }

    /* ====================================================
       SCREEN 1 — Welcome / launch
       ==================================================== */
    function WelcomePhone() {
      return (
        <div className="phone" data-screen-label="01 Welcome">
          <div className="notch" />
          <StatusBar />
          <div className="scroll" style={{ paddingBottom: 0 }}>
            <div className="welcome">
              <div className="welcome-photo">
                <span className="badge"><span className="pulse" />NY SESONG · ÅPEN</span>
                <img src={HERO_PHOTO} alt="" />
              </div>
              <div className="welcome-eyebrow">PERSONLIG COACHING · OSLO + FREDRIKSTAD</div>
              <h1>Fra check-in til <em>kamp-modus</em>, alt i én app.</h1>
              <p style={{ textAlign: "center", fontSize: 13, color: "var(--muted-foreground)", margin: "12px 28px 0", lineHeight: 1.5 }}>
                Book Anders eller Markus. Få planen. Logg økten. Følg pyramiden.
              </p>
              <div className="welcome-cta">
                <button className="btn btn-primary"><Icon name="arrow-right" size={16} />&nbsp;Kom i gang</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ====================================================
       SCREEN 2 — Booking hub (upcoming + pick package)
       ==================================================== */
    function HubPhone() {
      const [filter, setFilter] = useState("alle");
      const filters = [
        { id: "alle",      label: "Alle" },
        { id: "drop",      label: "Drop-in" },
        { id: "perf",      label: "Performance" },
        { id: "junior",    label: "Junior" },
      ];
      return (
        <div className="phone" data-screen-label="02 Hub">
          <div className="notch" />
          <StatusBar />
          <div className="scroll">

            <div className="hub-header">
              <span className="hub-avatar">MS</span>
              <div className="hub-greet">
                <div className="eb">GOD MORGEN</div>
                <div className="name">Magnus Strand</div>
              </div>
              <span className="hub-bell"><Icon name="bell" size={16} /><span className="dot" /></span>
            </div>

            <div className="hub-search">
              <Icon name="search" size={14} />
              <span>Søk coach, pakke, tidspunkt…</span>
            </div>

            <div className="hub-section">
              <span className="ttl">Neste økt</span>
              <span className="see">Se alt →</span>
            </div>

            <div className="upcoming">
              <span className="eb-pill"><span className="pulse-w" />ONSDAG 28. MAI</span>
              <h3>Performance med Anders Kristiansen</h3>
              <div className="row">
                <span className="ic"><Icon name="clock" size={13} /></span>
                <span>14:30 – 15:20 · 50 min</span>
              </div>
              <div className="row">
                <span className="ic"><Icon name="map-pin" size={13} /></span>
                <span>Mulligan Indoor · Sarpsborg</span>
              </div>
              <div className="upcoming-actions">
                <button className="btn btn-ghost-dark" style={{ height: 40, fontSize: 13 }}>Avbestill</button>
                <button className="btn btn-accent" style={{ height: 40, fontSize: 13 }}>Detaljer <Icon name="arrow-right" size={14} /></button>
              </div>
            </div>

            <div className="hub-section">
              <span className="ttl">Book ny økt</span>
              <span className="see">Filtre →</span>
            </div>

            <div className="chip-row">
              {filters.map(f => (
                <span key={f.id} className={"chip " + (filter === f.id ? "active" : "")} onClick={() => setFilter(f.id)}>
                  {f.label}
                </span>
              ))}
            </div>

            <div style={{ height: 12 }} />

            <div className="pkg-list">
              {PACKAGES.map(p => (
                <div className="pkg" key={p.id}>
                  <div className="av" style={{ backgroundImage: `url(${p.photo})` }} />
                  <div className="info">
                    <div className="eb">{p.eb}</div>
                    <div className="nm">{p.nm}</div>
                    <div className="meta">{p.coach}</div>
                  </div>
                  <div className="pr">{p.price}<small>{p.unit}</small></div>
                </div>
              ))}
            </div>
          </div>

          <BottomNav active="book" />
        </div>
      );
    }

    /* ====================================================
       SCREEN 3 — Coach detail (Anders) + calendar + slots
       ==================================================== */
    function DetailPhone() {
      const [day, setDay]   = useState(29);
      const [slot, setSlot] = useState("10:30");
      const days = [
        { d: "Man", n: 26, dis: true  },
        { d: "Tir", n: 27, dis: false },
        { d: "Ons", n: 28, dis: false },
        { d: "Tor", n: 29, dis: false },
        { d: "Fre", n: 30, dis: false },
        { d: "Lør", n: 31, dis: false },
        { d: "Søn", n:  1, dis: true  },
      ];
      const slots = ["08:30", "09:30", "10:30", "11:30", "13:00", "14:00", "15:00", "16:00", "17:30"];
      const taken = new Set(["08:30", "13:00", "16:00"]);

      return (
        <div className="phone" data-screen-label="03 Coach detail">
          <div className="notch" />
          <StatusBar />
          <div className="scroll" style={{ paddingBottom: 96 }}>

            <div className="detail-top">
              <button className="back"><Icon name="chevron-left" size={18} /></button>
              <span className="ttl">Coach Detail</span>
              <button className="heart"><Icon name="bookmark" size={16} /></button>
            </div>

            <div className="coach-hero">
              <div className="photo" style={{ backgroundImage: `url(${ANDERS_PHOTO})` }} />
              <div className="meta">
                <div className="eb">HEAD COACH · AK GOLF ACADEMY</div>
                <h2>Anders Kristiansen</h2>
                <div className="ses">Fra 1 300 kr · Performance</div>
              </div>
            </div>

            <div className="stat-strip">
              <div className="stat">
                <div className="v">12+</div>
                <div className="l">år erfaring</div>
              </div>
              <div className="stat">
                <div className="v">38</div>
                <div className="l">aktive spillere</div>
              </div>
              <div className="stat">
                <div className="v">4,9</div>
                <div className="l">snitt rating</div>
              </div>
            </div>

            <div className="section-sm">
              <span className="ttl">Velg dag</span>
            </div>
            <div className="day-strip">
              {days.map(d => (
                <div
                  key={d.n}
                  className={"day-cell " + (day === d.n ? "selected" : "") + (d.dis ? " disabled" : "")}
                  onClick={() => !d.dis && setDay(d.n)}
                >
                  <div className="d">{d.d}</div>
                  <div className="n">{d.n}</div>
                </div>
              ))}
            </div>

            <div className="section-sm">
              <span className="ttl">Velg tid</span>
            </div>
            <div className="slots">
              {slots.map(s => {
                const isTaken = taken.has(s);
                return (
                  <div
                    key={s}
                    className={"slot " + (isTaken ? "taken" : "") + (slot === s ? " selected" : "")}
                    onClick={() => !isTaken && setSlot(s)}
                  >
                    {s}
                  </div>
                );
              })}
            </div>
          </div>

          <div className="book-bar">
            <div className="total">
              <div className="l">Pris</div>
              <div className="v">1 300 kr / mnd</div>
            </div>
            <button className="btn btn-primary">Book økt <Icon name="arrow-right" size={16} /></button>
          </div>
        </div>
      );
    }

    function App() {
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);

      return (
        <div className="stage">
          <WelcomePhone />
          <HubPhone />
          <DetailPhone />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
