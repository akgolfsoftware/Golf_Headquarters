<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <title>PlayerHQ — AK Golf HQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="playerhq.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.453.0"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Screens.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [tab, setTab] = useState("home");

      useEffect(() => {
        // re-render lucide icons whenever tab changes
        if (window.lucide) window.lucide.createIcons();
      }, [tab]);

      const onPhoto = tab === "home";

      return (
        <div className="phone" data-screen-label="01 PlayerHQ">
          <div className="notch"></div>
          <StatusBar onPhoto={onPhoto} />
          <div className="scroll" key={tab}>
            {tab === "home"    && <HomeScreen />}
            {tab === "plan"    && <PlanScreen />}
            {tab === "stats"   && <StatsScreen />}
            {tab === "profile" && <ProfileScreen />}
          </div>
          <BottomNav tab={tab} onChange={setTab} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
