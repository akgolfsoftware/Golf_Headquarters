<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .scale-row { display: grid; grid-template-columns: 56px 1fr 80px; align-items: center; gap: 12px; padding: 4px 0; }
  .token { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--foreground); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); text-align: right; }
  .bar { height: 14px; background: var(--primary); border-radius: 4px; }
  .note { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-foreground); margin-bottom: 10px; }
</style></head>
<body><div class="card">
  <div class="note">8pt-grid · strict · no 4/12/20/28</div>
  <div class="scale-row"><span class="token">space-1</span><div class="bar" style="width: 8px;"></div><span class="px">8px</span></div>
  <div class="scale-row"><span class="token">space-2</span><div class="bar" style="width: 16px;"></div><span class="px">16px</span></div>
  <div class="scale-row"><span class="token">space-3</span><div class="bar" style="width: 24px;"></div><span class="px">24px</span></div>
  <div class="scale-row"><span class="token">space-4</span><div class="bar" style="width: 32px;"></div><span class="px">32px</span></div>
  <div class="scale-row"><span class="token">space-5</span><div class="bar" style="width: 40px;"></div><span class="px">40px</span></div>
  <div class="scale-row"><span class="token">space-6</span><div class="bar" style="width: 48px;"></div><span class="px">48px</span></div>
  <div class="scale-row"><span class="token">space-8</span><div class="bar" style="width: 64px;"></div><span class="px">64px</span></div>
</div></body></html>
