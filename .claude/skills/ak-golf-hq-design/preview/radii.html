<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .box { width: 80px; height: 80px; background: var(--card); border: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: 10px; font-weight: 600; }
  .px { font-family: var(--font-mono); font-size: 9px; color: var(--muted-foreground); }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="swatch"><div class="box" style="border-radius:8px;"></div><div class="name">sm</div><div class="px">8px</div></div>
    <div class="swatch"><div class="box" style="border-radius:12px;"></div><div class="name">md</div><div class="px">12px</div></div>
    <div class="swatch"><div class="box" style="border-radius:16px;"></div><div class="name">lg</div><div class="px">16px</div></div>
    <div class="swatch"><div class="box" style="border-radius:20px;"></div><div class="name">xl</div><div class="px">20px</div></div>
    <div class="swatch"><div class="box" style="border-radius:24px;"></div><div class="name">2xl</div><div class="px">24px</div></div>
    <div class="swatch"><div class="box" style="border-radius:9999px;"></div><div class="name">full</div><div class="px">pill</div></div>
  </div>
</div></body></html>
