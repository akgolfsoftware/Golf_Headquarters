<!doctype html><html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .tile { aspect-ratio: 4/3; border-radius: 14px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
  .tile img { width: 64%; height: 64%; object-fit: contain; }
  .lbl { font-family: var(--font-mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--foreground); text-align: center; margin-top: 6px; }
  .sub { font-family: var(--font-mono); font-size: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-foreground); text-align: center; margin-top: 2px; line-height: 1.4; }
</style></head>
<body><div class="card">
  <div class="grid">
    <div>
      <div class="tile" style="background: #FAFAF7;"><img src="../assets/logo-primary-on-light.svg" alt="primary on light"></div>
      <div class="lbl">on light</div>
      <div class="sub">forest ak + lime</div>
    </div>
    <div>
      <div class="tile" style="background: #005840;"><img src="../assets/logo-white-on-green.svg" alt="white on forest"></div>
      <div class="lbl">on forest</div>
      <div class="sub">hvit ak + lime</div>
    </div>
    <div>
      <div class="tile" style="background: #0F2A22;"><img src="../assets/logo-primary-on-dark.svg" alt="lime on dark — hero"></div>
      <div class="lbl">on dark · hero</div>
      <div class="sub">splash · presentasjon</div>
    </div>
    <div>
      <div class="tile" style="background: #0F2A22;"><img src="../assets/logo-white-on-dark.svg" alt="white on dark — nav"></div>
      <div class="lbl">on dark · nav</div>
      <div class="sub">nav · footer · sekundær</div>
    </div>
  </div>
</div></body></html>
