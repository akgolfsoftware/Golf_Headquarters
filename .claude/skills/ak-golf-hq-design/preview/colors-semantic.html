<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip {
    height: 72px; border-radius: 12px; border: 1px solid var(--border);
    position: relative; display: flex; align-items: center; justify-content: center;
    color: white; font-family: var(--font-mono); font-weight: 700;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .hex { font-family: var(--font-mono); font-size: 9px; font-weight: 600; color: var(--muted-foreground); letter-spacing: 0.04em; }
  .name { font-family: var(--font-mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--foreground); }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="swatch">
      <div class="chip" style="background:#1A7D56;">OK</div>
      <div class="name">success</div><div class="hex">#1A7D56</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#B8852A;">Warn</div>
      <div class="name">warning</div><div class="hex">#B8852A</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#A32D2D;">Err</div>
      <div class="name">destructive</div><div class="hex">#A32D2D</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#2563EB;">Info</div>
      <div class="name">info</div><div class="hex">#2563EB</div>
    </div>
  </div>
</div></body></html>
