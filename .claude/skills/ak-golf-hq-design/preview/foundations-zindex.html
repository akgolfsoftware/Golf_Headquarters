<!doctype html><html><head><meta charset="utf-8"><title>Z-index ladder</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { width: 760px; }
  .card { padding: 22px 24px; display: flex; gap: 24px; align-items: center; }

  /* Stacked perspective demo */
  .stage {
    width: 320px; height: 280px;
    position: relative;
    perspective: 800px;
    perspective-origin: 50% 50%;
    flex-shrink: 0;
  }
  .layer {
    position: absolute; left: 50%; top: 50%;
    width: 200px; height: 120px;
    border-radius: 14px;
    background: var(--card); border: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 12px; box-shadow: 0 4px 14px rgba(10,31,23,0.08);
    transform-origin: 50% 50%;
  }
  .layer .l {
    font-family: var(--font-mono); font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted-foreground);
  }
  .layer .v {
    font-family: var(--font-mono); font-weight: 600; font-size: 20px;
    margin-top: 4px;
  }

  .l0 { transform: translate(-50%, -50%) rotateX(60deg) translateZ(-90px); background: var(--secondary); }
  .l1 { transform: translate(-50%, -50%) rotateX(60deg) translateZ(-30px); }
  .l2 { transform: translate(-50%, -50%) rotateX(60deg) translateZ(30px); }
  .l3 { transform: translate(-50%, -50%) rotateX(60deg) translateZ(90px); }
  .l4 { transform: translate(-50%, -50%) rotateX(60deg) translateZ(150px); background: var(--primary); color: var(--accent); border-color: var(--primary); }
  .l4 .l { color: rgba(209,248,67,0.7); }
  .l5 { transform: translate(-50%, -50%) rotateX(60deg) translateZ(210px); background: var(--accent); color: var(--primary); border-color: var(--accent); box-shadow: 0 12px 32px rgba(209,248,67,0.4); }
  .l5 .l { color: rgba(0,88,64,0.7); }

  .legend {
    flex: 1;
  }
  .leg-row {
    display: grid; grid-template-columns: 40px 1fr 100px; align-items: center;
    gap: 12px; padding: 7px 0;
  }
  .leg-row + .leg-row { border-top: 1px solid var(--border); }
  .leg-z { font-family: var(--font-mono); font-size: 12px; font-weight: 700; font-feature-settings: "tnum","zero"; }
  .leg-name { font-family: var(--font-sans); font-size: 13px; font-weight: 500; }
  .leg-use { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); text-align: right; text-transform: uppercase; letter-spacing: 0.06em; }
  .chip { display: inline-block; width: 8px; height: 8px; border-radius: 2px; vertical-align: middle; margin-right: 6px; }
</style></head>
<body><div class="card">
  <div class="stage">
    <div class="layer l0"><span class="l">Z 0</span><span class="v">base</span></div>
    <div class="layer l1"><span class="l">Z 10</span><span class="v">sticky nav</span></div>
    <div class="layer l2"><span class="l">Z 20</span><span class="v">dropdown</span></div>
    <div class="layer l3"><span class="l">Z 30</span><span class="v">tooltip</span></div>
    <div class="layer l4"><span class="l">Z 50</span><span class="v">modal</span></div>
    <div class="layer l5"><span class="l">Z 70</span><span class="v">toast</span></div>
  </div>

  <div class="legend">
    <div class="leg-row"><span class="leg-z">0</span><span class="leg-name">Base · innhold</span><span class="leg-use">default</span></div>
    <div class="leg-row"><span class="leg-z">10</span><span class="leg-name">Sticky nav, sidebar</span><span class="leg-use">topbar</span></div>
    <div class="leg-row"><span class="leg-z">20</span><span class="leg-name">Dropdown, popover, menu</span><span class="leg-use">selectable</span></div>
    <div class="leg-row"><span class="leg-z">30</span><span class="leg-name">Tooltip, hover-preview</span><span class="leg-use">passive</span></div>
    <div class="leg-row"><span class="leg-z">40</span><span class="leg-name">Bottom-nav, sticky bars</span><span class="leg-use">mobile</span></div>
    <div class="leg-row"><span class="leg-z">50</span><span class="leg-name">Modal backdrop + modal</span><span class="leg-use">blocking</span></div>
    <div class="leg-row"><span class="leg-z">70</span><span class="leg-name">Toast, system alert</span><span class="leg-use">priority</span></div>
  </div>
</div></body></html>
