<!doctype html><html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .row-t { display: grid; grid-template-columns: 64px 1fr 120px; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .row-t:last-child { border-bottom: 0; }
  .size { font-family: var(--font-mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted-foreground); }
  .meta { font-family: var(--font-mono); font-size: 9px; color: var(--muted-foreground); text-align: right; }
  .sample { font-family: var(--font-sans); color: var(--foreground); }
  .sample-d { font-family: var(--font-display); }
</style></head>
<body><div class="card">
  <div class="row-t"><span class="size">H1 · 36</span><span class="sample-d" style="font-size: 36px; font-weight: 700; letter-spacing: -0.025em; line-height: 1.05;">Dagens økt</span><span class="meta">display · 700</span></div>
  <div class="row-t"><span class="size">H2 · 30</span><span class="sample-d" style="font-size: 30px; font-weight: 700; letter-spacing: -0.015em; line-height: 1.1;">SG approach trend</span><span class="meta">display · 700</span></div>
  <div class="row-t"><span class="size">H3 · 20</span><span class="sample-d" style="font-size: 20px; font-weight: 600; letter-spacing: -0.015em;">Putt fra 3m</span><span class="meta">display · 600</span></div>
  <div class="row-t"><span class="size">Body · 16</span><span class="sample" style="font-size: 16px; line-height: 1.55;">Du traff 12 av 14 fairways i går.</span><span class="meta">sans · 400</span></div>
  <div class="row-t"><span class="size">Body · 14</span><span class="sample" style="font-size: 14px; line-height: 1.55;">Tour-snittet fra 3m er 48 %.</span><span class="meta">sans · 400</span></div>
  <div class="row-t"><span class="size">Cap · 10</span><span class="sample" style="font-family: var(--font-mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-foreground);">PGA TOUR · DRIVE DISTANCE</span><span class="meta">mono · eyebrow</span></div>
</div></body></html>
