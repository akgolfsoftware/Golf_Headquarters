<!doctype html><html><head><meta charset="utf-8"><title>Mono · KPI</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .kpi { padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--card); }
  .kpi-label { font-family: var(--font-mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-foreground); }
  .kpi-val { font-family: var(--font-mono); font-weight: 600; font-size: 28px; letter-spacing: -0.02em; line-height: 1; margin-top: 8px; font-feature-settings: "tnum", "zero"; }
  .kpi-unit { font-size: 13px; font-weight: 400; color: var(--muted-foreground); margin-left: 4px; }
  .trend { font-family: var(--font-mono); font-size: 10px; font-weight: 500; margin-top: 8px; }
  .pos { color: var(--primary); }
  .neg { color: var(--destructive); }
</style></head>
<body><div class="card">
  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-label">SG Total</div>
      <div class="kpi-val">+0,42</div>
      <div class="trend pos">↑ 0,18 vs forrige</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Drive</div>
      <div class="kpi-val">268<span class="kpi-unit">m</span></div>
      <div class="trend pos">↑ 4 m</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Fairway</div>
      <div class="kpi-val">71<span class="kpi-unit">%</span></div>
      <div class="trend neg">↓ 3 %</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Putt 3m</div>
      <div class="kpi-val">52<span class="kpi-unit">%</span></div>
      <div class="trend pos">↑ Tour: 48 %</div>
    </div>
  </div>
</div></body></html>
