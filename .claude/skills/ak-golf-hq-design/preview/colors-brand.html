<!doctype html><html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .swatch { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
  .chip { height: 88px; border-radius: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; }
  .chip .hex {
    position: absolute; left: 10px; bottom: 8px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.04em;
  }
  .name { font-family: var(--font-mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-foreground); }
  .role { font-size: 11px; color: var(--muted-foreground); }
</style></head>
<body><div class="card">
  <div class="row" style="align-items: stretch;">
    <div class="swatch">
      <div class="chip" style="background:#005840;">
        <span class="hex" style="color:#D1F843;">#005840</span>
      </div>
      <div class="name">Forest 500</div>
      <div class="role">primary · CTA · focus ring</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#D1F843;">
        <span class="hex" style="color:#005840;">#D1F843</span>
      </div>
      <div class="name">Lime 500</div>
      <div class="role">accent · pulse · CTA-text</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#FAFAF7;">
        <span class="hex" style="color:#0A1F17;">#FAFAF7</span>
      </div>
      <div class="name">Cream 50</div>
      <div class="role">background · warm off-white</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#0A1F17;">
        <span class="hex" style="color:#D1F843;">#0A1F17</span>
      </div>
      <div class="name">Forest 900</div>
      <div class="role">foreground · deep forest text</div>
    </div>
  </div>
</div></body></html>
