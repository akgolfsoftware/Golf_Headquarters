<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: var(--font-mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted-foreground); }
  input, select {
    height: 44px; padding: 0 14px; border-radius: 12px;
    border: 1px solid var(--input);
    background: white; color: var(--foreground);
    font: 14px var(--font-sans); outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, .focused {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(0,88,64,0.18);
  }
  textarea { padding: 12px 14px; border-radius: 12px; border: 1px solid var(--input); resize: none; font: 14px var(--font-sans); }
  .helper { font-family: var(--font-mono); font-size: 9px; color: var(--muted-foreground); }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="field">
      <span class="lbl">Navn</span>
      <input value="Magnus Strand" />
    </div>
    <div class="field">
      <span class="lbl">E-post · focus</span>
      <input class="focused" value="magnus@akgolf.no" />
    </div>
    <div class="field">
      <span class="lbl">Klubb</span>
      <select><option>Oslo GK</option></select>
    </div>
    <div class="field">
      <span class="lbl">Hcp · disabled</span>
      <input value="4.2" disabled style="background: var(--muted); color: var(--muted-foreground);" />
    </div>
  </div>
</div></body></html>
