<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>BookSessionModal</title></head>
<body style="background: rgba(10,31,24,0.5); padding: 60px 40px;">
<div class="modal" style="background: white; border-radius: 20px; max-width: 600px; margin: 0 auto; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);">

  <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
    <div>
      <span class="page-eyebrow">Coach: Anders Kristiansen</span>
      <h2 style="font-family: var(--font-display); font-size: 22px; font-weight: 600; margin-top: 4px;">Book <em style="color: var(--primary); font-weight: 400;">økt</em></h2>
    </div>
    <button style="background: transparent; border: 0; font-size: 24px; cursor: pointer; color: var(--text-secondary);">×</button>
  </div>

  <div style="margin-bottom: 20px;">
    <label class="card-label" style="display: block; margin-bottom: 10px;">Velg dato — uke 20</label>
    <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg);">
        <div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); letter-spacing: 0.06em;">MAN</div>
        <div style="font-family: var(--font-display); font-size: 16px; font-weight: 600;">11</div>
      </div>
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg);">
        <div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); letter-spacing: 0.06em;">TIR</div>
        <div style="font-family: var(--font-display); font-size: 16px; font-weight: 600;">12</div>
      </div>
      <div style="text-align: center; padding: 10px 6px; border: 2px solid var(--primary); border-radius: 10px; background: rgba(0,88,64,0.06);">
        <div style="font-family: var(--font-mono); font-size: 9px; color: var(--primary); letter-spacing: 0.06em; font-weight: 600;">ONS</div>
        <div style="font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--primary);">13</div>
      </div>
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg);">
        <div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); letter-spacing: 0.06em;">TOR</div>
        <div style="font-family: var(--font-display); font-size: 16px; font-weight: 600;">14</div>
      </div>
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg);">
        <div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); letter-spacing: 0.06em;">FRE</div>
        <div style="font-family: var(--font-display); font-size: 16px; font-weight: 600;">15</div>
      </div>
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); opacity: 0.4;">
        <div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); letter-spacing: 0.06em;">LØR</div>
        <div style="font-family: var(--font-display); font-size: 16px; font-weight: 600;">16</div>
      </div>
      <div style="text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); opacity: 0.4;">
        <div style="font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); letter-spacing: 0.06em;">SØN</div>
        <div style="font-family: var(--font-display); font-size: 16px; font-weight: 600;">17</div>
      </div>
    </div>
  </div>

  <div style="margin-bottom: 20px;">
    <label class="card-label" style="display: block; margin-bottom: 10px;">Velg fasilitet</label>
    <div style="display: flex; flex-direction: column; gap: 6px;">
      <label style="display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 2px solid var(--primary); border-radius: 12px; background: rgba(0,88,64,0.04); cursor: pointer;">
        <input type="radio" checked>
        <div style="flex: 1;">
          <b style="font-size: 13px;">Mulligan Fredrikstad</b>
          <div style="font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary);">Trackman 4 · innendørs · 12 min unna</div>
        </div>
        <span class="pill pill-success">Ledig</span>
      </label>
      <label style="display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; cursor: pointer;">
        <input type="radio">
        <div style="flex: 1;">
          <b style="font-size: 13px;">GFGK Performance Studio</b>
          <div style="font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary);">Trackman 4 · innendørs · 24 min unna</div>
        </div>
        <span class="pill pill-warning">2 igjen</span>
      </label>
      <label style="display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; cursor: pointer;">
        <input type="radio">
        <div style="flex: 1;">
          <b style="font-size: 13px;">Bossum GK · range</b>
          <div style="font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary);">Utendørs · 18 min unna</div>
        </div>
        <span class="pill pill-info">Værmelding ✓</span>
      </label>
    </div>
  </div>

  <div style="margin-bottom: 8px;">
    <label class="card-label" style="display: block; margin-bottom: 10px;">Ledige tider · onsdag 13. mai</label>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px;">
      <button style="padding: 12px 6px; border: 1px solid var(--border); border-radius: 10px; background: white; font-family: var(--font-mono); font-size: 13px; cursor: pointer;">15:00</button>
      <button style="padding: 12px 6px; border: 1px solid var(--border); border-radius: 10px; background: white; font-family: var(--font-mono); font-size: 13px; cursor: pointer;">16:00</button>
      <button style="padding: 12px 6px; border: 2px solid var(--primary); border-radius: 10px; background: rgba(0,88,64,0.06); font-family: var(--font-mono); font-size: 13px; cursor: pointer; color: var(--primary); font-weight: 600;">17:00</button>
      <button style="padding: 12px 6px; border: 1px solid var(--border); border-radius: 10px; background: white; font-family: var(--font-mono); font-size: 13px; cursor: pointer;">18:00</button>
    </div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);">
    <div>
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary);">Total</div>
      <div style="font-family: var(--font-mono); font-size: 20px; font-weight: 600;">800 kr</div>
    </div>
    <button class="btn btn-primary">Bekreft booking →</button>
  </div>

</div>
</body>
</html>
