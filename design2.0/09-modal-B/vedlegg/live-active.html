<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>LiveSessionActiveModal</title></head>
<body style="background: #0A1F18; padding: 0; min-height: 100vh; color: #FAFAF7;">

<div style="display: flex; flex-direction: column; min-height: 100vh; padding: 32px 40px;">

  <div style="display: flex; justify-content: space-between; align-items: center;">
    <div>
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(250,250,247,0.55);">Stasjon 1 av 3 · 12:24 igjen</div>
      <h2 style="font-family: var(--font-display); font-size: 28px; font-weight: 600; margin-top: 4px;">2-meter putts</h2>
    </div>
    <span style="background: rgba(209,248,67,0.18); color: var(--accent); padding: 6px 14px; border-radius: 999px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.10em; font-weight: 600;">SLAG · PUTT</span>
  </div>

  <div style="flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 40px 0;">

    <div style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(250,250,247,0.55); margin-bottom: 16px;">Forsøk</div>

    <div style="font-family: var(--font-display); font-size: 168px; font-weight: 600; line-height: 1; letter-spacing: -0.05em; margin-bottom: 8px;">
      <span style="color: var(--accent);">12</span><span style="color: rgba(250,250,247,0.30); font-size: 96px;"> / 20</span>
    </div>

    <div style="font-family: var(--font-mono); font-size: 14px; color: rgba(250,250,247,0.65); letter-spacing: 0.06em; margin-bottom: 48px;">
      9 inn · 3 bom · 60% hit rate
    </div>

    <div style="display: flex; gap: 24px;">
      <button style="background: rgba(239,68,68,0.20); color: #F87171; border: 2px solid rgba(239,68,68,0.40); width: 96px; height: 96px; border-radius: 50%; font-family: var(--font-display); font-size: 48px; font-weight: 600; cursor: pointer;">−</button>
      <button style="background: var(--accent); color: var(--text); border: 0; width: 144px; height: 96px; border-radius: 48px; font-family: var(--font-display); font-size: 18px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 24px rgba(209,248,67,0.30);">INN ✓</button>
      <button style="background: rgba(255,255,255,0.10); color: #FAFAF7; border: 2px solid rgba(255,255,255,0.20); width: 96px; height: 96px; border-radius: 50%; font-family: var(--font-display); font-size: 48px; font-weight: 600; cursor: pointer;">+</button>
    </div>

  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.10);">
    <button style="background: transparent; color: rgba(250,250,247,0.65); border: 0; font-size: 13px; cursor: pointer;">⏸ Pause</button>
    <div style="font-family: var(--font-mono); font-size: 11px; color: rgba(250,250,247,0.45); letter-spacing: 0.06em;">Markus R · 11. mai 17:34</div>
    <button style="background: rgba(255,255,255,0.10); color: #FAFAF7; border: 0; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer;">Hopp over →</button>
  </div>

</div>

</body>
</html>
