<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>LiveSessionSummaryModal</title></head>
<body style="background: #0A1F18; padding: 40px; min-height: 100vh; color: #FAFAF7;">

<div style="max-width: 720px; margin: 0 auto;">

  <div style="text-align: center; margin-bottom: 32px;">
    <div style="display: inline-flex; align-items: center; gap: 10px; background: rgba(209,248,67,0.18); color: var(--accent); padding: 8px 18px; border-radius: 999px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; font-weight: 600; margin-bottom: 16px;">
      🏆 ØKT FULLFØRT
    </div>
    <h1 style="font-family: var(--font-display); font-size: 44px; font-weight: 600; line-height: 1.1; letter-spacing: -0.02em;">Solid jobb, <em style="color: var(--accent); font-weight: 400; font-style: italic;">Markus</em></h1>
    <div style="font-family: var(--font-mono); font-size: 13px; color: rgba(250,250,247,0.65); margin-top: 8px;">28 min · 60 slag · 11. mai 17:34-18:02</div>
  </div>

  <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; padding: 20px; margin-bottom: 16px;">
    <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(250,250,247,0.55); margin-bottom: 16px;">Stasjon-resultater</div>
    <table style="width: 100%; font-size: 13px;">
      <tr style="border-bottom: 1px solid rgba(255,255,255,0.10);">
        <td style="padding: 10px 0;">2m putts</td>
        <td style="padding: 10px 0; text-align: right; font-family: var(--font-mono);">14/20</td>
        <td style="padding: 10px 0; text-align: right; font-family: var(--font-mono); color: var(--accent);">70%</td>
      </tr>
      <tr style="border-bottom: 1px solid rgba(255,255,255,0.10);">
        <td style="padding: 10px 0;">5m putts</td>
        <td style="padding: 10px 0; text-align: right; font-family: var(--font-mono);">13/20</td>
        <td style="padding: 10px 0; text-align: right; font-family: var(--font-mono); color: var(--accent);">65%</td>
      </tr>
      <tr>
        <td style="padding: 10px 0;">10m putts</td>
        <td style="padding: 10px 0; text-align: right; font-family: var(--font-mono);">14/20</td>
        <td style="padding: 10px 0; text-align: right; font-family: var(--font-mono); color: var(--accent);">70%</td>
      </tr>
    </table>
    <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.10); display: flex; justify-content: space-between; align-items: baseline;">
      <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.10em; color: rgba(250,250,247,0.65);">SNITT</span>
      <span style="font-family: var(--font-mono); font-size: 32px; font-weight: 600; color: var(--accent);">68%</span>
    </div>
  </div>

  <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; padding: 20px; margin-bottom: 16px;">
    <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(250,250,247,0.55); margin-bottom: 12px;">Pyramide-bidrag</div>
    <div style="display: flex; gap: 4px; height: 32px; border-radius: 6px; overflow: hidden;">
      <div style="background: var(--pyr-fys); width: 0%;"></div>
      <div style="background: var(--pyr-tek); width: 15%; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: white;">15</div>
      <div style="background: var(--pyr-slag); width: 70%; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: var(--text); font-weight: 600;">SLAG · 70</div>
      <div style="background: var(--pyr-spill); width: 15%; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: white;">15</div>
    </div>
  </div>

  <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; padding: 20px; margin-bottom: 24px;">
    <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(250,250,247,0.55); margin-bottom: 12px;">Refleksjon (valgfritt)</div>
    <textarea placeholder="Hva fungerte? Hva må justeres til neste gang?" style="width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.20); border: 1px solid rgba(255,255,255,0.10); border-radius: 10px; color: #FAFAF7; font-family: inherit; font-size: 13px; min-height: 70px; resize: vertical;">Følte putteren rullet bedre på 5m enn forrige uke. 10m kan jobbes mer på distansekontroll.</textarea>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center;">
    <button style="background: transparent; color: rgba(250,250,247,0.55); border: 0; font-size: 13px; cursor: pointer;">Forkast</button>
    <div style="display: flex; gap: 8px;">
      <button style="background: rgba(255,255,255,0.10); color: #FAFAF7; border: 0; padding: 12px 20px; border-radius: 999px; font-size: 13px; cursor: pointer;">Del med coach</button>
      <button style="background: var(--accent); color: var(--text); border: 0; padding: 14px 32px; border-radius: 999px; font-family: var(--font-display); font-size: 15px; font-weight: 600; cursor: pointer;">Lagre →</button>
    </div>
  </div>

</div>

</body>
</html>
