<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>VideoUploadModal</title></head>
<body style="background: rgba(10,31,24,0.5); padding: 60px 40px;">
<div class="modal" style="background: white; border-radius: 20px; max-width: 600px; margin: 0 auto; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);">

  <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
    <div>
      <span class="page-eyebrow">Markus R · approach-økt 11. mai</span>
      <h2 style="font-family: var(--font-display); font-size: 22px; font-weight: 600; margin-top: 4px;">Last opp <em style="color: var(--primary); font-weight: 400;">swing-video</em></h2>
    </div>
    <button style="background: transparent; border: 0; font-size: 24px; cursor: pointer; color: var(--text-secondary);">×</button>
  </div>

  <p style="color: var(--text-secondary); font-size: 13px; margin: 12px 0 20px;">MP4, MOV eller HEIC. Coachen kan kommentere bilde-for-bilde. Max 100 MB per video.</p>

  <div style="border: 2px dashed rgba(0,88,64,0.30); border-radius: 16px; padding: 20px; background: rgba(0,88,64,0.03); margin-bottom: 20px;">

    <div style="display: flex; align-items: center; gap: 14px; margin-bottom: 14px;">
      <div style="background: var(--primary); color: var(--accent); width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 12px; font-weight: 600; flex-shrink: 0;">MP4</div>
      <div style="flex: 1; min-width: 0;">
        <b style="font-size: 13px; display: block;">markus_7iron_face_on_2026-05-11.mp4</b>
        <div style="font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); margin-top: 2px;">68.4 MB · 1080p · 12 sek · 240 fps</div>
      </div>
      <span class="pill pill-info" style="flex-shrink: 0;">Laster opp</span>
    </div>

    <div style="height: 8px; background: rgba(0,0,0,0.06); border-radius: 4px; overflow: hidden; margin-bottom: 6px;">
      <div style="width: 64%; height: 100%; background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%); border-radius: 4px;"></div>
    </div>
    <div style="display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary);">
      <span>43.8 / 68.4 MB</span>
      <span>64% · ~7 sek igjen</span>
    </div>

  </div>

  <div style="border: 2px dashed var(--border-strong); border-radius: 16px; padding: 28px 20px; text-align: center; margin-bottom: 20px; background: var(--bg);">
    <div style="font-size: 28px; color: var(--text-muted); margin-bottom: 8px;">+</div>
    <div style="font-size: 13px; color: var(--text-secondary);">Slipp en til, eller <a href="#" style="color: var(--primary);">velg fra disk</a></div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px;">
    <div>
      <label class="card-label" style="display: block; margin-bottom: 8px;">Vinkel</label>
      <select style="width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 13px; background: var(--bg);">
        <option>Face-on (forfra)</option>
        <option>Down-the-line (bak)</option>
        <option>Top-down</option>
      </select>
    </div>
    <div>
      <label class="card-label" style="display: block; margin-bottom: 8px;">Klubb</label>
      <select style="width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 13px; background: var(--bg);">
        <option>7-jern</option>
        <option>Driver</option>
        <option>PW</option>
        <option>Putter</option>
      </select>
    </div>
  </div>

  <div style="margin-bottom: 8px;">
    <label class="card-label" style="display: block; margin-bottom: 8px;">Notater til coach (valgfritt)</label>
    <textarea placeholder="Hva vil du at coachen skal se på?" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 13px; min-height: 70px; background: var(--bg); resize: vertical;">Føler at jeg blokkerer hofterotasjonen i nedsving når jeg slår 7-jern. Kommentarer?</textarea>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);">
    <button class="btn btn-ghost">Avbryt</button>
    <button class="btn btn-primary" disabled style="opacity: 0.5;">Send når ferdig</button>
  </div>

</div>
</body>
</html>
