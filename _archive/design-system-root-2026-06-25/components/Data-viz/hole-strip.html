<!-- @dsCard group="Data-viz" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HoleStrip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
  .lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
  .lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
  .lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
  .lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
  .lc-sub b{ color:var(--ink); font-weight:600; }
  .hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
  .hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

  .tip{ position:fixed; z-index:500; pointer-events:none; opacity:0; transform:translateY(4px); transition:opacity .12s, transform .12s; background:#0A1410; color:#EAF2EC; border:1px solid #243A2E; border-radius:8px; padding:9px 11px; box-shadow:var(--sh-lg); font-size:11.5px; max-width:230px; line-height:1.45; }
  .tip.show{ opacity:1; transform:translateY(0); }
  .tip .tt-h{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--lime); margin-bottom:4px; }
  .tip .tt-r{ display:flex; justify-content:space-between; gap:14px; font-family:var(--mono); font-size:10.5px; color:#9DB0A4; }
  .tip .tt-r b{ color:#EAF2EC; }

  .hs{ display:grid; grid-template-columns:repeat(9,1fr); gap:4px; }
  .hs + .hs{ margin-top:6px; }
  .hs .h{ aspect-ratio:.74; border:1px solid var(--border); border-radius:5px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; cursor:pointer; transition:transform .1s; position:relative; }
  .hs .h:hover{ transform:translateY(-2px); z-index:3; }
  .hs .h .n{ font-family:var(--mono); font-size:8px; color:var(--muted-2); }
  .hs .h .s{ font-family:var(--mono); font-size:14px; font-weight:700; }
  .hs .h.birdie{ background:var(--lime-bg, rgba(209,248,67,.10)); border-color:var(--lime-dim); } .hs .h.birdie .s{ color:var(--forest); }
  .hs .h.eagle{ background:var(--lime); border-color:var(--lime); } .hs .h.eagle .s,.hs .h.eagle .n{ color:var(--forest-deep); }
  .hs .h.par .s{ color:var(--ink); }
  .hs .h.bogey{ background:rgba(163,45,45,.1); border-color:rgba(163,45,45,.3); } .hs .h.bogey .s{ color:var(--down); }
  .hs-meta{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:11px; }
  .hs-meta .sc{ font-family:var(--mono); font-size:13px; font-weight:600; }
  .hs-meta .sc b{ color:var(--forest); }
  .hs-leg{ display:flex; gap:14px; margin-top:13px; font-family:var(--mono); font-size:9.5px; color:var(--muted-2); }
  .hs-leg span{ display:flex; align-items:center; gap:5px; } .hs-leg i{ width:9px; height:9px; border-radius:2px; }
</style>
</head>
<body>
  <div class="lc">
    <div class="lc-h"><span class="ti">Hole<em>Strip</em></span><span class="lc-num">BOSSUM</span></div>
    <div class="lc-sub">18 hull fargekodet. <b>Hover</b> for par, score og slag. Birdie-streak lyser lime.</div>
    <div class="hs-meta"><span class="mono" style="font-size:11px;color:var(--muted-2)">UT 35 · INN 36</span><span class="sc">71 · <b>−1</b></span></div>
    <div class="hs" id="holes1"></div>
    <div class="hs" id="holes2"></div>
    <div class="hs-leg">
      <span><i style="background:var(--lime)"></i>Birdie</span>
      <span><i style="background:var(--border);border:1px solid var(--muted-2)"></i>Par</span>
      <span><i style="background:rgba(163,45,45,.35)"></i>Bogey</span>
    </div>
    <div class="hint">Hover et hull</div>
  </div>

  <div class="tip" id="tip"></div>
<script>
function nf(v,d=1){ return v.toLocaleString('nb-NO',{minimumFractionDigits:d,maximumFractionDigits:d}); }
const tip=document.getElementById('tip');
function showTip(html,e){ tip.innerHTML=html; tip.classList.add('show'); positionTip(e); }
function positionTip(e){ const pad=14,r=tip.getBoundingClientRect(); let x=e.clientX+pad,y=e.clientY+pad; if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-pad; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-pad; tip.style.left=x+'px'; tip.style.top=y+'px'; }
function hideTip(){ tip.classList.remove('show'); }
(function(){
  const holes=[
    [4,3],[5,4],[4,4],[3,3],[4,4],[4,5],[5,4],[3,3],[4,5],
    [4,4],[3,2],[5,4],[4,4],[4,4],[3,3],[5,5],[4,4],[4,6]
  ];
  const sg=[0.4,0.9,0,0.2,0,-0.6,0.5,0,-0.4, 0,1.1,0.7,0,0.1,0.3,0,0,-0.8];
  function cls(par,sc){ const d=sc-par; if(d<=-2)return'eagle'; if(d===-1)return'birdie'; if(d===0)return'par'; return'bogey'; }
  function fill(elId, off){
    const el=document.getElementById(elId);
    for(let i=0;i<9;i++){
      const idx=off+i; const [par,sc]=holes[idx]; const c=cls(par,sc);
      const cell=document.createElement('div'); cell.className='h '+c;
      cell.innerHTML=`<span class="n">${idx+1}</span><span class="s">${sc}</span>`;
      const dlt=sc-par; const dtxt = dlt===0?'Par':(dlt>0?`+${dlt} bogey`:(dlt===-1?'Birdie':'Eagle'));
      const sgv=sg[idx];
      cell.addEventListener('mousemove', e=> showTip(
        `<div class="tt-h">Hull ${idx+1} · Par ${par}</div>`+
        `<div class="tt-r"><span>Score</span><b>${sc} (${dtxt})</b></div>`+
        `<div class="tt-r"><span>SG hull</span><b style="color:${sgv>=0?'#4FD08A':'#F0683E'}">${sgv>=0?'+':''}${nf(sgv,1)}</b></div>`, e));
      cell.addEventListener('mouseleave', hideTip);
      el.appendChild(cell);
    }
  }
  fill('holes1',0); fill('holes2',9);
})();
</script>
</body>
</html>
