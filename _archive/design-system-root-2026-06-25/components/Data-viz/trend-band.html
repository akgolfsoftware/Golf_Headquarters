<!-- @dsCard group="Data-viz" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrendBand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
  .lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
  .lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
  .lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
  .lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
  .lc-sub b{ color:var(--ink); font-weight:600; }
  .hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
  .hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

  .tip{ position:fixed; z-index:500; pointer-events:none; opacity:0; transform:translateY(4px); transition:opacity .12s, transform .12s; background:#0A1410; color:#EAF2EC; border:1px solid #243A2E; border-radius:8px; padding:9px 11px; box-shadow:var(--sh-lg); font-size:11.5px; max-width:230px; line-height:1.45; }
  .tip.show{ opacity:1; transform:translateY(0); }
  .tip .tt-h{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--lime); margin-bottom:4px; }
  .tip .tt-r{ display:flex; justify-content:space-between; gap:14px; font-family:var(--mono); font-size:10.5px; color:#9DB0A4; }
  .tip .tt-r b{ color:#EAF2EC; }

  .trend-svg{ width:100%; height:auto; }
  .trend-ctl{ display:flex; gap:18px; margin-top:13px; font-family:var(--mono); font-size:10.5px; }
  .trend-ctl .tc{ display:flex; align-items:center; gap:7px; color:var(--muted); }
  .trend-ctl .tc .sw{ width:14px; height:8px; border-radius:2px; }
</style>
</head>
<body>
  <div class="lc">
    <div class="lc-h"><span class="ti">Trend<em>Band</em></span><span class="lc-num">HCP-UTVIKLING</span></div>
    <div class="lc-sub">Trend med <b>benchmark-bånd</b> (PGA / Team Norway). PB-punktet er markert. Hover for verdi.</div>
    <svg class="trend-svg" id="trendSvg" viewBox="0 0 320 180"></svg>
    <div class="trend-ctl">
      <span class="tc"><span class="sw" style="background:rgba(0,88,64,.14)"></span>Team Norway</span>
      <span class="tc"><span class="sw" style="background:var(--lime-deep)"></span>Din linje</span>
      <span class="tc"><span class="sw" style="background:var(--lime);box-shadow:0 0 0 2px var(--forest)"></span>PB</span>
    </div>
    <div class="hint">Hover et punkt på linjen</div>
  </div>

  <div class="tip" id="tip"></div>
<script>
function nf(v,d=1){ return v.toLocaleString('nb-NO',{minimumFractionDigits:d,maximumFractionDigits:d}); }
const tip=document.getElementById('tip');
function showTip(html,e){ tip.innerHTML=html; tip.classList.add('show'); positionTip(e); }
function positionTip(e){ const pad=14,r=tip.getBoundingClientRect(); let x=e.clientX+pad,y=e.clientY+pad; if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-pad; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-pad; tip.style.left=x+'px'; tip.style.top=y+'px'; }
function hideTip(){ tip.classList.remove('show'); }
(function(){
  const svg=document.getElementById('trendSvg');
  const W=320,H=180, padL=8,padR=8,padT=14,padB=22;
  const vals=[7.8,7.2,6.9,6.4,6.1,5.6,5.3,4.9,4.6,4.2];
  const pbIdx=9;
  const labels=['M1','M2','M3','M4','M5','M6','M7','M8','M9','Nå'];
  const minV=3.5, maxV=8.5;
  const x=i=> padL + i*(W-padL-padR)/(vals.length-1);
  const y=v=> padT + (v-minV)/(maxV-minV)*(H-padT-padB);
  const bandTop=y(4.0), bandBot=y(5.5);
  let line=vals.map((v,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(' ');
  let area=`M${x(0)} ${y(vals[0])} `+vals.map((v,i)=>`L${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(' ')+` L${x(vals.length-1)} ${H-padB} L${x(0)} ${H-padB} Z`;
  let dots='';
  vals.forEach((v,i)=>{
    const isPB=i===pbIdx;
    dots+=`<circle class="td" data-i="${i}" cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="${isPB?5:3.2}" fill="${isPB?'var(--lime)':'var(--paper)'}" stroke="${isPB?'var(--forest)':'var(--lime-deep)'}" stroke-width="2" style="cursor:pointer"/>`;
  });
  svg.innerHTML=`
    <rect x="${padL}" y="${bandTop}" width="${W-padL-padR}" height="${bandBot-bandTop}" fill="var(--forest)" fill-opacity="0.10"/>
    <text x="${W-padR}" y="${bandTop-3}" text-anchor="end" font-family="var(--mono)" font-size="8" fill="var(--muted-2)">Team Norway-sone</text>
    <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--lime-deep)" stop-opacity="0.22"/><stop offset="1" stop-color="var(--lime-deep)" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#tg)"/>
    <path d="${line}" fill="none" stroke="var(--lime-deep)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${labels.map((l,i)=>`<text x="${x(i).toFixed(1)}" y="${H-7}" text-anchor="middle" font-family="var(--mono)" font-size="8" fill="var(--muted-2)">${l}</text>`).join('')}
    <text x="${x(pbIdx).toFixed(1)}" y="${y(vals[pbIdx])-10}" text-anchor="middle" font-family="var(--mono)" font-size="8.5" font-weight="700" fill="var(--forest)">PB</text>`;
  svg.querySelectorAll('.td').forEach(d=>{
    const i=+d.dataset.i;
    d.addEventListener('mousemove', e=> showTip(
      `<div class="tt-h">${i===pbIdx?'Personlig rekord':'Måling '+(i+1)}</div>`+
      `<div class="tt-r"><span>HCP</span><b>${nf(vals[i])}</b></div>`+
      (i>0?`<div class="tt-r"><span>Endring</span><b style="color:#4FD08A">${nf(vals[i]-vals[i-1])}</b></div>`:''), e));
    d.addEventListener('mouseleave', hideTip);
  });
})();
</script>
</body>
</html>
