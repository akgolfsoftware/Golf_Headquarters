<!-- @dsCard group="Data-viz" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkillRadarLive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
  .lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
  .lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
  .lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
  .lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
  .lc-sub b{ color:var(--ink); font-weight:600; }
  .hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
  .hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

  .radar-svg{ width:100%; max-width:320px; margin:0 auto; display:block; }
  .radar-legend{ display:flex; gap:18px; justify-content:center; margin-top:8px; }
  .rl{ display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:10.5px; color:var(--muted); cursor:pointer; user-select:none; }
  .rl .sw{ width:14px; height:3px; border-radius:2px; }
  .rl.off{ opacity:.4; }
</style>
</head>
<body>
  <div class="lc">
    <div class="lc-h"><span class="ti">Skill<em>RadarLive</em></span><span class="lc-num">6 AKSER</span></div>
    <div class="lc-sub">Nå vs mål. <b>Toggle mål-laget</b> i forklaringen for å se gapet.</div>
    <svg class="radar-svg" id="radarSvg" viewBox="0 0 280 260"></svg>
    <div class="radar-legend">
      <span class="rl" data-layer="now"><span class="sw" style="background:var(--forest)"></span>Nå</span>
      <span class="rl" data-layer="goal"><span class="sw" style="background:var(--lime-deep)"></span>Mål</span>
    </div>
    <div class="hint">Klikk «Mål» for å vise/skjule</div>
  </div>

<script>
(function(){
  const svg=document.getElementById('radarSvg');
  const axes=['Driving','Approach','Short game','Putting','Mental','Fysikk'];
  const now=[78,84,62,75,70,80];
  const goal=[88,90,80,85,82,88];
  const cx=140, cy=125, R=92, N=axes.length;
  let show={now:true, goal:true};
  function pt(i,val){
    const ang=-Math.PI/2 + i*2*Math.PI/N;
    const r=val/100*R;
    return [cx+Math.cos(ang)*r, cy+Math.sin(ang)*r];
  }
  function poly(arr){ return arr.map((v,i)=>pt(i,v).join(',')).join(' '); }
  function draw(){
    let grid='';
    [25,50,75,100].forEach(p=>{
      let pp=axes.map((_,i)=>pt(i,p).join(',')).join(' ');
      grid+=`<polygon points="${pp}" fill="none" stroke="var(--border)" stroke-width="1" opacity="0.7"/>`;
    });
    let spokes='', labels='';
    axes.forEach((a,i)=>{
      const [x,y]=pt(i,100);
      spokes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--border)" stroke-width="1" opacity="0.6"/>`;
      const [lx,ly]=pt(i,118);
      const anchor = Math.abs(lx-cx)<6?'middle':(lx>cx?'start':'end');
      labels+=`<text x="${lx}" y="${ly+3}" text-anchor="${anchor}" font-family="var(--mono)" font-size="8.5" fill="var(--muted-2)">${a}</text>`;
    });
    let goalLayer = show.goal? `<polygon points="${poly(goal)}" fill="var(--lime)" fill-opacity="0.12" stroke="var(--lime-deep)" stroke-width="2" stroke-dasharray="4 3"/>`:'';
    let nowLayer = show.now? `<polygon points="${poly(now)}" fill="var(--forest)" fill-opacity="0.18" stroke="var(--forest)" stroke-width="2"/>`
      + now.map((v,i)=>{const[x,y]=pt(i,v);return `<circle cx="${x}" cy="${y}" r="2.5" fill="var(--forest)"/>`}).join('') : '';
    svg.innerHTML=grid+spokes+goalLayer+nowLayer+labels;
  }
  document.querySelectorAll('.radar-legend .rl').forEach(el=>{
    el.addEventListener('click', ()=>{
      const l=el.dataset.layer; show[l]=!show[l];
      el.classList.toggle('off', !show[l]); draw();
    });
  });
  draw();
})();
</script>
</body>
</html>
