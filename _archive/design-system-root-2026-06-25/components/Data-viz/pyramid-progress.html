<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PyramidProgress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
  .lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
  .lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
  .lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
  .lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
  .lc-sub b{ color:var(--ink); font-weight:600; }
  .hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
  .hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

  .pyr{ display:flex; flex-direction:column-reverse; gap:7px; align-items:center; }
  .pyr-tier{ cursor:pointer; transition:transform .14s; }
  .pyr-tier:hover{ transform:translateY(-2px); }
  .pyr-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  .pyr-nm{ font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .pyr-dot{ width:9px; height:9px; border-radius:2px; flex-shrink:0; }
  .pyr-pct{ font-family:var(--mono); font-size:12px; font-weight:600; color:var(--ink); }
  .pyr-track{ height:16px; background:var(--sand); border:1px solid var(--border); border-radius:var(--r-sm); position:relative; overflow:hidden; }
  .pyr-fill{ position:absolute; left:0; top:0; bottom:0; width:0; border-radius:var(--r-sm); transition:width 1s cubic-bezier(.22,1,.36,1); }
  .pyr-note{ display:none; margin-top:13px; padding:11px 13px; background:var(--cream-2); border:1px solid var(--border-soft); border-radius:var(--r-md); border-left:3px solid var(--lime); font-size:12.5px; color:var(--muted); }
  .pyr-note.show{ display:block; animation:fadein .25s; }
  .pyr-note b{ color:var(--ink); font-weight:600; }
  @keyframes fadein{ from{ opacity:0; transform:translateY(4px); } to{ opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
  <div class="lc">
    <div class="lc-h"><span class="ti">Pyramid<em>Progress</em></span><span class="lc-num">AK-PYRAMIDEN</span></div>
    <div class="lc-sub"><b>Klikk et trinn</b> for detalj. Bunn er bredest (fundament), topp smalest (turnering). Fyller seg ved load.</div>
    <div class="pyr" id="pyr"></div>
    <div class="pyr-note" id="pyrNote"></div>
    <div class="hint">Klikk et trinn for status</div>
  </div>

<script>
function nf(v,d=1){ return v.toLocaleString('nb-NO',{minimumFractionDigits:d,maximumFractionDigits:d}); }
(function(){
  // bottom -> top
  const tiers=[
    {nm:'Fysisk', pct:82, color:'var(--pyr-fys)', w:100, note:'eksplosivitet og bevegelighet på skjema'},
    {nm:'Teknisk', pct:74, color:'var(--pyr-tek)', w:86, note:'sving-konsistens stiger, AoA på driver gjenstår'},
    {nm:'Golfslag', pct:69, color:'var(--pyr-slag)', w:72, note:'approach sterk, wedge-kontroll 40–90 m i arbeid'},
    {nm:'Spill', pct:61, color:'var(--pyr-spill)', w:58, note:'course management og scoring under press neste fokus'},
    {nm:'Turnering', pct:48, color:'var(--pyr-turn)', w:44, note:'topp 10 Srixon Tour — internasjonal debut er målet'},
  ];
  const root=document.getElementById('pyr');
  const note=document.getElementById('pyrNote');
  tiers.forEach((t,i)=>{
    const el=document.createElement('div'); el.className='pyr-tier';
    el.style.width=t.w+'%';
    // lime tier needs dark text on its fill, but we use forest pct text outside fill so fine
    el.innerHTML=`
      <div class="pyr-top">
        <span class="pyr-nm"><span class="pyr-dot" style="background:${t.color}"></span>${t.nm}</span>
        <span class="pyr-pct">${t.pct}%</span>
      </div>
      <div class="pyr-track"><span class="pyr-fill" style="background:${t.color}"></span></div>`;
    root.appendChild(el);
    requestAnimationFrame(()=> setTimeout(()=>{ el.querySelector('.pyr-fill').style.width=t.pct+'%'; }, 120+i*90));
    el.addEventListener('click', ()=>{
      note.innerHTML=`<b>${t.nm} · ${t.pct}%</b> — ${t.note}`;
      note.classList.add('show');
    });
  });
})();
</script>
</body>
</html>
