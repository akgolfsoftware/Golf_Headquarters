<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skjelett-laster — AK Golf HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body{font-family:var(--sans);background:var(--cream);color:var(--ink);margin:0;padding:28px;}
  .lab{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin:0 0 12px;}
  .darklab{color:var(--t-fg-3);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin:0 0 30px;}
  .panel{background:var(--paper);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:18px;}
  .dark .panel{background:var(--t-bg-3);border-color:var(--t-line-2);box-shadow:none;}

  /* Skeleton — shimmer, aldri spinner */
  .sk{background:linear-gradient(90deg,var(--sand) 25%,var(--cream-2) 50%,var(--sand) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r-sm);}
  @keyframes shimmer{to{background-position:-200% 0;}}
  .dark .sk{background:linear-gradient(90deg,var(--t-bg-3) 0%,var(--t-bg-4) 50%,var(--t-bg-3) 100%);background-size:200% 100%;animation:shimmer-dark 1.4s infinite;}
  @keyframes shimmer-dark{to{background-position:-200% 0;}}

  .sk-circle{border-radius:var(--r-full);}
  .line{height:12px;}

  /* kort-skeleton */
  .sk-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .sk-head .sk-circle{width:48px;height:48px;flex:none;}
  .sk-head .meta{flex:1;display:flex;flex-direction:column;gap:8px;}

  /* liste-rader */
  .sk-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-soft);}
  .dark .sk-row{border-color:var(--t-line);}
  .sk-row:last-child{border-bottom:none;}
  .sk-row .sk-circle{width:42px;height:42px;flex:none;}
  .sk-row .meta{flex:1;display:flex;flex-direction:column;gap:8px;}

  /* KPI-grid */
  .sk-kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .sk-kpi .cell{border:1px solid var(--border-soft);border-radius:var(--r-md);padding:14px;display:flex;flex-direction:column;gap:10px;}
  .dark .sk-kpi .cell{border-color:var(--t-line);}

  /* tabell */
  .sk-table .tr{display:grid;grid-template-columns:1.6fr 1fr 1fr .8fr;gap:14px;padding:11px 0;border-bottom:1px solid var(--border-soft);align-items:center;}
  .dark .sk-table .tr{border-color:var(--t-line);}
  .sk-table .tr:last-child{border-bottom:none;}
  .sk-table .tr.head .sk{opacity:.6;}
</style>
</head>
<body>

  <p class="lab">Skjelett-laster · lys</p>
  <div class="grid">

    <div class="panel">
      <p class="lab" style="margin-bottom:14px">Kort</p>
      <div class="sk-head">
        <div class="sk sk-circle"></div>
        <div class="meta">
          <div class="sk line" style="width:60%"></div>
          <div class="sk line" style="width:40%"></div>
        </div>
      </div>
      <div class="sk line" style="width:100%;margin-bottom:8px"></div>
      <div class="sk line" style="width:92%;margin-bottom:8px"></div>
      <div class="sk line" style="width:74%"></div>
    </div>

    <div class="panel">
      <p class="lab" style="margin-bottom:8px">Liste</p>
      <div class="sk-row">
        <div class="sk sk-circle"></div>
        <div class="meta"><div class="sk line" style="width:55%"></div><div class="sk line" style="width:35%"></div></div>
      </div>
      <div class="sk-row">
        <div class="sk sk-circle"></div>
        <div class="meta"><div class="sk line" style="width:70%"></div><div class="sk line" style="width:45%"></div></div>
      </div>
      <div class="sk-row">
        <div class="sk sk-circle"></div>
        <div class="meta"><div class="sk line" style="width:48%"></div><div class="sk line" style="width:30%"></div></div>
      </div>
    </div>

    <div class="panel">
      <p class="lab" style="margin-bottom:14px">KPI-felt</p>
      <div class="sk-kpi">
        <div class="cell"><div class="sk line" style="width:50%;height:10px"></div><div class="sk line" style="width:70%;height:22px"></div></div>
        <div class="cell"><div class="sk line" style="width:55%;height:10px"></div><div class="sk line" style="width:60%;height:22px"></div></div>
        <div class="cell"><div class="sk line" style="width:45%;height:10px"></div><div class="sk line" style="width:75%;height:22px"></div></div>
        <div class="cell"><div class="sk line" style="width:60%;height:10px"></div><div class="sk line" style="width:55%;height:22px"></div></div>
      </div>
    </div>

    <div class="panel">
      <p class="lab" style="margin-bottom:8px">Tabell</p>
      <div class="sk-table">
        <div class="tr head"><div class="sk line" style="width:50%;height:9px"></div><div class="sk line" style="width:60%;height:9px"></div><div class="sk line" style="width:60%;height:9px"></div><div class="sk line" style="width:70%;height:9px"></div></div>
        <div class="tr"><div class="sk line" style="width:80%"></div><div class="sk line" style="width:55%"></div><div class="sk line" style="width:65%"></div><div class="sk line" style="width:45%"></div></div>
        <div class="tr"><div class="sk line" style="width:70%"></div><div class="sk line" style="width:60%"></div><div class="sk line" style="width:50%"></div><div class="sk line" style="width:55%"></div></div>
        <div class="tr"><div class="sk line" style="width:85%"></div><div class="sk line" style="width:45%"></div><div class="sk line" style="width:70%"></div><div class="sk line" style="width:40%"></div></div>
      </div>
    </div>

  </div>

  <div class="dark" style="background:var(--t-bg);padding:22px;border-radius:var(--r-lg)">
    <p class="lab darklab">Skjelett-laster · mørk (terminal)</p>
    <div class="grid" style="margin:0">

      <div class="panel">
        <p class="lab darklab" style="margin-bottom:14px">Kort</p>
        <div class="sk-head">
          <div class="sk sk-circle"></div>
          <div class="meta">
            <div class="sk line" style="width:60%"></div>
            <div class="sk line" style="width:40%"></div>
          </div>
        </div>
        <div class="sk line" style="width:100%;margin-bottom:8px"></div>
        <div class="sk line" style="width:92%;margin-bottom:8px"></div>
        <div class="sk line" style="width:74%"></div>
      </div>

      <div class="panel">
        <p class="lab darklab" style="margin-bottom:8px">Liste</p>
        <div class="sk-row">
          <div class="sk sk-circle"></div>
          <div class="meta"><div class="sk line" style="width:55%"></div><div class="sk line" style="width:35%"></div></div>
        </div>
        <div class="sk-row">
          <div class="sk sk-circle"></div>
          <div class="meta"><div class="sk line" style="width:70%"></div><div class="sk line" style="width:45%"></div></div>
        </div>
        <div class="sk-row">
          <div class="sk sk-circle"></div>
          <div class="meta"><div class="sk line" style="width:48%"></div><div class="sk line" style="width:30%"></div></div>
        </div>
      </div>

      <div class="panel">
        <p class="lab darklab" style="margin-bottom:14px">KPI-felt</p>
        <div class="sk-kpi">
          <div class="cell"><div class="sk line" style="width:50%;height:10px"></div><div class="sk line" style="width:70%;height:22px"></div></div>
          <div class="cell"><div class="sk line" style="width:55%;height:10px"></div><div class="sk line" style="width:60%;height:22px"></div></div>
          <div class="cell"><div class="sk line" style="width:45%;height:10px"></div><div class="sk line" style="width:75%;height:22px"></div></div>
          <div class="cell"><div class="sk line" style="width:60%;height:10px"></div><div class="sk line" style="width:55%;height:22px"></div></div>
        </div>
      </div>

      <div class="panel">
        <p class="lab darklab" style="margin-bottom:8px">Tabell</p>
        <div class="sk-table">
          <div class="tr head"><div class="sk line" style="width:50%;height:9px"></div><div class="sk line" style="width:60%;height:9px"></div><div class="sk line" style="width:60%;height:9px"></div><div class="sk line" style="width:70%;height:9px"></div></div>
          <div class="tr"><div class="sk line" style="width:80%"></div><div class="sk line" style="width:55%"></div><div class="sk line" style="width:65%"></div><div class="sk line" style="width:45%"></div></div>
          <div class="tr"><div class="sk line" style="width:70%"></div><div class="sk line" style="width:60%"></div><div class="sk line" style="width:50%"></div><div class="sk line" style="width:55%"></div></div>
          <div class="tr"><div class="sk line" style="width:85%"></div><div class="sk line" style="width:45%"></div><div class="sk line" style="width:70%"></div><div class="sk line" style="width:40%"></div></div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
