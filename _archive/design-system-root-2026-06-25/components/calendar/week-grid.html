<!-- @dsCard group="Kalender" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Week-grid · Kalender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body{font-family:var(--sans);background:var(--cream);color:var(--ink);margin:0;padding:28px;}
  .vh{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin:0 0 12px;}
  .stack{max-width:560px;margin:0 0 36px;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
  .wk-dow{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);text-align:center;padding-bottom:2px;}
  .wk-cell{aspect-ratio:1;border-radius:var(--r-md);border:1px solid var(--border);background:var(--cream);
    display:flex;align-items:center;justify-content:center;position:relative;
    font-family:var(--mono);font-weight:600;font-size:14px;color:var(--ink);}
  .wk-cell.has::after{content:"";position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:var(--r-full);background:var(--forest);}
  .wk-cell.today{background:var(--forest);color:var(--lime);border-color:var(--forest);}
  .wk-cell.full{background:var(--lime);color:var(--forest-deep);border-color:var(--lime);}
  .wk-cell.full::after{background:var(--forest-deep);}
  .wk-cell.muted{color:var(--muted-2);opacity:.5;}

  /* Variant med labels */
  .lab{flex-direction:column;justify-content:flex-start;align-items:stretch;aspect-ratio:auto;min-height:96px;padding:8px;gap:5px;}
  .lab .dn{font-family:var(--mono);font-weight:600;font-size:13px;}
  .lab.today .dn{color:var(--lime);}
  .chip{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    border-radius:var(--r-sm);padding:3px 5px;text-align:left;line-height:1.25;}
  .chip.fo{background:var(--forest);color:#fff;}
  .chip.li{background:var(--lime);color:var(--forest-deep);}
  .chip.sa{background:var(--sand);color:var(--ink);}

  .dark{background:var(--t-bg);}
  .dark .wk-cell{background:var(--t-bg-2);border-color:var(--t-line);color:var(--t-fg);}
  .dark .wk-cell.has::after{background:var(--lime);}
  .dark .wk-cell.today{background:var(--forest);color:var(--lime);border-color:var(--forest);}
  .dark .wk-cell.full{background:var(--lime);color:var(--forest-deep);border-color:var(--lime);}
  .dark .wk-cell.full::after{background:var(--forest-deep);}
  .dark .wk-dow{color:var(--t-fg-3);}
  .dark .wk-cell.muted{color:var(--t-fg-4);}
</style>
</head>
<body>

<div class="stack">
  <p class="vh">Week-grid · uke 25 (lys)</p>
  <div class="grid">
    <div class="wk-dow">man</div><div class="wk-dow">tir</div><div class="wk-dow">ons</div><div class="wk-dow">tor</div><div class="wk-dow">fre</div><div class="wk-dow">lør</div><div class="wk-dow">søn</div>
    <div class="wk-cell has">16</div>
    <div class="wk-cell today has">17</div>
    <div class="wk-cell has">18</div>
    <div class="wk-cell">19</div>
    <div class="wk-cell full">20</div>
    <div class="wk-cell has">21</div>
    <div class="wk-cell muted">22</div>
  </div>
</div>

<div class="stack">
  <p class="vh">Week-grid · med økt-labels (lys)</p>
  <div class="grid">
    <div class="wk-dow">man</div><div class="wk-dow">tir</div><div class="wk-dow">ons</div><div class="wk-dow">tor</div><div class="wk-dow">fre</div><div class="wk-dow">lør</div><div class="wk-dow">søn</div>
    <div class="wk-cell lab"><span class="dn">16</span><span class="chip sa">Mobilitet</span></div>
    <div class="wk-cell lab today"><span class="dn">17</span><span class="chip fo">Teknisk</span><span class="chip li">SG-putt</span></div>
    <div class="wk-cell lab"><span class="dn">18</span><span class="chip fo">Spilløkt</span></div>
    <div class="wk-cell lab"><span class="dn">19</span></div>
    <div class="wk-cell lab"><span class="dn">20</span><span class="chip li">Turnering</span></div>
    <div class="wk-cell lab"><span class="dn">21</span><span class="chip sa">Restitusjon</span></div>
    <div class="wk-cell lab"><span class="dn" style="opacity:.5">22</span></div>
  </div>
</div>

<div class="dark" style="background:var(--t-bg);padding:22px;border-radius:var(--r-lg)">
  <p class="vh" style="color:var(--t-fg-3)">Week-grid · uke 25 (mørk)</p>
  <div class="grid">
    <div class="wk-dow">man</div><div class="wk-dow">tir</div><div class="wk-dow">ons</div><div class="wk-dow">tor</div><div class="wk-dow">fre</div><div class="wk-dow">lør</div><div class="wk-dow">søn</div>
    <div class="wk-cell has">16</div>
    <div class="wk-cell today has">17</div>
    <div class="wk-cell has">18</div>
    <div class="wk-cell">19</div>
    <div class="wk-cell full">20</div>
    <div class="wk-cell has">21</div>
    <div class="wk-cell muted">22</div>
  </div>
</div>

</body>
</html>
