<!-- @dsCard group="Identitet" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avatar — Identitet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); margin: 0; padding: 28px; }
  h2 { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }
  .group { margin-bottom: 34px; }
  .row { display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cap { font-family: var(--mono); font-size: 10px; letter-spacing: .04em; color: var(--muted-2); text-transform: uppercase; }

  /* Lime-ring (aktiv i dag) */
  .av-ring { border-radius: var(--r-full); padding: 3px; background: linear-gradient(135deg, var(--lime), var(--lime-deep)); display: inline-block; }
  .av-ring.forest { background: linear-gradient(135deg, var(--forest), var(--forest-deep)); }
  .av-ring.neutral { background: var(--border); }
  .av-ring.bare { padding: 0; background: none; }
  .inner { width: 100%; height: 100%; border-radius: var(--r-full); overflow: hidden; position: relative; background: var(--forest-deep); }
  .av-ring.neutral .inner { background: var(--sand); display: flex; align-items: center; justify-content: center; }
  .av-ring.forest .inner { display: flex; align-items: center; justify-content: center; }
  .inner svg.photo { width: 100%; height: 100%; display: block; }

  .size-74 { width: 74px; height: 74px; }
  .size-44 { width: 44px; height: 44px; }
  .size-34 { width: 34px; height: 34px; }
  .size-26 { width: 26px; height: 26px; }

  .ini { font-family: var(--mono); font-weight: 700; line-height: 1; }
  .ini.lime { color: var(--lime); }
  .ini.muted { color: var(--muted); }
  .ini.s74 { font-size: 22px; }
  .ini.s44 { font-size: 14px; }
  .ini.s34 { font-size: 11px; }
  .ini.s26 { font-size: 9px; }

  .dark { background: var(--t-bg); padding: 22px; border-radius: var(--r-lg); }
  .dark h2 { color: var(--t-fg-3); }
  .dark .cap { color: var(--t-fg-3); }
</style>
</head>
<body>

<div class="group">
  <h2>Duotone-foto · lime-ring = aktiv i dag</h2>
  <div class="row">
    <div class="cell">
      <span class="av-ring"><span class="inner size-74">
        <svg class="photo" viewBox="0 0 74 74" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="duoA" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#D1F843"/><stop offset="1" stop-color="#00402F"/>
            </linearGradient>
          </defs>
          <rect width="74" height="74" fill="url(#duoA)"/>
          <circle cx="37" cy="29" r="14" fill="#00402F" opacity="0.55"/>
          <path d="M11 74c2-17 13-26 26-26s24 9 26 26z" fill="#00402F" opacity="0.55"/>
        </svg>
      </span></span>
      <span class="cap">Øyvind Rohjan</span>
    </div>
    <div class="cell">
      <span class="av-ring"><span class="inner size-74">
        <svg class="photo" viewBox="0 0 74 74" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="duoB" x1="0" y1="1" x2="1" y2="0">
              <stop offset="0" stop-color="#D1F843"/><stop offset="1" stop-color="#00402F"/>
            </linearGradient>
          </defs>
          <rect width="74" height="74" fill="url(#duoB)"/>
          <circle cx="37" cy="27" r="13" fill="#06100A" opacity="0.5"/>
          <path d="M9 74c3-19 14-28 28-28s25 9 28 28z" fill="#06100A" opacity="0.5"/>
        </svg>
      </span></span>
      <span class="cap">Anders Kristiansen</span>
    </div>
  </div>
</div>

<div class="group">
  <h2>Initial-fallback · forest + lime / nøytral</h2>
  <div class="row">
    <div class="cell">
      <span class="av-ring forest"><span class="inner size-74"><span class="ini lime s74">ØR</span></span></span>
      <span class="cap">Forest</span>
    </div>
    <div class="cell">
      <span class="av-ring neutral"><span class="inner size-74"><span class="ini muted s74">AK</span></span></span>
      <span class="cap">Nøytral</span>
    </div>
    <div class="cell">
      <span class="av-ring"><span class="inner size-74"><span class="ini lime s74" style="color:var(--lime)">ØR</span></span></span>
      <span class="cap">Lime-ring</span>
    </div>
  </div>
</div>

<div class="group">
  <h2>Størrelser · 26 / 34 / 44 / 74</h2>
  <div class="row">
    <div class="cell"><span class="av-ring forest"><span class="inner size-26"><span class="ini lime s26">ØR</span></span></span><span class="cap">26</span></div>
    <div class="cell"><span class="av-ring forest"><span class="inner size-34"><span class="ini lime s34">ØR</span></span></span><span class="cap">34</span></div>
    <div class="cell"><span class="av-ring forest"><span class="inner size-44"><span class="ini lime s44">ØR</span></span></span><span class="cap">44</span></div>
    <div class="cell"><span class="av-ring forest"><span class="inner size-74"><span class="ini lime s74">ØR</span></span></span><span class="cap">74</span></div>
  </div>
</div>

<div class="group">
  <h2>Uten ring</h2>
  <div class="row">
    <div class="cell"><span class="av-ring forest bare"><span class="inner size-44"><span class="ini lime s44">ØR</span></span></span><span class="cap">44 bare</span></div>
    <div class="cell"><span class="av-ring neutral bare"><span class="inner size-34"><span class="ini muted s34">AK</span></span></span><span class="cap">34 bare</span></div>
  </div>
</div>

<div class="dark">
  <h2>Mørkt (AgencyOS)</h2>
  <div class="row">
    <div class="cell"><span class="av-ring"><span class="inner size-74">
      <svg class="photo" viewBox="0 0 74 74" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs><linearGradient id="duoD" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#D1F843"/><stop offset="1" stop-color="#00402F"/></linearGradient></defs>
        <rect width="74" height="74" fill="url(#duoD)"/>
        <circle cx="37" cy="29" r="14" fill="#06100A" opacity="0.55"/>
        <path d="M11 74c2-17 13-26 26-26s24 9 26 26z" fill="#06100A" opacity="0.55"/>
      </svg>
    </span></span><span class="cap">Aktiv</span></div>
    <div class="cell"><span class="av-ring forest"><span class="inner size-74"><span class="ini lime s74">ØR</span></span></span><span class="cap">Forest</span></div>
    <div class="cell"><span class="av-ring neutral"><span class="inner size-44"><span class="ini muted s44">AK</span></span></span><span class="cap">Nøytral</span></div>
  </div>
</div>

</body>
</html>
