<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Badge — Identitet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body { font-family: var(--sans); background: var(--cream); color: var(--ink); margin: 0; padding: 28px; }
  h2 { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }
  .group { margin-bottom: 34px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .04em;
    padding: 4px 9px; border-radius: var(--r-full); text-transform: uppercase;
  }
  .b-ok { background: rgba(26,125,86,.12); color: var(--ok); }
  .b-warn { background: rgba(184,133,42,.14); color: var(--warn); }
  .b-urgent { background: rgba(163,45,45,.12); color: var(--urgent); }
  .b-info { background: rgba(37,99,235,.12); color: var(--info); }
  .b-lime { background: var(--lime); color: var(--forest-deep); }
  .b-forest { background: var(--forest); color: var(--lime); }
  .b-neutral { background: var(--sand); color: var(--muted); }

  .badge.dot::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Mørke firkant-badges */
  .bdg {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .04em;
    padding: 4px 7px; border-radius: 3px; text-transform: uppercase;
  }
  .bdg-lime { background: var(--lime); color: #06100A; }
  .bdg-up { background: var(--t-up-bg); color: var(--t-up); }
  .bdg-dn { background: var(--t-down-bg); color: var(--t-down); }
  .bdg-warn { background: rgba(232,180,60,.12); color: var(--t-warn); }
  .bdg-gho { background: transparent; color: var(--t-fg-2); border: 1px solid var(--t-line-2); }

  .dark { background: var(--t-bg); padding: 22px; border-radius: var(--r-lg); }
  .dark h2 { color: var(--t-fg-3); }
</style>
</head>
<body>

<div class="group">
  <h2>StatusPill · lyse varianter</h2>
  <div class="row">
    <span class="badge b-ok">På sporet</span>
    <span class="badge b-warn">Følg med</span>
    <span class="badge b-urgent">Haster</span>
    <span class="badge b-info">Ny</span>
    <span class="badge b-lime">Aktiv i dag</span>
    <span class="badge b-forest">Performance Pro</span>
    <span class="badge b-neutral">Hvile</span>
  </div>
</div>

<div class="group">
  <h2>Med dot-prefiks</h2>
  <div class="row">
    <span class="badge b-ok dot">Online</span>
    <span class="badge b-warn dot">Venter</span>
    <span class="badge b-urgent dot">Avlyst</span>
    <span class="badge b-info dot">Booket</span>
  </div>
</div>

<div class="dark">
  <h2>Firkant-badges · mørkt (AgencyOS)</h2>
  <div class="row" style="margin-bottom:14px">
    <span class="bdg bdg-lime">NÅ</span>
    <span class="bdg bdg-up">+2,4 SG</span>
    <span class="bdg bdg-dn">−1,1 SG</span>
    <span class="bdg bdg-warn">3 dg</span>
    <span class="bdg bdg-gho">Utkast</span>
  </div>
  <h2>StatusPill i mørkt</h2>
  <div class="row">
    <span class="badge b-ok dot">På sporet</span>
    <span class="badge b-lime">Aktiv i dag</span>
    <span class="badge b-forest">Pro</span>
    <span class="badge b-urgent dot">Haster</span>
  </div>
</div>

</body>
</html>
