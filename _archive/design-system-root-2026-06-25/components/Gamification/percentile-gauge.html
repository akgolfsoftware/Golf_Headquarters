<!-- @dsCard group="Gamification" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
.lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
.lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
.lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
.lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
.lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
.lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
.lc-sub b{ color:var(--ink); font-weight:600; }
.hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
.hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

/* 15 · PERCENTILE GAUGE */
.pg-svg{ width:100%; max-width:280px; margin:0 auto; display:block; }
.pg-needle{ transition:transform 1.2s cubic-bezier(.34,1.4,.5,1); transform-origin:140px 130px; }
.pg-read{ text-align:center; margin-top:-6px; }
.pg-read .pv{ font-family:var(--mono); font-size:34px; font-weight:700; color:var(--forest); line-height:1; }
.pg-read .pl{ font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); margin-top:4px; }
.pg-read .pn{ font-size:12px; color:var(--muted); margin-top:7px; }
.pg-read .pn b{ color:var(--ink); }
</style>
</head>
<body>
<div class="lc">
  <div class="lc-h"><span class="ti">Percentile<em>Gauge</em></span><span class="lc-num">VS KOHORT</span></div>
  <div class="lc-sub">Hvor du rangerer mot tour-kohorten. <b>Nålen stiger</b> mot «topp X %» ved load.</div>
  <svg class="pg-svg" id="pgSvg" viewBox="0 0 280 160"></svg>
  <div class="pg-read">
    <div class="pv" id="pgVal">—</div>
    <div class="pl">Percentil · SG total</div>
    <div class="pn">Du slår <b id="pgBeat">—</b> av kohorten. Neste mål: <b>topp 5 %</b>.</div>
  </div>
  <div class="hint">Klikk for å re-animere nålen</div>
</div>

<script>
(function(){
  const svg=document.getElementById('pgSvg');
  const cx=140, cy=130, R=104;
  const target=0.88; // 88th percentile
  // arc from 180deg(left) to 0deg(right)
  function polar(p){ const ang=Math.PI - p*Math.PI; return [cx+Math.cos(ang)*R, cy-Math.sin(ang)*R]; }
  // build coloured segments
  let segs='';
  const stops=[[0,'var(--down)'],[0.5,'var(--warn)'],[0.78,'var(--forest)'],[1,'var(--lime-deep)']];
  const steps2=60;
  for(let i=0;i<steps2;i++){
    const p0=i/steps2, p1=(i+1)/steps2;
    const [x0,y0]=polar(p0), [x1,y1]=polar(p1);
    let col= p0<0.5?'var(--down)' : p0<0.7?'var(--warn)' : p0<0.85?'var(--forest)':'var(--lime-deep)';
    segs+=`<path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${R} ${R} 0 0 1 ${x1.toFixed(1)} ${y1.toFixed(1)}" stroke="${col}" stroke-width="13" fill="none" stroke-linecap="butt" opacity="0.92"/>`;
  }
  // ticks
  let ticks='';
  [0,0.25,0.5,0.75,1].forEach(p=>{
    const [tx,ty]=polar(p); const [lx,ly]=[cx+Math.cos(Math.PI-p*Math.PI)*(R+15), cy-Math.sin(Math.PI-p*Math.PI)*(R+15)];
    ticks+=`<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" text-anchor="middle" font-family="var(--mono)" font-size="8" fill="var(--muted-2)">${Math.round(p*100)}</text>`;
  });
  svg.innerHTML=`${segs}${ticks}
    <g class="pg-needle" id="pgNeedle" transform="rotate(-90 ${cx} ${cy})">
      <line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy-R+14}" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="6" fill="var(--ink)"/>
      <circle cx="${cx}" cy="${cy}" r="2.5" fill="var(--lime)"/>
    </g>`;
  const needle=document.getElementById('pgNeedle');
  const valEl=document.getElementById('pgVal'), beatEl=document.getElementById('pgBeat');
  function run(){
    needle.style.transition='none'; needle.setAttribute('transform',`rotate(-90 ${cx} ${cy})`);
    valEl.textContent='—'; beatEl.textContent='—';
    void needle.getBBox();
    requestAnimationFrame(()=> setTimeout(()=>{
      needle.style.transition='';
      const deg = -90 + target*180;
      needle.setAttribute('transform',`rotate(${deg} ${cx} ${cy})`);
      let cur=0; const tgt=Math.round(target*100);
      const step=()=>{ cur+=Math.ceil((tgt-cur)/7); if(cur>tgt)cur=tgt; valEl.textContent='topp '+(100-cur)+'%'; beatEl.textContent=cur+'%'; if(cur<tgt) requestAnimationFrame(step); };
      step();
    },200));
  }
  svg.addEventListener('click', run);
  document.getElementById('pgSvg').style.cursor='pointer';
  run();
})();
</script>
</body>
</html>
