<!-- @dsCard group="Gamification" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
.lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
.lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
.lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
.lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
.lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:20px; }
.lc-sub b{ color:var(--ink); font-weight:600; }
.hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:16px; }
.hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

/* Live rep pulse */
.section-label{
  font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
  color:var(--muted-2); margin-bottom:14px;
}

.rep-card{
  border:1px solid var(--border); border-radius:var(--r-lg); padding:20px 20px 18px;
  margin-bottom:14px; position:relative; overflow:hidden; transition:border-color .2s, background .2s;
}
.rep-card.active{ background:var(--paper); }
.rep-card.paused{ background:var(--cream-2); border-color:var(--border-soft); }

/* Øvelse-header */
.ex-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.ex-name{ font-size:13px; font-weight:600; display:flex; align-items:center; gap:7px; }
.ex-name .live-dot{
  width:7px; height:7px; border-radius:50%; background:var(--lime);
  box-shadow:0 0 0 0 rgba(209,248,67,.5);
  animation:pulse-ring 1.5s ease-out infinite;
}
.rep-card.paused .live-dot{ background:var(--muted-2); box-shadow:none; animation:none; }
.ex-pos{ font-family:var(--mono); font-size:10px; color:var(--muted-2); background:var(--sand); border:1px solid var(--border); border-radius:5px; padding:3px 8px; }

/* Stor teller */
.count-wrap{ display:flex; align-items:flex-end; justify-content:center; gap:8px; margin:10px 0 14px; }
.count-num{
  font-family:var(--mono); font-variant-numeric:tabular-nums;
  font-size:80px; font-weight:700; line-height:1; color:var(--ink);
  transition:transform .08s cubic-bezier(.22,1,.36,1), color .15s;
  display:inline-block;
}
.rep-card.paused .count-num{ color:var(--muted-2); }
.count-unit{ font-family:var(--mono); font-size:13px; color:var(--muted); margin-bottom:10px; }

/* Lime flash overlay */
.flash{
  position:absolute; inset:0; background:var(--lime); opacity:0; border-radius:var(--r-lg);
  pointer-events:none;
  transition:opacity .05s;
}
.rep-card.flash-active .flash{ opacity:.18; }

/* Fremdrift mot sett-mål */
.prog-row{ display:flex; align-items:center; gap:10px; }
.prog-track{ flex:1; height:7px; background:var(--sand); border:1px solid var(--border); border-radius:var(--r-full); overflow:hidden; }
.prog-fill{ height:100%; border-radius:var(--r-full); background:linear-gradient(90deg,var(--forest),var(--lime-deep)); transition:width .3s cubic-bezier(.22,1,.36,1); }
.prog-label{ font-family:var(--mono); font-size:10px; color:var(--muted-2); white-space:nowrap; }

/* Knapper */
.btn-row{ display:flex; align-items:center; gap:10px; margin-top:14px; }
.btn{
  font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  border:none; border-radius:var(--r-full); cursor:pointer; display:inline-flex; align-items:center; gap:7px;
  padding:0 18px; height:40px; transition:background .14s, opacity .14s;
}
.btn-primary{ background:var(--lime); color:var(--forest); }
.btn-primary:hover{ background:var(--lime-deep); }
.btn-secondary{ background:var(--sand); border:1px solid var(--border); color:var(--ink); }
.btn-secondary:hover{ background:var(--sand-deep); }
.btn:active{ opacity:.8; }
.rep-card.paused .btn-primary{ background:var(--sand-deep); color:var(--muted); }

/* Status-chip pause */
.paused-chip{
  display:inline-flex; align-items:center; gap:5px;
  font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase;
  color:var(--muted); background:var(--sand); border:1px solid var(--border);
  border-radius:var(--r-full); padding:3px 10px;
}

/* Pulsring-animasjon */
@keyframes pulse-ring{
  0%  { box-shadow:0 0 0 0 rgba(209,248,67,.55); }
  70% { box-shadow:0 0 0 8px rgba(209,248,67,0); }
  100%{ box-shadow:0 0 0 0 rgba(209,248,67,0); }
}
@keyframes bump{
  0%  { transform:scale(1); }
  40% { transform:scale(1.12); }
  100%{ transform:scale(1); }
}
.bump{ animation:bump .18s cubic-bezier(.22,1,.36,1); }
</style>
</head>
<body>
<div class="lc">
  <div class="lc-h"><span class="ti">Live<em>RepPulse</em></span><span class="lc-num">LIVE-ØKT</span></div>
  <div class="lc-sub"><b>Sanntids rep-teller</b> med lime-puls per treffer. Pause nedtoner flaten.</div>

  <!-- AKTIV tilstand -->
  <div class="section-label">Aktiv</div>
  <div class="rep-card active" id="card-active">
    <div class="flash" id="flash-active"></div>
    <div class="ex-row">
      <span class="ex-name">
        <span class="live-dot"></span>
        Wedge — kontroll 50 m
      </span>
      <span class="ex-pos" id="ex-pos">Øvelse 2 av 5</span>
    </div>
    <div class="count-wrap">
      <span class="count-num" id="count">7</span>
      <span class="count-unit">slag</span>
    </div>
    <div class="prog-row">
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:35%"></div></div>
      <span class="prog-label" id="prog-label">7 / 20</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-rep" onclick="logRep()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14"/><path d="m5 12 7 7 7-7"/></svg>
        Logg slag
      </button>
      <button class="btn btn-secondary" onclick="togglePause()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pause
      </button>
    </div>
  </div>

  <!-- PAUSET tilstand -->
  <div class="section-label">Pauset</div>
  <div class="rep-card paused" id="card-paused">
    <div class="ex-row">
      <span class="ex-name">
        <span class="live-dot"></span>
        Wedge — kontroll 50 m
      </span>
      <span class="paused-chip">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pauset
      </span>
    </div>
    <div class="count-wrap">
      <span class="count-num">7</span>
      <span class="count-unit">slag</span>
    </div>
    <div class="prog-row">
      <div class="prog-track"><div class="prog-fill" style="width:35%"></div></div>
      <span class="prog-label">7 / 20</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" style="background:var(--forest);color:var(--lime);" onclick="togglePause()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Fortsett
      </button>
    </div>
  </div>

  <div class="hint">Trykk «Logg slag» for å se pulsen · Øyvind Rohjan · Live-økt</div>
</div>

<script>
let count = 7;
const total = 20;
const countEl = document.getElementById('count');
const progFill = document.getElementById('prog-fill');
const progLabel = document.getElementById('prog-label');
const flashEl = document.getElementById('flash-active');
const cardActive = document.getElementById('card-active');
const cardPaused = document.getElementById('card-paused');
let paused = false;

function logRep() {
  if (paused) return;
  count = Math.min(count + 1, total);
  // Bump animasjon
  countEl.classList.remove('bump');
  void countEl.offsetWidth;
  countEl.classList.add('bump');
  countEl.textContent = count;
  // Flash overlay
  cardActive.classList.add('flash-active');
  setTimeout(() => cardActive.classList.remove('flash-active'), 160);
  // Fremdrift
  const pct = Math.round((count / total) * 100);
  progFill.style.width = pct + '%';
  progLabel.textContent = count + ' / ' + total;
  countEl.addEventListener('animationend', () => countEl.classList.remove('bump'), { once: true });
}

function togglePause() {
  paused = !paused;
  if (paused) {
    cardActive.classList.add('paused');
    cardActive.classList.remove('active');
    // Bytt knapper i aktiv-kort
    const btnRow = document.querySelector('#card-active .btn-row');
    btnRow.innerHTML = `
      <button class="btn" style="background:var(--forest);color:var(--lime);" onclick="togglePause()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Fortsett
      </button>
      <span class="paused-chip" style="margin-left:4px;">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pauset
      </span>`;
  } else {
    cardActive.classList.remove('paused');
    cardActive.classList.add('active');
    const btnRow = document.querySelector('#card-active .btn-row');
    btnRow.innerHTML = `
      <button class="btn btn-primary" id="btn-rep" onclick="logRep()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14"/><path d="m5 12 7 7 7-7"/></svg>
        Logg slag
      </button>
      <button class="btn btn-secondary" onclick="togglePause()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pause
      </button>`;
  }
}
</script>
</body>
</html>
