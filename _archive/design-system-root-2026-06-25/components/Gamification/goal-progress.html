<!-- @dsCard group="Gamification" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
.lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
.lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
.lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
.lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
.lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
.lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
.lc-sub b{ color:var(--ink); font-weight:600; }
.hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
.hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

/* 14 · GOAL PROGRESS */
.gp{ margin-bottom:20px; }
.gp-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px; }
.gp-nm{ font-size:13px; font-weight:600; }
.gp-eta{ font-family:var(--mono); font-size:10px; color:var(--muted-2); }
.gp-track{ height:12px; background:var(--sand); border:1px solid var(--border); border-radius:var(--r-full); position:relative; overflow:visible; }
.gp-fill{ position:absolute; left:0; top:0; bottom:0; border-radius:var(--r-full); background:linear-gradient(90deg,var(--forest),var(--lime-deep)); width:0; transition:width 1.1s cubic-bezier(.22,1,.36,1); }
.gp-ms{ position:absolute; top:50%; transform:translate(-50%,-50%); width:9px; height:9px; border-radius:50%; background:var(--paper); border:2px solid var(--muted-2); z-index:2; }
.gp-ms.hit{ background:var(--lime); border-color:var(--lime-deep); }
.gp-val{ position:absolute; right:0; top:-22px; font-family:var(--mono); font-size:11px; font-weight:600; }
</style>
</head>
<body>
<div class="lc">
  <div class="lc-h"><span class="ti">Goal<em>Progress</em></span><span class="lc-num">SESONGMÅL</span></div>
  <div class="lc-sub"><b>Animert fremdrift</b> mot mål med milepæl-prikker og ETA. Fyller seg ved load.</div>
  <div id="goals"></div>
  <div class="hint">Fyller seg automatisk · trykk for å re-animere</div>
</div>

<script>
function nf(v,d=1){ return v.toLocaleString('nb-NO',{minimumFractionDigits:d,maximumFractionDigits:d}); }
(function(){
  const goals=[
    {n:'HCP til 3,5', pct:78, eta:'ETA: ~6 uker', ms:[20,50,80], val:'4,2 → 3,5'},
    {n:'SG total +2,0', pct:85, eta:'ETA: ~4 uker', ms:[33,66], val:'+1,7 / +2,0'},
    {n:'200 wedge-drills', pct:62, eta:'124 / 200', ms:[25,50,75], val:'124'},
  ];
  const root=document.getElementById('goals');
  goals.forEach(g=>{
    const wrap=document.createElement('div'); wrap.className='gp';
    let ms=g.ms.map(m=>`<span class="gp-ms ${m<=g.pct?'hit':''}" style="left:${m}%"></span>`).join('');
    wrap.innerHTML=`
      <div class="gp-top"><span class="gp-nm">${g.n}</span><span class="gp-eta">${g.eta}</span></div>
      <div class="gp-track"><span class="gp-val" style="left:0">${g.pct}%</span><span class="gp-fill"></span>${ms}</div>`;
    root.appendChild(wrap);
    const fill=wrap.querySelector('.gp-fill'), valEl=wrap.querySelector('.gp-val');
    function run(){ fill.style.width='0'; valEl.style.left='0';
      requestAnimationFrame(()=> setTimeout(()=>{ fill.style.width=g.pct+'%'; valEl.style.left='calc('+g.pct+'% - 14px)'; },150)); }
    run();
    wrap.addEventListener('click', run);
  });
})();
</script>
</body>
</html>
