<!-- @dsCard group="Gamification" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
.lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
.lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
.lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
.lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
.lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
.lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
.lc-sub b{ color:var(--ink); font-weight:600; }
.hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
.hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }

/* 10 · MASTERY RING */
.mr-wrap{ display:flex; align-items:center; gap:22px; flex-wrap:wrap; }
.mr-svg{ width:140px; height:140px; flex-shrink:0; cursor:pointer; }
.mr-svg .bg{ fill:none; stroke:var(--sand); stroke-width:11; }
.mr-svg .fg{ fill:none; stroke:var(--forest); stroke-width:11; stroke-linecap:round; transition:stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1); transform:rotate(-90deg); transform-origin:center; }
.mr-svg.full .fg{ stroke:var(--lime-deep); filter:drop-shadow(0 0 7px rgba(209,248,67,.6)); }
.mr-ctr{ text-align:center; }
.mr-ctr .lvl{ font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; fill:var(--muted-2); }
.mr-ctr .pct{ font-family:var(--mono); font-size:26px; font-weight:600; fill:var(--ink); }
.mr-body .mr-lvl{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-2); }
.mr-body h4{ font-family:var(--disp); font-size:22px; font-weight:700; letter-spacing:-0.02em; margin:3px 0 7px; }
.mr-body p{ font-size:12.5px; color:var(--muted); max-width:200px; }
.mr-up{ margin-top:11px; font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--forest); background:var(--lime); padding:5px 11px; border-radius:var(--r-full); display:none; }
.mr-svg.full ~ .mr-body .mr-up{ display:inline-block; animation:pop .4s; }
@keyframes pop{ 0%{ transform:scale(.6); opacity:0; } 60%{ transform:scale(1.12); } 100%{ transform:scale(1); opacity:1; } }
</style>
</head>
<body>
<div class="lc">
  <div class="lc-h"><span class="ti">Mastery<em>Ring</em></span><span class="lc-num">WEDGE-MESTRING</span></div>
  <div class="lc-sub"><b>Klikk ringen</b> — den fyller seg mot terskelen. Når full: «nivå opp»-puls.</div>
  <div class="mr-wrap">
    <svg class="mr-svg" id="mrSvg" viewBox="0 0 120 120" onclick="fillRing()">
      <circle class="bg" cx="60" cy="60" r="50"/>
      <circle class="fg" id="mrFg" cx="60" cy="60" r="50" stroke-dasharray="314" stroke-dashoffset="314"/>
      <text class="lvl" id="mrLvlTxt" x="60" y="50" text-anchor="middle">NIVÅ 4</text>
      <text class="pct" id="mrPct" x="60" y="74" text-anchor="middle">0%</text>
    </svg>
    <div class="mr-body">
      <div class="mr-lvl">Avstandskontroll 40–90 m</div>
      <h4>Wedge-mestring</h4>
      <p>Hit-rate ±3 m over siste 200 slag avgjør nivået.</p>
      <span class="mr-up" id="mrUp">Nivå opp → 5</span>
    </div>
  </div>
  <div class="hint">Klikk ringen for å fylle den</div>
</div>

<script>
let ringFilled=false;
function fillRing(){
  const svg=document.getElementById('mrSvg'), fg=document.getElementById('mrFg'), pct=document.getElementById('mrPct');
  const target=0.86, C=314;
  if(ringFilled){ // reset then refill
    fg.style.transition='none'; fg.setAttribute('stroke-dashoffset',C); pct.textContent='0%'; svg.classList.remove('full');
    void fg.getBBox(); fg.style.transition='';
    ringFilled=false; setTimeout(fillRing,30); return;
  }
  ringFilled=true;
  fg.setAttribute('stroke-dashoffset', C*(1-target));
  let cur=0; const step=()=>{ cur+=Math.ceil((target*100-cur)/6); if(cur>=Math.round(target*100)){cur=Math.round(target*100);} pct.textContent=cur+'%'; if(cur<Math.round(target*100)) requestAnimationFrame(step); else if(target>=0.85) svg.classList.add('full'); };
  requestAnimationFrame(step);
}
</script>
</body>
</html>
