<!-- @dsCard group="Gamification" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--sans); background:var(--cream); color:var(--ink); padding:28px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
.lc{ max-width:560px; background:var(--paper); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; box-shadow:var(--sh-md); }
.lc-h{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
.lc-h .ti{ font-family:var(--disp); font-size:19px; font-weight:700; letter-spacing:-.02em; }
.lc-h .ti em{ font-style:italic; color:var(--forest); font-weight:500; }
.lc-num{ font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted-2); border:1px solid var(--border); padding:3px 7px; border-radius:5px; letter-spacing:.04em; flex-shrink:0; }
.lc-sub{ font-size:12.5px; color:var(--muted); margin-bottom:18px; }
.lc-sub b{ color:var(--ink); font-weight:600; }
.hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); display:inline-flex; align-items:center; gap:5px; margin-top:14px; }
.hint::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--lime-deep); }
.tip{ position:fixed; z-index:500; pointer-events:none; opacity:0; transform:translateY(4px); transition:opacity .12s, transform .12s; background:#0A1410; color:#EAF2EC; border:1px solid #243A2E; border-radius:8px; padding:9px 11px; box-shadow:var(--sh-lg); font-size:11.5px; max-width:230px; line-height:1.45; }
.tip.show{ opacity:1; transform:translateY(0); }
.tip .tt-h{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--lime); margin-bottom:4px; }
.tip .tt-r{ display:flex; justify-content:space-between; gap:14px; font-family:var(--mono); font-size:10.5px; color:#9DB0A4; }
.tip .tt-r b{ color:#EAF2EC; }

/* 12 · BADGE SHELF */
.bs-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:11px; }
.bdg2{ aspect-ratio:1; border-radius:var(--r-md); border:1px solid var(--border); background:var(--cream-2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; padding:8px; cursor:pointer; transition:transform .14s, border-color .14s; text-align:center; position:relative; }
.bdg2:hover{ transform:translateY(-2px); }
.bdg2 .ic{ width:34px; height:34px; border-radius:var(--r-full); display:grid; place-items:center; border:1.5px solid var(--border); color:var(--muted-2); }
.bdg2 .bn{ font-family:var(--mono); font-size:8.5px; letter-spacing:.03em; text-transform:uppercase; color:var(--muted-2); line-height:1.2; }
.bdg2.unlocked{ border-color:var(--lime-dim); background:var(--lime-bg); }
.bdg2.unlocked .ic{ border-color:var(--lime-deep); color:var(--forest); background:var(--paper); }
.bdg2.unlocked .bn{ color:var(--ink); }
.bdg2.locked .ic svg{ opacity:.5; }
.bdg2 .lock{ position:absolute; top:7px; right:7px; color:var(--muted-2); opacity:.6; }
.bdg2.unlocked .lock{ display:none; }
@media(max-width:680px){ .bs-grid{ grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
<div class="lc">
  <div class="lc-h"><span class="ti">Badge<em>Shelf</em></span><span class="lc-num">MILEPÆLER</span></div>
  <div class="lc-sub">Oppnådde milepæler (lime) vs låste (grå). <b>Hover</b> en badge for hva som kreves.</div>
  <div class="bs-grid" id="badges"></div>
  <div class="hint">Hover for krav · 5 av 8 låst opp</div>
</div>

<div class="tip" id="tip"></div>
<script>
const tip=document.getElementById('tip');
function showTip(html,e){ tip.innerHTML=html; tip.classList.add('show'); positionTip(e); }
function positionTip(e){ const pad=14,r=tip.getBoundingClientRect(); let x=e.clientX+pad,y=e.clientY+pad; if(x+r.width>window.innerWidth-8)x=e.clientX-r.width-pad; if(y+r.height>window.innerHeight-8)y=e.clientY-r.height-pad; tip.style.left=x+'px'; tip.style.top=y+'px'; }
function hideTip(){ tip.classList.remove('show'); }

(function(){
  const badges=[
    {n:'Første sub-par', unlocked:true, req:'Spill en runde under par.', ic:'<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>'},
    {n:'100 drills', unlocked:true, req:'Fullfør 100 loggede øvelser.', ic:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>'},
    {n:'Streak 14', unlocked:true, req:'14 treningsdager på rad.', ic:'<path d="M12 2s4 4 4 8a4 4 0 0 1-8 0c0-2 1-3 2-4"/>'},
    {n:'SG +1,0', unlocked:true, req:'Nå SG total over +1,0.', ic:'<path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>'},
    {n:'Wedge-mester', unlocked:true, req:'80%+ hit-rate på wedge ±3 m.', ic:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/>'},
    {n:'HCP under 4', unlocked:false, req:'Få handicap under 4,0. Du er 0,2 unna.', ic:'<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 9 6 9 9"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 15 6 15 9"/><path d="M8 22h8"/><path d="M12 9v13"/>'},
    {n:'Tour-debut', unlocked:false, req:'Spill din første proff-turnering.', ic:'<path d="M2 12h20"/><path d="M12 2v20"/><circle cx="12" cy="12" r="9"/>'},
    {n:'Sub-70 snitt', unlocked:false, req:'Snittscore under 70 over 10 runder.', ic:'<path d="M12 2 2 7l10 5 10-5z"/><path d="M2 17l10 5 10-5"/>'},
  ];
  const root=document.getElementById('badges');
  badges.forEach(b=>{
    const el=document.createElement('div');
    el.className='bdg2 '+(b.unlocked?'unlocked':'locked');
    el.innerHTML=`
      <span class="lock"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
      <span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">${b.ic}</svg></span>
      <span class="bn">${b.n}</span>`;
    el.addEventListener('mousemove', e=> showTip(
      `<div class="tt-h">${b.unlocked?'Låst opp':'Låst'}</div><div style="font-size:11.5px;color:#EAF2EC">${b.req}</div>`, e));
    el.addEventListener('mouseleave', hideTip);
    root.appendChild(el);
  });
})();
</script>
</body>
</html>
