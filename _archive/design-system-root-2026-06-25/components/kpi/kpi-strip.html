<!-- @dsCard group="Tall/KPI" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KPI-stripe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); margin:0; padding:28px; }
  h2{ font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 12px; }

  /* Lys 4-kol */
  .strip{ display:grid; grid-template-columns:repeat(4,1fr); border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; background:var(--paper); margin-bottom:26px; }
  .cell{ padding:12px 13px; border-right:1px solid var(--border-soft); }
  .cell:last-child{ border-right:none; }
  .cell.hot{ background:var(--lime-bg); }
  .kl{ font-family:var(--mono); font-size:8.5px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); margin:0 0 7px; }
  .kv{ font-family:var(--mono); font-size:22px; font-weight:600; letter-spacing:-.02em; line-height:1; font-variant-numeric:tabular-nums; }
  .kv small{ font-size:12px; color:var(--muted); font-weight:500; }
  .kd{ font-family:var(--mono); font-size:9.5px; font-weight:500; margin-top:7px; display:flex; align-items:center; gap:4px; font-variant-numeric:tabular-nums; color:var(--muted); }
  .kd svg{ width:11px; height:11px; }
  .up{ color:var(--up); } .down{ color:var(--down); }

  /* Mørk 6-kol terminal */
  .dark-wrap{ background:var(--t-bg); padding:22px; border-radius:var(--r-lg); }
  .strip6{ display:grid; grid-template-columns:repeat(6,1fr); border:1px solid var(--t-line-2); border-radius:var(--r-md); overflow:hidden; background:var(--t-bg-1); }
  .c6{ padding:11px 12px; border-right:1px solid var(--t-line); position:relative; background:var(--t-bg-2); }
  .c6:last-child{ border-right:none; }
  .c6.hot{ background:var(--lime-bg); }
  .c6 .l{ font-family:var(--mono); font-size:8.5px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--t-fg-3); margin:0 0 7px; }
  .c6 .v{ font-family:var(--mono); font-size:20px; font-weight:600; letter-spacing:-.02em; line-height:1; color:var(--t-fg); font-variant-numeric:tabular-nums; }
  .c6 .v small{ font-size:11px; color:var(--t-fg-3); }
  .c6.hot .v{ color:var(--lime); }
  .c6 .d{ font-family:var(--mono); font-size:9px; font-weight:500; margin-top:7px; display:flex; align-items:center; gap:3px; font-variant-numeric:tabular-nums; }
  .c6 .d svg{ width:10px; height:10px; }
  .tu{ color:var(--t-up); } .td{ color:var(--t-down); }
  .spark{ position:absolute; right:8px; bottom:8px; width:30px; height:12px; opacity:.85; }
  @media(max-width:760px){ .strip{ grid-template-columns:repeat(2,1fr); } .strip6{ grid-template-columns:repeat(3,1fr); } }
</style>
</head>
<body>
  <h2>Lyst tema — 4 celler delt av hairlines</h2>
  <div class="strip">
    <div class="cell">
      <p class="kl">Snittscore</p>
      <div class="kv">72,4</div>
      <div class="kd up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>1,2</div>
    </div>
    <div class="cell">
      <p class="kl">SG total</p>
      <div class="kv">+1,8</div>
      <div class="kd up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>0,4</div>
    </div>
    <div class="cell hot">
      <p class="kl">Økter uke</p>
      <div class="kv">6</div>
      <div class="kd up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>2</div>
    </div>
    <div class="cell">
      <p class="kl">Handicap</p>
      <div class="kv">4,1</div>
      <div class="kd down"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>0,3</div>
    </div>
  </div>

  <h2>Mørk terminal — 6 celler med mini-spark</h2>
  <div class="dark-wrap dark">
    <div class="strip6">
      <div class="c6">
        <p class="l">SG OTT</p><div class="v">+0,6</div>
        <div class="d tu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>0,2</div>
        <svg class="spark" viewBox="0 0 30 12" preserveAspectRatio="none"><polyline points="0,9 7,7 14,8 21,4 30,2" fill="none" stroke="var(--t-up)" stroke-width="1.2"/></svg>
      </div>
      <div class="c6">
        <p class="l">SG APP</p><div class="v">+0,4</div>
        <div class="d tu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>0,1</div>
        <svg class="spark" viewBox="0 0 30 12" preserveAspectRatio="none"><polyline points="0,8 7,6 14,7 21,5 30,4" fill="none" stroke="var(--t-up)" stroke-width="1.2"/></svg>
      </div>
      <div class="c6">
        <p class="l">SG ARG</p><div class="v">-0,2</div>
        <div class="d td"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>0,1</div>
        <svg class="spark" viewBox="0 0 30 12" preserveAspectRatio="none"><polyline points="0,3 7,5 14,4 21,7 30,9" fill="none" stroke="var(--t-down)" stroke-width="1.2"/></svg>
      </div>
      <div class="c6">
        <p class="l">SG PUTT</p><div class="v">+0,3</div>
        <div class="d tu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>0,2</div>
        <svg class="spark" viewBox="0 0 30 12" preserveAspectRatio="none"><polyline points="0,8 7,7 14,5 21,5 30,3" fill="none" stroke="var(--t-up)" stroke-width="1.2"/></svg>
      </div>
      <div class="c6 hot">
        <p class="l">SG total</p><div class="v">+1,8</div>
        <div class="d tu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>0,4</div>
        <svg class="spark" viewBox="0 0 30 12" preserveAspectRatio="none"><polyline points="0,10 7,8 14,6 21,4 30,1" fill="none" stroke="var(--lime)" stroke-width="1.4"/></svg>
      </div>
      <div class="c6">
        <p class="l">Runder</p><div class="v">14</div>
        <div class="d tu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>3</div>
        <svg class="spark" viewBox="0 0 30 12" preserveAspectRatio="none"><polyline points="0,9 7,8 14,8 21,6 30,5" fill="none" stroke="var(--t-up)" stroke-width="1.2"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
