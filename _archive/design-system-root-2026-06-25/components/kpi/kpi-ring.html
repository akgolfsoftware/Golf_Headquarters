<!-- @dsCard group="Tall/KPI" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KPI-ring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); margin:0; padding:28px; }
  h2{ font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 14px; }
  .row{ display:flex; gap:18px; flex-wrap:wrap; margin-bottom:26px; }
  .ring{ position:relative; width:120px; text-align:center; }
  .ring svg{ width:120px; height:120px; transform:rotate(-90deg); }
  .ring .ctr{ position:absolute; top:42px; left:0; right:0; }
  .ring .val{ font-family:var(--mono); font-size:26px; font-weight:600; letter-spacing:-.02em; line-height:1; font-variant-numeric:tabular-nums; color:var(--ink); }
  .ring .val small{ font-size:13px; color:var(--muted); }
  .ring .lbl{ font-family:var(--mono); font-size:9px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); margin-top:9px; }
  .dark-wrap{ background:var(--t-bg); padding:22px; border-radius:var(--r-lg); }
  .dark-wrap .ring .val{ color:var(--t-fg); }
  .dark-wrap .ring .val small{ color:var(--t-fg-3); }
  .dark-wrap .ring .lbl{ color:var(--t-fg-3); }
</style>
</head>
<body>
  <h2>Lyst tema — fyllgrad + farge</h2>
  <div class="row">
    <!-- 78% forest -->
    <div class="ring">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--sand-deep)" stroke-width="10"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--forest)" stroke-width="10" stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="69.12"/>
      </svg>
      <div class="ctr"><div class="val">78<small>%</small></div></div>
      <div class="lbl">Plan-fullført</div>
    </div>
    <!-- 92% lime -->
    <div class="ring">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--sand-deep)" stroke-width="10"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--lime-deep)" stroke-width="10" stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="25.13"/>
      </svg>
      <div class="ctr"><div class="val">92<small>%</small></div></div>
      <div class="lbl">Hit-rate drill</div>
    </div>
    <!-- 45% warn -->
    <div class="ring">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--sand-deep)" stroke-width="10"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--warn)" stroke-width="10" stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="172.79"/>
      </svg>
      <div class="ctr"><div class="val">45<small>%</small></div></div>
      <div class="lbl">FYS-mål</div>
    </div>
    <!-- 64% forest, verdi i stedet for % -->
    <div class="ring">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--sand-deep)" stroke-width="10"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--forest)" stroke-width="10" stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="113.10"/>
      </svg>
      <div class="ctr"><div class="val">23<small>/36</small></div></div>
      <div class="lbl">Økter måned</div>
    </div>
  </div>

  <h2>Mørk terminal</h2>
  <div class="dark-wrap dark">
    <div class="row" style="margin-bottom:0">
      <div class="ring">
        <svg viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--t-line-2)" stroke-width="10"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--lime)" stroke-width="10" stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="40.84"/>
        </svg>
        <div class="ctr"><div class="val">87<small>%</small></div></div>
        <div class="lbl">Aktiv-rate</div>
      </div>
      <div class="ring">
        <svg viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--t-line-2)" stroke-width="10"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--t-up)" stroke-width="10" stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="94.25"/>
        </svg>
        <div class="ctr"><div class="val">70<small>%</small></div></div>
        <div class="lbl">GIR</div>
      </div>
      <div class="ring">
        <svg viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--t-line-2)" stroke-width="10"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--t-warn)" stroke-width="10" stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="201.06"/>
        </svg>
        <div class="ctr"><div class="val">36<small>%</small></div></div>
        <div class="lbl">Up&down</div>
      </div>
    </div>
  </div>
</body>
</html>
