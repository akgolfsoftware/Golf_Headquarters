<!-- @dsCard group="Tall/KPI" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Delta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); margin:0; padding:28px; }
  h2{ font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 12px; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:24px; }

  /* Chip */
  .dlt{ font-family:var(--mono); font-size:10px; font-weight:600; padding:1px 5px; border-radius:3px; display:inline-flex; align-items:center; gap:3px; font-variant-numeric:tabular-nums; }
  .dlt svg{ width:11px; height:11px; }
  .u{ color:var(--up); background:rgba(26,125,86,.12); }
  .d{ color:var(--down); background:rgba(163,45,45,.12); }
  .f{ color:var(--forest); background:var(--lime-bg); }
  .flat{ color:var(--muted); background:var(--sand); }

  /* Stor inline-delta ved KPI */
  .kpi{ display:inline-flex; align-items:baseline; gap:8px; padding:10px 14px; border:1px solid var(--border); border-radius:var(--r-md); background:var(--paper); }
  .kpi .v{ font-family:var(--mono); font-size:24px; font-weight:600; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .kpi .big{ font-family:var(--mono); font-size:14px; font-weight:600; display:inline-flex; align-items:center; gap:3px; font-variant-numeric:tabular-nums; }
  .kpi .big svg{ width:13px; height:13px; }
  .bu{ color:var(--up); } .bd{ color:var(--down); }

  .dark-wrap{ background:var(--t-bg); padding:22px; border-radius:var(--r-lg); }
  .dark-wrap .u{ color:var(--t-up); background:var(--t-up-bg); }
  .dark-wrap .d{ color:var(--t-down); background:var(--t-down-bg); }
  .dark-wrap .f{ color:var(--lime); background:var(--lime-bg); }
  .dark-wrap .flat{ color:var(--t-fg-2); background:var(--t-bg-3); }
  .dark-wrap .kpi{ background:var(--t-bg-2); border-color:var(--t-line); }
  .dark-wrap .kpi .v{ color:var(--t-fg); }
  .dark-wrap .bu{ color:var(--t-up); } .dark-wrap .bd{ color:var(--t-down); }
</style>
</head>
<body>
  <h2>Lyst tema — delta-chips</h2>
  <div class="row">
    <span class="dlt u"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>+2,4</span>
    <span class="dlt d"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>-1,1</span>
    <span class="dlt flat">0,0</span>
    <span class="dlt f"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>ny rekord</span>
  </div>

  <h2>Lyst tema — stor inline-delta ved KPI</h2>
  <div class="row">
    <span class="kpi"><span class="v">72,4</span><span class="big bu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>1,2</span></span>
    <span class="kpi"><span class="v">29,3</span><span class="big bd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>0,8</span></span>
  </div>

  <h2>Mørk terminal — chips + inline</h2>
  <div class="dark-wrap dark">
    <div class="row">
      <span class="dlt u"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>+2,4</span>
      <span class="dlt d"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>-1,1</span>
      <span class="dlt flat">0,0</span>
      <span class="dlt f"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>topp</span>
    </div>
    <div class="row" style="margin-bottom:0">
      <span class="kpi"><span class="v">+1,8</span><span class="big bu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>0,4</span></span>
      <span class="kpi"><span class="v">68 %</span><span class="big bd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>2 %</span></span>
    </div>
  </div>
</body>
</html>
