<!-- @dsCard group="Tall/KPI" -->
<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KPI-kort</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<style>
  body{ font-family:var(--sans); background:var(--cream); color:var(--ink); margin:0; padding:28px; }
  h2{ font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 12px; }
  .grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:26px; }
  @media(max-width:760px){ .grid{ grid-template-columns:repeat(2,1fr); } }

  /* Lys KPI-card */
  .kc{ border-radius:var(--r-md); padding:14px; border:1px solid var(--border); background:var(--cream); }
  .kcl{ font-family:var(--mono); font-size:9.5px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); margin:0 0 8px; }
  .kcv{ font-family:var(--mono); font-size:28px; font-weight:600; letter-spacing:-.02em; line-height:1; font-variant-numeric:tabular-nums; }
  .kcv small{ font-size:14px; color:var(--muted); font-weight:500; }
  .kcf{ font-family:var(--mono); font-size:11px; font-weight:500; font-variant-numeric:tabular-nums; margin-top:9px; display:flex; align-items:center; gap:5px; color:var(--muted); }
  .kcf svg{ width:13px; height:13px; }
  .up{ color:var(--up); } .down{ color:var(--down); }

  .kc-forest{ background:var(--forest); border-color:transparent; }
  .kc-forest .kcl{ color:var(--lime); }
  .kc-forest .kcv{ color:#fff; }
  .kc-forest .kcf{ color:rgba(255,255,255,.7); }
  .kc-forest .up{ color:var(--lime); }

  .kc-lime{ background:var(--lime); border-color:transparent; }
  .kc-lime .kcl{ color:var(--forest-deep); }
  .kc-lime .kcv{ color:#06100A; }
  .kc-lime .kcf{ color:var(--forest-deep); }

  /* Mørk terminal */
  .dark-wrap{ background:var(--t-bg); padding:22px; border-radius:var(--r-lg); }
  .kg{ background:var(--t-bg-2); padding:12px; border-radius:var(--r-md); border:1px solid var(--t-line); }
  .kg .l{ font-family:var(--mono); font-size:9.5px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--t-fg-3); margin:0 0 7px; }
  .kg .v{ font-family:var(--mono); font-size:22px; font-weight:600; letter-spacing:-.02em; line-height:1; color:var(--t-fg); font-variant-numeric:tabular-nums; }
  .kg .v small{ font-size:12px; color:var(--t-fg-3); }
  .kg .f{ font-family:var(--mono); font-size:10px; font-weight:500; margin-top:8px; display:flex; align-items:center; gap:4px; color:var(--t-fg-2); font-variant-numeric:tabular-nums; }
  .kg .f svg{ width:12px; height:12px; }
  .kg .tu{ color:var(--t-up); } .kg .td{ color:var(--t-down); }
  .kg.hot{ background:var(--lime-bg); border-color:rgba(209,248,67,.2); }
  .kg.hot .v{ color:var(--lime); }
  .kg.hot .l{ color:var(--lime-dim); }
</style>
</head>
<body>
  <h2>Lyst tema — standard · forest · lime</h2>
  <div class="grid">
    <div class="kc">
      <p class="kcl">Snittscore 30 d</p>
      <div class="kcv">72,4</div>
      <div class="kcf up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>
        1,2 mot forrige
      </div>
    </div>
    <div class="kc">
      <p class="kcl">Strokes Gained</p>
      <div class="kcv">+1,8 <small>SG</small></div>
      <div class="kcf up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>
        0,4
      </div>
    </div>
    <div class="kc kc-forest">
      <p class="kcl">Økter denne uka</p>
      <div class="kcv">6</div>
      <div class="kcf up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>
        2 mot snitt
      </div>
    </div>
    <div class="kc kc-lime">
      <p class="kcl">Handicap</p>
      <div class="kcv">4,1</div>
      <div class="kcf">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
        0,3 lavere
      </div>
    </div>
  </div>

  <h2>Mørk terminal — flate · hot</h2>
  <div class="dark-wrap dark">
    <div class="grid" style="margin-bottom:0">
      <div class="kg">
        <p class="l">Driving distance</p>
        <div class="v">271 <small>m</small></div>
        <div class="f tu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>
          4 m
        </div>
      </div>
      <div class="kg">
        <p class="l">GIR-prosent</p>
        <div class="v">68 <small>%</small></div>
        <div class="f td">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
          2 %
        </div>
      </div>
      <div class="kg">
        <p class="l">Putts/runde</p>
        <div class="v">29,3</div>
        <div class="f tu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>
          0,8
        </div>
      </div>
      <div class="kg hot">
        <p class="l">Form-indeks</p>
        <div class="v">94</div>
        <div class="f tu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>
          rekord
        </div>
      </div>
    </div>
  </div>
</body>
</html>
