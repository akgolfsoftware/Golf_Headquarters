<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Eksporter runder — AK Golf PlayerHQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="workbench-v2.css">
<style>
  body { background: var(--bg); margin: 0; padding: 0; overflow: hidden; height: 100vh; }

  .topnav {
    display: flex; align-items: center;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: #fff; gap: 16px;
  }
  .topnav .name {
    font-family: var(--font-display); font-size: 13px;
    font-weight: 700; color: var(--primary); letter-spacing: 0.02em;
  }
  .topnav .crumbs {
    margin-left: auto;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--muted); letter-spacing: 0.04em;
  }
  .topnav .crumbs .current { color: var(--fg); font-weight: 600; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--muted); letter-spacing: 0.04em;
    text-transform: uppercase; font-weight: 600; text-decoration: none;
  }
  .back-link:hover { color: var(--fg); }
  .back-link svg { width: 14px; height: 14px; }

  /* host: runder-side (faded) */
  .host {
    max-width: 1080px; margin: 0 auto;
    padding: 32px 24px;
    filter: blur(3px) saturate(0.85);
    opacity: 0.55;
    pointer-events: none; user-select: none;
  }
  .host .h1 {
    font-family: var(--font-display); font-size: 32px;
    font-weight: 600; letter-spacing: -0.015em; line-height: 1.05;
  }
  .host .h1 em {
    font-family: var(--font-serif); font-style: italic;
    font-weight: 400; color: var(--primary);
  }
  .host .table-stub {
    margin-top: 24px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; height: 480px;
  }

  /* backdrop */
  .backdrop {
    position: fixed; inset: 0;
    background: rgba(10,31,23,0.45);
    backdrop-filter: blur(6px);
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  /* modal */
  .modal {
    width: 480px; max-width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 24px 60px rgba(10,31,23,0.30);
    display: flex; flex-direction: column;
    max-height: calc(100vh - 48px);
    overflow: hidden;
  }
  .m-head {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .m-head .eyebrow {
    font-family: var(--font-mono); font-size: 10.5px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); font-weight: 700;
  }
  .m-head h2 {
    font-family: var(--font-display); font-size: 20px;
    font-weight: 600; letter-spacing: -0.01em; line-height: 1.2;
    margin-top: 4px;
  }
  .m-head h2 em {
    font-family: var(--font-serif); font-style: italic;
    font-weight: 400; color: var(--primary);
  }
  .m-close {
    width: 32px; height: 32px; border-radius: 8px;
    border: 0; background: transparent;
    color: var(--muted); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .m-close:hover { background: var(--bg); color: var(--fg); }
  .m-close svg { width: 16px; height: 16px; }

  .m-body {
    padding: 20px 24px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 22px;
  }

  /* group */
  .grp { display: flex; flex-direction: column; gap: 10px; }
  .grp-label {
    font-family: var(--font-mono); font-size: 10.5px;
    font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
  }
  .grp-label .req { color: var(--danger); }

  /* format radio cards */
  .fmt-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .fmt-card {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
  }
  .fmt-card .ic {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--bg); color: var(--primary);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .fmt-card .ic svg { width: 16px; height: 16px; }
  .fmt-card .nm {
    font-family: var(--font-display); font-size: 14px;
    font-weight: 600; letter-spacing: -0.005em;
  }
  .fmt-card .sub {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--muted); letter-spacing: 0.04em;
  }
  .fmt-card.active {
    border-color: var(--primary);
    background: rgba(0,88,64,0.04);
  }
  .fmt-card.active .ic {
    background: var(--primary); color: var(--accent);
  }
  .fmt-card .check {
    position: absolute; top: 10px; right: 10px;
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .fmt-card.active .check { background: var(--primary); border-color: var(--primary); color: var(--accent); }
  .fmt-card .check svg { width: 11px; height: 11px; opacity: 0; }
  .fmt-card.active .check svg { opacity: 1; }

  /* periode radio list */
  .radio-list { display: flex; flex-direction: column; gap: 6px; }
  .radio-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card);
    cursor: pointer;
    transition: border-color 120ms;
  }
  .radio-row:hover { border-color: var(--muted-soft); }
  .radio-row.active {
    border-color: var(--primary);
    background: rgba(0,88,64,0.04);
  }
  .radio-row .dot {
    width: 16px; height: 16px; border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .radio-row.active .dot { border-color: var(--primary); }
  .radio-row.active .dot::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: var(--primary);
  }
  .radio-row .nm {
    font-family: var(--font-body); font-size: 13.5px;
    color: var(--fg); font-weight: 500;
  }
  .radio-row .count {
    margin-left: auto;
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--muted); letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
  }

  /* date range (hidden unless egendefinert) */
  .date-range {
    display: none;
    grid-template-columns: 1fr 1fr; gap: 10px;
    padding: 12px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px;
  }
  .date-range.shown { display: grid; }
  .date-range .field {
    display: flex; flex-direction: column; gap: 4px;
  }
  .date-range .field label {
    font-family: var(--font-mono); font-size: 9.5px;
    color: var(--muted); letter-spacing: 0.10em;
    text-transform: uppercase; font-weight: 700;
  }
  .date-range input {
    font-family: var(--font-mono); font-size: 13px;
    color: var(--fg); background: var(--card);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; outline: none;
    font-variant-numeric: tabular-nums;
  }

  /* CSV columns */
  .col-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .col-grid.hidden { display: none; }
  .col-check {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 8px;
    background: var(--card); border: 1px solid var(--border);
    cursor: pointer;
  }
  .col-check .box {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1.5px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .col-check.on { background: rgba(0,88,64,0.04); border-color: var(--primary); }
  .col-check.on .box {
    background: var(--primary); border-color: var(--primary); color: var(--accent);
  }
  .col-check .box svg { width: 10px; height: 10px; opacity: 0; }
  .col-check.on .box svg { opacity: 1; }
  .col-check .nm {
    font-family: var(--font-body); font-size: 12.5px;
    color: var(--fg);
  }

  /* PDF style */
  .style-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .style-row.hidden { display: none; }
  .style-opt {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 12px 10px;
    text-align: center;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 6px; align-items: center;
  }
  .style-opt .preview {
    width: 32px; height: 40px; border: 1.5px solid var(--border);
    border-radius: 3px; background: var(--bg);
    position: relative; overflow: hidden;
  }
  .style-opt .preview::before {
    content: '';
    position: absolute; top: 4px; left: 4px; right: 4px; height: 4px;
    background: var(--muted-soft); border-radius: 1px;
  }
  .style-opt .preview::after {
    content: '';
    position: absolute; left: 4px; right: 4px; top: 12px;
    height: 1px; background: var(--border);
    box-shadow:
      0 4px 0 0 var(--border),
      0 8px 0 0 var(--border),
      0 12px 0 0 var(--border),
      0 16px 0 0 var(--border),
      0 20px 0 0 var(--border);
  }
  .style-opt.detail .preview::after {
    content: '';
    left: 4px; right: 12px; top: 14px; height: 8px;
    background: var(--border);
    box-shadow: 0 14px 0 -4px var(--border);
  }
  .style-opt.stats .preview {
    background: linear-gradient(to bottom, var(--bg) 0%, var(--bg) 30%, var(--accent) 30%, var(--accent) 65%, var(--bg) 65%);
  }
  .style-opt.stats .preview::after { display: none; }
  .style-opt .nm {
    font-family: var(--font-display); font-size: 11.5px;
    font-weight: 600;
  }
  .style-opt .sub {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--muted); letter-spacing: 0.04em;
  }
  .style-opt.active {
    border-color: var(--primary);
    background: rgba(0,88,64,0.04);
  }

  /* preview block */
  .preview-block {
    background: linear-gradient(160deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    border-radius: 12px; padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
  }
  .preview-block .ic {
    width: 36px; height: 36px; border-radius: 9px;
    background: var(--accent); color: var(--fg);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .preview-block .ic svg { width: 16px; height: 16px; }
  .preview-block .body { flex: 1; min-width: 0; }
  .preview-block .lbl {
    font-family: var(--font-mono); font-size: 9.5px;
    color: rgba(209,248,67,0.7); letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 700;
  }
  .preview-block .file {
    font-family: var(--font-mono); font-size: 13px;
    color: #fff; font-weight: 600; margin-top: 3px;
    word-break: break-all;
  }
  .preview-block .size {
    font-family: var(--font-mono); font-size: 11px;
    color: rgba(209,248,67,0.85);
    margin-top: 3px; letter-spacing: 0.06em;
    font-variant-numeric: tabular-nums;
  }

  /* footer */
  .m-foot {
    padding: 14px 24px;
    border-top: 1px solid var(--border-soft);
    background: var(--card);
    display: flex; gap: 10px; align-items: center; justify-content: flex-end;
  }
  .btn-ghost-m {
    background: transparent; color: var(--muted);
    padding: 10px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 600; border: 0;
    font-family: var(--font-body); cursor: pointer;
  }
  .btn-ghost-m:hover { background: var(--bg); color: var(--fg); }
  .btn-primary-m {
    background: var(--accent); color: var(--fg);
    padding: 11px 22px; border-radius: 999px;
    font-size: 13.5px; font-weight: 700; border: 0;
    font-family: var(--font-body); cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary-m:hover { background: #C0E635; }
  .btn-primary-m svg { width: 14px; height: 14px; }

  /* mobile */
  @media (max-width: 540px) {
    .backdrop { padding: 0; align-items: flex-end; }
    .modal { border-radius: 16px 16px 0 0; max-height: 92vh; width: 100%; }
    .fmt-row { grid-template-columns: 1fr; }
    .style-row { grid-template-columns: 1fr; }
  }
</style>
</head>

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"></path><path d="M3 9h18"></path><path d="M3 15h18"></path><path d="M9 3v18"></path><path d="M15 3v18"></path></svg>

            <span class="ic">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>

      <!-- CSV columns -->

          <button class="col-check on"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span><span class="nm">FIR</span></button>
          <button class="col-check on"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span><span class="nm">GIR</span></button>

<script>
(function() {
  let fmt = 'pdf';
  let periode = '2026';
  let style = 'stats';

  function updatePreview() {
    const ext = fmt === 'csv' ? 'csv' : 'pdf';
    const periodSlug = { '10': 'siste-10', '30d': 'siste-30d', '90d': 'siste-90d', '2026': '2026', 'custom': 'egendefinert' }[periode];
    const styleSlug = fmt === 'pdf' ? '-' + style : '';
    document.getElementById('preview-file').textContent =
      `markus-rp-runder-${periodSlug}${styleSlug}.${ext}`;
    const counts = { '10': 10, '30d': 8, '90d': 23, '2026': 47, 'custom': 47 };
    const n = counts[periode];
    if (fmt === 'csv') {
      const cols = document.querySelectorAll('.col-check.on').length;
      document.getElementById('preview-size').textContent =
        `${n} rader · ${cols} kolonner · ~ ${Math.max(1, Math.round(n * cols * 0.04))} KB`;
    } else {
      const pages = { compact: 1, detail: n, stats: 8 }[style];
      const mb = style === 'stats' ? 2.1 : (style === 'detail' ? Math.round(n * 0.3 * 10) / 10 : 0.6);
      document.getElementById('preview-size').textContent =
        `${pages} side${pages !== 1 ? 'r' : ''} · ~ ${mb.toString().replace('.', ',')} MB · ${n} runder`;
    }
  }

  document.querySelectorAll('#fmt-row .fmt-card').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('#fmt-row .fmt-card').forEach(o => o.classList.remove('active'));
    b.classList.add('active');
    fmt = b.dataset.fmt;
    document.getElementById('csv-cols-wrap').classList.toggle('hidden', fmt !== 'csv');
    document.getElementById('pdf-style-wrap').classList.toggle('hidden', fmt !== 'pdf');
    updatePreview();
  }));

  document.querySelectorAll('#periode-list .radio-row').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('#periode-list .radio-row').forEach(o => o.classList.remove('active'));
    b.classList.add('active');
    periode = b.dataset.p;
    document.getElementById('date-range').classList.toggle('shown', periode === 'custom');
    updatePreview();
  }));

  document.querySelectorAll('#style-row .style-opt').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('#style-row .style-opt').forEach(o => o.classList.remove('active'));
    b.classList.add('active');
    style = b.classList.contains('detail') ? 'detail' : b.classList.contains('stats') ? 'stats' : 'compact';
    updatePreview();
  }));

  document.querySelectorAll('#col-grid .col-check').forEach(b => b.addEventListener('click', () => {
    b.classList.toggle('on');
    updatePreview();
  }));

  updatePreview();
})();
</script>

</body>
</html>
