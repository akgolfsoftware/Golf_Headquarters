<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>EditPlanModal</title></head>
<body style="background: rgba(10,31,24,0.5); padding: 80px 40px;">
<div class="modal" style="background: white; border-radius: 20px; max-width: 600px; margin: 0 auto; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);">

  <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
    <div>
      <span class="page-eyebrow">Markus R · sesong 2026</span>
      <h2 style="font-family: var(--font-display); font-size: 22px; font-weight: 600; margin-top: 4px;">Rediger plan</h2>
    </div>
    <button style="background: transparent; border: 0; font-size: 24px; cursor: pointer; color: var(--text-secondary);">×</button>
  </div>

  <div style="margin-bottom: 18px;">
    <label class="card-label" style="display: block; margin-bottom: 8px;">Tittel</label>
    <input type="text" value="Sesongplan 2026 — vekst på Approach" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 14px; background: var(--bg);">
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px;">
    <div>
      <label class="card-label" style="display: block; margin-bottom: 8px;">Fra</label>
      <input type="text" value="01. apr 2026" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-family: var(--font-mono); font-size: 13px; background: var(--bg);">
    </div>
    <div>
      <label class="card-label" style="display: block; margin-bottom: 8px;">Til</label>
      <input type="text" value="31. okt 2026" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-family: var(--font-mono); font-size: 13px; background: var(--bg);">
    </div>
  </div>

  <div style="margin-bottom: 18px;">
    <label class="card-label" style="display: block; margin-bottom: 8px;">Hovedmål</label>
    <textarea style="width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 13px; min-height: 90px; background: var(--bg); resize: vertical;">Løfte Approach SG fra -1.8 til 0.0 innen NM Junior i august. Sekundært: redusert variansnivå på 7-jern.</textarea>
  </div>

  <div style="margin-bottom: 8px;">
    <label class="card-label" style="display: block; margin-bottom: 10px;">Pyramide-fokus</label>
    <div class="pyr-tiers" style="--w: 100%; padding: 4px 0;">
      <div class="pyr-tier pyr-tier-fys" style="--w: 60%; --p: 18%;"><span>FYSIKK</span><b>18</b></div>
      <div class="pyr-tier pyr-tier-tek" style="--w: 70%; --p: 22%;"><span>TEKNIKK</span><b>22</b></div>
      <div class="pyr-tier pyr-tier-slag" style="--w: 80%; --p: 35%;"><span>SLAG</span><b>35</b></div>
      <div class="pyr-tier pyr-tier-spill" style="--w: 90%; --p: 15%;"><span>SPILL</span><b>15</b></div>
      <div class="pyr-tier pyr-tier-turn" style="--w: 100%; --p: 10%;"><span>TURNERING</span><b>10</b></div>
    </div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);">
    <button class="btn btn-ghost" style="color: var(--danger); border-color: rgba(239,68,68,0.3);">Slett plan</button>
    <div style="display: flex; gap: 8px;">
      <button class="btn btn-ghost">Avbryt</button>
      <button class="btn btn-primary">Lagre endringer</button>
    </div>
  </div>

</div>
</body>
</html>
