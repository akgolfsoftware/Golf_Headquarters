<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../base.css"><title>LiveSessionBetweenModal</title></head>
<body style="background: #0A1F18; padding: 0; min-height: 100vh; color: #FAFAF7; display: flex; align-items: center; justify-content: center;">

<div style="max-width: 680px; padding: 40px; width: 100%;">

  <div style="text-align: center; margin-bottom: 40px;">
    <div style="display: inline-flex; align-items: center; gap: 10px; background: rgba(16,185,129,0.18); color: #6EE7B7; padding: 8px 18px; border-radius: 999px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; font-weight: 600; margin-bottom: 16px;">
      ✓ STASJON 1 FERDIG
    </div>
    <h1 style="font-family: var(--font-display); font-size: 40px; font-weight: 600; line-height: 1.1; letter-spacing: -0.02em;">2m putts <em style="color: var(--accent); font-weight: 400; font-style: italic;">14 av 20</em></h1>
    <div style="font-family: var(--font-mono); font-size: 14px; color: rgba(250,250,247,0.65); margin-top: 8px;">70% hit rate · best i dag</div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 40px;">
    <div style="background: rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; text-align: center;">
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; color: rgba(250,250,247,0.55); text-transform: uppercase; margin-bottom: 6px;">Tid brukt</div>
      <div style="font-family: var(--font-mono); font-size: 22px; font-weight: 600;">8:42</div>
    </div>
    <div style="background: rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; text-align: center;">
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; color: rgba(250,250,247,0.55); text-transform: uppercase; margin-bottom: 6px;">Streak</div>
      <div style="font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--accent);">5 🔥</div>
    </div>
    <div style="background: rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; text-align: center;">
      <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; color: rgba(250,250,247,0.55); text-transform: uppercase; margin-bottom: 6px;">vs uke 18</div>
      <div style="font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: #6EE7B7;">+15%</div>
    </div>
  </div>

  <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; padding: 24px; margin-bottom: 32px;">
    <div style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(250,250,247,0.55); margin-bottom: 8px;">Neste opp · stasjon 2 av 3</div>
    <h2 style="font-family: var(--font-display); font-size: 26px; font-weight: 600; margin-bottom: 6px;">5-meter putts</h2>
    <div style="font-family: var(--font-mono); font-size: 12px; color: rgba(250,250,247,0.65); margin-bottom: 12px;">20 forsøk · ~10 min · 5 hull rundt cup</div>
    <div style="display: flex; gap: 8px;">
      <span style="background: rgba(209,248,67,0.18); color: var(--accent); padding: 4px 10px; border-radius: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em;">SLAG</span>
      <span style="background: rgba(255,255,255,0.10); color: rgba(250,250,247,0.75); padding: 4px 10px; border-radius: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em;">DISTANSE-KONTROLL</span>
    </div>
  </div>

  <div style="display: flex; justify-content: space-between; align-items: center;">
    <button style="background: transparent; color: rgba(250,250,247,0.55); border: 0; font-size: 13px; cursor: pointer;">Avslutt økt</button>
    <button style="background: var(--accent); color: var(--text); border: 0; padding: 16px 36px; border-radius: 999px; font-family: var(--font-display); font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 24px rgba(209,248,67,0.30);">Fortsett →</button>
  </div>

</div>

</body>
</html>
