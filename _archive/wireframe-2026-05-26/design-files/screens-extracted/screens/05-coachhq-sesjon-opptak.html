<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<title>CoachHQ — Sesjon Opptak</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="../_shared/arketype-e.css" />
<style>
  .so-pipeline {
    display:flex; align-items:center; gap: 24px; justify-content:center;
    margin-bottom: 28px;
  }
  .so-step {
    display:flex; flex-direction: column; align-items:center; gap: 10px;
    min-width: 200px;
  }
  .so-step .ring {
    width: 56px; height: 56px; border-radius: 999px;
    border: 2px solid var(--e-border); background: var(--e-surface);
    display:flex; align-items:center; justify-content:center;
    color: var(--e-muted); font-size: 18px;
  }
  .so-step .label {
    font-family:'JetBrains Mono'; font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--e-muted);
  }
  .so-step .meta { font-size: 12px; color: var(--e-muted); }
  .so-step.is-done .ring { border-color: var(--e-lime); color: var(--e-lime); background: rgba(209,248,67,0.08); }
  .so-step.is-active .ring {
    border-color: var(--e-lime); color: var(--e-lime);
    box-shadow: 0 0 0 6px rgba(209,248,67,0.08), 0 0 20px rgba(209,248,67,0.35);
    animation: so-spin 1.6s linear infinite;
  }
  @keyframes so-spin {
    0%   { box-shadow: 0 0 0 6px rgba(209,248,67,0.06), 0 0 20px rgba(209,248,67,0.25); }
    50%  { box-shadow: 0 0 0 10px rgba(209,248,67,0.10), 0 0 30px rgba(209,248,67,0.45); }
    100% { box-shadow: 0 0 0 6px rgba(209,248,67,0.06), 0 0 20px rgba(209,248,67,0.25); }
  }
  .so-step.is-error .ring { border-color: var(--e-red); color: var(--e-red); }

  .so-arrow { width: 60px; height:2px; background: var(--e-border); }

  .so-wave {
    width: 720px; height: 140px; display:flex; align-items:center; justify-content:center; gap: 3px;
  }
  .so-wave span {
    display:block; width: 4px; background: var(--e-border); border-radius: 999px;
  }
  .so-wave.is-live span { background: var(--e-lime); }

  .so-transcript {
    position:absolute; left: 50%; transform: translateX(-50%);
    bottom: 104px;
    width: 720px; max-width: 90%; max-height: 200px;
    overflow:hidden; padding: 12px 20px;
    font-family:'JetBrains Mono'; font-size: 13px; line-height: 1.6;
    mask-image: linear-gradient(to top, #000 70%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, #000 70%, transparent 100%);
  }
  .so-transcript .line { color: var(--e-muted-2); }
  .so-transcript .line.fresh { color: var(--e-fg); }
  .so-transcript .ts { color: var(--e-muted-2); margin-right: 8px; }

  .so-overlay {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; z-index: 4;
  }
  .so-overlay .pause-text {
    font-family:'Instrument Serif'; font-style: italic; font-size: 96px;
    color: var(--e-lime);
  }
</style>
</head>
<body style="background:var(--surface);margin:0;padding:0">
<div class="e-frame e-grain" style="margin-top:18px">
      <div class="e-topbar">
        <div class="e-left">
          <span class="e-live e-live--rec" style="opacity:0.4"><span class="pulse" style="animation:none"></span>REC 00:00</span>
        </div>
        <div class="e-center">
          <span style="display:inline-flex;align-items:center;gap:8px">
            <span style="width:20px;height:20px;border-radius:999px;background:var(--e-pyr-tek);display:inline-block;text-align:center;color:#fff;font-size:10px;line-height:20px">MR</span>
            Markus R Pedersen — TEK · Driver
          </span>
        </div>
        <div class="e-right"><span class="e-close">×</span></div>
      </div>

      <div class="e-stage">
        <div style="display:flex; flex-direction:column; align-items:center; gap: 16px">
          <div class="so-pipeline">
            <div class="so-step">
              <div class="ring">●</div>
              <div class="label">Transkriberer</div>
              <div class="meta">venter</div>
            </div>
            <div class="so-arrow"></div>
            <div class="so-step">
              <div class="ring">●</div>
              <div class="label">Analyserer</div>
              <div class="meta">venter</div>
            </div>
            <div class="so-arrow"></div>
            <div class="so-step">
              <div class="ring">●</div>
              <div class="label">Foreslår</div>
              <div class="meta">venter</div>
            </div>
          </div>
          <div class="so-wave">
            <!-- flat dempet -->
            <script>
              document.write(Array.from({length:80}, (_,i)=>`<span style="height:${4 + (i%3)*2}px"></span>`).join(''));
            </script>
          </div>
          <p style="font-size:14px;color:var(--e-muted); margin-top:8px">Trykk for å starte opptak</p>
        </div>
      </div>

      <div class="e-bottombar">
        <button class="e-btn e-btn--ghost" style="flex:1 1 0">Avbryt</button>
        <button class="e-btn e-btn--primary e-btn--xl" style="flex:1 1 0">● Start opptak</button>
      </div>
    </div>
</body>
</html>
