<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<title>PlayerHQ — Agent Pipeline</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="../_shared/arketype-e.css" />
<style>
  /* node-graph */
  .pl-board {
    position:relative; width: 1120px; height: 520px; margin: 0 auto;
  }
  .pl-col-label {
    position: absolute; top: -32px;
    font-family:'JetBrains Mono'; font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--e-muted);
  }
  .pl-sig {
    position:absolute; left: 0; width: 220px;
    display:flex; align-items:center; gap:12px;
    font-size: 13px; color: var(--e-fg);
  }
  .pl-sig .dot {
    width:32px; height:32px; border-radius:999px; background: var(--e-surface);
    border: 1px solid var(--e-border);
    display:flex; align-items:center; justify-content:center; font-size: 14px;
    flex: 0 0 32px;
  }
  .pl-sig.is-active .dot { border-color: var(--e-lime); color: var(--e-lime); box-shadow: 0 0 0 4px rgba(209,248,67,0.08); }

  .pl-skill {
    position: absolute;
    width: 200px; height: 100px;
    background: var(--e-surface-2); border:1px solid var(--e-border);
    border-radius: 14px; padding: 14px 16px;
    display:flex; flex-direction:column; justify-content:center; gap: 4px;
  }
  .pl-skill h4 { margin:0; font-size:14px; font-weight: 600; }
  .pl-skill p  { margin:0; font-size: 11px; color: var(--e-muted); line-height: 1.4; }
  .pl-skill.is-active { border-color: var(--e-lime); background: rgba(209,248,67,0.04); }

  .pl-agent {
    position:absolute; right: 0;
    width: 88px; height: 88px; border-radius: 999px;
    background: var(--e-surface); border:2px solid var(--e-border);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 2px;
    font-size: 11px; color: var(--e-fg);
  }
  .pl-agent .ic { font-size: 22px; }
  .pl-agent .lbl { font-family:'JetBrains Mono'; font-size: 9px; letter-spacing: 0.06em; }
  .pl-agent.is-active {
    border-color: var(--e-lime);
    box-shadow: 0 0 0 6px rgba(209,248,67,0.08), 0 0 24px rgba(209,248,67,0.35);
    color: var(--e-lime);
  }

  .pl-line {
    position:absolute; height: 2px; background: var(--e-border);
  }
  .pl-line.is-active {
    background: linear-gradient(90deg,
      rgba(209,248,67,0.2) 0%,
      rgba(209,248,67,0.9) 50%,
      rgba(209,248,67,0.2) 100%);
    background-size: 30px 100%;
    animation: pl-dash 1.4s linear infinite;
  }
  @keyframes pl-dash { from { background-position: 0 0 } to { background-position: 30px 0 } }

  /* popover */
  .pl-popover {
    position:absolute; top: 80px; right: 24px; width: 360px;
    background: var(--e-surface); border: 1px solid var(--e-border);
    border-radius: 16px; padding: 20px;
    z-index: 8;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
  }

  /* blur overlay for tier-gate */
  .pl-blur { filter: blur(8px); pointer-events: none; }
  .pl-gate {
    position:absolute; inset: 56px 0 88px 0;
    display:flex; align-items:center; justify-content:center;
    z-index: 10;
  }
</style>
</head>
<body style="background:var(--surface);margin:0;padding:0">
<div class="e-frame e-grain" style="margin-top:18px">
      <div class="e-topbar">
        <div class="e-left">
          <span style="font-size:14px">Agent Pipeline</span>
          <span class="e-pyr e-pyr--slag" style="border-color:rgba(209,248,67,0.4)">PRO</span>
        </div>
        <div class="e-center">Sist oppdatert: 14:32</div>
        <div class="e-right"><span class="e-close">×</span></div>
      </div>

      <div class="e-stage">
        <div class="pl-board">
          <div class="pl-col-label" style="left:0">SIGNAL</div>
          <div class="pl-col-label" style="left: 350px">SKILL</div>
          <div class="pl-col-label" style="right:0">AGENT</div>

          <!-- signals -->
          <div class="pl-sig" style="top: 24px"><span class="dot">⌖</span> TrackMan</div>
          <div class="pl-sig" style="top: 96px"><span class="dot">🅗</span> HCP-data</div>
          <div class="pl-sig" style="top: 168px"><span class="dot">☾</span> Søvn</div>
          <div class="pl-sig" style="top: 240px"><span class="dot">⏱</span> Live Session</div>

          <!-- skills -->
          <div class="pl-skill" style="left: 320px; top: 24px">
            <h4>Tech-analyse</h4><p>Mønster i køllebane, ball-flight, distanse.</p>
          </div>
          <div class="pl-skill" style="left: 320px; top: 156px">
            <h4>Volum-analyse</h4><p>Rep-tetthet, sammenheng med tretthet.</p>
          </div>

          <!-- agents -->
          <div class="pl-agent" style="top: 24px"><span class="ic">🎯</span><span class="lbl">DRILL</span></div>
          <div class="pl-agent" style="top: 156px"><span class="ic">📅</span><span class="lbl">PERIOD.</span></div>
          <div class="pl-agent" style="top: 288px"><span class="ic">🔋</span><span class="lbl">DELOAD</span></div>

          <!-- lines -->
          <div class="pl-line" style="left: 32px; top: 40px; width: 280px"></div>
          <div class="pl-line" style="left: 32px; top: 112px; width: 280px"></div>
          <div class="pl-line" style="left: 32px; top: 184px; width: 280px"></div>
          <div class="pl-line" style="left: 32px; top: 256px; width: 280px"></div>

          <div class="pl-line" style="left: 520px; top: 72px; width: 480px"></div>
          <div class="pl-line" style="left: 520px; top: 204px; width: 480px"></div>
        </div>
      </div>

      <div class="e-bottombar">
        <div style="color:var(--e-muted); font-size:13px; flex:1">12 anbefalinger siste 7 dager</div>
        <button class="e-btn e-btn--ghost-lime">Send agent-feedback →</button>
      </div>
    </div>
</body>
</html>
