<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Del runde — AK Golf PlayerHQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="workbench-v2.css">
<style>
  body { padding: 0; margin: 0; background: var(--bg); min-height: 100vh; }

  /* Faded scene */
  .scene { position: fixed; inset: 0; z-index: 0; }
  .scene-inner {
    max-width: 980px; margin: 0 auto; padding: 56px 32px;
    opacity: 0.30; filter: blur(1.5px);
    pointer-events: none; user-select: none;
  }
  .scene-inner h1 {
    font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
  }
  .scene-inner h1 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--primary); }
  .scene-inner .crumb {
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--muted); letter-spacing: 0.10em; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .scene-inner .score-card {
    margin-top: 24px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 16px; height: 200px;
  }
  .scene-inner .holes {
    margin-top: 14px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 16px; height: 320px;
  }

  /* Backdrop */
  .backdrop {
    position: fixed; inset: 0; z-index: 10;
    background: rgba(250,250,247,0.60);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  /* Modal */
  .modal {
    background: #fff; border-radius: 16px;
    width: 560px; max-width: 100%;
    max-height: calc(100vh - 48px);
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 32px 80px rgba(10,31,23,0.28);
    animation: in 220ms ease-out;
  }
  @keyframes in {
    from { opacity: 0; transform: translateY(8px) scale(0.985); }
    to   { opacity: 1; transform: none; }
  }

  .m-head {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 14px;
  }
  .m-head h2 {
    font-family: var(--font-display); font-size: 22px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .m-head .sub {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--muted); letter-spacing: 0.04em;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }
  .m-head .sub strong { color: var(--fg); font-weight: 700; }
  .x-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 0; background: transparent; cursor: pointer; color: var(--muted);
    display: inline-flex; align-items: center; justify-content: center;
    text-decoration: none;
  }
  .x-btn:hover { background: var(--bg); color: var(--fg); }
  .x-btn svg { width: 16px; height: 16px; }

  .m-body {
    padding: 18px 24px;
    display: flex; flex-direction: column; gap: 18px;
    overflow-y: auto;
  }

  /* === Preview card === */
  .preview-wrap {
    background: var(--bg);
    border-radius: 14px;
    padding: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .preview {
    width: 100%;
    aspect-ratio: var(--ar, 9 / 16);
    max-height: 360px;
    position: relative; overflow: hidden;
    border-radius: 12px;
    background: linear-gradient(165deg, #006C50 0%, #003A2A 100%);
    color: #fff;
    padding: 20px;
    display: flex; flex-direction: column;
    box-shadow: 0 12px 28px rgba(10,31,23,0.25);
  }
  .preview[data-fmt="1080"] { --ar: 1 / 1; }
  .preview[data-fmt="pdf"] { --ar: 8.5 / 11; background: #fff; color: var(--fg); border: 1px solid var(--border); }
  .preview[data-fmt="link"] { --ar: 4 / 3; }

  /* gradient lines bg */
  .preview::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 90% 10%, rgba(209,248,67,0.20), transparent 60%),
      repeating-linear-gradient(135deg, transparent 0, transparent 20px, rgba(255,255,255,0.03) 20px, rgba(255,255,255,0.03) 22px);
    pointer-events: none;
  }

  .preview .head {
    display: flex; align-items: center; gap: 10px;
    position: relative; z-index: 1;
  }
  .preview .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); color: var(--fg);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 13px; font-weight: 700;
  }
  .preview .pname {
    font-family: var(--font-display); font-size: 14px; font-weight: 600;
    line-height: 1.2;
  }
  .preview .phcp {
    font-family: var(--font-mono); font-size: 10px;
    color: rgba(209,248,67,0.75); letter-spacing: 0.08em;
    margin-top: 1px;
  }

  .preview .score-block {
    margin-top: auto;
    position: relative; z-index: 1;
    display: flex; flex-direction: column; gap: 4px;
  }
  .preview .score-label {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    color: rgba(209,248,67,0.7); letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .preview .score-big {
    font-family: var(--font-display); font-size: 96px; font-weight: 700;
    color: var(--accent); letter-spacing: -0.04em; line-height: 0.9;
  }
  .preview .score-rel {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 14px; font-weight: 600;
    color: rgba(255,255,255,0.80); letter-spacing: 0.04em;
    margin-top: 4px;
  }
  .preview .score-rel .par {
    background: rgba(209,248,67,0.20); color: var(--accent);
    padding: 1px 8px; border-radius: 4px;
    font-weight: 700;
  }
  .preview .meta-line {
    font-family: var(--font-mono); font-size: 11px;
    color: rgba(255,255,255,0.70); letter-spacing: 0.06em;
    margin-top: 4px;
  }

  .preview .sg-strip {
    margin-top: 16px;
    display: flex; gap: 4px; flex-wrap: wrap;
    position: relative; z-index: 1;
  }
  .preview .sg-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.16);
    padding: 4px 8px; border-radius: 999px;
    font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
    letter-spacing: 0.06em;
  }
  .preview .sg-pill .v {
    color: var(--accent); font-weight: 700;
  }
  .preview .sg-pill .v.neg { color: #FFB4A8; }

  .preview .brand {
    position: absolute; bottom: 16px; right: 18px;
    font-family: var(--font-display); font-size: 11px; font-weight: 700;
    color: var(--accent); letter-spacing: 0.16em;
    z-index: 1;
  }

  /* PDF preview variant */
  .preview[data-fmt="pdf"] .score-big { color: var(--primary); font-size: 56px; }
  .preview[data-fmt="pdf"] .score-label { color: var(--muted); }
  .preview[data-fmt="pdf"] .score-rel { color: var(--muted); }
  .preview[data-fmt="pdf"] .meta-line { color: var(--muted); }
  .preview[data-fmt="pdf"] .pname { color: var(--fg); }
  .preview[data-fmt="pdf"] .phcp { color: var(--muted); }
  .preview[data-fmt="pdf"] .avatar { background: var(--primary); color: var(--accent); }
  .preview[data-fmt="pdf"] .brand { color: var(--primary); }
  .preview[data-fmt="pdf"]::before { display: none; }
  .preview[data-fmt="pdf"] .sg-pill {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
  }
  .preview[data-fmt="pdf"] .sg-pill .v { color: var(--success); }
  .preview[data-fmt="pdf"] .sg-pill .v.neg { color: var(--danger); }

  /* link preview */
  .preview[data-fmt="link"] {
    background: linear-gradient(160deg, #FAFAF7 0%, #ECECDF 100%);
    color: var(--fg); padding: 24px;
  }
  .preview[data-fmt="link"]::before {
    background:
      radial-gradient(ellipse 80% 50% at 90% 10%, rgba(209,248,67,0.35), transparent 60%);
  }
  .preview[data-fmt="link"] .pname { color: var(--fg); }
  .preview[data-fmt="link"] .phcp { color: var(--muted); }
  .preview[data-fmt="link"] .score-label { color: var(--muted); }
  .preview[data-fmt="link"] .score-big { color: var(--primary); }
  .preview[data-fmt="link"] .score-rel { color: var(--muted); }
  .preview[data-fmt="link"] .meta-line { color: var(--muted); }
  .preview[data-fmt="link"] .avatar { background: var(--primary); color: var(--accent); }
  .preview[data-fmt="link"] .brand { color: var(--primary); }
  .preview[data-fmt="link"] .sg-pill {
    background: rgba(255,255,255,0.6); color: var(--fg);
    border: 1px solid var(--border);
  }
  .preview[data-fmt="link"] .sg-pill .v { color: var(--success); }
  .preview[data-fmt="link"] .sg-pill .v.neg { color: var(--danger); }

  /* Format radio */
  .format-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  }
  .fmt {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 6px;
    cursor: pointer; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: all 140ms ease;
  }
  .fmt:hover { background: var(--bg); }
  .fmt.active {
    border-color: var(--accent); background: rgba(209,248,67,0.10);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .fmt .ic {
    width: 26px; height: 26px; border-radius: 6px;
    background: var(--bg); color: var(--muted);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .fmt.active .ic { background: var(--primary); color: var(--accent); }
  .fmt .ic svg { width: 13px; height: 13px; }
  .fmt .nm {
    font-family: var(--font-display); font-size: 11.5px; font-weight: 600;
    color: var(--fg); line-height: 1.2;
  }
  .fmt .dim {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--muted-soft); letter-spacing: 0.04em;
  }

  /* Visibility toggle */
  .vis-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    background: var(--bg); border: 1px solid var(--border-soft);
    border-radius: 10px; padding: 3px; gap: 3px;
  }
  .vis-row button {
    background: transparent; border: 0;
    padding: 8px 10px; border-radius: 8px;
    font-family: var(--font-body); font-size: 12px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  }
  .vis-row button svg { width: 12px; height: 12px; }
  .vis-row button.active {
    background: #fff; color: var(--fg); box-shadow: 0 1px 3px rgba(10,31,23,0.06);
  }

  .field-label {
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.10em; text-transform: uppercase; color: var(--muted);
    margin-bottom: 6px; display: block;
  }

  /* Footer */
  .m-foot {
    padding: 14px 24px;
    border-top: 1px solid var(--border-soft);
    background: #FBFAF5;
    display: flex; gap: 10px; align-items: center;
  }
  .btn-out {
    background: #fff; color: var(--fg);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 10px 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--font-body);
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-out svg { width: 13px; height: 13px; }
  .btn-out:hover { background: var(--bg); }
  .btn-fill {
    margin-left: auto;
    background: var(--primary); color: var(--accent);
    border: 0; border-radius: 999px;
    padding: 11px 22px; font-size: 13.5px; font-weight: 600;
    cursor: pointer; font-family: var(--font-body);
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-fill svg { width: 13px; height: 13px; }
  .btn-fill:hover { background: var(--primary-dark); }

  /* Progress bar that animates on download click */
  .progress-bar {
    height: 3px; background: var(--bg);
    border-radius: 999px; overflow: hidden;
    margin-top: 2px; display: none;
  }
  .progress-bar > div {
    height: 100%; width: 0; background: var(--accent);
    border-radius: 999px;
    transition: width 1.2s ease;
  }
  .progress-bar.running { display: block; }
  .progress-bar.running > div { width: 100%; }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--fg); color: #fff;
    padding: 12px 20px; border-radius: 999px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 12px 32px rgba(10,31,23,0.30);
    opacity: 0; pointer-events: none;
    transition: opacity 200ms, transform 200ms;
    z-index: 100;
  }
  .toast svg { width: 16px; height: 16px; color: var(--accent); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
</style>
</head>
<body data-screen-label="PlayerHQ Del runde">

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="ic-x" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
    <symbol id="ic-image" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></symbol>
    <symbol id="ic-square" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></symbol>
    <symbol id="ic-doc" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></symbol>
    <symbol id="ic-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
    <symbol id="ic-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></symbol>
    <symbol id="ic-coach" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5 21v-2a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v2"/></symbol>
    <symbol id="ic-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></symbol>
    <symbol id="ic-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
    <symbol id="ic-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
    <symbol id="ic-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></symbol>
  </defs>
</svg>

<!-- Scene -->
<div class="scene" aria-hidden="true">
  <div class="scene-inner">
    <div class="crumb">PLAYERHQ &nbsp;/&nbsp; RUNDER &nbsp;/&nbsp; BOSSUM GK · 19. MAI</div>
    <h1>Bossum GK · 19. mai <em>· 73 (−1)</em></h1>
    <div class="score-card"></div>
    <div class="holes"></div>
  </div>
</div>

<div class="backdrop">
  <div class="modal" role="dialog" aria-labelledby="m-title" aria-modal="true">

    <div class="m-head">
      <div>
        <h2 id="m-title">Del runde</h2>
        <div class="sub"><strong>Bossum GK</strong> · 19. mai · <strong>73 (−1)</strong></div>
      </div>
      <a href="Workbench v2.html" class="x-btn" aria-label="Lukk"><svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-x"/></svg></a>
    </div>

    <div class="m-body">

      <!-- Preview -->
      <div class="preview-wrap">
        <div class="preview" id="preview" data-fmt="1920">
          <div class="head">
            <span class="avatar">MR</span>
            <div>
              <div class="pname">Markus R. P.</div>
              <div class="phcp">HCP 4,2 · AK GOLF · U18</div>
            </div>
          </div>

          <div class="score-block">
            <span class="score-label">RUNDE · 18 HULL</span>
            <span class="score-big">73</span>
            <span class="score-rel"><span class="par">−1</span> BOSSUM GK · 19. MAI 2026</span>
            <div class="sg-strip">
              <span class="sg-pill">PUTT <span class="v">+2,1</span></span>
              <span class="sg-pill">IRON <span class="v">+0,8</span></span>
              <span class="sg-pill">CHIP <span class="v neg">−0,4</span></span>
              <span class="sg-pill">DRIVE <span class="v">+0,3</span></span>
            </div>
          </div>

          <div class="brand">AK GOLF</div>
        </div>
      </div>

      <!-- Format -->
      <div>
        <label class="field-label">Format</label>
        <div class="format-grid">
          <button class="fmt active" data-fmt="1920">
            <span class="ic"><svg fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-image"/></svg></span>
            <span class="nm">Story</span>
            <span class="dim">1080 × 1920</span>
          </button>
          <button class="fmt" data-fmt="1080">
            <span class="ic"><svg fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-square"/></svg></span>
            <span class="nm">Post</span>
            <span class="dim">1080 × 1080</span>
          </button>
          <button class="fmt" data-fmt="pdf">
            <span class="ic"><svg fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-doc"/></svg></span>
            <span class="nm">PDF</span>
            <span class="dim">FULL SG-DATA</span>
          </button>
          <button class="fmt" data-fmt="link">
            <span class="ic"><svg fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-link"/></svg></span>
            <span class="nm">Lenke</span>
            <span class="dim">DELBAR URL</span>
          </button>
        </div>
      </div>

      <!-- Visibility -->
      <div>
        <label class="field-label">Synlighet</label>
        <div class="vis-row" id="vis">
          <button data-v="privat">
            <svg fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-lock"/></svg>
            Privat
          </button>
          <button class="active" data-v="coach">
            <svg fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-coach"/></svg>
            Coach kan se
          </button>
          <button data-v="off">
            <svg fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-globe"/></svg>
            Offentlig
          </button>
        </div>
      </div>

      <div class="progress-bar" id="progress"><div></div></div>
    </div>

    <div class="m-foot">
      <button class="btn-out" id="copy-link">
        <svg fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-copy"/></svg>
        Kopier lenke
      </button>
      <button class="btn-fill" id="download">
        <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="#ic-download"/></svg>
        Last ned
      </button>
    </div>

  </div>
</div>

<div class="toast" id="toast">
  <svg fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><use href="#ic-check"/></svg>
  <span id="toast-text">Lenke kopiert</span>
</div>

<script>
  const preview = document.getElementById('preview');
  document.querySelectorAll('.fmt').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.fmt').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      preview.setAttribute('data-fmt', b.getAttribute('data-fmt'));
    });
  });
  document.querySelectorAll('#vis button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#vis button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });

  const toast = document.getElementById('toast');
  function showToast(t) {
    document.getElementById('toast-text').textContent = t;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2400);
  }

  document.getElementById('copy-link').addEventListener('click', () => {
    showToast('Lenke kopiert · akgolf.no/r/m-rp-bgk-19052026');
  });

  const progress = document.getElementById('progress');
  document.getElementById('download').addEventListener('click', () => {
    progress.classList.add('running');
    setTimeout(() => {
      progress.classList.remove('running');
      progress.querySelector('div').style.width = '0';
      showToast('Last ned fullført · runde-bgk-19052026.png');
    }, 1400);
  });
</script>

</body>
</html>
