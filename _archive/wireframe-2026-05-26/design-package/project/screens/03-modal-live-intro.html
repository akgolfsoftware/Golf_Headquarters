<!doctype html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<title>03 — LiveIntroModal</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #0A1F18; color: #fff; overflow: hidden; }
  .modal {
    width: 100vw; min-height: 100vh; height: 100vh; background: #0A1F18;
    display: grid; grid-template-rows: 56px 1fr 120px; position: relative; overflow: hidden;
  }
  /* radial accent on hero */
  .modal::before {
    content: ""; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -55%);
    width: 720px; height: 480px;
    background: radial-gradient(ellipse, rgba(209,248,67,0.07) 0%, rgba(209,248,67,0) 65%);
    pointer-events: none;
  }

  /* top bar */
  .top { display: flex; align-items: center; padding: 0 24px; position: relative; z-index: 2; }
  .top-l { display: flex; align-items: center; gap: 16px; flex: 1; }
  .top-r { display: flex; align-items: center; }
  .prog-track {
    width: 200px; height: 4px; border-radius: 100px; background: rgba(255,255,255,0.12); overflow: hidden;
  }
  .prog-fill { width: 25%; height: 100%; background: linear-gradient(90deg, #D1F843, #C2EE2F); border-radius: 100px; box-shadow: 0 0 12px rgba(209,248,67,0.35); }
  .prog-label { font: 500 12px/1 'Inter'; color: rgba(255,255,255,0.65); }
  .prog-label b { color: rgba(255,255,255,0.95); font-weight: 600; }

  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.20); background: transparent;
    display: inline-flex; align-items: center; justify-content: center; color: #fff; cursor: pointer;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.10); }

  /* center */
  .center { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; position: relative; z-index: 1; text-align: center; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font: 600 12px/1 'Inter'; color: rgba(255,255,255,0.60); letter-spacing: 0.10em; text-transform: uppercase;
  }
  .eyebrow .eb-dot { width: 6px; height: 6px; border-radius: 50%; background: #1A7D56; }

  .title {
    margin-top: 28px;
    font: 700 88px/0.95 'Inter Tight';
    letter-spacing: -0.035em; color: #fff;
  }

  .subtitle {
    margin-top: 14px;
    font: 400 24px/1.2 'Inter'; color: rgba(255,255,255,0.75);
  }

  .meta-strip {
    margin-top: 32px;
    display: inline-flex; align-items: center; gap: 28px;
    padding: 14px 24px; border-radius: 100px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
  }
  .meta-item { display: inline-flex; align-items: baseline; gap: 8px; font: 400 16px/1 'Inter'; color: rgba(255,255,255,0.65); }
  .meta-item b { font: 600 18px/1 'JetBrains Mono'; color: #fff; font-variant-numeric: tabular-nums; }
  .meta-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.15); }

  /* coach tip */
  .tip {
    margin-top: 40px; width: 480px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px; padding: 18px 20px; text-align: left;
    display: grid; grid-template-columns: 36px 1fr; gap: 14px;
  }
  .tip-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #D1F843; color: #0A1F18;
    display: inline-flex; align-items: center; justify-content: center;
    font: 700 13px/1 'Inter'; letter-spacing: 0.02em;
  }
  .tip-label { font: 600 10px/1 'Inter'; color: rgba(255,255,255,0.50); letter-spacing: 0.12em; text-transform: uppercase; }
  .tip-quote { margin-top: 6px; font: italic 400 15px/1.5 'Inter Tight'; color: rgba(255,255,255,0.92); letter-spacing: -0.005em; }
  .tip-author { margin-top: 8px; font: 400 12px/1 'Inter'; color: rgba(255,255,255,0.50); }

  /* CTA bar */
  .ctabar { display: flex; align-items: center; justify-content: center; padding: 16px 24px 32px; position: relative; z-index: 2; }
  .cta {
    width: 280px; height: 72px; border-radius: 16px; border: 0; cursor: pointer;
    background: #D1F843; color: #0A1F18;
    font: 600 18px/1 'Inter';
    display: inline-flex; align-items: center; justify-content: center; gap: 12px;
    box-shadow: 0 0 0 1px rgba(209,248,67,0.5), 0 16px 32px rgba(209,248,67,0.18);
    transition: transform var(--duration-micro) var(--ease-out), background var(--duration-micro) var(--ease-out);
  }
  .cta:hover { background: #C2EE2F; }
  .cta:active { transform: scale(0.98); }

  svg.lucide { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  svg.lucide-20 { width: 20px; height: 20px; }
</style>
</head>
<body>
<div class="modal" data-screen-label="03 Live Intro Modal">

  <div class="top">
    <div class="top-l">
      <div class="prog-track"><div class="prog-fill"></div></div>
      <div class="prog-label"><b>1 / 4</b> · forberedelse</div>
    </div>
    <div class="top-r">
      <button class="icon-btn" aria-label="Lukk">
        <svg class="lucide" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="center">
    <div class="eyebrow"><span class="eb-dot"></span>Sommer-toppform · TEK</div>
    <h1 class="title">Putte-økt</h1>
    <div class="subtitle">3 stasjoner</div>

    <div class="meta-strip">
      <div class="meta-item">~<b>30 min</b></div>
      <span class="meta-divider"></span>
      <div class="meta-item"><b>60 reps</b> planlagt</div>
    </div>

    <div class="tip">
      <div class="tip-avatar">AK</div>
      <div>
        <div class="tip-label">Coach-tip</div>
        <div class="tip-quote">«Hold tempo gjennom hele putten — ikke akselerer på treffpunktet.»</div>
        <div class="tip-author">— Anders K · 2 dager siden</div>
      </div>
    </div>
  </div>

  <div class="ctabar">
    <button class="cta">
      Start økt
      <svg class="lucide lucide-20" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
  </div>

</div>
</body>
</html>
