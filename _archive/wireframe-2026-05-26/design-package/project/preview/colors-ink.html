<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--surface)}
  .row{display:flex;gap:16px;align-items:stretch}
  .col{flex:1;display:flex;flex-direction:column;gap:6px}
  .swatch{height:48px;border-radius:10px;border:1px solid var(--line)}
  .lbl{font-family:'Inter';font-size:11px;font-weight:500;color:var(--ink)}
  .hex{font-family:'JetBrains Mono';font-size:10px;color:var(--ink-muted)}
  .ink{display:flex;align-items:center;gap:10px}
  .chip{width:42px;height:42px;border-radius:50%;flex-shrink:0}
  .info{display:flex;flex-direction:column}
</style>
</head><body>
  <div class="row" style="gap:24px">
    <div class="col" style="flex:1.3">
      <div class="ink"><div class="chip" style="background:#0A1F18"></div><div class="info"><div class="lbl">Ink</div><div class="hex">#0A1F18</div></div></div>
      <div class="ink"><div class="chip" style="background:#5E5C57"></div><div class="info"><div class="lbl">Ink Muted</div><div class="hex">#5E5C57</div></div></div>
      <div class="ink"><div class="chip" style="background:#9C9990"></div><div class="info"><div class="lbl">Ink Subtle</div><div class="hex">#9C9990</div></div></div>
      <div class="ink"><div class="chip" style="background:#C4C0B8"></div><div class="info"><div class="lbl">Ink Disabled</div><div class="hex">#C4C0B8</div></div></div>
    </div>
    <div class="col" style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;gap:6px">
      <div style="font-family:'Inter Tight';font-size:18px;font-weight:700;color:#0A1F18">The quick brown fox</div>
      <div style="font-family:'Inter';font-size:13px;color:#5E5C57">jumps over the lazy dog with secondary emphasis</div>
      <div style="font-family:'Inter';font-size:12px;color:#9C9990">subtle meta — last updated 5 min ago</div>
      <div style="font-family:'Inter';font-size:12px;color:#C4C0B8">disabled affordance</div>
    </div>
  </div>
</body></html>
