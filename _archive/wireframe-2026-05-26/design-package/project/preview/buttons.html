<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--surface);display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:14px;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;font-family:'Inter';font-size:14px;font-weight:500;border:none;cursor:pointer}
  .btn-primary{background:#005840;color:#fff}
  .btn-accent{background:#D1F843;color:#0A1F18}
  .btn-ghost{background:transparent;color:#0A1F18;border:1px solid #E5E3DD}
  .lbl{font-family:'Inter';font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-subtle);min-width:60px}
  svg{width:16px;height:16px;stroke-width:1.75;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
</style></head><body>
  <div class="row"><div class="lbl">Default</div>
    <button class="btn btn-primary"><svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>Primary</button>
    <button class="btn btn-accent"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Accent</button>
    <button class="btn btn-ghost"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>Ghost</button>
  </div>
  <div class="row"><div class="lbl">Hover</div>
    <button class="btn btn-primary" style="background:#00472f">Primary</button>
    <button class="btn btn-accent" style="background:#C2EE2F">Accent</button>
    <button class="btn btn-ghost" style="background:#F5F2EA;border-color:#C4C0B8">Ghost</button>
  </div>
</body></html>
