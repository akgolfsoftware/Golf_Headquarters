<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 32px;background:var(--surface);display:flex;flex-direction:column;gap:14px}
  .wrap{display:flex;flex-direction:column;gap:6px}
  .lbl{display:flex;justify-content:space-between;font-family:'Inter';font-size:13px;font-weight:500;color:#0A1F18}
  .lbl .pct{font-family:'JetBrains Mono';color:#5E5C57}
  .track{height:8px;background:#E5E3DD;border-radius:100px;overflow:hidden}
  .fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#D1F843,#C2EE2F)}
</style></head><body>
  <div class="wrap"><div class="lbl"><span>Putting drill</span><span class="pct">25%</span></div><div class="track"><div class="fill" style="width:25%"></div></div></div>
  <div class="wrap"><div class="lbl"><span>Nærspill-økt</span><span class="pct">60%</span></div><div class="track"><div class="fill" style="width:60%"></div></div></div>
  <div class="wrap"><div class="lbl"><span>Ukentlig mål</span><span class="pct">85%</span></div><div class="track"><div class="fill" style="width:85%"></div></div></div>
</body></html>
