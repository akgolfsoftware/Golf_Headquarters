<!doctype html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<title>01 — Live Session · PlayerHQ</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #0A1F18; color: #fff; min-height: 100vh; overflow: hidden; }
  .screen {
    width: 100vw; min-height: 100vh; height: 100vh; background: #0A1F18;
    display: grid; grid-template-rows: 56px 1fr 88px; overflow: hidden;
    position: relative;
  }

  /* ── radial accent behind counter ─────────────────────────── */
  .screen::before {
    content: ""; position: absolute; left: 50%; top: 52%; transform: translate(-50%, -50%);
    width: 760px; height: 760px; border-radius: 50%;
    background: radial-gradient(circle, rgba(209,248,67,0.06) 0%, rgba(209,248,67,0) 65%);
    pointer-events: none;
  }

  /* ── top bar ──────────────────────────────────────────────── */
  .topbar { display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid rgba(255,255,255,0.06); position: relative; z-index: 2; }
  .topbar-l, .topbar-r { flex: 0 0 auto; display: flex; align-items: center; gap: 12px; }
  .topbar-c { flex: 1; text-align: center; font: 13px/1 'Inter'; color: #9C9990; letter-spacing: -0.01em; }

  .live-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 10px; border-radius: 100px;
    background: rgba(209,248,67,0.12); border: 1px solid rgba(209,248,67,0.35);
    font: 600 11px/1 'Inter'; color: #D1F843; letter-spacing: 0.10em; text-transform: uppercase;
  }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #D1F843; box-shadow: 0 0 0 4px rgba(209,248,67,0.18); animation: pulse 1.6s var(--ease-out) infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 4px rgba(209,248,67,0.18); }
    50% { opacity: .55; box-shadow: 0 0 0 8px rgba(209,248,67,0.05); }
  }
  .topbar-tag { font: 500 12px/1 'JetBrains Mono'; color: rgba(255,255,255,0.85); letter-spacing: 0.10em; text-transform: uppercase; }

  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.20); background: transparent;
    display: inline-flex; align-items: center; justify-content: center; color: #fff;
    cursor: pointer; transition: background var(--duration-micro) var(--ease-out);
  }
  .icon-btn:hover { background: rgba(255,255,255,0.10); }

  /* ── center counter zone ──────────────────────────────────── */
  .center { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 1; padding-top: 8px; }

  .focus-pill {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px; border-radius: 100px;
    border: 2px solid #1A7D56; background: rgba(26,125,86,0.08);
    font: 600 12px/1 'Inter'; color: rgba(255,255,255,0.92); letter-spacing: 0.10em; text-transform: uppercase;
  }
  .focus-pill .layer-dot { width: 8px; height: 8px; border-radius: 50%; background: #1A7D56; }

  .counter-wrap {
    margin-top: 40px;
    width: 360px; height: 360px; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .ring-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { stroke: rgba(255,255,255,0.08); }
  .ring-fill  { stroke: #D1F843; stroke-linecap: round; filter: drop-shadow(0 0 8px rgba(209,248,67,0.35)); }

  .counter-num {
    font: 500 168px/0.9 'JetBrains Mono';
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.05em;
    color: #D1F843;
  }
  .counter-glow { text-shadow: 0 0 32px rgba(209,248,67,0.30); }

  .sub-text { margin-top: 28px; font: 400 16px/1 'Inter'; color: rgba(255,255,255,0.65); }
  .sub-text b { color: rgba(255,255,255,0.95); font-weight: 500; }

  .seq-dots { margin-top: 28px; display: flex; gap: 14px; align-items: center; }
  .seq-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.30); }
  .seq-dot.done { background: rgba(255,255,255,0.30); border-color: transparent; }
  .seq-dot.active { background: #D1F843; border-color: transparent; box-shadow: 0 0 0 4px rgba(209,248,67,0.18); }
  .seq-label { font: 500 11px/1 'Inter'; color: rgba(255,255,255,0.50); letter-spacing: 0.10em; text-transform: uppercase; margin-left: 8px; }

  /* ── bottom bar ───────────────────────────────────────────── */
  .bottombar {
    display: grid; grid-template-columns: 30% 1fr; gap: 16px; padding: 16px 24px;
    border-top: 1px solid rgba(255,255,255,0.06); position: relative; z-index: 2;
  }
  .btn-pause {
    height: 56px; align-self: center; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.20); background: transparent;
    color: #fff; font: 500 16px/1 'Inter'; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    transition: background var(--duration-micro) var(--ease-out);
  }
  .btn-pause:hover { background: rgba(255,255,255,0.06); }

  .btn-next {
    height: 56px; align-self: center;
    border-radius: 12px; border: 0; cursor: pointer;
    background: #D1F843; color: #0A1F18;
    font: 600 18px/1 'Inter'; letter-spacing: -0.01em;
    display: inline-flex; align-items: center; justify-content: center; gap: 12px;
    box-shadow: 0 0 0 1px rgba(209,248,67,0.5), 0 8px 24px rgba(209,248,67,0.18);
    transition: transform var(--duration-micro) var(--ease-out), background var(--duration-micro) var(--ease-out);
  }
  .btn-next:hover { background: #C2EE2F; }
  .btn-next:active { transform: scale(0.98); }

  /* lucide stroke defaults */
  svg.lucide { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  svg.lucide-20 { width: 20px; height: 20px; }
</style>
</head>
<body>
<div class="screen" data-screen-label="01 Live Session">

  <!-- ── Top bar ─────────────────────────────────────────────── -->
  <div class="topbar">
    <div class="topbar-l">
      <div class="live-pill"><span class="live-dot"></span>Live</div>
      <div class="topbar-tag">TEK · Driver</div>
    </div>
    <div class="topbar-c">Økt 12 av 18 — Sommer-toppform</div>
    <div class="topbar-r">
      <button class="icon-btn" aria-label="Lukk">
        <svg class="lucide" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Center counter zone ─────────────────────────────────── -->
  <div class="center">
    <div class="focus-pill"><span class="layer-dot"></span>TEK · Driver</div>

    <div class="counter-wrap">
      <svg class="ring-svg" viewBox="0 0 360 360">
        <circle class="ring-track" cx="180" cy="180" r="170" fill="none" stroke-width="6" />
        <!-- 24/30 = 80% of 2π·170 ≈ 854 -->
        <circle class="ring-fill"  cx="180" cy="180" r="170" fill="none" stroke-width="6"
                stroke-dasharray="854" stroke-dashoffset="171" />
      </svg>
      <div class="counter-num counter-glow">24</div>
    </div>

    <div class="sub-text">av <b>30 rep</b></div>

    <div class="seq-dots">
      <span class="seq-dot done"></span>
      <span class="seq-dot active"></span>
      <span class="seq-dot"></span>
      <span class="seq-label">stasjon 2 av 3</span>
    </div>
  </div>

  <!-- ── Bottom bar ──────────────────────────────────────────── -->
  <div class="bottombar">
    <button class="btn-pause">
      <svg class="lucide" viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
      Pause
    </button>
    <button class="btn-next">
      Neste rep
      <svg class="lucide lucide-20" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
  </div>

</div>
</body>
</html>
