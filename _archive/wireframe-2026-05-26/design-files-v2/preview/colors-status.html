<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--surface)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .pair{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff}
  .top{height:48px}
  .bot{height:48px}
  .info{padding:10px 12px}
  .name{font-family:'Inter';font-size:12px;font-weight:600}
  .hex{font-family:'JetBrains Mono';font-size:10px;color:var(--ink-muted);margin-top:2px}
</style>
</head><body>
  <div class="grid">
    <div class="pair">
      <div class="top" style="background:#1A7D56"></div>
      <div class="bot" style="background:#E5F1EA"></div>
      <div class="info"><div class="name" style="color:#1A7D56">Success</div><div class="hex">#1A7D56 / #E5F1EA</div></div>
    </div>
    <div class="pair">
      <div class="top" style="background:#B8852A"></div>
      <div class="bot" style="background:#FFF0D6"></div>
      <div class="info"><div class="name" style="color:#B8852A">Warning</div><div class="hex">#B8852A / #FFF0D6</div></div>
    </div>
    <div class="pair">
      <div class="top" style="background:#A32D2D"></div>
      <div class="bot" style="background:#FAE3E3"></div>
      <div class="info"><div class="name" style="color:#A32D2D">Danger</div><div class="hex">#A32D2D / #FAE3E3</div></div>
    </div>
  </div>
</body></html>
