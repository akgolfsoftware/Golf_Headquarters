<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--surface);display:flex;gap:14px;align-items:stretch}
.tier{flex:1;padding:18px;background:#fff;border:1px solid var(--line);border-radius:var(--radius-card);position:relative;overflow:hidden}
.tier::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.t-gratis::before{background:var(--tier-gratis)} .t-pro::before{background:var(--tier-pro)} .t-elite::before{background:var(--tier-elite)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:100px;font-family:var(--font-body);font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
.b-gratis{background:#F5F2EA;color:var(--tier-gratis)} .b-pro{background:var(--brand-primary-soft);color:var(--brand-primary)} .b-elite{background:var(--accent-bg);color:var(--brand-accent-on)}
.dot{width:6px;height:6px;border-radius:50%}
h4{font-family:var(--font-display);font-weight:600;font-size:14px;margin:0 0 4px 0;color:var(--ink)}
p{font-family:var(--font-body);font-size:11px;color:var(--ink-muted);margin:0;line-height:1.4}</style>
</head><body>
<div class="tier t-gratis"><span class="badge b-gratis"><span class="dot" style="background:var(--tier-gratis)"></span>Gratis</span><h4>Grunnleggende</h4><p>Default. Locked features dempet 40 % opacity.</p></div>
<div class="tier t-pro"><span class="badge b-pro"><span class="dot" style="background:var(--tier-pro)"></span>Pro</span><h4>Mest vanlige</h4><p>Full treningsplan, statistikk, coach-link.</p></div>
<div class="tier t-elite"><span class="badge b-elite"><span class="dot" style="background:var(--tier-elite)"></span>Elite</span><h4>Topp-tier</h4><p>1-til-1 coaching, video-analyse, prioritet.</p></div>
</body></html>
