<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--surface);display:flex;gap:14px}
  .card{flex:1;padding:18px;background:#fff;border:1px solid #E5E3DD;border-radius:14px}
  .lbl{font-family:'Inter';font-size:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-subtle);margin-bottom:8px}
  .demo{height:48px;border-radius:14px;background:#fff}
  .s1{box-shadow:0 1px 2px rgba(15,31,24,.04),0 4px 12px rgba(15,31,24,.04)}
  .s2{box-shadow:0 1px 2px rgba(15,31,24,.06),0 14px 32px rgba(15,31,24,.08)}
  .s3{box-shadow:inset 0 0 0 1px rgba(15,31,24,.06)}
  .s4{box-shadow:0 0 0 1px rgba(209,248,67,.5),0 8px 24px rgba(209,248,67,.18);background:#D1F843}
  .name{font-family:'Inter';font-size:12px;font-weight:600;color:#0A1F18;margin-top:8px}
  .hex{font-family:'JetBrains Mono';font-size:9px;color:var(--ink-muted);margin-top:2px;line-height:1.4}
</style></head><body>
  <div class="card"><div class="lbl">Resting</div><div class="demo s1"></div><div class="name">shadow-card</div></div>
  <div class="card"><div class="lbl">Lifted</div><div class="demo s2"></div><div class="name">shadow-card-hover</div></div>
  <div class="card"><div class="lbl">Inset rim</div><div class="demo s3"></div><div class="name">shadow-rim</div></div>
  <div class="card"><div class="lbl">Accent glow</div><div class="demo s4"></div><div class="name">shadow-accent-glow</div></div>
</body></html>
