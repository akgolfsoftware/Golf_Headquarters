<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--surface)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sw{border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#fff}
  .swatch{height:64px}
  .info{padding:8px 10px}
  .name{font-family:'Inter';font-size:11px;font-weight:500;color:var(--ink)}
  .hex{font-family:'JetBrains Mono';font-size:10px;color:var(--ink-muted);margin-top:2px}
</style>
</head><body>
  <div class="grid">
    <div class="sw"><div class="swatch" style="background:#FAFAF7;border-bottom:1px solid #E5E3DD"></div><div class="info"><div class="name">Surface</div><div class="hex">#FAFAF7</div></div></div>
    <div class="sw"><div class="swatch" style="background:#F5F2EA"></div><div class="info"><div class="name">Surface Alt</div><div class="hex">#F5F2EA</div></div></div>
    <div class="sw"><div class="swatch" style="background:#FFFFFF;border-bottom:1px solid #E5E3DD"></div><div class="info"><div class="name">Card</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="swatch" style="background:#0A0A0A"></div><div class="info"><div class="name">Hero BG</div><div class="hex">#0A0A0A</div></div></div>
    <div class="sw"><div class="swatch" style="background:#061210"></div><div class="info"><div class="name">Coach Rail</div><div class="hex">#061210</div></div></div>
    <div class="sw"><div class="swatch" style="background:#E5E3DD"></div><div class="info"><div class="name">Line</div><div class="hex">#E5E3DD</div></div></div>
    <div class="sw"><div class="swatch" style="background:#EFEDE6"></div><div class="info"><div class="name">Line Soft</div><div class="hex">#EFEDE6</div></div></div>
    <div class="sw"><div class="swatch" style="background:#F0EDE5"></div><div class="info"><div class="name">Player Border</div><div class="hex">#F0EDE5</div></div></div>
  </div>
</body></html>
