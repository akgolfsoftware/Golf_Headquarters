<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--surface);display:flex;gap:14px}
  .ico{display:flex;flex-direction:column;align-items:center;gap:6px;width:78px}
  .ico svg{stroke:#0A1F18;stroke-width:1.75;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .ico .name{font-family:'JetBrains Mono';font-size:10px;color:var(--ink-subtle)}
  .grp{display:flex;flex-direction:column;align-items:center;gap:8px}
  .lbl{font-family:'Inter';font-size:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-subtle)}
  .row{display:flex;gap:14px}
</style></head><body>
  <div style="display:flex;flex-direction:column;gap:10px;flex:1">
    <div class="lbl">Lucide · stroke 1.75 · 18 / 20 / 24</div>
    <div class="row">
      <div class="ico"><svg width="18" height="18" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="name">calendar</span></div>
      <div class="ico"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><span class="name">target</span></div>
      <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg><span class="name">trending-up</span></div>
      <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="name">users</span></div>
      <div class="ico"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="name">user</span></div>
      <div class="ico"><svg width="24" height="24" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="name">chevron-right</span></div>
    </div>
  </div>
</body></html>
