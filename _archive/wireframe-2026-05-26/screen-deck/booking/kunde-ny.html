<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../base.css"><title>Opprett konto · Booking</title></head>
<body style="background: var(--bg);">

<header style="background: white; border-bottom: 1px solid #E5E3DD; padding: 16px 48px;">
  <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
    <a href="index.html" style="font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 18px; text-decoration: none; color: var(--text);">AK Golf · Booking</a>
    <a href="min-side.html" style="color: var(--text-secondary); text-decoration: none; font-size: 13px;">Logg inn →</a>
  </div>
</header>

<div style="max-width: 1000px; margin: 0 auto; padding: 24px 48px;">
  <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
    <span class="pill pill-muted">1. Tjeneste ✓</span>
    <span style="color: var(--text-muted);">→</span>
    <span class="pill pill-muted">2. Tid ✓</span>
    <span style="color: var(--text-muted);">→</span>
    <span class="pill" style="background: var(--primary); color: white;">3. Info</span>
    <span style="color: var(--text-muted);">→</span>
    <span class="pill pill-muted">4. Betaling</span>
    <span style="color: var(--text-muted);">→</span>
    <span class="pill pill-muted">5. Bekreftelse</span>
  </div>
</div>

<main style="max-width: 600px; margin: 0 auto; padding: 16px 48px 80px;">
  <header style="margin-bottom: 24px;">
    <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary);">Steg 3 av 5</span>
    <h1 style="font-family: var(--font-display); font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin: 8px 0 6px;">Opprett <em style="color: var(--primary); font-weight: 400;">konto</em></h1>
    <p style="color: var(--text-secondary); font-size: 14px;">Tar 30 sekunder. Du får tilgang til Min side, klippekort og fakturaer.</p>
  </header>

  <div class="card">
    <div style="display: flex; flex-direction: column; gap: 14px;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div>
          <label style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 6px;">Fornavn</label>
          <input type="text" value="Markus" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 14px; font-family: inherit;">
        </div>
        <div>
          <label style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 6px;">Etternavn</label>
          <input type="text" value="Rønning" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 14px; font-family: inherit;">
        </div>
      </div>
      <div>
        <label style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 6px;">E-post</label>
        <input type="email" placeholder="navn@eksempel.no" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 14px; font-family: inherit;">
      </div>
      <div>
        <label style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 6px;">Telefon</label>
        <input type="tel" placeholder="+47 412 34 567" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 14px; font-family: inherit;">
      </div>
      <div>
        <label style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 6px;">Passord</label>
        <input type="password" placeholder="Min. 8 tegn" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 14px; font-family: inherit;">
      </div>
      <div>
        <label style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 6px;">Fødselsdato</label>
        <input type="date" value="1992-04-15" style="width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 14px; font-family: inherit;">
      </div>
      <label style="display: flex; gap: 10px; align-items: start; padding-top: 8px;">
        <input type="checkbox" style="margin-top: 3px; accent-color: var(--primary);">
        <small style="font-size: 12px; color: var(--text-secondary); line-height: 1.5;">Jeg godtar AK Golfs vilkår og personvern. Vi sender deg booking-bekreftelser, påminnelser og nyheter — du kan melde deg av når du vil.</small>
      </label>
    </div>
  </div>

  <p style="text-align: center; margin: 16px 0; font-size: 13px; color: var(--text-secondary);">Har du allerede konto? <a href="kunde-eksisterende.html" style="color: var(--primary);">Logg inn →</a></p>

  <div style="display: flex; gap: 12px; justify-content: space-between; margin-top: 16px;">
    <a href="tillegg.html" class="btn btn-ghost">← Tilbake</a>
    <a href="spiller-info.html" class="btn btn-primary">Opprett konto →</a>
  </div>
</main>

</body></html>
