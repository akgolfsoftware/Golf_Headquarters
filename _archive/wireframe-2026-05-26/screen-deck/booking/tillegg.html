<!DOCTYPE html><html lang="nb"><head><meta charset="UTF-8"><link rel="stylesheet" href="../base.css"><title>Tillegg · Booking</title></head>
<body style="background: var(--bg);">

<header style="background: white; border-bottom: 1px solid #E5E3DD; padding: 16px 48px;">
  <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
    <a href="index.html" style="font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 18px; text-decoration: none; color: var(--text);">AK Golf · Booking</a>
    <a href="min-side.html" style="color: var(--text-secondary); text-decoration: none; font-size: 13px;">Min side →</a>
  </div>
</header>

<div style="max-width: 1000px; margin: 0 auto; padding: 24px 48px;">
  <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
    <span class="pill pill-muted">1. Tjeneste ✓</span>
    <span style="color: var(--text-muted);">→</span>
    <span class="pill pill-muted">2. Tid ✓</span>
    <span style="color: var(--text-muted);">→</span>
    <span class="pill" style="background: var(--primary); color: white;">3. Tillegg</span>
    <span style="color: var(--text-muted);">→</span>
    <span class="pill pill-muted">4. Info</span>
    <span style="color: var(--text-muted);">→</span>
    <span class="pill pill-muted">5. Betaling</span>
  </div>
</div>

<main style="max-width: 800px; margin: 0 auto; padding: 16px 48px 80px;">
  <header style="margin-bottom: 24px;">
    <span style="font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary);">Steg 3 av 5</span>
    <h1 style="font-family: var(--font-display); font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin: 8px 0 6px;">Vil du legge til <em style="color: var(--primary); font-weight: 400;">noe ekstra</em>?</h1>
    <p style="color: var(--text-secondary); font-size: 14px;">Velg fritt — kan også legges til på dagen.</p>
  </header>

  <div style="display: flex; flex-direction: column; gap: 10px;">
    <label class="card" style="display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px; cursor: pointer;">
      <input type="checkbox" checked style="width: 20px; height: 20px; accent-color: var(--primary);">
      <div>
        <b style="font-family: var(--font-display); font-size: 16px;">Video-analyse</b>
        <p style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">Slow-motion, V1-app, leveres på e-post innen 24 t.</p>
      </div>
      <span style="font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--primary);">+ 400 kr</span>
    </label>
    <label class="card" style="display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px; cursor: pointer;">
      <input type="checkbox" checked style="width: 20px; height: 20px; accent-color: var(--primary);">
      <div>
        <b style="font-family: var(--font-display); font-size: 16px;">TrackMan-data</b>
        <p style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">Eksport av alle TrackMan-tall fra økten.</p>
      </div>
      <span style="font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--primary);">+ 200 kr</span>
    </label>
    <label class="card" style="display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px; cursor: pointer;">
      <input type="checkbox" style="width: 20px; height: 20px; accent-color: var(--primary);">
      <div>
        <b style="font-family: var(--font-display); font-size: 16px;">Range-baller</b>
        <p style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">100 baller for oppvarming før coaching-økten.</p>
      </div>
      <span style="font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--primary);">+ 150 kr</span>
    </label>
    <label class="card" style="display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px; cursor: pointer;">
      <input type="checkbox" style="width: 20px; height: 20px; accent-color: var(--primary);">
      <div>
        <b style="font-family: var(--font-display); font-size: 16px;">Slag-leie</b>
        <p style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">Komplett køllesett (TaylorMade Stealth) hvis du ikke har eget.</p>
      </div>
      <span style="font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--primary);">+ 100 kr</span>
    </label>
    <label class="card" style="display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px; cursor: pointer;">
      <input type="checkbox" style="width: 20px; height: 20px; accent-color: var(--primary);">
      <div>
        <b style="font-family: var(--font-display); font-size: 16px;">Kaffe & nybakt bolle</b>
        <p style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">Klart til når du kommer. Fra Mulligan-cafén.</p>
      </div>
      <span style="font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--primary);">+ 50 kr</span>
    </label>
  </div>

  <div class="card" style="margin-top: 24px; background: rgba(0,88,64,0.04); border: 1px dashed var(--primary);">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary);">Tillegg så langt</span>
      <b style="font-family: var(--font-display); font-size: 18px;">+ 600 kr</b>
    </div>
  </div>

  <div style="margin-top: 28px; display: flex; gap: 12px; justify-content: space-between;">
    <a href="pakke.html" class="btn btn-ghost">← Tilbake</a>
    <a href="kunde-eksisterende.html" class="btn btn-primary">Fortsett →</a>
  </div>
</main>

</body></html>
