<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Onboarding — AK Golf</title>
<link rel="stylesheet" href="../base.css">
<style>
  body { background: linear-gradient(180deg, #FAFAF7 0%, #F0F2F0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .auth-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--r-card); padding: 40px; width: 100%; max-width: 560px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
  .auth-logo { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 18px; }
  .auth-logo em { font-style: italic; font-weight: 400; color: var(--primary); }
  .step-bar { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 18px; }
  .step-dots { display: flex; gap: 8px; }
  .step-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
  .step-dot.done { background: var(--primary); }
  .step-dot.current { background: var(--accent); box-shadow: 0 0 0 3px rgba(209,248,67,0.30); }
  .auth-title { font-family: var(--font-display); font-size: 28px; font-weight: 600; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 6px; }
  .auth-title em { font-style: italic; font-weight: 400; color: var(--primary); }
  .auth-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 22px; }
  .form-field { margin-bottom: 18px; }
  .form-label { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }
  .form-input, .form-select { width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); font-size: 14px; font-family: inherit; background: var(--bg-elev); }
  .form-input:focus, .form-select:focus { outline: 0; border-color: var(--primary); }
  .opt-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .opt-card { padding: 14px 10px; border: 1px solid var(--border-strong); border-radius: var(--r-btn); text-align: center; cursor: pointer; background: var(--bg-elev); }
  .opt-card.active { border-color: var(--primary); background: rgba(0,88,64,0.04); box-shadow: 0 0 0 2px rgba(0,88,64,0.10); }
  .opt-card b { display: block; font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .opt-card.active b { color: var(--primary); }
  .opt-card small { font-size: 10px; color: var(--text-secondary); font-family: var(--font-mono); letter-spacing: 0.04em; }
  .btn-row { display: flex; gap: 10px; margin-top: 24px; }
  .btn-row .btn { flex: 1; justify-content: center; padding: 13px; font-size: 14px; font-weight: 600; }
  .btn-row .btn-prev { flex: 0 0 auto; min-width: 100px; }
  .auth-skip { display: block; text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 14px; text-decoration: none; }
  .auth-skip:hover { color: var(--text-secondary); }
  .auth-meta { text-align: center; margin-top: 24px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--text-muted); }
  .auth-meta a { color: var(--text-muted); text-decoration: none; margin: 0 6px; }
</style>
</head>
<body>
<div>
  <div class="auth-card">
    <div class="auth-logo">AK <em>Golf</em></div>
    <div class="step-bar">
      <span>Steg 2 av 4</span>
      <div class="step-dots">
        <i class="step-dot done"></i>
        <i class="step-dot current"></i>
        <i class="step-dot"></i>
        <i class="step-dot"></i>
      </div>
    </div>
    <h1 class="auth-title"><em>Om</em> deg</h1>
    <p class="auth-sub">La oss bli kjent med spillet ditt. Du kan endre alt senere i innstillingene.</p>

    <div class="form-field">
      <label class="form-label">Hva er din nåværende HCP?</label>
      <input class="form-input" type="number" value="14.2" step="0.1" placeholder="f.eks. 18.4">
    </div>

    <div class="form-field">
      <label class="form-label">Hvor ofte spiller du?</label>
      <div class="opt-row">
        <div class="opt-card active"><b>Ukentlig</b><small>1+ runde/uke</small></div>
        <div class="opt-card"><b>Månedlig</b><small>2–3 runder/mnd</small></div>
        <div class="opt-card"><b>Sjeldnere</b><small>Av og til</small></div>
      </div>
    </div>

    <div class="form-field">
      <label class="form-label">Hva er ditt hovedmål?</label>
      <div class="opt-row">
        <div class="opt-card active"><b>Senke HCP</b><small>Bli bedre</small></div>
        <div class="opt-card"><b>Konkurrere</b><small>Turneringer</small></div>
        <div class="opt-card"><b>Mosjon</b><small>Trivsel</small></div>
      </div>
    </div>

    <div class="form-field">
      <label class="form-label">Hvilket anlegg er ditt hjemmeanlegg?</label>
      <select class="form-select">
        <option>Gamle Fredrikstad Golfklubb</option>
        <option>Onsøy Golfklubb</option>
        <option>Borregaard Golfklubb</option>
        <option>Mulligan Indoor (Fredrikstad)</option>
        <option>Annet / ingen</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost btn-prev">← Forrige</button>
      <a class="btn btn-primary" href="../playerhq/hjem.html" style="justify-content:center;">Ferdig →</a>
    </div>
    <a href="../playerhq/hjem.html" class="auth-skip">Hopp over onboarding</a>
  </div>
  <div class="auth-meta">
    <a href="#">Trenger hjelp?</a> · <a href="#">Personvern</a> · <a href="#">Vilkår</a>
  </div>
</div>
</body>
</html>
