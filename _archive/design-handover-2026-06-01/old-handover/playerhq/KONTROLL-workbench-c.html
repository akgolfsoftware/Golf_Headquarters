<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="meta"
        title="PlayerHQ Workbench · Variant C"
        subtitle="Dashboard data-dense · Bloomberg Terminal-følelse for golf. Maks informasjon per fold uten å bli rotete — 8-pt grid strict, mono overalt på tall, accent (#D1F843) brukt sparsomt for 'live'. For PRO-spiller eller konkurranse-amatør."
      >
        <DCPostIt rotate={-2}>
          KPI 4×2 + 3-kol grid
          {'\n'}Pyramide-fordeling full-bredde
          {'\n'}HCP 12 mnd m/ hendelser
          {'\n'}Mono tabular-nums overalt
        </DCPostIt>
      </DCSection>

      <DCSection
        id="desktop"
        title="Desktop · 1440×900 — primær"
        subtitle="Multi-pane: KPI + Velvære venstre · Kalender 3-dager midt · AI-innsikt + Turnering høyre. Pyramide-fordeling og HCP-utvikling full-bredde under. Bunn-rad: 4 sub-kort."
      >
        <DCArtboard id="wbc-desktop" label="Desktop · 1440w" width={1440} height={1320}>
          <WBC_Workbench vp="desktop"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="tablet"
        title="iPad landscape · 1180w"
        subtitle="3-kol blir 2-kol. Kalender stables under KPI/Velvære og AI/Turnering. Footer 4-kort blir 2×2."
      >
        <DCArtboard id="wbc-tablet" label="Tablet · 1180w" width={1180} height={1640}>
          <WBC_Workbench vp="tablet"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
