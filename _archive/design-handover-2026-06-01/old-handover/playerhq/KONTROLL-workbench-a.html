<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<!-- Components -->
<script type="text/babel" src="../design-canvas.jsx"></script>
<script type="text/babel" src="../workbench-a/workbench-a.jsx"></script>

<!-- Mount -->
<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="meta"
        title="PlayerHQ Workbench · Variant A"
        subtitle="Stack-layout · Mobile-first · Vertikal IA (9 seksjoner). Samme komponent rendres på tre bredder. Snikkertelefon optimalisert for tommelfinger — uten sidebar, med hamburger og bunn-nav."
      >
        <DCPostIt x={60} y={-8} rotate={-2}>
          Pyramide-farger fra ny spec
          {'\n'}FYS forest · TEK amber · SLAG blå
          {'\n'}SPILL lime · TURN dyp rød
        </DCPostIt>
      </DCSection>

      <DCSection
        id="mobile"
        title="iPhone 14 Pro · 393 × 852 — primær"
        subtitle="Vertikal stack, tommel-tilgjengelig, sticky topbar + bunn-nav. Kalender scroller horisontalt. 56-px touch-mål på CTA."
      >
        <DCArtboard id="wba-mobile" label="Mobile · 393w · Stack" width={393} height={2620}>
          <WBA_Workbench vp="mobile"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="tablet"
        title="iPad · 834 × · 4-kol-snarveier + 4-kol-velvære"
        subtitle="Container max-w 1024. AI-innsikt og snarveier blir 3- og 4-kol-grid. Bunn-nav skjules. Topbar beholdes."
      >
        <DCArtboard id="wba-tablet" label="Tablet · 834w" width={834} height={2280}>
          <WBA_Workbench vp="tablet"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="desktop"
        title="Desktop · 1280 · luksus-editorial"
        subtitle="Container max-w 1280. Turnering blir 2-kol med countdown ved siden av sjekkliste. Hele stacken puster mer."
      >
        <DCArtboard id="wba-desktop" label="Desktop · 1280w" width={1280} height={2100}>
          <WBA_Workbench vp="desktop"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
