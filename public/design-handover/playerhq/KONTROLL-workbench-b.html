<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="meta"
        title="PlayerHQ Workbench · Variant B"
        subtitle="Editorial luxury · Kinfolk-magasin-følelse · solid #FAFAF7 bakgrunn, ingen kort-rammer — bare hvitt rom og tynne sektions-skiller. Massiv typografi (96 px italic-hilsen), prose-stil AI som essay i stedet for kort, og 192-px italic-countdown."
      >
        <DCPostIt rotate={-2}>
          Hero 96px Inter Tight italic
          {'\n'}Center-aligned, primary green
          {'\n'}Solid #FAFAF7, ingen kort
          {'\n'}AI som prose, max 65ch
        </DCPostIt>
      </DCSection>

      <DCSection
        id="ipad"
        title="iPad portrait · 810w — primær"
        subtitle="Editorial-formatet jobber best på iPad portrait — typografien får plass uten å bli aggressive. Hero 50vh, 88px hilsen, generøst whitespace."
      >
        <DCArtboard id="wbb-ipad" label="iPad portrait · 810w" width={810} height={3520}>
          <WBB_Workbench vp="ipad"/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="desktop"
        title="Desktop · 1280w"
        subtitle="Skalerer opp — hero 56vh m/ 112px italic, 'Neste' blir 2-kol. Snarveier-grid blir tre kolonner i footer."
      >
        <DCArtboard id="wbb-desktop" label="Desktop · 1280w" width={1280} height={3260}>
          <WBB_Workbench vp="desktop"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
