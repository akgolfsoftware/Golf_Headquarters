<!doctype html><html lang="nb"><head><meta charset="utf-8"><title>Treningsanalyse · Utforsk</title>
<link rel="stylesheet" href="_shared.css">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.453.0"></script>
<style>
  body { width: 1180px; }
  .card { padding: 24px; }

  .sec {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted-foreground);
    display: flex; align-items: center; gap: 8px; margin: 0 0 16px;
  }
  .sec::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* ===== TITLE ===== */
  .title-row { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 22px; }
  .title-row .eb {
    font-family: var(--font-mono); font-size: 10px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-foreground);
    margin-bottom: 7px;
  }
  .title-row h1 {
    margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 27px;
    letter-spacing: -0.025em; color: var(--foreground); line-height: 1.05;
  }
  .title-row h1 em { font-family: var(--font-display); font-style: italic; font-weight: 500; color: var(--primary); }
  .title-row .meta {
    margin-left: auto; flex-shrink: 0; white-space: nowrap;
    display: inline-flex; gap: 18px; align-items: baseline;
  }
  .title-row .meta .m { display: inline-flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .title-row .meta .m .v {
    font-family: var(--font-mono); font-size: 17px; font-weight: 800; letter-spacing: -0.01em;
    color: var(--foreground); font-feature-settings: "tnum","zero"; line-height: 1;
  }
  .title-row .meta .m .v.neg { color: var(--destructive); }
  .title-row .meta .m .v.pos { color: var(--primary); }
  .title-row .meta .m .v.flat { color: var(--muted-foreground); }
  .title-row .meta .m .l {
    font-family: var(--font-mono); font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.10em; color: var(--muted-foreground);
  }

  /* ===== CONTROL BAR ===== */
  .controls {
    display: flex; flex-wrap: wrap; gap: 24px 32px; align-items: flex-end;
    padding: 16px 24px; border: 1px solid var(--border); border-radius: var(--radius-lg);
    background: var(--cream-50); margin-bottom: 16px;
  }
  .ctrl { display: flex; flex-direction: column; gap: 7px; }
  .ctrl-l {
    font-family: var(--font-mono); font-size: 9px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-foreground);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ctrl-l i { width: 11px; height: 11px; }
  .seg {
    display: inline-flex; padding: 3px; gap: 2px;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  }
  .seg button {
    appearance: none; border: 0; cursor: pointer; background: transparent;
    font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.02em;
    color: var(--muted-foreground); padding: 7px 13px; border-radius: 7px;
    display: inline-flex; align-items: center; gap: 6px; transition: background .12s, color .12s;
    white-space: nowrap;
  }
  .seg button:hover { color: var(--foreground); }
  .seg button.on { background: var(--accent); color: var(--accent-foreground); font-weight: 800; }
  .seg button:disabled { opacity: 0.32; cursor: not-allowed; }
  .seg button .dot { width: 8px; height: 8px; border-radius: 9999px; }

  /* ===== FILTER CHIPS ===== */
  .filters {
    display: flex; flex-direction: column; gap: 8px;
    padding: 16px 24px; border: 1px solid var(--border); border-radius: var(--radius-lg);
    background: var(--card); margin-bottom: 24px;
  }
  .fhead { display: flex; align-items: center; gap: 10px; }
  .fhead .ft {
    font-family: var(--font-mono); font-size: 9px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-foreground);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .fhead .ft i { width: 11px; height: 11px; }
  .fhead .fcount {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--foreground);
  }
  .reset {
    margin-left: auto; appearance: none; cursor: pointer;
    background: transparent; border: 1px solid var(--border); border-radius: 9999px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted-foreground); padding: 5px 11px;
    display: inline-flex; align-items: center; gap: 6px; transition: background .12s, color .12s;
  }
  .reset:hover { background: var(--secondary); color: var(--foreground); }
  .reset i { width: 11px; height: 11px; }
  .reset.hidden { display: none; }
  .fgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px 22px; }
  .fgroup { display: flex; flex-direction: column; gap: 7px; }
  .fg-l {
    font-family: var(--font-mono); font-size: 9px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.10em; color: var(--muted-foreground);
  }
  .fg-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    appearance: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 9px;
    border-radius: 9999px; border: 1px solid var(--border); background: var(--cream-50);
    font-family: var(--font-mono); font-size: 10px; font-weight: 800; letter-spacing: 0.03em;
    text-transform: uppercase; color: var(--foreground); transition: opacity .12s, background .12s;
    white-space: nowrap;
  }
  .chip .cdot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
  .chip:hover { background: var(--secondary); }
  .chip.off { opacity: 0.4; text-decoration: line-through; background: transparent; }
  .chip.off .cdot { opacity: 0.4; }

  /* ===== KPI STRIP ===== */
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 8px; }
  .kpi {
    border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px;
    background: var(--card); display: flex; flex-direction: column; gap: 4px;
  }
  .kpi .kv {
    font-family: var(--font-mono); font-size: 24px; font-weight: 800; letter-spacing: -0.02em;
    color: var(--foreground); font-feature-settings: "tnum","zero"; line-height: 1;
    display: inline-flex; align-items: baseline; gap: 5px;
  }
  .kpi .kv small { font-size: 13px; font-weight: 700; color: var(--muted-foreground); }
  .kpi .kv.neg { color: var(--destructive); }
  .kpi .kv.pos { color: var(--primary); }
  .kpi .kv.flat { color: var(--muted-foreground); }
  .kpi .kl {
    font-family: var(--font-mono); font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.10em; color: var(--muted-foreground);
  }
  .kpi .ksub { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--foreground); }

  /* ===== INSIGHT LINE ===== */
  .insight {
    display: grid; grid-template-columns: 26px 1fr; align-items: center; gap: 16px;
    padding: 16px; border-radius: var(--radius-md); margin: 8px 0 24px;
    background: color-mix(in srgb, var(--destructive) 6%, var(--card)); border: 1px solid color-mix(in srgb, var(--destructive) 28%, var(--card));
    border-left: 3px solid var(--destructive);
  }
  .insight.flat { background: var(--cream-50); border-color: var(--border); border-left-color: var(--muted-foreground); }
  .insight .ii {
    width: 26px; height: 26px; border-radius: 9999px; background: color-mix(in srgb, var(--destructive) 10%, var(--card));
    color: var(--destructive); display: inline-flex; align-items: center; justify-content: center;
  }
  .insight.flat .ii { background: var(--secondary); color: var(--muted-foreground); }
  .insight .ii i { width: 14px; height: 14px; }
  .insight .it { font-size: 13px; line-height: 1.45; color: var(--foreground); letter-spacing: -0.005em; }
  .insight .it b { font-weight: 700; }
  .insight .it .d { font-family: var(--font-mono); font-weight: 800; font-feature-settings: "tnum","zero"; }
  .insight .it .d.neg { color: var(--destructive); }

  /* ===== BREAKDOWN ===== */
  .panel { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: var(--card); }
  .bd-head, .bd-row {
    display: grid;
    grid-template-columns: 184px 1fr 92px 184px 84px 56px;
    align-items: center; column-gap: 16px;
  }
  .bd-head {
    padding: 12px 24px; background: var(--cream-50); border-bottom: 1px solid var(--border);
    font-family: var(--font-mono); font-size: 9px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.10em; color: var(--muted-foreground);
  }
  .bd-head .r { text-align: right; }
  .bd-row { padding: 16px 24px; border-bottom: 1px solid var(--border); }
  .bd-row:last-child { border-bottom: 0; }
  .bd-row.neg { border-left: 3px solid var(--destructive); background: color-mix(in srgb, var(--destructive) 4%, var(--card)); }

  .bd-name { display: flex; align-items: center; gap: 10px; }
  .bd-name .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .bd-name .nm {
    font-family: var(--font-mono); font-weight: 800; font-size: 13px; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--foreground);
  }
  .bd-name .full {
    display: block; font-family: var(--font-sans); font-size: 10.5px; font-weight: 500;
    color: var(--muted-foreground); letter-spacing: -0.005em; text-transform: none; margin-top: 1px;
  }

  .bar {
    height: 8px; background: var(--secondary); border-radius: 9999px;
    position: relative; overflow: hidden;
  }
  .bar .f { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 9999px; transition: width .22s ease; }
  .bar .tgt { position: absolute; top: -2px; bottom: -2px; width: 2px; background: var(--foreground); }
  .bar.neg { background: color-mix(in srgb, var(--destructive) 12%, var(--card)); }
  .bar.neg .tgt { background: var(--destructive); }

  .bd-h {
    text-align: right; font-family: var(--font-mono); font-size: 12px; font-weight: 800;
    color: var(--foreground); font-feature-settings: "tnum","zero"; white-space: nowrap;
  }
  .bd-h .of { color: var(--muted-foreground); font-weight: 600; }

  .bd-stack { display: flex; flex-direction: column; gap: 4px; }
  .stackbar { height: 8px; border-radius: 9999px; overflow: hidden; display: flex; background: var(--secondary); }
  .stackbar .sp { height: 100%; }
  .bd-stack .none { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }

  .bd-sg {
    text-align: left; font-family: var(--font-mono); font-size: 14px; font-weight: 800;
    letter-spacing: -0.01em; font-feature-settings: "tnum","zero";
    display: inline-flex; align-items: baseline; gap: 5px;
  }
  .bd-sg .sgv { min-width: 48px; }
  .bd-sg .arr { font-size: 11px; line-height: 1; }
  .bd-sg.pos { color: var(--primary); }
  .bd-sg.neg { color: var(--destructive); }
  .bd-sg.flat { color: var(--muted-foreground); }
  .bd-share {
    text-align: right; font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    color: var(--muted-foreground); font-feature-settings: "tnum","zero";
  }

  /* ===== STACK LEGEND ===== */
  .stack-legend {
    display: flex; flex-wrap: wrap; gap: 6px 16px; align-items: center;
    padding: 12px 24px; border-top: 1px solid var(--border); background: var(--cream-50);
  }
  .stack-legend .sl-l {
    font-family: var(--font-mono); font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.10em; color: var(--muted-foreground); margin-right: 4px;
  }
  .stack-legend .item {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--foreground);
    letter-spacing: 0.03em; white-space: nowrap;
  }
  .stack-legend .item .sw { width: 12px; height: 8px; border-radius: 3px; }

  .empty {
    padding: 48px 20px; text-align: center;
    font-family: var(--font-mono); font-size: 12px; color: var(--muted-foreground);
  }

  .foot {
    margin-top: 14px; font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.02em; color: var(--muted-foreground); line-height: 1.5;
  }
  .foot b { color: var(--foreground); font-weight: 700; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style></head>
<body><div class="card">

  <div class="sec">Treningsanalyse · Utforsk · Markus R.P.</div>

  <div class="title-row">
    <div>
      <div class="eb">DEKOMPONER TRENINGEN PÅ HVILKEN SOM HELST AKSE</div>
      <h1>Hvor <em>brukes</em> tiden — og hvor <em>tapes</em> slagene?</h1>
    </div>
    <div class="meta" id="meta"></div>
  </div>

  <!-- CONTROL BAR -->
  <div class="controls">
    <div class="ctrl">
      <span class="ctrl-l"><i data-lucide="layers"></i>Gruppér på</span>
      <div class="seg" id="seg-group">
        <button data-v="pyr" class="on">Pyramide</button>
        <button data-v="venue">Område</button>
        <button data-v="kat">SG-kategori</button>
        <button data-v="type">Økt-type</button>
      </div>
    </div>
    <div class="ctrl">
      <span class="ctrl-l"><i data-lucide="calendar"></i>Periode</span>
      <div class="seg" id="seg-period">
        <button data-v="7">7 dager</button>
        <button data-v="30" class="on">30 dager</button>
        <button data-v="season">Sesong</button>
      </div>
    </div>
    <div class="ctrl">
      <span class="ctrl-l"><i data-lucide="git-fork"></i>Fordelt på</span>
      <div class="seg" id="seg-sub">
        <button data-v="venue" class="on">Område</button>
        <button data-v="pyr">Pyramide</button>
        <button data-v="type">Økt-type</button>
        <button data-v="none">Av</button>
      </div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div class="fhead">
      <span class="ft"><i data-lucide="filter"></i>Filtrér bort</span>
      <span class="fcount" id="fcount"></span>
      <button class="reset hidden" id="reset"><i data-lucide="rotate-ccw"></i>Nullstill</button>
    </div>
    <div class="fgrid" id="fgrid"></div>
  </div>

  <!-- KPI -->
  <div class="kpis" id="kpis"></div>

  <!-- INSIGHT -->
  <div id="insight"></div>

  <!-- BREAKDOWN -->
  <div class="panel">
    <div class="bd-head">
      <div id="bd-col0">PYRAMIDE-AKSE</div>
      <div>TRENINGSTIMER<span id="bd-tgtnote"> · MÅL = TICK</span></div>
      <div class="r">TIMER</div>
      <div id="bd-col3">FORDELT PÅ OMRÅDE</div>
      <div>SG</div>
      <div class="r">ANDEL</div>
    </div>
    <div id="breakdown"></div>
    <div class="stack-legend" id="stack-legend"></div>
  </div>

  <div class="foot" id="foot"></div>

</div>

<script>
/* ============================================================
   DATA — én økt-logg er sannhetskilden. Alle aggregat regnes
   live herfra, så ingen to tall kan være uenige.
   d = dager siden · t = timer · sg = strokes gained-bidrag
   ============================================================ */
const S = [
  /* ---- siste 30 d (sum: 18,0 t · SG −1,1) ---- */
  { d:4,  axis:'tek',  venue:'flat',         kat:'ott',  type:'coachet',  t:1.5, sg:+0.20 },
  { d:9,  axis:'tek',  venue:'gress',        kat:'ott',  type:'egen',     t:1.0, sg:+0.10 },
  { d:14, axis:'slag', venue:'bane-tren',    kat:'ott',  type:'egen',     t:0.5, sg:+0.10 },
  { d:7,  axis:'tek',  venue:'flat',         kat:'app',  type:'egen',     t:1.2, sg:-0.90 },
  { d:3,  axis:'slag', venue:'gress',        kat:'app',  type:'test',     t:1.0, sg:-1.00 },
  { d:11, axis:'spill',venue:'gress',        kat:'arg',  type:'egen',     t:0.8, sg:+0.00 },
  { d:18, axis:'slag', venue:'bane-tren',    kat:'arg',  type:'coachet',  t:0.5, sg:+0.02 },
  { d:5,  axis:'tek',  venue:'flat',         kat:'putt', type:'egen',     t:2.3, sg:+0.20 },
  { d:13, axis:'spill',venue:'bane-tren',    kat:'putt', type:'coachet',  t:1.2, sg:+0.18 },
  { d:2,  axis:'fys',  venue:'gym',          kat:null,   type:'egen',     t:1.5, sg:0 },
  { d:6,  axis:'fys',  venue:'gym',          kat:null,   type:'egen',     t:1.5, sg:0 },
  { d:12, axis:'fys',  venue:'gym',          kat:null,   type:'coachet',  t:1.0, sg:0 },
  { d:17, axis:'fys',  venue:'gym',          kat:null,   type:'egen',     t:1.5, sg:0 },
  { d:24, axis:'fys',  venue:'gym',          kat:null,   type:'egen',     t:1.0, sg:0 },
  { d:8,  axis:'turn', venue:'bane-scoring', kat:null,   type:'turnering',t:1.5, sg:0 },
  /* ---- eldre i sesongen (d 31–88) ---- */
  { d:34, axis:'slag', venue:'gress',        kat:'app',  type:'coachet',  t:2.0, sg:+0.40 },
  { d:38, axis:'slag', venue:'bane-tren',    kat:'app',  type:'egen',     t:1.5, sg:+0.30 },
  { d:42, axis:'tek',  venue:'flat',         kat:'ott',  type:'egen',     t:1.5, sg:+0.10 },
  { d:46, axis:'spill',venue:'bane-scoring', kat:'arg',  type:'egen',     t:1.0, sg:+0.20 },
  { d:50, axis:'fys',  venue:'gym',          kat:null,   type:'coachet',  t:2.0, sg:0 },
  { d:55, axis:'tek',  venue:'flat',         kat:'putt', type:'test',     t:1.5, sg:+0.15 },
  { d:60, axis:'slag', venue:'gress',        kat:'ott',  type:'egen',     t:1.5, sg:+0.20 },
  { d:64, axis:'spill',venue:'bane-tren',    kat:'arg',  type:'coachet',  t:1.0, sg:+0.10 },
  { d:70, axis:'turn', venue:'bane-scoring', kat:null,   type:'turnering',t:4.0, sg:0 },
  { d:76, axis:'fys',  venue:'gym',          kat:null,   type:'egen',     t:3.0, sg:0 },
  { d:82, axis:'slag', venue:'bane-tren',    kat:'app',  type:'egen',     t:2.0, sg:+0.30 },
  { d:88, axis:'tek',  venue:'flat',         kat:'putt', type:'egen',     t:1.5, sg:+0.10 },
];

/* dimension definitions */
const DIMS = {
  pyr: { label:'Pyramide-akse', members:[
    { k:'fys',  l:'FYS',  full:'Fysisk',    c:'var(--pyr-fys)',  tgt:4 },
    { k:'tek',  l:'TEK',  full:'Teknikk',   c:'var(--pyr-tek)',  tgt:3 },
    { k:'slag', l:'SLAG', full:'Slag',      c:'var(--pyr-slag)', tgt:6 },
    { k:'spill',l:'SPILL',full:'Spill',     c:'var(--pyr-spill)',tgt:3 },
    { k:'turn', l:'TURN', full:'Turnering', c:'var(--pyr-turn)', tgt:4 },
  ]},
  venue: { label:'Treningsområde', members:[
    { k:'flat',         l:'FLAT MATTE',  full:'Range · matte' },
    { k:'gress',        l:'RANGE GRESS', full:'Range · gress' },
    { k:'bane-tren',    l:'BANE TRENING',full:'Bane · trening' },
    { k:'bane-scoring', l:'BANE SCORING',full:'Bane · scoring' },
    { k:'gym',          l:'GYM',         full:'Styrke' },
  ]},
  kat: { label:'SG-kategori', members:[
    { k:'ott',  l:'OTT', full:'Utslag' },
    { k:'app',  l:'APP', full:'Innspill' },
    { k:'arg',  l:'ARG', full:'Nærspill' },
    { k:'putt', l:'PUTT',full:'Putting' },
    { k:'ovrig',l:'ØVRIG',full:'Fys / turnering' },
  ]},
  type: { label:'Økt-type', members:[
    { k:'egen',     l:'EGEN',     full:'Egentrening' },
    { k:'coachet',  l:'COACHET',  full:'Med coach' },
    { k:'test',     l:'TEST',     full:'Test / måling' },
    { k:'turnering',l:'TURNERING',full:'Konkurranse' },
  ]},
};
const FILTER_DIMS = ['pyr','venue','kat','type'];
const SUB_RAMP = ['color-mix(in srgb, var(--primary) 82%, var(--card))','color-mix(in srgb, var(--primary) 60%, var(--card))','color-mix(in srgb, var(--primary) 42%, var(--card))','color-mix(in srgb, var(--primary) 27%, var(--card))','color-mix(in srgb, var(--primary) 15%, var(--card))'];

function memberOf(dim,k){ return DIMS[dim].members.find(m=>m.k===k); }
function keyOf(s,dim){ return dim==='kat' ? (s.kat||'ovrig') : s[dim==='pyr'?'axis':dim]; }
function segColor(dim,k,i){ return dim==='pyr' ? memberOf('pyr',k).c : SUB_RAMP[i] || 'color-mix(in srgb, var(--primary) 12%, var(--card))'; }

/* state */
const state = {
  group:'pyr', period:'30', sub:'venue',
  off:{ pyr:new Set(), venue:new Set(), kat:new Set(), type:new Set() }
};
const PERIOD_DAYS = { '7':7, '30':30, 'season':92 };
function periodFactor(){ return state.period==='7' ? 7/30 : state.period==='season' ? 3 : 1; }

/* formatters (Norwegian) */
function nbHours(t){ return t.toFixed(1).replace('.',','); }
function nbSg(v){
  const a=Math.abs(v); const dec = a>0 && a<0.1 ? 2 : 1;
  const s=a.toFixed(dec).replace('.',',');
  if(v>0.005) return '+'+s; if(v<-0.005) return '−'+s; return '±0,0';
}
function sgClass(v){ return v>0.005?'pos':v<-0.005?'neg':'flat'; }
function sgArrow(v){ return v>0.005?'▲':v<-0.005?'▼':'→'; }

/* core filter */
function filtered(){
  const maxD = PERIOD_DAYS[state.period];
  return S.filter(s =>
    s.d <= maxD &&
    !state.off.pyr.has(s.axis) &&
    !state.off.venue.has(s.venue) &&
    !state.off.kat.has(s.kat||'ovrig') &&
    !state.off.type.has(s.type)
  );
}

/* ============================================================ RENDER */
function render(){
  const fs = filtered();
  const totT = fs.reduce((a,s)=>a+s.t,0);
  const totSg = fs.reduce((a,s)=>a+s.sg,0);
  const n = fs.length;
  const gdim = state.group;
  const sub = (state.sub===gdim) ? 'none' : state.sub;

  /* --- group aggregation --- */
  const rows = DIMS[gdim].members.map(m=>{
    const ss = fs.filter(s=>keyOf(s,gdim)===m.k);
    const h = ss.reduce((a,s)=>a+s.t,0);
    const sg = ss.reduce((a,s)=>a+s.sg,0);
    const tgt = (gdim==='pyr') ? m.tgt*periodFactor() : null;
    /* sub distribution */
    let dist=null;
    if(sub!=='none' && h>0){
      dist = DIMS[sub].members.map((sm,i)=>{
        const sh = ss.filter(s=>keyOf(s,sub)===sm.k).reduce((a,s)=>a+s.t,0);
        return { k:sm.k, l:sm.l, h:sh, c:segColor(sub,sm.k,i) };
      }).filter(x=>x.h>0);
    }
    return { m, h, sg, n:ss.length, tgt, dist };
  }).filter(r=>r.h>0 || r.n>0);

  const scaleMax = Math.max(0.1, ...rows.map(r=>Math.max(r.h, r.tgt||0)));

  /* --- META --- */
  const sgCls = sgClass(totSg);
  document.getElementById('meta').innerHTML =
    `<div class="m"><span class="v">${nbHours(totT)}</span><span class="l">Timer</span></div>`+
    `<div class="m"><span class="v ${sgCls}">${nbSg(totSg)} <span class="arr" style="font-size:11px">${sgArrow(totSg)}</span></span><span class="l">SG netto</span></div>`+
    `<div class="m"><span class="v">${n}</span><span class="l">Økter</span></div>`;

  /* --- KPIs --- */
  const worst = rows.filter(r=>r.sg<-0.005).sort((a,b)=>a.sg-b.sg)[0];
  const best  = rows.filter(r=>r.sg>0.005).sort((a,b)=>b.sg-a.sg)[0];
  const periodLbl = state.period==='7'?'7 dager':state.period==='season'?'sesongen':'30 dager';
  document.getElementById('kpis').innerHTML = [
    `<div class="kpi"><span class="kv">${nbHours(totT)}<small>t</small></span><span class="kl">Total trening · ${periodLbl}</span></div>`,
    `<div class="kpi"><span class="kv ${sgCls}">${nbSg(totSg)} <span style="font-size:14px">${sgArrow(totSg)}</span></span><span class="kl">SG netto vs Tour</span></div>`,
    worst
      ? `<div class="kpi"><span class="kv neg">${nbSg(worst.sg)} <span style="font-size:14px">▼</span></span><span class="kl">Største tap · ${worst.m.l}</span></div>`
      : `<div class="kpi"><span class="kv pos">${best?nbSg(best.sg):'±0,0'} <span style="font-size:14px">▲</span></span><span class="kl">Ingen tap · best ${best?best.m.l:'—'}</span></div>`,
    `<div class="kpi"><span class="kv">${rows.length}<small>/ ${DIMS[gdim].members.length}</small></span><span class="kl">${DIMS[gdim].label} i bruk</span></div>`,
  ].join('');

  /* --- INSIGHT --- */
  const ins = document.getElementById('insight');
  if(worst){
    const share = totT>0 ? Math.round(worst.h/totT*100) : 0;
    const tgtTxt = (gdim==='pyr') ? ` — ${nbHours(worst.h)} av ${nbHours(worst.tgt)} t mål` : ` — ${share}% av tiden`;
    ins.className='insight';
    ins.innerHTML = `<span class="ii"><i data-lucide="alert-triangle"></i></span>`+
      `<span class="it"><b>${worst.m.l}</b> (${worst.m.full}) eier tapet: <span class="d neg">${nbSg(worst.sg)} SG</span>${tgtTxt}. `+
      `Grupperingen er på <b>${DIMS[gdim].label.toLowerCase()}</b> — bytt akse over for å se samme tap fra en annen vinkel.</span>`;
  } else {
    ins.className='insight flat';
    ins.innerHTML = `<span class="ii"><i data-lucide="check"></i></span>`+
      `<span class="it">Ingen negativ SG i utvalget. Netto <span class="d">${nbSg(totSg)}</span> over ${n} økter.</span>`;
  }

  /* --- HEAD labels --- */
  document.getElementById('bd-col0').textContent = DIMS[gdim].label.toUpperCase();
  document.getElementById('bd-col3').textContent = sub==='none' ? 'FORDELING' : ('FORDELT PÅ ' + DIMS[sub].label.toUpperCase());
  document.getElementById('bd-tgtnote').style.display = gdim==='pyr' ? '' : 'none';

  /* --- ROWS --- */
  const bd = document.getElementById('breakdown');
  if(!rows.length){ bd.innerHTML = `<div class="empty">Ingen økter matcher filteret. Slå på flere chips eller nullstill.</div>`; }
  else {
    bd.innerHTML = rows.map(r=>{
      const neg = r.sg<-0.005;
      const fill = Math.round(r.h/scaleMax*100);
      const fillCol = gdim==='pyr' ? r.m.c : 'color-mix(in srgb, var(--primary) 55%, var(--card))';
      const tick = r.tgt!=null ? `<div class="tgt" style="left:${Math.min(100,Math.round(r.tgt/scaleMax*100))}%"></div>` : '';
      const hoursTxt = r.tgt!=null
        ? `${nbHours(r.h)}<span class="of"> / ${nbHours(r.tgt)} t</span>`
        : `${nbHours(r.h)}<span class="of"> t</span>`;
      let stack;
      if(r.dist && r.dist.length){
        const segs = r.dist.map(d=>`<div class="sp" style="width:${(d.h/r.h*100).toFixed(1)}%;background:${d.c}" title="${d.l} ${nbHours(d.h)} t"></div>`).join('');
        stack = `<div class="stackbar">${segs}</div>`;
      } else { stack = `<span class="none">—</span>`; }
      const share = totT>0 ? Math.round(r.h/totT*100) : 0;
      return `<div class="bd-row ${neg?'neg':''}">`+
        `<div class="bd-name"><span class="dot" style="background:${r.m.c||'var(--muted-foreground)'}"></span>`+
          `<span><span class="nm">${r.m.l}</span><span class="full">${r.m.full}</span></span></div>`+
        `<div><div class="bar ${neg?'neg':''}"><div class="f" style="width:${fill}%;background:${fillCol}"></div>${tick}</div></div>`+
        `<div class="bd-h">${hoursTxt}</div>`+
        `<div class="bd-stack">${stack}</div>`+
        `<div class="bd-sg ${sgClass(r.sg)}"><span class="sgv">${nbSg(r.sg)}</span><span class="arr">${sgArrow(r.sg)}</span></div>`+
        `<div class="bd-share">${share}%</div>`+
      `</div>`;
    }).join('');
  }

  /* --- STACK LEGEND --- */
  const sl = document.getElementById('stack-legend');
  if(sub==='none'){ sl.style.display='none'; }
  else {
    sl.style.display='';
    sl.innerHTML = `<span class="sl-l">Fordelt på ${DIMS[sub].label.toLowerCase()}</span>` +
      DIMS[sub].members.map((sm,i)=>`<span class="item"><span class="sw" style="background:${segColor(sub,sm.k,i)}"></span>${sm.l}</span>`).join('');
  }

  /* --- FOOT --- */
  document.getElementById('foot').innerHTML =
    `Hver rad regnes live fra <b>${fs.length}</b> økt-logger i utvalget. `+
    `SG-bidragene summerer til <b>${nbSg(totSg)}</b> uansett hvilken akse du grupperer på — samme tall, ny vinkel.`;

  /* filters chip-state */
  updateFilterUI();
  lucide.createIcons();
}

/* ============================================================ FILTER UI */
function buildFilters(){
  const grid = document.getElementById('fgrid');
  grid.innerHTML = FILTER_DIMS.map(dim=>{
    const chips = DIMS[dim].members.map((m,i)=>{
      const c = dim==='pyr' ? m.c : segColor('venue',m.k,i); // dot hue
      const dotCol = dim==='pyr' ? m.c : 'var(--muted-foreground)';
      return `<button class="chip" data-dim="${dim}" data-k="${m.k}"><span class="cdot" style="background:${dotCol}"></span>${m.l}</button>`;
    }).join('');
    return `<div class="fgroup"><span class="fg-l">${DIMS[dim].label}</span><div class="fg-chips">${chips}</div></div>`;
  }).join('');
  grid.querySelectorAll('.chip').forEach(ch=>{
    ch.addEventListener('click',()=>{
      const dim=ch.dataset.dim, k=ch.dataset.k;
      if(state.off[dim].has(k)) state.off[dim].delete(k); else state.off[dim].add(k);
      render();
    });
  });
}
function updateFilterUI(){
  let total=0;
  document.querySelectorAll('.chip').forEach(ch=>{
    const off = state.off[ch.dataset.dim].has(ch.dataset.k);
    ch.classList.toggle('off', off);
    if(off) total++;
  });
  document.getElementById('fcount').textContent = total ? `${total} skjult` : 'alt vises';
  document.getElementById('reset').classList.toggle('hidden', total===0 && state.group==='pyr' && state.period==='30' && state.sub==='venue');
}

/* ============================================================ CONTROLS */
function bindSeg(id, key, after){
  document.getElementById(id).addEventListener('click', e=>{
    const b=e.target.closest('button'); if(!b||b.disabled) return;
    state[key]=b.dataset.v;
    document.querySelectorAll('#'+id+' button').forEach(x=>x.classList.toggle('on', x===b));
    if(after) after();
    render();
  });
}
function syncSubAvailability(){
  // can't split by the same dimension you group by
  document.querySelectorAll('#seg-sub button').forEach(b=>{
    const collide = b.dataset.v===state.group;
    b.disabled = collide;
    if(collide && b.classList.contains('on')){
      b.classList.remove('on');
      const fallback = document.querySelector('#seg-sub button[data-v="venue"]:not([disabled])') ||
                       document.querySelector('#seg-sub button[data-v="pyr"]:not([disabled])');
      if(fallback){ fallback.classList.add('on'); state.sub=fallback.dataset.v; }
      else { document.querySelector('#seg-sub button[data-v="none"]').classList.add('on'); state.sub='none'; }
    }
  });
}

bindSeg('seg-group','group', syncSubAvailability);
bindSeg('seg-period','period');
bindSeg('seg-sub','sub');
document.getElementById('reset').addEventListener('click',()=>{
  FILTER_DIMS.forEach(d=>state.off[d].clear());
  state.group='pyr'; state.period='30'; state.sub='venue';
  document.querySelectorAll('#seg-group button').forEach(b=>b.classList.toggle('on',b.dataset.v==='pyr'));
  document.querySelectorAll('#seg-period button').forEach(b=>b.classList.toggle('on',b.dataset.v==='30'));
  document.querySelectorAll('#seg-sub button').forEach(b=>b.classList.toggle('on',b.dataset.v==='venue'));
  syncSubAvailability();
  render();
});

buildFilters();
syncSubAvailability();
render();
</script>
</body></html>
