<script type="text/babel" data-presets="react">

/* Canvas router — picks the right view based on zoom level */
function WBP_CanvasRouter() {
  const { zoom } = useContext(PlanContext);
  if (zoom === 'ar')      return <WBP_CanvasYear/>;
  if (zoom === 'uke')     return <WBP_CanvasWeek/>;
  if (zoom === 'dag')     return <WBP_CanvasDay/>;
  /* 'periode' (default) and 'maned' both use the lane canvas */
  return <WBP_Canvas/>;
}

function PlanWorkbench() {
  const [modal, setModal] = useState(null);
  const [zoom, setZoom] = useState('periode');
  const [activeSession, setActiveSession] = useState(null);
  const [toast, setToast] = useState(null);
  const [facilities, setFacilities] = useState(WBP_INITIAL_FAC);
  const [wizardOpen, setWizardOpen] = useState(true);

  // Esc closes everything
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') {
        setActiveSession(null);
        setModal(null);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return (
    <PlanContext.Provider value={{
      modal, setModal,
      zoom, setZoom,
      activeSession, setActiveSession,
      toast, setToast,
      facilities, setFacilities,
      wizardOpen, setWizardOpen,
    }}>
      <div className="wbp">
        <div className="app" style={{
          gridTemplateRows: wizardOpen
            ? 'var(--topbar-h) 36px var(--zoombar-h) var(--aibar-h) 1fr'
            : 'var(--topbar-h) var(--zoombar-h) var(--aibar-h) 1fr'
        }}>
          <WBP_Topbar />
          {wizardOpen && <WBP_WizardBanner />}
          <WBP_Zoombar />
          <WBP_AIBar />
          <div className="body">
            <WBP_Sidebar />
            <WBP_CanvasRouter />
            <WBP_Inspector />
          </div>
        </div>

        {/* Modals */}
        {modal === 'period'     && <WBP_ModalPeriod      onClose={() => setModal(null)} />}
        {modal === 'camp'       && <WBP_ModalCamp        onClose={() => setModal(null)} />}
        {modal === 'freq'       && <WBP_ModalFreq        onClose={() => setModal(null)} />}
        {modal === 'facilities' && <WBP_ModalFacilities  onClose={() => setModal(null)} />}
        {modal === 'testpicker' && (
          <WBP_ModalTestPicker
            onClose={() => setModal(null)}
            onAdded={(testId) => setToast({ test: WBP_TESTS.find(t => t.id === testId) })}
          />
        )}

        {/* Session detail drawer */}
        <WBP_SessionDetail session={activeSession} onClose={() => setActiveSession(null)} />

        {/* Toast for test added */}
        {toast && (
          <WBP_Toast
            test={toast.test}
            onUndo={() => setToast(null)}
            onClose={() => setToast(null)}
          />
        )}
      </div>
    </PlanContext.Provider>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="meta"
        title="Workbench · plan-kommandosenter — Variant A · INTERAKTIV"
        subtitle="Klikkbar demo. 5 zoom-nivåer (År/Periode/Måned/Uke/Dag) byttbare via tabs eller ⌘+/−. Klikk på en økt åpner kontekstuell detalj-drawer med slag-data (kun for full-sving). Snarveier-seksjon for tester i inspector — ett klikk legger til linket test."
      >
        <DCPostIt rotate={-2}>
          NYTT:
          {'\n'}
          {'\n'}• 5 zoom-nivåer fungerer
          {'\n'}• Klikk økt = detalj-drawer
          {'\n'}• Slag-data BARE for sving
          {'\n'}• Test-snarveier i inspector
          {'\n'}• Test-velger m/ slot-picker
          {'\n'}• 5 periode-typer (oppdatert)
          {'\n'}• WANG Toppidrett (ikke Vang)
        </DCPostIt>
      </DCSection>

      <DCSection
        id="desktop"
        title="Desktop · 1680×1000 — klikkbar demo"
        subtitle="Bytt mellom År/Periode/Måned/Uke/Dag via tabs. Klikk en SLAG-økt for å se kølle-hastighet + spinn-data. Klikk en putt-økt — slag-data skjules siden det er irrelevant. Test-chips i inspector legger til ett klikk."
      >
        <DCArtboard id="wbp-a-desktop" label="Desktop · 1680w" width={1680} height={1100}>
          <PlanWorkbench />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="zoom-views"
        title="Zoom-nivåer (År / Uke / Dag) — fokus-bilder"
        subtitle="Hver visning er klikkbar individuelt. Klikk artboard-tittelen for fullscreen-fokus."
      >
        <DCArtboard id="wbp-zoom-year" label="År · 12 måneder · 5 akser" width={1680} height={760}>
          <PlanContext.Provider value={{ modal: null, setModal: () => {}, zoom: 'ar', setZoom: () => {}, activeSession: null, setActiveSession: () => {}, toast: null, setToast: () => {}, facilities: WBP_INITIAL_FAC, setFacilities: () => {}, wizardOpen: false, setWizardOpen: () => {} }}>
            <div className="wbp"><div className="app" style={{ gridTemplateRows: '0 0 0 1fr' }}><div></div><div></div><div></div><div className="body"><div></div><WBP_CanvasYear/><div></div></div></div></div>
          </PlanContext.Provider>
        </DCArtboard>
        <DCArtboard id="wbp-zoom-week" label="Uke · 7 dager × timer" width={1380} height={920}>
          <PlanContext.Provider value={{ modal: null, setModal: () => {}, zoom: 'uke', setZoom: () => {}, activeSession: null, setActiveSession: () => {}, toast: null, setToast: () => {}, facilities: WBP_INITIAL_FAC, setFacilities: () => {}, wizardOpen: false, setWizardOpen: () => {} }}>
            <div className="wbp"><div className="app" style={{ gridTemplateRows: '0 0 0 1fr' }}><div></div><div></div><div></div><div className="body"><div></div><WBP_CanvasWeek/><div></div></div></div></div>
          </PlanContext.Provider>
        </DCArtboard>
        <DCArtboard id="wbp-zoom-day" label="Dag · enkelt-fokus tirsdag" width={1100} height={920}>
          <PlanContext.Provider value={{ modal: null, setModal: () => {}, zoom: 'dag', setZoom: () => {}, activeSession: null, setActiveSession: () => {}, toast: null, setToast: () => {}, facilities: WBP_INITIAL_FAC, setFacilities: () => {}, wizardOpen: false, setWizardOpen: () => {} }}>
            <div className="wbp"><div className="app" style={{ gridTemplateRows: '0 0 0 1fr' }}><div></div><div></div><div></div><div className="body"><div></div><WBP_CanvasDay/><div></div></div></div></div>
          </PlanContext.Provider>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="session-detail"
        title="Kontekstuell øktdetalj — slag-data vises BARE for full-sving"
        subtitle="SLAG-økt på full sving (wedge 40–80m) viser kølle-hastighet, ball-hastighet, spinn, launch-vinkel, miljø. PUTT/CHIP/FYS får aldri disse feltene — de er irrelevante."
      >
        <DCArtboard id="wbp-sd-slag" label="SLAG · Wedge-spinn (slag-data SYNLIG)" width={560} height={1000}>
          <PlanContext.Provider value={{ modal: null, setModal: () => {}, zoom: 'periode', setZoom: () => {}, activeSession: { id: 's21c', axis: 'slag', title: 'Wedge-spinn 40–80m', meta: '90m · TM bay 3', week: 21, day: 1 }, setActiveSession: () => {}, toast: null, setToast: () => {}, facilities: WBP_INITIAL_FAC, setFacilities: () => {}, wizardOpen: false, setWizardOpen: () => {} }}>
            <div className="wbp" style={{ position: 'relative', height: '100%' }}>
              <WBP_SessionDetail
                session={{ id: 's21c', axis: 'slag', title: 'Wedge-spinn 40–80m', meta: '90m · TM bay 3', week: 21, day: 1 }}
                onClose={() => {}}
              />
            </div>
          </PlanContext.Provider>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="modals"
        title="Modaler — også åpnbare direkte"
        subtitle="Steg-for-steg i wizard-flyten."
      >
        <DCArtboard id="wbp-modal-fac" label="Modal: Fasiliteter (Steg 1)" width={820} height={780}>
          <div className="wbp" style={{ position: 'relative', height: '100%' }}>
            <PlanContext.Provider value={{ modal: 'facilities', setModal: () => {}, facilities: WBP_INITIAL_FAC, setFacilities: () => {} }}>
              <WBP_ModalFacilities onClose={() => {}} />
            </PlanContext.Provider>
          </div>
        </DCArtboard>
        <DCArtboard id="wbp-modal-period" label="Modal: Ny periode (Steg 2)" width={640} height={820}>
          <div className="wbp" style={{ position: 'relative', height: '100%' }}>
            <PlanContext.Provider value={{ modal: 'period', setModal: () => {}, facilities: WBP_INITIAL_FAC, setFacilities: () => {} }}>
              <WBP_ModalPeriod onClose={() => {}} />
            </PlanContext.Provider>
          </div>
        </DCArtboard>
        <DCArtboard id="wbp-modal-camp" label="Modal: Treningssamling — WANG Toppidrett" width={640} height={820}>
          <div className="wbp" style={{ position: 'relative', height: '100%' }}>
            <PlanContext.Provider value={{ modal: 'camp', setModal: () => {}, facilities: WBP_INITIAL_FAC, setFacilities: () => {} }}>
              <WBP_ModalCamp onClose={() => {}} />
            </PlanContext.Provider>
          </div>
        </DCArtboard>
        <DCArtboard id="wbp-modal-freq" label="Modal: Ukentlig frekvens (Steg 5)" width={820} height={680}>
          <div className="wbp" style={{ position: 'relative', height: '100%' }}>
            <PlanContext.Provider value={{ modal: 'freq', setModal: () => {}, facilities: WBP_INITIAL_FAC, setFacilities: () => {} }}>
              <WBP_ModalFreq onClose={() => {}} />
            </PlanContext.Provider>
          </div>
        </DCArtboard>
        <DCArtboard id="wbp-modal-tests" label="Modal: Test-velger med slot-picker" width={820} height={920}>
          <div className="wbp" style={{ position: 'relative', height: '100%' }}>
            <PlanContext.Provider value={{ modal: 'testpicker', setModal: () => {}, facilities: WBP_INITIAL_FAC, setFacilities: () => {} }}>
              <WBP_ModalTestPicker onClose={() => {}} initialTestId="cmj" onAdded={() => {}} />
            </PlanContext.Provider>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
