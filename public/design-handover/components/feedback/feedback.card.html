<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  .lbl { font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .queue { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-card); padding: 6px; }
  .div { height: 1px; background: var(--border); margin: 0 14px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
const { AiTipCard, TipMetric, ListRow, Tag, Button, MeldingsTraad } = window.AKGolfHQDesignSystem_a3d5af;

function Demo() {
  return (
    <div className="grid">
      <div>
        <div className="lbl">AI-Caddie</div>
        <AiTipCard updated="3 min" title="Putting trekker ned scoren"
          action={<Button variant="signal" size="sm" iconLeft="target">Lag drill</Button>}>
          Øyvind har tapt <TipMetric>−1,2 SG</TipMetric> på putt innenfor 6 ft de siste 4 rundene —
          størst utslag på høyrebrekk.
        </AiTipCard>
      </div>
      <div>
        <div className="lbl">Innboks / kø</div>
        <div className="queue">
          <ListRow icon="bell" iconTone="signal" title="Ny øktforespørsel"
            subtitle="Øyvind Rohjan · Putting" meta="2t" unread chevron onClick={()=>{}} />
          <div className="div" />
          <ListRow icon="circle-check" iconTone="up" title="Plan fullført"
            subtitle="Uke 24 · 6 av 6 økter" meta="i går" chevron onClick={()=>{}} />
          <div className="div" />
          <ListRow icon="alert-triangle" iconTone="down" title="Betaling feilet"
            subtitle="Markus P. · 299 kr" meta={<Tag variant="down" size="sm">Skylder</Tag>} chevron onClick={()=>{}} />
          <div className="div" />
          <ListRow icon="mail" title="Melding fra forelder"
            subtitle="Re: Ukerapport" meta="man" chevron onClick={()=>{}} />
        </div>
      </div>
      <div style={{ gridColumn: "1 / -1" }}>
        <div className="lbl">Meldingstråd</div>
        <MeldingsTraad label="Samtale med Jonas Haugen">
          <MeldingsTraad.Skille>I går</MeldingsTraad.Skille>
          <MeldingsTraad.Melding fra="dem" navn="Jonas Haugen" tid="18:20">
            Håndleddet kjennes mye bedre. Kan jeg starte lett putting?
          </MeldingsTraad.Melding>
          <MeldingsTraad.Melding fra="meg" tid="18:34">
            Ja — start med 15 min rullekontroll, ingen fulle slag ennå.
          </MeldingsTraad.Melding>
          <MeldingsTraad.Melding fra="ai" tid="18:35">
            Rehab-protokollen anbefaler putting under 20 min de første 3 dagene.
          </MeldingsTraad.Melding>
          <MeldingsTraad.Skriver navn="AI-Caddie" />
        </MeldingsTraad>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
