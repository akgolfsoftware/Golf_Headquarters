<!-- @dsCard group="Components" viewport="700x640" name="Core — Buttons, Tags, Cards" subtitle="Pill buttons, status tags, hairline cards & eyebrows" -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .wrap { display: flex; flex-direction: column; gap: 26px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 12px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
const { Button, Tag, CountBadge, Card, Eyebrow, Icon, ThemeToggle } = window.AKGolfHQDesignSystem_a3d5af;

function Section({ label, children, style }) {
  return (
    <div style={style}>
      <div className="lbl">{label}</div>
      {children}
    </div>
  );
}

function Demo() {
  return (
    <React.Fragment>
      <Section label="Knapper — varianter">
        <div className="row">
          <Button variant="primary">Primær</Button>
          <Button variant="signal" iconLeft="zap">Signal</Button>
          <Button variant="secondary">Sekundær</Button>
          <Button variant="ghost" iconLeft="chevron-left">Tilbake</Button>
          <Button variant="destructive">Slett</Button>
        </div>
      </Section>

      <Section label="Størrelser · ikon · deaktivert">
        <div className="row">
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="primary" size="md">Medium</Button>
          <Button variant="primary" size="lg">Large</Button>
          <Button variant="secondary" iconLeft="plus" aria-label="Ny" />
          <Button variant="signal" iconLeft="plus" aria-label="Ny" />
          <Button variant="primary" disabled>Deaktivert</Button>
        </div>
      </Section>

      <Section label="Tags · badges">
        <div className="row">
          <Tag variant="live">Live</Tag>
          <Tag variant="signal">Aktiv</Tag>
          <Tag variant="up" dot>+2,8 SG</Tag>
          <Tag variant="down" dot>−0,6 SG</Tag>
          <Tag variant="neutral">Kategori A</Tag>
          <Tag variant="outline">Drop-in</Tag>
          <CountBadge count={3} tone="signal" />
          <CountBadge count={12} />
        </div>
      </Section>

      <Section label="ThemeToggle — System · Lys · Mørk (nøytral, aldri lime)">
        <div className="row">
          <ThemeToggle apply={false} defaultValue="dark" />
          <ThemeToggle apply={false} size="sm" visEtiketter={false} defaultValue="system" />
        </div>
      </Section>

      <Section label="Hårline-kort">
        <div className="grid2">
          <Card
            eyebrow="I dag · 24. juni"
            title="Treningsplan"
            action={<Button variant="ghost" size="sm" iconRight="chevron-right">Alle</Button>}
          >
            <div style={{ color: "var(--text-2)", fontSize: "var(--text-14)", lineHeight: 1.55 }}>
              To økter planlagt. Neste: <span style={{ color: "var(--text)" }}>Putting-blokk 16:00</span>.
            </div>
          </Card>
          <Card compact interactive eyebrow="Stall" title="Øyvind Rohjan"
            action={<Tag variant="up" size="sm" dot>+2,8</Tag>}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, color: "var(--text-2)", fontSize: "var(--text-13)" }}>
              <Icon name="trophy" size={16} style={{ color: "var(--text-muted)" }} />
              HCP +2,4 · Kategori A
            </div>
          </Card>
        </div>
      </Section>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
