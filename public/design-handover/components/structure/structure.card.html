<!DOCTYPE html>
<html lang="nb">
<head>

<style>

<body>
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">

            {value:"TEK",label:"TEK",axis:"TEK",count:8},
            {value:"SLAG",label:"SLAG",axis:"SLAG",count:4},
            {value:"SPILL",label:"SPILL",axis:"SPILL",count:3},
            {value:"TURN",label:"TURN",axis:"TURN",count:4},
          ]}
          value={filter} onChange={setFilter}
        />
      </div>

      <div className="grid2">
        <div>
          <div className="lbl">Accordion</div>
          <Accordion exclusive items={[
            {title:"Hva er Strokes Gained?",content:"SG måler prestasjon relativt til en baseline, splittet i OTT, APP, ARG og PUTT."},
            {title:"Hvilke nivåer finnes?",content:"Kategori A–K definerer spillernivå. A er høyest."},

          <div style={{marginTop:14}}>
            <div className="lbl" style={{marginBottom:8}}>EmptyState</div>

        </div>

              <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",marginTop:5}}>4. aug – 25. okt · 32 økter</div>
            </Card>
            <Card compact>
              <div style={{fontSize:"var(--text-13)",fontWeight:600,color:"var(--text)"}}>Retur etter pause</div>
              <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",marginTop:5}}>6. jul – 31. jul · 10 økter</div>
            </Card>
          </KanbanKolonne>
          <KanbanKolonne tittel="Aktiv" tone="aktiv">
            <Card compact>
              <div style={{fontSize:"var(--text-13)",fontWeight:600,color:"var(--text)"}}>NM-oppkjøring</div>
              <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--text-muted)",marginTop:5}}>Uke 23–32 · 18/24 økter</div>
            </Card>
          </KanbanKolonne>
          <KanbanKolonne tittel="Fullført" tone="ferdig">
            <KanbanKolonne.Tom>Ingen planer</KanbanKolonne.Tom>
          </KanbanKolonne>
        </div>
      </div>

      <div>
        <div className="lbl">Pagination</div>
        <Pagination page={page} totalPages={12} onChange={setPage} />
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
