<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .wrap { display: flex; flex-direction: column; gap: 28px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
const { Modal, Sheet, Drawer, Tooltip, Popover, Toast, ToastProvider, toast, Banner, Button, Input, FormField } = window.AKGolfHQDesignSystem_a3d5af;

function Demo() {
  const [modal, setModal] = React.useState(false);
  const [sheet, setSheet] = React.useState(false);
  const [drawer, setDrawer] = React.useState(false);

  return (
    <ToastProvider>
      <React.Fragment>
        <div>
          <div className="lbl">Banner — varselstyper</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Banner tone="success" title="Betaling mottatt" description="299 kr for juni er registrert." onClose={() => {}} />
            <Banner tone="warning" title="Abonnement utløper om 3 dager" action="Forny" onAction={() => {}} onClose={() => {}} />
            <Banner tone="error" title="Betaling feilet" description="Kortdetaljer er ugyldig." onClose={() => {}} />
            <Banner tone="info" title="Ny funksjon tilgjengelig" description="AI-Caddie er nå i beta." action="Les mer" onAction={() => {}} />
          </div>
        </div>

        <div>
          <div className="lbl">Overlays — åpne via knapper</div>
          <div className="row">
            <Button variant="secondary" onClick={() => setModal(true)}>Åpne Modal</Button>
            <Button variant="secondary" onClick={() => setSheet(true)}>Åpne Sheet</Button>
            <Button variant="secondary" onClick={() => setDrawer(true)}>Åpne Drawer</Button>
            <Tooltip label="Strokes Gained Off the Tee — antall slag vunnet fra utslagsstedet" side="top">
              <Button variant="ghost" iconLeft="info">Tooltip hover</Button>
            </Tooltip>
            <Button variant="ghost" iconLeft="bell" onClick={() => toast({ title: "Økt lagret", description: "Putting-blokk er lagt til planen.", tone: "success" })}>
              Vis Toast
            </Button>
          </div>
        </div>

        <Modal open={modal} title="Ny økt" subtitle="Legg til økt i ukeplanen" onClose={() => setModal(false)}
          footer={<><Button variant="ghost" onClick={() => setModal(false)}>Avbryt</Button><Button variant="signal" onClick={() => setModal(false)}>Lagre økt</Button></>}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <FormField label="Tittel"><Input placeholder="Putting-blokk" /></FormField>
            <FormField label="Lokasjon"><Input placeholder="GFGK" /></FormField>
          </div>
        </Modal>

        <Sheet open={sheet} title="Øktdetaljer" onClose={() => setSheet(false)}>
          <div style={{ color: "var(--text-2)", fontSize: "var(--text-14)", lineHeight: 1.6 }}>
            Bunnark glir opp fra bunnen av skjermen. Brukes på mobil (PlayerHQ) for økt-detaljer, filtre og bekreftelser.
          </div>
        </Sheet>

        <Drawer open={drawer} title="Øyvind Rohjan" onClose={() => setDrawer(false)}>
          <div style={{ color: "var(--text-2)", fontSize: "var(--text-14)", lineHeight: 1.6 }}>
            Sideskuffen glir inn fra høyre. Brukes i AgencyOS for spiller-detaljer, plan-redigering og filter-treer.
          </div>
        </Drawer>
      </React.Fragment>
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
