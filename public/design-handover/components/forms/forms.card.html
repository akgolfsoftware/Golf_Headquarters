<!-- @dsCard group="Components" viewport="700x860" name="Forms — Input, Select, Combobox, DatePicker, Checkbox, Radio, Slider, Textarea, FormField" subtitle="Complete form control suite with lime focus states" -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .wrap { display: flex; flex-direction: column; gap: 28px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
const { Input, Select, Combobox, DatePicker, Checkbox, RadioGroup, Slider, Textarea, FormField, Toggle, SegmentedTabs, CodeInput } = window.AKGolfHQDesignSystem_a3d5af;

const LOKASJON_OPTS = [
  {value:"gfgk",label:"GFGK"},
  {value:"miklagard",label:"Miklagard"},
  {value:"mulligan",label:"Mulligan Studio"},
];
const SPILLERE = [
  {value:"oyvind",label:"Øyvind Rohjan"},
  {value:"peer",label:"Peer Gynt"},
  {value:"jonas",label:"Jonas Holm"},
  {value:"silje",label:"Silje Vangen"},
];

function Demo() {
  const [lok, setLok] = React.useState(null);
  const [spiller, setSpiller] = React.useState(null);
  const [cb1, setCb1] = React.useState(true);
  const [cb2, setCb2] = React.useState(false);
  const [tier, setTier] = React.useState("PRO");
  const [intensitet, setIntensitet] = React.useState(70);
  const [notat, setNotat] = React.useState("");
  const [dato, setDato] = React.useState(null);

  return (
    <React.Fragment>
      <div>
        <div className="lbl">Input · Select · Combobox</div>
        <div className="grid2">
          <FormField label="Tittel" required>
            <Input placeholder="Putting-blokk" />
          </FormField>
          <FormField label="Lokasjon">
            <Select options={LOKASJON_OPTS} value={lok} onChange={setLok} placeholder="Velg lokasjon" />
          </FormField>
          <FormField label="Spiller (søk)">
            <Combobox options={SPILLERE} value={spiller} onChange={setSpiller} placeholder="Søk etter spiller…" />
          </FormField>
          <FormField label="Turneringsstart">
            <DatePicker value={dato} onChange={setDato} />
          </FormField>
          <FormField label="E-post" error="Ugyldig e-postadresse">
            <Input type="email" value="ugyldig" error />
          </FormField>
        </div>
      </div>

      <div>
        <div className="lbl">Checkbox · Radio</div>
        <div className="row" style={{ gap: 28 }}>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            <Checkbox checked={cb1} onChange={setCb1} label="Jeg godtar vilkårene" />
            <Checkbox checked={cb2} onChange={setCb2} label="Motta e-postvarsler" description="Ukentlig oppsummering av treningsfremgang" />
            <Checkbox indeterminate label="Velg alle spillere" />
            <Checkbox checked disabled label="Deaktivert" />
          </div>
          <RadioGroup
            options={[
              {value:"GRATIS",label:"Gratis",description:"Begrenset tilgang"},
              {value:"PRO",label:"PRO — 299 kr/mnd",description:"Full tilgang"},
            ]}
            value={tier}
            onChange={setTier}
          />
        </div>
      </div>

      <div>
        <div className="lbl">Slider · Toggle · SegmentedTabs</div>
        <div style={{ display:"flex",flexDirection:"column",gap:16,maxWidth:400 }}>
          <Slider label="Intensitet" value={intensitet} min={0} max={100}
            onChange={setIntensitet} formatValue={(v) => `${v}%`} />
          <div style={{ display:"flex",gap:20,alignItems:"center" }}>
            <Toggle checked={cb1} onChange={setCb1} label="Varsler aktive" />
            <Toggle checked={cb2} onChange={setCb2} size="sm" label="Kompakt visning" />
          </div>
          <SegmentedTabs
            tabs={["Uke","Måned","Sesong"]}
            value="Uke"
            onChange={() => {}}
          />
        </div>
      </div>

      <div>
        <div className="lbl">Textarea · FormField med hint</div>
        <div className="grid2">
          <FormField label="Trenernotat" hint="Synlig kun for trener">
            <Textarea value={notat} onChange={setNotat} placeholder="Skriv notat…" rows={3} maxLength={300} />
          </FormField>
          <FormField label="Kode" hint="6-sifret engangskode">
            <CodeInput length={6} onChange={() => {}} />
          </FormField>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
