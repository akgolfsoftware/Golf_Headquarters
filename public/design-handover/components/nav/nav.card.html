<!-- @dsCard group="Components" viewport="700x480" name="Navigation — NavRail & BottomNav" subtitle="AgencyOS hover-expand rail and PlayerHQ bottom tab bar" -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .wrap { display: flex; flex-direction: column; gap: 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  .nav-demo { display: flex; height: 240px; border: 1px solid var(--border); border-radius: var(--radius-card); overflow: hidden; }
  .nav-content { flex: 1; padding: 24px; background: var(--bg); display: flex; align-items: flex-start; }
  .bottom-demo { position: relative; max-width: 440px; height: 80px;
    border: 1px solid var(--border); border-radius: var(--radius-card); overflow: hidden; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
const { NavRail, BottomNav, Eyebrow } = window.AKGolfHQDesignSystem_a3d5af;

function Demo() {
  const [activeNav, setActiveNav] = React.useState("Cockpit");
  const [activeTab, setActiveTab] = React.useState("Hjem");

  const navItems = [
    { icon: "layout-dashboard", label: "Cockpit",   active: activeNav === "Cockpit"  },
    { icon: "users",            label: "Spillere",  active: activeNav === "Spillere", badge: 2 },
    { icon: "calendar",         label: "Plan",      active: activeNav === "Plan"     },
    { icon: "brain",            label: "AI-Caddie", active: activeNav === "AI-Caddie"},
    { icon: "bar-chart-2",      label: "Finans",    active: activeNav === "Finans"   },
  ];

  const bottomItems = [
    { icon: "settings", label: "Innstillinger" },
    { icon: "circle-user", label: "Anders K." },
  ];

  const tabItems = [
    { icon: "home",       label: "Hjem",    active: activeTab === "Hjem"    },
    { icon: "bar-chart",  label: "Analyse", active: activeTab === "Analyse" },
    { icon: "activity",   label: "Live",    active: activeTab === "Live", badge: true },
    { icon: "calendar",   label: "Plan",    active: activeTab === "Plan"    },
    { icon: "user",       label: "Meg",     active: activeTab === "Meg"     },
  ];

  return (
    <React.Fragment>
      <div>
        <div className="lbl">NavRail — AgencyOS (hover for å utvide)</div>
        <div className="nav-demo">
          <NavRail
            items={navItems}
            bottomItems={bottomItems}
            onSelect={(it) => setActiveNav(it.label)}
            style={{ height: "100%" }}
          />
          <div className="nav-content">
            <Eyebrow>AGENCYOS · {activeNav.toUpperCase()}</Eyebrow>
          </div>
        </div>
      </div>

      <div>
        <div className="lbl">BottomNav — PlayerHQ (5-tab)</div>
        <div className="bottom-demo">
          <BottomNav
            items={tabItems}
            onSelect={(it) => setActiveTab(it.label)}
            style={{ position: "absolute" }}
          />
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
