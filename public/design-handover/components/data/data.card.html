<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .wrap { display: flex; flex-direction: column; gap: 28px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  .kpis { display:grid;grid-template-columns:repeat(3,1fr);gap:0; }
  .kpis > * { padding:0 18px; border-left:1px solid var(--border); }
  .kpis > *:first-child { padding-left:0;border-left:none; }
  .row { display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start; }
  .grid2 { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel">
const { KpiTile, Sparkline, Progress, Pyramid, Card, SGTrend, Radar, DataTable, BarChart, StatStrip } = window.AKGolfHQDesignSystem_a3d5af;

const ROUNDS = [
  {label:"R1",ott:0.2,app:-0.3,arg:0.0,putt:0.4},
  {label:"R2",ott:0.5,app:0.1,arg:-0.1,putt:0.5},
  {label:"R3",ott:0.4,app:0.3,arg:0.2,putt:0.6},
  {label:"R4",ott:0.8,app:0.2,arg:0.1,putt:0.7},
  {label:"R5",ott:0.9,app:0.4,arg:0.3,putt:0.8},
  {label:"R6",ott:0.7,app:0.5,arg:0.2,putt:0.9},
];

function Demo() {
  return (
    <React.Fragment>
      <div>
        <div className="lbl">StatStrip — KPI-rad</div>
        <StatStrip stats={[
          {label:"SG snitt · 30d",value:"2,8",unit:"snitt",delta:"+0,4"},
          {label:"Plan-adherence",value:"86",unit:"%",delta:"+5"},
          {label:"HCP",value:"+2,4",delta:"−0,3",trend:"up"},
        ]} />
      </div>

      <div className="grid2">
        <Card eyebrow="SG-trend · siste 6 runder" compact>
          <SGTrend rounds={ROUNDS} benchmark={0} height={160} />
        </Card>
        <Card eyebrow="SG-øyeblikksbilde" compact>
          <div style={{display:"flex",justifyContent:"center"}}>
            <Radar
              data={{ott:0.8,app:0.4,arg:0.2,putt:0.7}}
              baseline={{ott:0.5,app:0.5,arg:0.5,putt:0.5}}
              size={180}
            />
          </div>
        </Card>
      </div>

      <div>
        <div className="lbl">DataTable — stall-oversikt</div>
        <DataTable
          columns={[
            {key:"name",label:"Spiller",width:160},
            {key:"hcp",label:"HCP",mono:true,sortable:true,align:"right",width:70},
            {key:"sg",label:"SG snitt",mono:true,sortable:true,delta:true,align:"right",width:90},
            {key:"runder",label:"Runder",mono:true,sortable:true,align:"right",width:80},
            {key:"adh",label:"Adh %",mono:true,sortable:true,align:"right",width:80},
          ]}
          rows={[
            {name:"Øyvind Rohjan",hcp:"+2,4",sg:2.8,runder:24,adh:86},
            {name:"Peer Gynt",hcp:"4,2",sg:1.4,runder:18,adh:72},
            {name:"Jonas Holm",hcp:"6,1",sg:0.9,runder:12,adh:65},
            {name:"Silje Vangen",hcp:"8,0",sg:0.3,runder:8,adh:90},
          ]}
          sortKey="sg"
        />
      </div>

      <div>
        <div className="lbl">BarChart — SG-rangering</div>
        <BarChart showRank labelWidth={120}
          items={[
            {label:"Øyvind Rohjan",value:2.8,active:true},
            {label:"Peer Gynt",value:1.4},
            {label:"Jonas Holm",value:0.9},
            {label:"Silje Vangen",value:0.3},
          ]}
          formatValue={(v) => v.toFixed(1).replace(".",",")}
        />
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
