<!-- @dsCard group="Brand" viewport="700x230" name="The AK mark" subtitle="The AK monogram with its signature lime dot — the golf ball" -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 30px; font-family: var(--font-ui); }
  .wrap { display: flex; align-items: center; gap: 40px; }
  .big { height: 150px; }
  .copy { display: flex; flex-direction: column; gap: 12px; max-width: 360px; }
  .copy p { margin: 0; font-size: 14px; line-height: 1.55; color: var(--text-2); }
  .copy b { color: var(--text); }
  .mini { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .mini img { height: 30px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="wrap">
  <img class="big" src="../assets/logos/ak-golf-logo-primary-on-dark.svg" alt="AK mark" />
  <div class="copy">
    <p>The <b>AK monogram</b> carries a single lime dot — the golf ball, and the brand's signal color in mark form.</p>
    <p>In compact UI (auth, headers) the mark stands alone or beside a lowercase lime <b>“ak”</b> lettermark.</p>
    <div class="mini">
      <img src="../assets/logos/ak-golf-logo-primary-mono.svg" alt="mark" />
      <span class="tag">primary-mono · white-mono · black-mono</span>
    </div>
  </div>
</div>
</body>
</html>
