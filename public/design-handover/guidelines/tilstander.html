<!-- @dsCard group="Tema" viewport="1500x4400" name="/admin/tilstander — Tilstandsgalleri" subtitle="Hver interaktive og databærende familie rendret med alle tilstander (default/checked/error/disabled/loading/empty) — side ved side i lys og mørk. Verifikasjonsloopen for tilstandspasset. Null rå farger; alt via tokens." -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: #1a1d1b; padding: 22px; font-family: var(--font-ui); }
  .head { max-width: 1440px; margin: 0 auto 18px; display: flex; align-items: baseline; gap: 14px; color: #E7EAE8; }
  .head h1 { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .head p { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #838B86; margin: 0; }
  .fam { max-width: 1440px; margin: 0 auto 18px; }
  .fam__lbl { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #838B86; margin: 0 0 8px 2px; }
  .fam__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: stretch; }
  .col { border-radius: 16px; border: 1px solid var(--border); background: var(--bg); color: var(--text); padding: 18px; }
  .sec { margin-bottom: 18px; }
  .sec:last-child { margin-bottom: 0; }
  .sec__lbl { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 10px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
  .st { display: flex; flex-direction: column; gap: 5px; align-items: flex-start; }
  .st__lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); }
</style>
</head>
<body>
<div class="head">
  <h1>/admin/tilstander</h1>
  <p>Tilstandsgalleri · lys ⇄ mørk · hover/fokus er live — pek/tab</p>
</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script type="text/babel" src="tilstander-fam-data.jsx"></script>
<script type="text/babel" src="tilstander-fam-kalender.jsx"></script>
<script type="text/babel" src="tilstander-fam-structure.jsx"></script>
<script type="text/babel" src="tilstander-fam-golfdata.jsx"></script>

<script type="text/babel">
const DS = window.AKGolfHQDesignSystem_a3d5af;
const {
  Button, Card, Tag, Eyebrow, ThemeToggle, Icon, ICON_NAMES, CountBadge,
  Input, Select, Combobox, DatePicker, Checkbox, Radio, RadioGroup, Toggle, Slider,
  Textarea, SegmentedTabs, CodeInput, FormField,
  Modal, Banner, Popover, Tooltip, Drawer, Sheet, Toast,
  ValidationChip, ValidationGroup,
  KpiTile, BarChart, SGTrend, LoadChart, DataTable, Sparkline,
  Skeleton, SkeletonRow, EmptyState,
} = DS;
// Defensivt: overlev en bundle som ennå ikke er rekompilert etter omdøpingen
const LengdeAvvik = DS.LengdeAvvik || DS.Dispersion;
const { DispersionPlot, KolleStatKort, TrajectoryPlot } = DS;

class FamBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  render() {
    if (this.state.err) {
      return (
        <div role="alert" style={{ padding: 16, border: "1px dashed var(--border-strong)",
          borderRadius: 12, fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-muted)" }}>
          Familien kunne ikke rendres — bundle er trolig eldre enn kildene. Last siden på nytt etter rekompilering.
        </div>
      );
    }
    return this.props.children;
  }
}

function Sec({ label, children }) {
  return (
    <div className="sec">
      <p className="sec__lbl">{label}</p>
      {children}
    </div>
  );
}
function St({ l, children }) {
  return (
    <div className="st">
      <span className="st__lbl">{l}</span>
      {children}
    </div>
  );
}

/* ---------- family bodies (rendered identically in both themes) ---------- */

function FamCore() {
  return (
    <React.Fragment>
      <Sec label="Button — varianter × default / disabled / loading">
        <div className="stack">
          {["primary", "signal", "secondary", "ghost", "destructive"].map((v) => (
            <div className="row" key={v}>
              <St l={v}><Button variant={v}>Lagre plan</Button></St>
              <St l="disabled"><Button variant={v} disabled>Lagre plan</Button></St>
              <St l="loading"><Button variant={v} loading>Lagre plan</Button></St>
            </div>
          ))}
        </div>
      </Sec>
      <Sec label="Card — default / interactive (hover + fokus: tab)">
        <div className="grid2">
          <Card compact eyebrow="Økt" title="Kravtrening driver">Innhold på flate.</Card>
          <Card compact interactive tabIndex={0} eyebrow="Økt" title="Interaktiv — pek/tab">Hover-løft + fokusring.</Card>
        </div>
      </Sec>
      <Sec label="Tag / ThemeToggle">
        <div className="row">
          <Tag variant="neutral">M2 · Kravtrening</Tag>
          <Tag variant="signal" dot>Aktiv</Tag>
          <Tag variant="live" dot>Live</Tag>
          <ThemeToggle apply={false} size="sm" />
        </div>
      </Sec>
      <Sec label="Icon (1,5px strøk) · Eyebrow · CountBadge · Button-størrelser">
        <div className="row" style={{ gap: 14, alignItems: "center" }}>
          {["calendar", "target", "flag", "sparkles", "trending-up", "users", "settings"].map((n) => (
            <Icon key={n} name={n} />
          ))}
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--text-faint)" }}>{ICON_NAMES.length} glyfer</span>
        </div>
        <div className="row" style={{ gap: 14, marginTop: 10, alignItems: "center" }}>
          <Eyebrow tone="muted">Muted</Eyebrow>
          <Eyebrow>Default</Eyebrow>
          <Eyebrow tone="signal">Signal</Eyebrow>
          <CountBadge count={3} />
          <CountBadge count={12} tone="signal" />
        </div>
        <div className="row" style={{ gap: 10, marginTop: 10, alignItems: "center" }}>
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="primary" size="md">Medium</Button>
          <Button variant="primary" size="lg">Large</Button>
        </div>
      </Sec>
    </React.Fragment>
  );
}

function FamForms() {
  const [tgl, setTgl] = React.useState(true);
  const [chk, setChk] = React.useState(true);
  const [seg, setSeg] = React.useState("Uke");
  const [sld, setSld] = React.useState(64);
  return (
    <React.Fragment>
      <Sec label="Input — default / verdi / error / disabled">
        <div className="grid2">
          <Input placeholder="Navn på økt" />
          <Input defaultValue="Kravtrening driver" />
          <Input defaultValue="CS-nivå 110" error="Ugyldig CS-nivå — bruk CS50–CS100." />
          <Input placeholder="Deaktivert" disabled />
        </div>
      </Sec>
      <Sec label="Select / Textarea">
        <div className="grid2">
          <Select options={["M0 · Fri trening", "M2 · Kravtrening", "M5 · Turnering"]} value="M2 · Kravtrening" />
          <Select options={["M2 · Kravtrening"]} value="M2 · Kravtrening" disabled />
          <Textarea defaultValue="Merknad til økta." maxLength={120} />
          <Textarea placeholder="Deaktivert" disabled />
        </div>
      </Sec>
      <Sec label="Checkbox / Radio — states">
        <div className="row" style={{ gap: 18 }}>
          <Checkbox label="Umerket" />
          <Checkbox checked={chk} onChange={setChk} label="Merket" />
          <Checkbox indeterminate label="Delvis" />
          <Checkbox disabled label="Deaktivert" />
        </div>
        <div className="row" style={{ gap: 18, marginTop: 10 }}>
          <Radio label="Umerket" />
          <Radio checked label="Valgt" />
          <Radio disabled label="Deaktivert" />
        </div>
      </Sec>
      <Sec label="Toggle / Slider / SegmentedTabs / CodeInput">
        <div className="row" style={{ gap: 18 }}>
          <St l="på/av"><div className="row"><Toggle checked={tgl} onChange={setTgl} /><Toggle checked={false} /></div></St>
          <St l="disabled"><div className="row"><Toggle checked disabled /><Toggle checked={false} disabled /></div></St>
        </div>
        <div className="row" style={{ gap: 18, marginTop: 12 }}>
          <div style={{ width: 220 }}><Slider label="Belastning" value={sld} onChange={setSld} /></div>
          <div style={{ width: 220 }}><Slider label="Deaktivert" value={30} disabled /></div>
        </div>
        <div className="row" style={{ gap: 18, marginTop: 12 }}>
          <SegmentedTabs options={["Dag", "Uke", "Måned"]} value={seg} onChange={setSeg} size="sm" />
          <SegmentedTabs options={["Dag", "Uke"]} value="Dag" size="sm" disabled />
        </div>
        <div className="row" style={{ gap: 18, marginTop: 12 }}>
          <CodeInput length={4} value="42" />
          <CodeInput length={4} value="1234" error />
          <CodeInput length={4} disabled />
        </div>
      </Sec>
      <Sec label="Combobox / DatePicker / RadioGroup / FormField">
        <div className="grid2">
          <Combobox options={["Øyvind Rohjan", "Anders Kristiansen", "Jonas Haugen"]} value="Øyvind Rohjan" />
          <div className="row" style={{ gap: 10 }}>
            <DatePicker value="2026-07-03" />
            <DatePicker error placeholder="Velg dato" />
            <DatePicker disabled placeholder="Deaktivert" />
          </div>
          <RadioGroup value="m2" options={[
            { value: "m1", label: "M1 · Måltrening", description: "Trening mot definert mål" },
            { value: "m2", label: "M2 · Kravtrening", description: "Trening eller testing med definerte krav" },
            { value: "m3", label: "M3 · Banetrening", description: "På banen, uten scoring", disabled: true },
          ]} />
          <div className="stack" style={{ gap: 12 }}>
            <FormField label="CS-nivå" hint="CS50–CS100 — % av maksfart."><Input defaultValue="CS80" /></FormField>
            <FormField label="CS-nivå" required error="Ugyldig CS-nivå — bruk CS50–CS100."><Input defaultValue="CS110" error /></FormField>
          </div>
        </div>
      </Sec>
    </React.Fragment>
  );
}

function ModalDemo() {
  const [open, setOpen] = React.useState(false);
  return (
    <React.Fragment>
      <Button variant="secondary" onClick={() => setOpen(true)}>Vis modal</Button>
      <Modal open={open} size="sm" title="Slett økt?" subtitle="Handlingen kan ikke angres."
        onClose={() => setOpen(false)}
        footer={<React.Fragment><Button variant="ghost" onClick={() => setOpen(false)}>Avbryt</Button><Button variant="destructive" onClick={() => setOpen(false)}>Slett</Button></React.Fragment>}>
        <p style={{ margin: 0, fontSize: "var(--text-14)", color: "var(--text-2)" }}>Økta «M2 · Kravtrening driver» fjernes fra uke 27.</p>
      </Modal>
    </React.Fragment>
  );
}

function DrawerDemo() {
  const [open, setOpen] = React.useState(false);
  return (
    <React.Fragment>
      <Button variant="secondary" size="sm" onClick={() => setOpen(true)}>Vis drawer</Button>
      <Drawer open={open} title="Inspektør" onClose={() => setOpen(false)}
        footer={<Button variant="primary" onClick={() => setOpen(false)}>Lukk</Button>}>
        <p style={{ margin: 0, fontSize: "var(--text-14)", color: "var(--text-2)" }}>Økt-detaljer for «M2 · Kravtrening driver» — fredag 16:00, 60 min.</p>
      </Drawer>
    </React.Fragment>
  );
}

function SheetDemo() {
  const [open, setOpen] = React.useState(false);
  return (
    <React.Fragment>
      <Button variant="secondary" size="sm" onClick={() => setOpen(true)}>Vis sheet</Button>
      <Sheet open={open} title="Logg økt" onClose={() => setOpen(false)}
        footer={<Button variant="primary" block onClick={() => setOpen(false)}>Lagre</Button>}>
        <p style={{ margin: 0, fontSize: "var(--text-14)", color: "var(--text-2)" }}>Hvordan gikk økta? Registrer gjennomføring og RPE.</p>
      </Sheet>
    </React.Fragment>
  );
}

function FamOverlays() {
  return (
    <React.Fragment>
      <Sec label="Banner — alle toner (action + lukk har fokusring — tab)">
        <div className="stack" style={{ gap: 8 }}>
          <Banner tone="success" title="Plan godkjent" description="Uke 27 er klar." action="Se plan" onAction={() => {}} onClose={() => {}} />
          <Banner tone="warning" title="Avviker fra anbefaling" description="ACWR i varselsone." action="AI-fiks" onAction={() => {}} onClose={() => {}} />
          <Banner tone="error" title="Sterkt avvik" description="Coach er varslet automatisk." action="AI-fiks" onAction={() => {}} onClose={() => {}} />
          <Banner tone="info" title="Ny TrackMan-økt" onClose={() => {}} />
          <Banner tone="neutral" title="Synkronisert" onClose={() => {}} />
        </div>
      </Sec>
      <Sec label="Modal — åpnes på klikk (representerer Modal/Sheet/Drawer-mønsteret; lukkeknapp har fokusring)">
        <ModalDemo />
      </Sec>
      <Sec label="Popover / Tooltip / Drawer / Sheet / Toast">
        <div className="row" style={{ gap: 10 }}>
          <Popover trigger={<Button variant="secondary" size="sm">Vis popover</Button>}>
            <div style={{ padding: 4, maxWidth: 220, fontSize: "var(--text-13)", color: "var(--text-2)" }}>M2 · Kravtrening — trening eller testing med definerte krav.</div>
          </Popover>
          <Tooltip label="CS80 = 80 % av maksfart" side="top"><Button variant="ghost" size="sm">Hover for tooltip</Button></Tooltip>
          <DrawerDemo />
          <SheetDemo />
          <Button variant="secondary" size="sm" onClick={() => Toast.vis({ title: "Plan lagret", description: "Uke 28 er oppdatert.", tone: "success" })}>Vis toast</Button>
        </div>
      </Sec>
      <Sec label="Kanon-tilstander — Innenfor anbefaling / Avviker fra anbefaling / Sterkt avvik">
        <div className="stack" style={{ gap: 8 }}>
          <ValidationGroup label="SLAG-budsjett" state="ren">
            <ValidationChip label="Innenfor anbefaling" active readOnly />
          </ValidationGroup>
          <ValidationGroup label="SPILL-budsjett" state="myk" message="Avviker fra anbefaling — SPILL ligger over ukesbudsjettet.">
            <ValidationChip label="Avviker fra anbefaling" readOnly />
          </ValidationGroup>
          <ValidationGroup label="TURN-budsjett" state="hard" message="Sterkt avvik — coach varsles automatisk.">
            <ValidationChip label="Sterkt avvik" readOnly />
          </ValidationGroup>
        </div>
      </Sec>
    </React.Fragment>
  );
}

function FamData() {
  const rounds = [
    { label: "R1", ott: 0.2, app: -0.4, arg: 0.1, putt: 0.6 },
    { label: "R2", ott: 0.4, app: -0.1, arg: 0.2, putt: 0.3 },
    { label: "R3", ott: 0.1, app: 0.3, arg: -0.2, putt: 0.5 },
  ];
  return (
    <React.Fragment>
      <Sec label="Data — med data / empty / loading">
        <div className="grid2">
          <St l="BarChart · data">
            <div style={{ width: "100%" }}>
              <BarChart items={[{ label: "FYS", value: 20 }, { label: "TEK", value: 35 }, { label: "SLAG", value: 25 }]} />
            </div>
          </St>
          <St l="BarChart · empty">
            <div style={{ width: "100%" }}><BarChart items={[]} /></div>
          </St>
          <St l="BarChart · loading">
            <div style={{ width: "100%" }}><BarChart loading /></div>
          </St>
          <St l="DataTable · empty">
            <div style={{ width: "100%" }}><DataTable columns={[{ key: "n", label: "Navn" }]} rows={[]} /></div>
          </St>
          <St l="SGTrend · empty">
            <div style={{ width: "100%" }}><SGTrend rounds={[]} height={140} /></div>
          </St>
          <St l="LoadChart · loading">
            <div style={{ width: "100%" }}><LoadChart loading height={140} /></div>
          </St>
        </div>
      </Sec>
      <Sec label="Sparkline — data / empty / loading · KpiTile">
        <div className="row" style={{ gap: 18, alignItems: "flex-end" }}>
          <St l="data"><Sparkline data={[2, 4, 3, 6, 5, 8]} width={96} height={28} /></St>
          <St l="empty"><Sparkline data={[]} width={96} height={28} /></St>
          <St l="loading"><Sparkline loading width={96} height={28} /></St>
          <KpiTile size="sm" label="Snitt carry" value="214" unit="m" delta="+3,2" trend="up" />
        </div>
      </Sec>
      <Sec label="TrackMan — DispersionPlot empty (meter, m V/H) · LengdeAvvik empty">
        <div className="grid2">
          <DispersionPlot slag={[]} hoyde={180} />
          <LengdeAvvik shots={[]} size={180} />
        </div>
      </Sec>
    </React.Fragment>
  );
}

/* ---------- sheet: each family × two themes ---------- */

const FAMILIES = [
  ["Core — Button · Card · Tag · Icon · Eyebrow", FamCore],
  ["Forms — Input · Select · Combobox · DatePicker · Checkbox · Radio · Toggle · Slider · SegmentedTabs · CodeInput · FormField", FamForms],
  ["Overlays + kanon — Banner · Modal · Drawer · Sheet · Popover · Tooltip · Toast · ValidationChip", FamOverlays],
  ["Data + TrackMan — empty / loading", FamData],
  ["Datavisualisering — med data", window.FamDataVis],
  ["TrackMan — med data", window.FamTrackman],
  ["Kalender — VisningsVelger · DayStrip · AgendaRow · Uke · Måned · TidsGrid · Tidslinje · Periodeplan", window.FamKalender],
  ["Domene — kort · chips · kanon-motiver", window.FamDomain],
  ["Feedback — AiTipCard · ListRow · MeldingsTraad", window.FamFeedback],
  ["Struktur — Accordion · Avatar · EmptyState · FilterPills · Kanban · Skeleton · Stepper", window.FamStructure],
  ["Navigasjon — NavRail · BottomNav", window.FamNav],
  ["Marketing — FeaturedCard", window.FamMarketing],
  ["Golfdata — SG-fortellerfamilien · alle tilstander", window.FamGolfdata],
  ["Kategori — KategoriStige · TidsPyramide · KategoriFjell", window.FamKategori],
].filter(([, Fam]) => Fam);

function App() {
  return (
    <Toast>
      {FAMILIES.map(([label, Fam]) => (
        <div className="fam" key={label} data-screen-label={label}>
          <p className="fam__lbl">{label}</p>
          <div className="fam__grid">
            <div className="col light"><FamBoundary><Fam /></FamBoundary></div>
            <div className="col dark"><FamBoundary><Fam /></FamBoundary></div>
          </div>
        </div>
      ))}
    </Toast>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
