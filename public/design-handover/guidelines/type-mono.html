<!-- @dsCard group="Type" viewport="700x210" name="Numbers — JetBrains Mono" subtitle="All numbers: JetBrains Mono 500/600, tabular, tracking 0.02em" -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; color: var(--text); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .big { font-size: 30px; font-weight: 600; }
  .tab { display: flex; flex-direction: column; gap: 4px; }
  .tab .r { display: flex; gap: 28px; font-size: 16px; font-weight: 500; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .lbl { color: var(--text-muted); }
</style>
</head>
<body>
<div class="stack">
  <div class="mono big">+2,4 &nbsp; 1 200 kr &nbsp; 86 % &nbsp; 12:45<span class="meta" style="margin-left:10px;">600 · tabular</span></div>
  <div class="tab mono">
    <div class="r"><span style="width:90px;" class="lbl">HCP</span><span style="width:80px;">+2,4</span><span style="width:80px;">+1,8</span><span style="width:80px;">−0,6</span></div>
    <div class="r"><span style="width:90px;" class="lbl">SG total</span><span style="width:80px;">2,84</span><span style="width:80px;">1,90</span><span style="width:80px;">3,11</span></div>
    <div class="r"><span style="width:90px;" class="lbl">Økter</span><span style="width:80px;">142</span><span style="width:80px;">96</span><span style="width:80px;">7</span></div>
  </div>
</div>
</body>
</html>
