<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow" subtitle="Mono-caps mini-label: 10–11px, tracking 0.12em, muted" -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .eb { font-family: var(--font-mono); font-weight: 600; font-size: 11px; line-height: 1;
    letter-spacing: 0.12em; text-transform: uppercase; }
  .muted { color: var(--text-muted); }
  .signal { color: var(--signal); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-left: 10px; letter-spacing: 0; text-transform: none; }
</style>
</head>
<body>
<div class="stack">
  <div class="eb muted">AgencyOS · Uke 24<span class="meta">tone="muted"</span></div>
  <div class="eb muted">Stall-SG · 30 dager</div>
  <div class="eb signal">Oppdatert for 3 min<span class="meta">tone="signal"</span></div>
</div>
</body>
</html>
