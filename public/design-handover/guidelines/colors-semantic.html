<!-- @dsCard group="Colors" viewport="700x230" name="Semantisk — tilstand" subtitle="Suksess / advarsel / feil / info. Eier tilstand entydig — konkurrerer ikke med lime." -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-ui); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .col { display: flex; flex-direction: column; gap: 9px; }
  .badge { display: inline-flex; align-items: center; gap: 7px; height: 30px; padding: 0 12px;
    border-radius: 9999px; font-size: 13px; font-weight: 600; width: fit-content; }
  .dot { width: 7px; height: 7px; border-radius: 9999px; background: currentColor; }
  .solid { display: inline-flex; align-items: center; height: 30px; padding: 0 12px; border-radius: 8px;
    font-size: 13px; font-weight: 600; width: fit-content; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="grid">
  <div class="col">
    <span class="badge" style="background:var(--success-bg);border:1px solid var(--success-border);color:var(--success);"><span class="dot"></span>Betalt</span>
    <span class="solid" style="background:var(--success-solid);color:var(--on-success);">Godkjent</span>
    <span class="tok">--success</span>
  </div>
  <div class="col">
    <span class="badge" style="background:var(--warning-bg);border:1px solid var(--warning-border);color:var(--warning);"><span class="dot"></span>Venter</span>
    <span class="solid" style="background:var(--warning-solid);color:var(--on-warning);">Forfaller</span>
    <span class="tok">--warning</span>
  </div>
  <div class="col">
    <span class="badge" style="background:var(--error-bg);border:1px solid var(--error-border);color:var(--error);"><span class="dot"></span>Forfalt</span>
    <span class="solid" style="background:var(--error-solid);color:var(--on-error);">Avvist</span>
    <span class="tok">--error</span>
  </div>
  <div class="col">
    <span class="badge" style="background:var(--info-bg);border:1px solid var(--info-border);color:var(--info);"><span class="dot"></span>Ny melding</span>
    <span class="solid" style="background:var(--info-solid);color:var(--on-info);">Varsel</span>
    <span class="tok">--info</span>
  </div>
</div>
</body>
</html>
