<!-- @dsCard group="Colors" viewport="700x180" name="Lime — energi-aksent" subtitle="Energi-aksenten. Trekker øyet til ÉN ting per skjerm — aldri en stor flate." -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-ui); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: stretch; }
  .sw { display: flex; flex-direction: column; gap: 9px; width: 150px; }
  .chip { height: 70px; border-radius: 12px; border: 1px solid var(--border); }
  .tok { font-family: var(--font-mono); font-size: 12px; color: var(--text); font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .pill { display: inline-flex; align-items: center; justify-content: center; height: 70px;
    border-radius: 9999px; background: var(--signal); color: var(--on-signal);
    font-weight: 600; font-size: 14px; padding: 0 22px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background: var(--lime-500);"></div><span class="tok">--lime-500</span><span class="hex">#D1F843 · signal</span></div>
  <div class="sw"><div class="chip" style="background: var(--lime-600);"></div><span class="tok">--lime-600</span><span class="hex">#BCE234 · press</span></div>
  <div class="sw"><div class="chip" style="background: var(--lime-300);"></div><span class="tok">--lime-300</span><span class="hex">#E4FB8E · soft</span></div>
  <div class="sw"><div class="pill">På lime: mørk tekst</div><span class="tok">--on-signal</span><span class="hex">#0B0C0E</span></div>
</div>
</body>
</html>
