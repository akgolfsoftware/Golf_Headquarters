<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 26px; font-family: var(--font-mono); }
  .row { display: flex; align-items: center; gap: 14px; padding: 3px 0; }
  .bar { height: 14px; background: var(--signal); border-radius: 3px; }
  .t { font-size: 11px; color: var(--text-muted); width: 60px; flex: none; }
  .px { font-size: 11px; color: var(--text-2); }
  .cols { columns: 2; column-gap: 44px; }
</style>
</head>
<body>
<div class="cols">
  <div class="row"><span class="t">space-1</span><span class="bar" style="width:4px;"></span><span class="px">4</span></div>
  <div class="row"><span class="t">space-2</span><span class="bar" style="width:8px;"></span><span class="px">8</span></div>
  <div class="row"><span class="t">space-3</span><span class="bar" style="width:12px;"></span><span class="px">12</span></div>
  <div class="row"><span class="t">space-4</span><span class="bar" style="width:16px;"></span><span class="px">16</span></div>
  <div class="row"><span class="t">space-5</span><span class="bar" style="width:20px;"></span><span class="px">20</span></div>
  <div class="row"><span class="t">space-6</span><span class="bar" style="width:24px;"></span><span class="px">24</span></div>
  <div class="row"><span class="t">space-8</span><span class="bar" style="width:32px;"></span><span class="px">32</span></div>
  <div class="row"><span class="t">space-10</span><span class="bar" style="width:40px;"></span><span class="px">40</span></div>
  <div class="row"><span class="t">space-12</span><span class="bar" style="width:48px;"></span><span class="px">48</span></div>
  <div class="row"><span class="t">space-16</span><span class="bar" style="width:64px;"></span><span class="px">64</span></div>
</div>
</body>
</html>
