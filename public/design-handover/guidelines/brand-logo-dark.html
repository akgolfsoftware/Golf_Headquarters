<!-- @dsCard group="Brand" viewport="700x190" name="Logo — on dark" subtitle="Primary (lime) and white mark on the graphite canvas" -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 28px; font-family: var(--font-mono); }
  .row { display: flex; gap: 22px; flex-wrap: wrap; }
  .tile { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-card); padding: 26px; display: flex; flex-direction: column;
    align-items: center; gap: 16px; }
  .tile img { height: 66px; }
  .t { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="tile"><img src="../assets/logos/ak-golf-logo-primary-on-dark.svg" alt="AK Golf — lime" /><span class="t">primary-on-dark</span></div>
  <div class="tile"><img src="../assets/logos/ak-golf-logo-white-on-dark.svg" alt="AK Golf — white" /><span class="t">white-on-dark</span></div>
</div>
</body>
</html>
