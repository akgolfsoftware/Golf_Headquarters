<!-- @dsCard group="Type" viewport="700x230" name="Display — Inter Tight" subtitle="Headings: Inter Tight 600/700, tracking −0.02em" -->
<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  h1,h2,h3 { margin: 0; font-family: var(--font-display); letter-spacing: var(--tracking-display);
    line-height: 1.08; color: var(--text); }
  .d1 { font-size: 48px; font-weight: 700; }
  .d2 { font-size: 30px; font-weight: 700; }
  .d3 { font-size: 20px; font-weight: 600; color: var(--text-2); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-left: 10px; font-weight: 500; letter-spacing: 0; }
</style>
</head>
<body>
<div class="stack">
  <h1 class="d1">Tren på det du trenger<span class="meta">700 · 48</span></h1>
  <h2 class="d2">Hvem trenger meg nå?<span class="meta">700 · 30</span></h2>
  <h3 class="d3">Stall-oversikt og dagens plan<span class="meta">600 · 20</span></h3>
</div>
</body>
</html>
