<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-ui); }
  .ramp { display: flex; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .ramp > div { flex: 1; height: 84px; display: flex; align-items: flex-end; padding: 6px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 600; }
  .cap { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin: 14px 0 0; line-height: 1.6; }
  .cap b { color: var(--text-2); font-weight: 600; }
</style>
</head>
<body class="light">
<div class="ramp">
  <div style="background:var(--sand-0);color:#737068;">0</div>
  <div style="background:var(--sand-50);color:#737068;">50</div>
  <div style="background:var(--sand-100);color:#737068;">100</div>
  <div style="background:var(--sand-150);color:#737068;">150</div>
  <div style="background:var(--sand-200);color:#737068;">200</div>
  <div style="background:var(--sand-250);color:#737068;">250</div>
  <div style="background:var(--sand-300);color:#5B5851;">300</div>
  <div style="background:var(--sand-400);color:#FFFFFF;">400</div>
  <div style="background:var(--sand-500);color:#FFFFFF;">500</div>
  <div style="background:var(--sand-600);color:#FFFFFF;">600</div>
  <div style="background:var(--sand-700);color:#FFFFFF;">700</div>
  <div style="background:var(--sand-800);color:#F4F4F1;">800</div>
  <div style="background:var(--sand-900);color:#F4F4F1;">900</div>
</div>
<p class="cap"><b>0</b> kort · <b>50</b> bg (cream) · <b>100</b> hevet · <b>200</b> hover · <b>300</b> divider · <b>600</b> dempet tekst (AA) · <b>700</b> sekundær · <b>900</b> primær tekst</p>
</body>
</html>
