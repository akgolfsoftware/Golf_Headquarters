<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AK Golf CoachHQ</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #003A2A;
    color: #D1F843;
    font-family: 'JetBrains Mono', monospace;
    height: 100%;
    display: grid;
    place-items: center;
  }
  .loader { text-align: center; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.6; }
</style>
</head>
<body>
<div class="loader">AK Golf — laster …</div>
<script>
  localStorage.setItem('ak.target', 'coach');
  const authed = localStorage.getItem('ak.auth') === '1';
  const role = localStorage.getItem('ak.role');
  if (authed && role === 'coach') {
    location.replace('coachhq/stall-oversikt.html');
  } else {
    localStorage.setItem('ak.role', 'coach');
    location.replace('auth/login.html');
  }
</script>
</body>
</html>
