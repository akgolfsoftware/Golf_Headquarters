<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Live Test Scoring — NGF 20-test-battery — AK Golf HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,500;0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="workbench-plan/plan-test-live.css">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
</style>
</head>
<body data-screen-label="Live Test Scoring — NGF 20-test-battery">

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="ic-x" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
    <symbol id="ic-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></symbol>
    <symbol id="ic-arrow-right" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></symbol>
    <symbol id="ic-play" viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></symbol>
    <symbol id="ic-pause" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></symbol>
    <symbol id="ic-pin" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></symbol>
    <symbol id="ic-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></symbol>
    <symbol id="ic-trophy" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></symbol>
    <symbol id="ic-trending" viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></symbol>
  </defs>
</svg>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  // Tiny icon helper that mirrors WBPIc used by plan-test-live.jsx
  function WBPIc({ id, size = 16, style }) {
    return (
      <svg width={size} height={size} fill="none" stroke="currentColor"
           strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={style}>
        <use href={`#${id}`}/>
      </svg>
    );
  }
  window.WBPIc = WBPIc;
</script>
<script type="text/babel" src="workbench-plan/plan-test-live.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const inspill = WTL_TESTS.inspill_120;
  const putt = WTL_TESTS.putt_1_3m;
  const driver = WTL_TESTS.driver_basic;
  const trapbar = WTL_TESTS.trapbar_deadlift;
  const chs = WTL_TESTS.chs;

  // Mock running state for Inspill 120m, mid-test (slag 3 av 5)
  const inspillState = {
    currentStepIdx: 2,
    currentShotIdx: 2,
    scoreNow: { value: '6.4', context: 'Snitt av 2 slag · på sporet mot mål 8m', vsTarget: 1.6, barPct: 80, targetPct: 75, pgaPct: 83 },
    shotLog: [
      { value: '4.8m', delta: '✓ under mål', deltaCls: 'ok', status: 'done' },
      { value: '8.1m', delta: '↑ 0.1m over', deltaCls: 'miss', status: 'done' },
      { value: '—',    status: 'current' },
      { value: null },
      { value: null },
    ],
  };

  const puttState = {
    currentStepIdx: 2, // 2m
    currentShotIdx: 0,
    scoreNow: { value: '76', context: '15 av 20 sunket · 1m + 1.5m sett ferdig', vsTarget: 16, barPct: 76, targetPct: 60, pgaPct: 65 },
    shotLog: [
      { value: '1.0m · 5/5', delta: '100%', deltaCls: 'ok', status: 'done' },
      { value: '1.5m · 4/5', delta: '80%', deltaCls: 'ok', status: 'done' },
      { value: '2.0m', status: 'current' },
      { value: null },
      { value: null },
    ],
    putts: [true, true, false, true, null],
  };

  return (
    <DesignCanvas>
      <DCSection
        id="meta"
        title="Live Test Scoring · NGF 20-test-battery"
        subtitle="Fullskjerm-arbeidsflate for å gjennomføre tester. Hver pyramide-akse har sin egen accent-farge — UI'et bytter visuell signatur basert på test-typen. Live-score oppdateres slag-for-slag med mål + PGA-benchmark."
      >
        <DCPostIt rotate={-2}>
          5 axis-temaer
          {'\n'}3 hovedtilstander
          {'\n'}10 input-typer
          {'\n'}Live PEI + snitt + max
          {'\n'}PGA benchmark inline
        </DCPostIt>
      </DCSection>

      <DCSection
        id="states"
        title="3 hovedtilstander — Inspill 120m (SLAG · blå)"
        subtitle="Start-briefing → aktiv scoring → ferdig-resultat. Samme akse-farge (blå #2563EB) gjennom hele flyten."
      >
        <DCArtboard id="start-inspill" label="1. Start · briefing" width={1440} height={820}>
          <WTL_StartScreen test={inspill}/>
        </DCArtboard>
        <DCArtboard id="active-inspill" label="2. Aktiv · slag 3 av 5" width={1440} height={900}>
          <WTL_ActiveScreen
            test={inspill}
            currentStepIdx={inspillState.currentStepIdx}
            currentShotIdx={inspillState.currentShotIdx}
            scoreNow={inspillState.scoreNow}
            shotLog={inspillState.shotLog}
          />
        </DCArtboard>
        <DCArtboard id="result-inspill" label="3. Ferdig · resultat" width={1440} height={820}>
          <WTL_ResultScreen
            test={inspill}
            finalScore={{ value: '6.2', context: '5 slag · best 4.8m · verste 8.1m' }}
            shots={[
              { v: '4.8', ok: true },
              { v: '8.1', ok: false },
              { v: '6.4', ok: true },
              { v: '5.9', ok: true },
              { v: '5.8', ok: true },
            ]}
            beatTarget={true}
          />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="axes"
        title="5 axis-temaer — UI'et bytter accent-farge per pyramide-akse"
        subtitle="SLAG blå · TEK amber · FYS forest · SPILL lime · TURN dyp rød. Hver test bruker sin axis-farge på inputs, score, knapper, og step-progress."
      >
        <DCArtboard id="axis-spill" label="SPILL · Putt 1-3m (lime)" width={1440} height={900}>
          <WTL_ActiveScreen
            test={putt}
            currentStepIdx={puttState.currentStepIdx}
            currentShotIdx={puttState.currentShotIdx}
            scoreNow={puttState.scoreNow}
            shotLog={puttState.shotLog}
            putts={puttState.putts}
          />
        </DCArtboard>
        <DCArtboard id="axis-fys" label="FYS · Clubhead Speed (forest)" width={1440} height={900}>
          <WTL_ActiveScreen
            test={chs}
            currentStepIdx={2}
            currentShotIdx={0}
            scoreNow={{ value: '109', context: 'Maks av 3 slag · 9 mph under PGA', vsTarget: 4, barPct: 78, targetPct: 75, pgaPct: 82 }}
            shotLog={[
              { value: '107 mph', delta: '✓ over mål', deltaCls: 'ok', status: 'done' },
              { value: '109 mph', delta: '↑ PB-jakt', deltaCls: 'ok', status: 'done' },
              { value: '—', status: 'current' },
              { value: null },
              { value: null },
            ]}
          />
        </DCArtboard>
        <DCArtboard id="axis-fys-trapbar" label="FYS · Trapbar Deadlift (forest)" width={1440} height={900}>
          <WTL_ActiveScreen
            test={trapbar}
            currentStepIdx={2}
            currentShotIdx={0}
            scoreNow={{ value: '142', context: 'PB-forsøk 1 · 95 % av antatt maks', vsTarget: 2, barPct: 71, targetPct: 70, pgaPct: 85 }}
            shotLog={[
              { value: '130 kg', delta: '✓ oppvarming', deltaCls: 'ok', status: 'done' },
              { value: '140 kg', delta: '✓ godkjent', deltaCls: 'ok', status: 'done' },
              { value: '—', status: 'current' },
              { value: null },
              { value: null },
            ]}
          />
        </DCArtboard>
        <DCArtboard id="axis-slag-driver" label="SLAG · Driver Basic (blå · PEI)" width={1440} height={900}>
          <WTL_ActiveScreen
            test={driver}
            currentStepIdx={2}
            currentShotIdx={0}
            scoreNow={{ value: '0.058', context: 'Snitt PEI av 2 slag · under PGA-target', vsTarget: 0.012, barPct: 84, targetPct: 86, pgaPct: 86 }}
            shotLog={[
              { value: '244m / 0.052', delta: '✓ under PEI', deltaCls: 'ok', status: 'done' },
              { value: '231m / 0.064', delta: '↑ side −8m', deltaCls: 'miss', status: 'done' },
              { value: '—', status: 'current' },
              { value: null },
              { value: null },
            ]}
          />
        </DCArtboard>
      </DCSection>
      <DCSection
        id="mobile"
        title="Mobil · iPhone 393w — alle 3 tilstander"
        subtitle="Single-column layout · 60px input-felt for tommel-tilgjengelig touch · score-kort + slag-logg stables under input · bunn-bar med store CTA."
      >
        <DCArtboard id="mobile-start" label="Mobil · Start" width={393} height={852}>
          <WTL_StartScreen test={inspill} mobile/>
        </DCArtboard>
        <DCArtboard id="mobile-active" label="Mobil · Aktiv · slag 3" width={393} height={1620}>
          <WTL_ActiveScreen
            test={inspill}
            currentStepIdx={inspillState.currentStepIdx}
            currentShotIdx={inspillState.currentShotIdx}
            scoreNow={inspillState.scoreNow}
            shotLog={inspillState.shotLog}
            mobile
          />
        </DCArtboard>
        <DCArtboard id="mobile-putt" label="Mobil · Putt-test (sjekkbokser)" width={393} height={1500}>
          <WTL_ActiveScreen
            test={putt}
            currentStepIdx={puttState.currentStepIdx}
            currentShotIdx={puttState.currentShotIdx}
            scoreNow={puttState.scoreNow}
            shotLog={puttState.shotLog}
            putts={puttState.putts}
            mobile
          />
        </DCArtboard>
        <DCArtboard id="mobile-result" label="Mobil · Ferdig · resultat" width={393} height={1240}>
          <WTL_ResultScreen
            test={inspill}
            finalScore={{ value: '6.2', context: '5 slag · best 4.8m · verste 8.1m' }}
            shots={[
              { v: '4.8', ok: true },
              { v: '8.1', ok: false },
              { v: '6.4', ok: true },
              { v: '5.9', ok: true },
              { v: '5.8', ok: true },
            ]}
            beatTarget={true}
            mobile
          />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
