<!doctype html><html><head><meta charset="utf-8"><title>Breakpoints</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { width: 760px; }
  .card { padding: 22px 24px; }

  .bp-row {
    display: grid; grid-template-columns: 60px 80px 1fr 130px; align-items: center;
    gap: 12px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .bp-row:last-of-type { border-bottom: 0; }
  .bp-name {
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--foreground);
  }
  .bp-range {
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
    color: var(--muted-foreground); font-feature-settings: "tnum","zero";
  }
  .bp-track {
    height: 14px; background: var(--muted); border-radius: 999px;
    position: relative; overflow: hidden;
  }
  .bp-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--primary); border-radius: 999px;
  }
  .bp-fill.lime { background: var(--accent); }
  .bp-use {
    font-size: 11px; color: var(--muted-foreground);
    text-align: right;
  }

  .container-spec {
    margin-top: 18px;
    padding: 16px 18px;
    background: var(--secondary);
    border-radius: 12px;
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }
  .spec {
    display: flex; flex-direction: column; gap: 4px;
  }
  .spec .l { font-family: var(--font-mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-foreground); }
  .spec .v { font-family: var(--font-mono); font-weight: 600; font-size: 18px; letter-spacing: -0.015em; font-feature-settings: "tnum","zero"; }
  .spec .v small { font-size: 11px; color: var(--muted-foreground); font-weight: 400; margin-left: 4px; }
</style></head>
<body><div class="card">
  <div class="bp-row">
    <span class="bp-name">sm</span>
    <span class="bp-range">0 — 767</span>
    <span class="bp-track"><span class="bp-fill" style="width: 22%"></span></span>
    <span class="bp-use">PlayerHQ · Booking</span>
  </div>
  <div class="bp-row">
    <span class="bp-name">md</span>
    <span class="bp-range">768 — 1023</span>
    <span class="bp-track"><span class="bp-fill" style="width: 38%"></span></span>
    <span class="bp-use">Tablet · responsive</span>
  </div>
  <div class="bp-row">
    <span class="bp-name">lg</span>
    <span class="bp-range">1024 — 1279</span>
    <span class="bp-track"><span class="bp-fill" style="width: 60%"></span></span>
    <span class="bp-use">CoachHQ default</span>
  </div>
  <div class="bp-row">
    <span class="bp-name">xl</span>
    <span class="bp-range">1280 — 1439</span>
    <span class="bp-track"><span class="bp-fill" style="width: 80%"></span></span>
    <span class="bp-use">Marketing default</span>
  </div>
  <div class="bp-row">
    <span class="bp-name">2xl</span>
    <span class="bp-range">1440+</span>
    <span class="bp-track"><span class="bp-fill lime" style="width: 100%"></span></span>
    <span class="bp-use">Marketing hero wide</span>
  </div>

  <div class="container-spec">
    <div class="spec">
      <span class="l">Container max</span>
      <span class="v">1280<small>px</small></span>
    </div>
    <div class="spec">
      <span class="l">Gutter · mobile</span>
      <span class="v">24<small>px</small></span>
    </div>
    <div class="spec">
      <span class="l">Gutter · desktop</span>
      <span class="v">32<small>px</small></span>
    </div>
  </div>
</div></body></html>
