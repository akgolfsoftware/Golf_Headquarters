<!doctype html><html><head><meta charset="utf-8"><title>Pyramide-akser</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .axis-row {
    display: grid; grid-template-columns: 80px 1fr 64px 80px;
    align-items: center; gap: 12px; padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .axis-row:last-child { border-bottom: 0; }
  .axis-name { font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--foreground); }
  .bar { height: 8px; border-radius: 999px; }
  .axis-val { font-family: var(--font-mono); font-size: 11px; font-weight: 600; text-align: right; }
  .axis-hex { font-family: var(--font-mono); font-size: 9px; color: var(--muted-foreground); text-align: right; }
  .note { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-foreground); margin-bottom: 8px; }
</style></head>
<body><div class="card">
  <div class="note">Pyramide-rekkefølge · bunn → topp · chart-fills only</div>
  <div class="axis-row">
    <span class="axis-name">Turnering</span>
    <span class="bar" style="background:#A32D2D; width: 38%;"></span>
    <span class="axis-val">pyr-turn</span>
    <span class="axis-hex">#A32D2D</span>
  </div>
  <div class="axis-row">
    <span class="axis-name">Spill</span>
    <span class="bar" style="background:#D1F843; width: 52%;"></span>
    <span class="axis-val">pyr-spill</span>
    <span class="axis-hex">#D1F843</span>
  </div>
  <div class="axis-row">
    <span class="axis-name">Golfslag</span>
    <span class="bar" style="background:#2563EB; width: 64%;"></span>
    <span class="axis-val">pyr-slag</span>
    <span class="axis-hex">#2563EB</span>
  </div>
  <div class="axis-row">
    <span class="axis-name">Teknisk</span>
    <span class="bar" style="background:#B8852A; width: 72%;"></span>
    <span class="axis-val">pyr-tek</span>
    <span class="axis-hex">#B8852A</span>
  </div>
  <div class="axis-row">
    <span class="axis-name">Fysisk</span>
    <span class="bar" style="background:#005840; width: 88%;"></span>
    <span class="axis-val">pyr-fys</span>
    <span class="axis-hex">#005840</span>
  </div>
</div></body></html>
