<!doctype html><html><head><meta charset="utf-8"><title>Treningspyramide · 5 nivåer</title>
<link rel="stylesheet" href="_shared.css">
<script src="https://unpkg.com/lucide@0.453.0"></script>
<style>
  /* Register --current-color so var()-driven transitions actually interpolate */
  @property --current-color {
    syntax: '<color>';
    inherits: true;
    initial-value: #005840;  /* --pyr-fys */
  }

  body { width: 880px; }
  .card { padding: 28px; }

  /* === HEAD === */
  .eyebrow-top {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted-foreground);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .eyebrow-top .pulse {
    width: 6px; height: 6px; border-radius: 9999px;
    background: var(--accent);
    box-shadow: 0 0 6px rgba(209,248,67,0.6);
  }
  .lede {
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--muted-foreground);
    line-height: 1.55;
    max-width: 62ch;
    margin: 8px 0 24px;
  }

  /* === TWO-COL LAYOUT === */
  .layout {
    display: grid;
    grid-template-columns: 440px 1fr;
    gap: 32px;
    align-items: center;
  }

  /* === PYRAMID === */
  .pyramid {
    width: 440px;
    user-select: none;
    position: relative;
    padding-bottom: 26px; /* room for ground shadow */
  }
  /* Soft elliptical ground shadow under the pyramid */
  .pyramid::after {
    content: "";
    position: absolute;
    left: 9%; right: 9%;
    bottom: 4px;
    height: 18px;
    background: radial-gradient(ellipse at center,
      rgba(10,31,23,0.22) 0%,
      rgba(10,31,23,0.10) 40%,
      rgba(10,31,23,0)   75%);
    z-index: 0;
    pointer-events: none;
    filter: blur(2px);
  }
  .slab {
    width: 440px;
    height: 64px;
    display: block;
    border: 0;
    padding: 0;
    background: transparent;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: opacity 220ms ease, transform 220ms ease, filter 220ms ease;
    opacity: 0.55;
    filter: saturate(0.85);
  }
  .slab:focus { outline: none; }
  .slab:focus-visible .fill {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .slab:hover { opacity: 0.88; filter: saturate(1); }
  .slab:hover .fill { filter: brightness(1.06); }
  .slab.is-active {
    opacity: 1;
    filter: saturate(1) drop-shadow(0 12px 24px rgba(10,31,23,0.22));
    z-index: 2;
  }

  /* === CLIPPED TRAPEZOID + DEPTH LAYERS === */
  /* .fill is the trapezoid face. Inside, ::before paints highlight+shadow on the
     same clipped shape, and ::after paints a 1px rim-light along the top edge. */
  .slab .fill {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 16px;
    color: var(--cream-50);
    isolation: isolate;
  }
  .slab .fill::before {
    /* Top highlight → bottom shadow gradient — gives the slab a beveled body */
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(255,255,255,0.22) 0%,
      rgba(255,255,255,0.06) 12%,
      rgba(255,255,255,0)    32%,
      rgba(0,0,0,0)          62%,
      rgba(0,0,0,0.10)       86%,
      rgba(0,0,0,0.22)      100%);
    pointer-events: none;
  }
  .slab .fill::after {
    /* Thin rim light along the top edge — catches imaginary overhead light */
    content: "";
    position: absolute; left: 0; right: 0; top: 0;
    height: 1px;
    background: linear-gradient(to right,
      rgba(255,255,255,0)   0%,
      rgba(255,255,255,0.45) 18%,
      rgba(255,255,255,0.55) 50%,
      rgba(255,255,255,0.45) 82%,
      rgba(255,255,255,0)  100%);
    pointer-events: none;
  }

  /* Per-level trapezoid clip + PYR-* AXIS COLORS (one color per axis).
     Bruker --pyr-* (rå hex, mode-invariant) i stedet for semantiske aliaser
     (--primary, --warning, etc.) — disse flipper i dark mode og bryter
     akse-identiteten. Fix-pattern flagget i spec for pyramid.html:
     "den ene tillatte regnbuen i hele systemet".
     Container 440px wide; 5 slabs taper from base 440 → top 160.
     Shrink per level = 56 (28 each side). Percentages relative to 440. */
  .slab[data-level="5"] .fill {
    background-color: var(--pyr-turn);    /* TURNERING */
    clip-path: polygon(31.82% 0%, 68.18% 0%, 74.55% 100%, 25.45% 100%);
  }
  .slab[data-level="4"] .fill {
    background-color: var(--pyr-spill); color: var(--forest-900);  /* SPILL — lime */
    clip-path: polygon(25.45% 0%, 74.55% 0%, 80.91% 100%, 19.09% 100%);
  }
  .slab[data-level="3"] .fill {
    background-color: var(--pyr-slag);    /* GOLFSLAG */
    clip-path: polygon(19.09% 0%, 80.91% 0%, 87.27% 100%, 12.73% 100%);
  }
  .slab[data-level="2"] .fill {
    background-color: var(--pyr-tek);     /* TEKNISK */
    clip-path: polygon(12.73% 0%, 87.27% 0%, 93.64% 100%, 6.36% 100%);
  }
  .slab[data-level="1"] .fill {
    background-color: var(--pyr-fys);     /* FYSISK */
    clip-path: polygon(6.36% 0%, 93.64% 0%, 100% 100%, 0% 100%);
  }

  /* Lime slab (L4) needs warm-tone gradients so it doesn't wash out */
  .slab[data-level="4"] .fill::before {
    background: linear-gradient(to bottom,
      rgba(255,255,255,0.55) 0%,
      rgba(255,255,255,0.16) 14%,
      rgba(255,255,255,0)    34%,
      rgba(10,40,30,0)       64%,
      rgba(10,40,30,0.12)    88%,
      rgba(10,40,30,0.24)   100%);
  }
  .slab[data-level="4"] .fill::after {
    background: linear-gradient(to right,
      rgba(255,255,255,0)    0%,
      rgba(255,255,255,0.85) 50%,
      rgba(255,255,255,0)  100%);
  }
  .slab .num {
    font-family: var(--font-display);
    font-style: italic; font-weight: 400;
    font-size: 19px;
    line-height: 1;
    letter-spacing: -0.02em;
    opacity: 0.55;
    font-feature-settings: "tnum","zero";
    position: relative; z-index: 1;
  }
  .slab .lbl {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 19px;
    line-height: 1;
    letter-spacing: -0.02em;
    position: relative; z-index: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,0.10);
  }
  .slab[data-level="4"] .lbl { text-shadow: none; }
  .slab.is-active .num { opacity: 0.78; }

  .foot-hint {
    margin-top: 6px;
    width: 440px;
    font-family: var(--font-mono); font-size: 10px;
    color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.12em;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  /* === DETAIL PANEL === */
  .detail {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    --current-color: var(--pyr-fys);
    display: flex; flex-direction: column;
    min-height: 380px;
  }

  /* Eyebrow as rounded-full axis-colored pill */
  .detail-eyebrow {
    display: inline-flex; align-items: center;
    background-color: var(--current-color);
    color: var(--cream-50);
    padding: 5px 14px;
    border-radius: 9999px;
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    transition: background-color 250ms ease, color 250ms ease;
    align-self: flex-start;
  }
  .detail.is-lime .detail-eyebrow { color: var(--forest-900); }

  .detail-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 24px;
    line-height: 1.2;
    letter-spacing: -0.015em;
    color: var(--foreground);
    margin: 14px 0 8px;
  }
  .detail-title em {
    font-style: italic;
    font-weight: 400;
    color: var(--primary);
  }

  .detail-lead {
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.55;
    color: var(--muted-foreground);
    margin: 0 0 22px;
    max-width: 50ch;
  }

  .detail-sec {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted-foreground);
    display: flex; align-items: center; gap: 10px;
    margin: 0 0 14px;
  }
  .detail-sec::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* === BULLET ACCORDIONS === */
  .detail-bullets {
    margin: 0; padding: 0;
    list-style: none;
    display: flex; flex-direction: column;
    border-top: 1px solid var(--border);
  }
  .bullet { border-bottom: 1px solid var(--border); }
  .bullet-head {
    width: 100%;
    background: transparent;
    border: 0;
    padding: 14px 6px;
    cursor: pointer;
    display: grid;
    grid-template-columns: 16px 1fr 16px;
    gap: 14px;
    align-items: start;
    text-align: left;
    font: inherit;
    color: inherit;
    border-radius: 6px;
    transition: background 120ms;
  }
  .bullet-head:hover { background: var(--secondary); }
  .bullet-dot {
    width: 8px; height: 8px; border-radius: 9999px;
    margin-top: 6px;
    background-color: var(--current-color);
    transition: background-color 250ms ease;
    justify-self: center;
  }
  .bullet-content {
    display: flex; flex-direction: column; gap: 3px;
    min-width: 0;
  }
  .bullet-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.005em;
    color: var(--foreground);
    line-height: 1.3;
  }
  .bullet-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--muted-foreground);
  }
  .bullet-chevron {
    color: var(--muted-foreground);
    margin-top: 4px;
    transition: transform 150ms ease-out, color 150ms;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .bullet-chevron svg { width: 14px; height: 14px; }
  .bullet[data-open="true"] .bullet-chevron {
    transform: rotate(90deg);
    color: var(--foreground);
  }
  .bullet-more {
    max-height: 0;
    overflow: hidden;
    transition: max-height 200ms ease-out, padding-bottom 150ms ease-out;
    padding: 0 14px 0 30px;
  }
  .bullet[data-open="true"] .bullet-more {
    max-height: 320px;
    padding-bottom: 14px;
  }
  .bullet-more p {
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted-foreground);
    margin: 0;
  }

  /* Deep link */
  .detail-deep-link {
    display: inline-flex; align-items: center; gap: 5px;
    margin-top: 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--primary);
    text-decoration: none;
    align-self: flex-start;
    transition: gap 150ms;
  }
  .detail-deep-link:hover { gap: 9px; text-decoration: underline; }

  /* Fade content swap */
  .detail-content.is-swapping {
    animation: fadeUp 280ms cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

</style></head>
<body><div class="card">

  <span class="eyebrow-top"><span class="pulse"></span>TRENINGSPYRAMIDE · 5 NIVÅER</span>
  <p class="lede">Hver del bygger på den under. Klikk et nivå for å se hva som er viktig, og hvordan det henger sammen med resten av pyramiden.</p>

  <div class="layout">

    <!-- PYRAMID -->
    <div>
      <div class="pyramid" role="tablist" aria-label="Treningspyramide-nivåer">
        <button class="slab" data-level="5" role="tab" aria-controls="detail-panel">
          <span class="fill"><span class="num">05</span><span class="lbl">Turnering</span></span>
        </button>
        <button class="slab" data-level="4" role="tab" aria-controls="detail-panel">
          <span class="fill"><span class="num">04</span><span class="lbl">Spill</span></span>
        </button>
        <button class="slab" data-level="3" role="tab" aria-controls="detail-panel">
          <span class="fill"><span class="num">03</span><span class="lbl">Golfslag</span></span>
        </button>
        <button class="slab" data-level="2" role="tab" aria-controls="detail-panel">
          <span class="fill"><span class="num">02</span><span class="lbl">Teknisk</span></span>
        </button>
        <button class="slab is-active" data-level="1" role="tab" aria-selected="true" aria-controls="detail-panel">
          <span class="fill"><span class="num">01</span><span class="lbl">Fysisk</span></span>
        </button>
      </div>
      <div class="foot-hint"><i data-lucide="mouse-pointer-2" style="width:11px;height:11px"></i>Trykk et nivå</div>
    </div>

    <!-- DETAIL PANEL -->
    <aside class="detail" id="detail-panel" role="tabpanel">
      <div class="detail-content">
        <span class="detail-eyebrow" id="d-eyebrow">01 FYSISK · FUNDAMENT</span>
        <h2 class="detail-title" id="d-title">Kroppen som tåler <em>hele sesongen</em></h2>
        <p class="detail-lead" id="d-lead"></p>
        <div class="detail-sec">HVA ER VIKTIG</div>
        <ul class="detail-bullets" id="d-bullets"></ul>
        <a class="detail-deep-link" id="d-link" href="#">Les mer om FYSISK →</a>
      </div>
    </aside>

  </div>

  <script>
    const levels = {
      1: {
        color: 'var(--pyr-fys)', isLime: false, key: 'FYSISK',
        eyebrow: '01 FYSISK · FUNDAMENT',
        titleHtml: 'Kroppen som tåler <em>hele sesongen</em>',
        lead: 'Styrke, mobilitet og restitusjon — alt som gjør at svingen holder fra hull 1 til hull 18, fra mars til oktober. Uten dette kollapser alt over.',
        bullets: [
          { title: 'Rotasjonsstyrke og power',
            text: 'Golfsvingen er en rotasjonsbevegelse. Styrke i transversalplanet er ikke valgfritt — det bestemmer hvor mye kraft teknikken kan kanalisere.',
            more: 'Medisinball-kast, cable woodchops, pallof press. RFD (rate of force development) er viktigere enn maks-styrke — svingen tar 200 ms. Rotasjonstrening gir 3× bedre return enn generell styrketrening for kølletempo.' },
          { title: 'Hofte-mobilitet og thorax-rotasjon',
            text: 'Begrenset hofterotasjon er den vanligste fysiske begrensningen hos norske golfere. Den setter et tak på svingplanet.',
            more: '90/90-tøyninger, hoftevridninger, kontrollerte dype knebøy. TPI Big 12-screening bør gjøres ved sesongstart. Sittende rotasjonstest måler thorax-mobilitet direkte.' },
          { title: 'Restitusjon er trening',
            text: 'Søvn er den viktigste restitusjonsøvelsen. Trening uten restitusjon er bare slitasje — styrke bygges i måneder og tapes i uker.',
            more: 'Søvnhygiene, aktiv hvile, foam rolling, statisk tøyning etter økt. Spillere som trener 6 dager uten hvile presterer dårligere, ikke bedre. Vedlikeholdsøkter i sesong er ikke valgfrie.' }
        ]
      },
      2: {
        color: 'var(--pyr-tek)', isLime: false, key: 'TEKNISK',
        eyebrow: '02 TEKNISK · SVING-DNA',
        titleHtml: 'Teknikken som gir <em>repeterbart</em> slag',
        lead: '100 % fokus på bevegelse — kropp, armer, kølleskaft, kølleblad. Feedbacken fra golfballen er irrelevant her. Du ser på om kroppen gjør det den skal.',
        bullets: [
          { title: 'MORAD-posisjoner (P1–P10)',
            text: 'Svingen deles i 10 nøkkelposisjoner. Hver posisjon har kriterier for kropp og kølle. Drills har alltid en posisjon som målreferanse.',
            more: 'P1.0 Setup → P4.0 Topp → P5.0 Overgang → P8.0 Impact → P10.0 Finish. “Stopp-på-toppen” trener P4.0. “Pump drill” trener P5.0→P6.0. Coach evaluerer via video eller speil — aldri via ballflukt.' },
          { title: 'Sekvens og tempo',
            text: 'Hofte → torso → arm → kølle. Ground-up-sekvensen bestemmer om kraften overføres eller forsvinner. 3:1 ratio mellom backswing og downswing.',
            more: 'Metronomøvelser, slow-motion-svinger med pause i nøkkelposisjoner. Tempokonsistens korrelerer direkte med lavere score-spredning. Hvis overkroppen starter nedsving før hoften, forsvinner energien.' },
          { title: 'Ikke bland TEK og SLAG',
            text: 'Den vanligste feilen i golf. Spillere trener på feedback fra ballen når problemet er bevegelsen. TEK betyr: ignorer ballen, fokuser på kroppen.',
            more: 'En spiller med stor spredning på TrackMan klarer ikke å gjøre samme bevegelse over tid. Da er problemet i TEK, ikke i SLAG. Trening på feil nivå i pyramiden er bortkastet tid — og det er der de fleste spillere er.' }
        ]
      },
      3: {
        color: 'var(--pyr-slag)', isLime: false, key: 'GOLFSLAG',
        eyebrow: '03 GOLFSLAG · RESULTAT',
        titleHtml: 'Fra bevegelse til <em>presisjon</em>',
        lead: 'Overgangen der teknikk møter resultat. Her øker presset. Feedbacken fra ballen teller nå — avstand, retning, trajectory. SG-data dikterer hva du trener.',
        bullets: [
          { title: 'Wedge-matrise og avstandskontroll',
            text: 'Systematisk kontroll med 4–5 wedger fra 30 til 120 meter. Backsving-lengde × kølle = avstand. Dokumentert i personlig wedge-chart.',
            more: 'Amatører taper flest slag på innspill (SG-APP) og nærspill (SG-ARG) — ikke på drivet. 60 % av treningstiden bør gå til kort spill og putting, 30 % jernspill, 10 % driver. Data lyver ikke.' },
          { title: 'Trening PÅ banen, ikke FOR score',
            text: 'Spillere hopper fra driving range rett til scoring. De trener aldri golfslag under realistiske betingelser uten resultatfokus.',
            more: 'Gå ut på banen for å trene. Ikke for å score. Spill 9 hull med bare wedge og putter. Treff 5 innspill fra ulike lies til samme green. Constraint-based trening bygger ferdigheten som blokk-praksis på rangen ikke kan.' },
          { title: 'Norske baner skjuler svakheter',
            text: 'Baner i Norge er lette nok til å score “greit” uten stor teknisk ferdighet. Det betyr at spillere ikke vet hva neste nivå krever.',
            more: 'SLAG-trening avslører dette brutalt. Når du tester presisjon på 80 meter til et flagg med vann bak, ser du forskjellen mellom en spiller som har trent overgangen og en som har hoppet over den. SG-benchmark mot Korn Ferry / EPGA Q-School viser gapet tydelig.' }
        ]
      },
      4: {
        color: 'var(--pyr-spill)', isLime: true, key: 'SPILL',
        eyebrow: '04 SPILL · STRATEGI',
        titleHtml: 'Beslutningene som <em>sparer slag</em>',
        lead: 'Course management, risiko-belønning og evnen til å bruke ferdighetene dine riktig — ikke bare ha dem. Opptil 30 % av score-forbedring kommer fra bedre beslutninger.',
        bullets: [
          { title: 'Sikt på green, ikke på flagg',
            text: 'Amatører sikter på flagget. Proffer sikter på tryggest mulig posisjon for neste slag. Sentrum av green med 2-putt slår flagg-jaging — statistisk, hver gang.',
            more: 'Bruk din faktiske spredning (TrackMan dispersion), ikke drømmeslaget, som beslutningsgrunnlag. Hvis 7-jernet ditt sprer seg 15 meter, kan du ikke skyte over vann mot et flagg 3 meter fra kanten.' },
          { title: 'Kjenn din egen spredning',
            text: 'Hvis du ikke vet hvor bredt du sprer deg med hvert jern, tar du beslutninger i blinde. Dispersion-data er grunnlaget for all banestrategi.',
            more: 'TrackMan Range gir deg presis spredning per kølle. Bygg et dispersion-chart: gjennomsnittlig avvik i carry og sideveis per jern. Oppdater hver 4. uke. Strategien din er bare så god som dataene den bygger på.' },
          { title: 'Ha en Plan B for hvert hull',
            text: 'Spillere med bare én strategi — “drive fairway, innspill green, 2-putt” — kollapser når planen svikter.',
            more: 'God strategi inkluderer: “Hvis jeg bommer fairway venstre, spiller jeg 8-jern tilbake til 80 meter og wedger inn.” Situasjonsspill-trening: 2 over par med 4 hull igjen. Matchspill 1 ned. Medvind par-5 med vann. Mentale kart for beslutninger under press.' }
        ]
      },
      5: {
        color: 'var(--pyr-turn)', isLime: false, key: 'TURNERING',
        eyebrow: '05 TURNERING · UNDER PRESS',
        titleHtml: 'Lever når det <em>teller</em>',
        lead: 'Alt du har bygget i de fire aksene under testes her. Mental forberedelse, rutiner og logistikk er ferdigheter — de trenes like systematisk som en bunkerredning.',
        bullets: [
          { title: 'Pre-shot og post-shot-rutine',
            text: 'En standardisert sekvens på hvert slag: visualisering → prøvesving → alignment → pust → sving. 10–15 sekunder, identisk hver gang.',
            more: 'Post-shot: aksepter resultatet innen 10 skritt. Reset-pust. Fokus på neste slag. Erstatt “det var elendig” med “neste slag er en ny mulighet.” Rutine-konsistens måles på video — variasjonen skal være under 2 sekunder.' },
          { title: 'Strukturert oppvarming, ikke improvisasjon',
            text: 'Spillere som ankommer 15 minutter før tee og slår 10 baller er ikke forberedt — de er forsinket.',
            more: '45–60 min: dynamisk strekk → korte slag → mellomlange → fulle slag → putting speed-kalibrering. Det er ikke trening — det er kalibrering. Du finner dagens følelse, ikke prøver å endre den.' },
          { title: 'Turneringsscore vs. treningsscore',
            text: 'En spiller som putter 90 % fra 1,5 m i trening men 70 % i turnering har ikke et putting-problem — de har et TURN-problem.',
            more: 'Inkluder scoring-konsekvenser i trening hele året. “Miss denne putten og start om igjen.” Scoregapet mellom trening og turnering er den viktigste KPI-en i denne aksen. Visualisering kvelden før runden: se slagene, kjenn følelsen, registrer roen.' }
        ]
      }
    };

    const slabs = document.querySelectorAll('.slab');
    const detail = document.getElementById('detail-panel');
    const eyebrowEl = document.getElementById('d-eyebrow');
    const titleEl   = document.getElementById('d-title');
    const leadEl    = document.getElementById('d-lead');
    const bulletsEl = document.getElementById('d-bullets');
    const linkEl    = document.getElementById('d-link');
    const contentEl = detail.querySelector('.detail-content');

    function selectLevel(level) {
      const data = levels[level];
      slabs.forEach(s => {
        const active = s.dataset.level === String(level);
        s.classList.toggle('is-active', active);
        s.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      contentEl.classList.remove('is-swapping');
      void contentEl.offsetWidth;
      contentEl.classList.add('is-swapping');

      detail.style.setProperty('--current-color', data.color);
      detail.classList.toggle('is-lime', data.isLime);
      eyebrowEl.textContent = data.eyebrow;
      titleEl.innerHTML = data.titleHtml;
      leadEl.textContent = data.lead;
      linkEl.textContent = `Les mer om ${data.key} →`;

      bulletsEl.innerHTML = data.bullets.map((b, i) => `
        <li class="bullet" data-bullet="${i}" data-open="false">
          <button class="bullet-head" type="button">
            <span class="bullet-dot"></span>
            <span class="bullet-content">
              <span class="bullet-title">${b.title}</span>
              <span class="bullet-text">${b.text}</span>
            </span>
            <span class="bullet-chevron"><i data-lucide="chevron-right"></i></span>
          </button>
          <div class="bullet-more"><p>${b.more}</p></div>
        </li>
      `).join('');

      bulletsEl.querySelectorAll('.bullet').forEach((b) => {
        b.querySelector('.bullet-head').addEventListener('click', () => {
          b.dataset.open = b.dataset.open === 'true' ? 'false' : 'true';
        });
      });
      lucide.createIcons();
    }

    slabs.forEach(s => {
      s.addEventListener('click', () => selectLevel(Number(s.dataset.level)));
    });

    // Init with level 1 selected
    selectLevel(1);
    lucide.createIcons();
  </script>
</div></body></html>
