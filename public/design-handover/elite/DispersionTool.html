<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <title>Dispersion-verktøy · AK Golf HQ</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="preview/_shared.css">
  <link rel="stylesheet" href="dispersion-tool.css">
  <script src="https://unpkg.com/lucide@0.453.0"></script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="dispersion-math.jsx"></script>
  <script type="text/babel" src="dispersion-archetypes.jsx"></script>
  <script type="text/babel" src="dispersion-tool.jsx"></script>

  <script type="text/babel">
    // Wait one tick for component definitions to land on window.
    setTimeout(() => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<window.DispersionTool />);
      // Re-render lucide icons after React mount + on updates.
      const refreshIcons = () => lucide.createIcons();
      refreshIcons();
      // Observe DOM mutations to refresh icons when insights update.
      const observer = new MutationObserver(() => {
        clearTimeout(window.__lucideRefresh);
        window.__lucideRefresh = setTimeout(refreshIcons, 50);
      });
      observer.observe(document.getElementById('root'),
        { childList: true, subtree: true });
    }, 50);
  </script>
</body>
</html>
