<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Workspace · Notion-integrerte oppgaver & prosjekter — AK Golf CoachHQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="workbench-v2.css">
<link rel="stylesheet" href="coachhq.css">
<style>
  /* shared bits also needed by the screens */
  .x-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; }
  .x-pill.aktiv { background: rgba(209,248,67,0.42); color: #3B4310; }
  .x-pill.draft { background: rgba(94,92,87,0.14); color: var(--muted); }
  .x-pill.done  { background: rgba(44,125,82,0.16); color: var(--success); }
  .mini-topbar { display: flex; align-items: center; gap: 16px; height: 52px; padding: 0 24px; background: #fff; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .mini-topbar .crumbs { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
  .mini-topbar .crumbs strong { color: var(--fg); font-weight: 600; }
  .mini-topbar .role-toggle { display: inline-flex; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .mini-topbar .role-toggle button { padding: 5px 12px; border-radius: 999px; font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; border: 0; background: transparent; }
  .mini-topbar .role-toggle button.active { background: var(--primary); color: var(--accent); }
  .mini-topbar .tb-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .mini-topbar .tb-av { width: 30px; height: 30px; border-radius: 50%; background: var(--primary); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 11px; font-weight: 700; }
  .state-strip { display: inline-flex; gap: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .state-strip button { padding: 5px 12px; border-radius: 999px; font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; border: 0; background: transparent; cursor: pointer; text-transform: uppercase; }
  .state-strip button.active { background: var(--fg); color: var(--accent); }
  .ph-status { height: 44px; flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 22px 6px; font-family: var(--font-mono); font-size: 13px; font-weight: 700; }
  .ph-status .right { display: flex; gap: 4px; align-items: center; }
  .ph-header { padding: 12px 18px 14px; background: #fff; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .ph-body { flex: 1; padding: 16px 18px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .ph-footer { padding: 12px 18px 20px; background: #fff; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
  .ph-footer .btn { width: 100%; justify-content: center; padding: 14px; font-size: 14px; border-radius: 12px; }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="manglende/shared.jsx"></script>
<script type="text/babel" src="workspace/shared.jsx"></script>
<script type="text/babel" src="workspace/s1-workspace-min-uke.jsx"></script>
<script type="text/babel" src="workspace/s2-oppgaver.jsx"></script>
<script type="text/babel" src="workspace/s3-task-detalj.jsx"></script>
<script type="text/babel" src="workspace/s4-prosjekter.jsx"></script>
<script type="text/babel" src="workspace/s5-notion-config.jsx"></script>
<script type="text/babel">
  function App() {
    return (
      <DesignCanvas>
        <DCSection id="ws-s1" title="1 · Min uke" subtitle="/admin/workspace — default for Anders · brenner-strip + 3-kol I dag / Denne uka / Senere">
          <DCArtboard id="ws-s1-desktop" label="Desktop · 1440" width={1440} height={1080}>
            <S1_MinUke/>
          </DCArtboard>
          <DCArtboard id="ws-s1-mobile" label="Mobile" width={390} height={820}>
            <S1_MinUke_Mobile/>
          </DCArtboard>
        </DCSection>

        <DCSection id="ws-s2" title="2 · Oppgaver" subtitle="/admin/workspace/oppgaver — view-toggle Liste / Kanban / Kalender, filter-bar sticky">
          <DCArtboard id="ws-s2-desktop" label="Desktop · liste" width={1440} height={1100}>
            <S2_Oppgaver/>
          </DCArtboard>
          <DCArtboard id="ws-s2-mobile" label="Mobile" width={390} height={820}>
            <S2_Oppgaver_Mobile/>
          </DCArtboard>
        </DCSection>

        <DCSection id="ws-s3" title="3 · Task-detalj" subtitle="/admin/workspace/oppgaver/[id] — 2-kol med metadata-sidebar · 404-fallback hvis privat">
          <DCArtboard id="ws-s3-desktop" label="Desktop · 1280" width={1280} height={1100}>
            <S3_TaskDetalj/>
          </DCArtboard>
          <DCArtboard id="ws-s3-mobile" label="Mobile" width={390} height={820}>
            <S3_TaskDetalj_Mobile/>
          </DCArtboard>
        </DCSection>

        <DCSection id="ws-s4" title="4 · Prosjekter" subtitle="/admin/workspace/prosjekter — 3-kol grid, fargestripe pr. selskap">
          <DCArtboard id="ws-s4-desktop" label="Desktop · 1440" width={1440} height={1100}>
            <S4_Prosjekter/>
          </DCArtboard>
          <DCArtboard id="ws-s4-mobile" label="Mobile" width={390} height={820}>
            <S4_Prosjekter_Mobile/>
          </DCArtboard>
        </DCSection>

        <DCSection id="ws-s5" title="5 · Notion-konfig" subtitle="/admin/workspace/notion — empty-state + koblet-state med feltkartlegging og sync-historikk">
          <DCArtboard id="ws-s5-desktop" label="Desktop · 1440" width={1440} height={1280}>
            <S5_NotionConfig/>
          </DCArtboard>
          <DCArtboard id="ws-s5-mobile" label="Mobile" width={390} height={820}>
            <S5_NotionConfig_Mobile/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
