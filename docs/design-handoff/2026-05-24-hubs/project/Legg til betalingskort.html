<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Legg til betalingskort — AK Golf PlayerHQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="workbench-v2.css">
<style>
  /* Shared screen styles, lifted from the design canvas */
  body { background: var(--bg); min-height: 100vh; }
  .x-hero { padding: 28px 32px 22px; background: linear-gradient(180deg, #FBFAF5 0%, var(--bg) 100%); border-bottom: 1px solid var(--border); }
  .x-hero .eyebrow { font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
  .x-hero h1 { font-family: var(--font-display); font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; margin-top: 8px; }
  .x-hero h1 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--primary); }
  .x-hero .head-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .form-grid { display: flex; flex-direction: column; gap: 18px; }
  .field-stack { display: flex; flex-direction: column; gap: 8px; }
  .stripe-iframe { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-button); padding: 13px 14px; font-family: var(--font-mono); font-size: 13px; color: var(--fg); display: flex; align-items: center; gap: 10px; }
  .stripe-iframe.focused { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,88,64,0.10); }
  .stripe-iframe .placeholder { color: var(--muted-soft); flex: 1; }
  .stripe-iframe .brand { width: 26px; height: 18px; border-radius: 3px; background: #fff; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 8px; font-weight: 700; color: var(--muted); }
  .stripe-iframe .brand.visa { color: #1A1F71; }
  .stripe-iframe .brand.mc { background: linear-gradient(90deg, #EB001B 50%, #F79E1B 50%); color: transparent; }
  .info-card { background: rgba(0,88,64,0.04); border: 1px solid rgba(0,88,64,0.18); border-radius: 12px; padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start; }
  .info-card svg { width: 16px; height: 16px; color: var(--primary); flex-shrink: 0; margin-top: 2px; }
  .info-card .ic-body { font-size: 12.5px; color: var(--fg); line-height: 1.45; }
  .checkbox-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
  .check-box { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--border); flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; background: #fff; }
  .check-box.checked { background: var(--primary); border-color: var(--primary); color: var(--accent); }
  .check-box svg { width: 11px; height: 11px; opacity: 0; }
  .check-box.checked svg { opacity: 1; }
  .checkbox-row .label { font-size: 13px; color: var(--fg); }
  .checkbox-row .label .hint { color: var(--muted); font-family: var(--font-mono); font-size: 10.5px; margin-top: 2px; }
  .card-preview { width: 100%; aspect-ratio: 1.586 / 1; border-radius: 16px; padding: 22px; color: #fff; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; background: linear-gradient(135deg, #003A2A 0%, #005840 55%, #006C50 100%); box-shadow: 0 18px 40px rgba(10,31,23,0.28), 0 0 0 1px rgba(255,255,255,0.08) inset; }
  .card-preview::before { content: ''; position: absolute; right: -40px; top: -40px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(209,248,67,0.20), transparent 70%); }
  .card-preview .cp-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-preview .cp-chip { width: 36px; height: 26px; border-radius: 5px; background: linear-gradient(135deg, rgba(209,248,67,0.85), rgba(209,248,67,0.45)); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.20); }
  .card-preview .cp-brand { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.10em; }
  .card-preview .cp-num { font-family: var(--font-mono); font-size: 16px; font-weight: 500; letter-spacing: 0.10em; color: #fff; }
  .card-preview .cp-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .card-preview .cp-meta { font-family: var(--font-mono); font-size: 9.5px; color: rgba(209,248,67,0.65); letter-spacing: 0.10em; text-transform: uppercase; }
  .card-preview .cp-meta strong { display: block; font-family: var(--font-mono); font-size: 13px; color: #fff; font-weight: 600; margin-top: 2px; letter-spacing: 0.06em; }
  .x-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; }
  .state-strip { display: inline-flex; gap: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .state-strip button { padding: 5px 12px; border-radius: 999px; font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; border: 0; background: transparent; cursor: pointer; text-transform: uppercase; }
  .state-strip button.active { background: var(--fg); color: var(--accent); }
  .mini-topbar { display: flex; align-items: center; gap: 16px; height: 52px; padding: 0 24px; background: #fff; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .mini-topbar .crumbs { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
  .mini-topbar .crumbs strong { color: var(--fg); font-weight: 600; }
  .mini-topbar .role-toggle { display: inline-flex; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .mini-topbar .role-toggle button { padding: 5px 12px; border-radius: 999px; font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; border: 0; background: transparent; }
  .mini-topbar .role-toggle button.active { background: var(--primary); color: var(--accent); }
  .mini-topbar .tb-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .mini-topbar .tb-av { width: 30px; height: 30px; border-radius: 50%; background: var(--primary); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 11px; font-weight: 700; }
  /* Handover banner */
  .handover-banner { position: fixed; bottom: 14px; right: 14px; z-index: 100; background: var(--fg); color: var(--accent); padding: 8px 14px; border-radius: 999px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.10em; text-transform: uppercase; box-shadow: 0 4px 16px rgba(10,31,23,0.20); }
</style>
</head>
<body>
<div class="handover-banner">HANDOVER · VARIANT A</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="manglende/shared.jsx"></script>
<script type="text/babel" src="manglende/s1-kort.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(
    <div style={{ height: '100vh' }}><S1_VariantA/></div>
  );
</script>
</body>
</html>
