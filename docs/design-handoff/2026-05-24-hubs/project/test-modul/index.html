<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Test-modul · 10 skjermer · AK Golf HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter', system-ui, sans-serif; }
  iframe.dc-iframe {
    width: 100%; height: 100%; border: 0; display: block; background: #FAFAF7;
    pointer-events: auto;
  }
  .open-link {
    position: absolute; top: 8px; right: 8px;
    background: rgba(10,31,23,0.82); color: #D1F843;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 0.10em;
    text-transform: uppercase;
    padding: 5px 10px; border-radius: 999px;
    text-decoration: none;
    z-index: 5;
    opacity: 0; transition: opacity 120ms ease;
  }
  [data-dc-slot]:hover .open-link { opacity: 1; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../design-canvas.jsx"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
// NOTE: DCSection filters children by `c.type === DCArtboard`, so each
// artboard must be inlined here — wrapping them in a helper component
// breaks that identity check and the section renders empty.

function App() {
  return (
    <DesignCanvas
      title="AK Golf HQ · Test-modul"
      subtitle="10 skjermer · NGF/WANG 20-test-batteri · PlayerHQ + CoachHQ"
    >
      <DCSection
        id="player"
        title="PlayerHQ · spilleren tar tester"
        subtitle="Dashboard → detalj → live-scoring → summary"
      >
        <DCArtboard id="s1" label="01 · Dashboard" width={1280} height={1100}>
          <a className="open-link" href="tester-dashboard.html" target="_blank" rel="noreferrer">Åpne ↗</a>
          <iframe className="dc-iframe" src="tester-dashboard.html" title="01 Dashboard" />
        </DCArtboard>
        <DCArtboard id="s2" label="02 · Test-detalj" width={1280} height={1500}>
          <a className="open-link" href="tester-detalj.html" target="_blank" rel="noreferrer">Åpne ↗</a>
          <iframe className="dc-iframe" src="tester-detalj.html" title="02 Detalj" />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="live"
        title="Live-scoring · 3 steg"
        subtitle="Fullscreen-flyt · ingen sidebar · sticky CTA"
      >
        <DCArtboard id="s3a" label="03a · Steg 1 oppvarming" width={1100} height={1100}>
          <a className="open-link" href="tester-live-step1.html" target="_blank" rel="noreferrer">Åpne ↗</a>
          <iframe className="dc-iframe" src="tester-live-step1.html" title="03a Steg 1" />
        </DCArtboard>
        <DCArtboard id="s3b" label="03b · Steg 2 slag-felter" width={1100} height={1200}>
          <a className="open-link" href="tester-live-step2.html" target="_blank" rel="noreferrer">Åpne ↗</a>
          <iframe className="dc-iframe" src="tester-live-step2.html" title="03b Steg 2" />
        </DCArtboard>
        <DCArtboard id="s3c" label="03c · Steg 4 fullfør" width={1280} height={1100}>
          <a className="open-link" href="tester-live-step-final.html" target="_blank" rel="noreferrer">Åpne ↗</a>
          <iframe className="dc-iframe" src="tester-live-step-final.html" title="03c Fullfør" />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="summary"
        title="Test-summary · 2 varianter"
        subtitle="PR-celebrasjon vs progresjon-uten-PR"
      >
        <DCArtboard id="s4a" label="04a · Ny PR" width={820} height={1280}>
          <a className="open-link" href="tester-summary-pr.html" target="_blank" rel="noreferrer">Åpne ↗</a>
          <iframe className="dc-iframe" src="tester-summary-pr.html" title="04a Ny PR" />
        </DCArtboard>
        <DCArtboard id="s4b" label="04b · Progresjon (ingen PR)" width={820} height={1280}>
          <a className="open-link" href="tester-summary-progress.html" target="_blank" rel="noreferrer">Åpne ↗</a>
          <iframe className="dc-iframe" src="tester-summary-progress.html" title="04b Progresjon" />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="coach"
        title="CoachHQ · planlegging og analyse"
        subtitle="Tildel-modal · stall-tester · spiller-tester-tab"
      >
        <DCArtboard id="s5" label="05 · Tildel-modal" width={1280} height={900}>
          <a className="open-link" href="tildel-test-modal.html" target="_blank" rel="noreferrer">Åpne ↗</a>
          <iframe className="dc-iframe" src="tildel-test-modal.html" title="05 Tildel-modal" />
        </DCArtboard>
        <DCArtboard id="s6" label="06 · Stall-tester" width={1480} height={1400}>
          <a className="open-link" href="coach-tester-stall.html" target="_blank" rel="noreferrer">Åpne ↗</a>
          <iframe className="dc-iframe" src="coach-tester-stall.html" title="06 Stall-tester" />
        </DCArtboard>
        <DCArtboard id="s7" label="07 · Spiller · Tester-tab" width={1480} height={1700}>
          <a className="open-link" href="coach-spiller-tester-tab.html" target="_blank" rel="noreferrer">Åpne ↗</a>
          <iframe className="dc-iframe" src="coach-spiller-tester-tab.html" title="07 Tester-tab" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
