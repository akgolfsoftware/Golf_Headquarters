<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Golf HQ — Skjermplan (spec-modell)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ECE9E1; --card:#fff; --ink:#0A1F17; --muted:#5E5C57; --line:#E5E3DD;
    --forest:#005840; --lime:#D1F843; --sand:#F1EEE5;
    --ok:#1A7D56; --warn:#B8852A; --info:#2563EB; --bad:#A32D2D; --neutral:#9C9990;
    --mono:'JetBrains Mono',ui-monospace,monospace; --disp:'Inter Tight',sans-serif; --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .mono{font-family:var(--mono)}
  /* layout */
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  aside{position:sticky;top:0;height:100vh;overflow-y:auto;background:#fff;border-right:1px solid var(--line);padding:20px 16px}
  main{min-width:0;padding:0 28px 120px}
  /* sidebar */
  .brand{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:-.02em;line-height:1.1}
  .brand span{color:var(--forest)}
  .sub{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:4px}
  .navlist{margin-top:20px;display:flex;flex-direction:column;gap:2px}
  .navlist a{display:flex;align-items:center;justify-content:space-between;gap:8px;text-decoration:none;color:var(--ink);font-size:13px;padding:7px 9px;border-radius:8px}
  .navlist a:hover{background:var(--sand)}
  .navlist a .c{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .legend{margin-top:22px;border-top:1px solid var(--line);padding-top:16px}
  .legend h4{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
  .lg{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0;cursor:pointer;user-select:none}
  .lg .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .lg.off{opacity:.35}
  /* header */
  header.top{padding:36px 0 18px}
  .ey{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--forest);background:var(--lime);display:inline-block;padding:4px 10px;border-radius:999px}
  h1{font-family:var(--disp);font-weight:700;font-size:40px;letter-spacing:-.03em;margin:14px 0 0}
  .lead{color:var(--muted);max-width:680px;margin-top:10px;font-size:15px}
  .meta{display:flex;flex-wrap:wrap;gap:18px;margin-top:16px;font-size:12px}
  .meta .k{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  /* status summary */
  .summary{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0 6px}
  .sc{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .sc .n{font-family:var(--mono);font-weight:700;font-size:18px}
  .sc .l{font-size:11px;color:var(--muted)}
  .sc .dot{width:9px;height:9px;border-radius:50%}
  /* toolbar */
  .toolbar{position:sticky;top:0;z-index:20;background:rgba(236,233,225,.9);backdrop-filter:blur(8px);padding:12px 0;margin-bottom:8px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--line)}
  .toolbar input{font-family:var(--mono);font-size:13px;padding:8px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;width:280px}
  .toolbar .hint{font-size:12px;color:var(--muted)}
  /* module */
  .mod{padding-top:34px;scroll-margin-top:60px}
  .mod-h{display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--ink);padding-bottom:10px}
  .mod-h h2{font-family:var(--disp);font-weight:700;font-size:24px;letter-spacing:-.02em}
  .mod-h .tema{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .mod-h .tema.dark{background:var(--forest);color:var(--lime);border-color:var(--forest)}
  .mod-h .c{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .mod-desc{color:var(--muted);font-size:13px;margin:10px 0 4px}
  .grp{margin-top:18px}
  .grp h3{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
  /* screen row */
  .rows{display:flex;flex-direction:column;gap:5px}
  .row{display:grid;grid-template-columns:14px 1fr auto auto;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer;transition:border-color .12s}
  .row:hover{border-color:var(--forest)}
  .row.child{margin-left:18px}
  .row .sdot{width:10px;height:10px;border-radius:50%}
  .row .name{font-size:13.5px;font-weight:500;min-width:0}
  .row .name .star{color:var(--warn)}
  .row .name .dag{color:var(--info);font-family:var(--mono);font-size:10px}
  .row .rute{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px}
  .row .kind{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:999px;background:var(--sand);color:var(--muted)}
  .haker{display:flex;align-items:center;gap:6px}
  .hgrp{display:flex;gap:2px}
  .h{width:8px;height:8px;border-radius:2px;background:var(--line)}
  .h.ja{background:var(--ok)} .h.delvis{background:var(--warn)} .h.nei{background:#E0DDD5}
  .hlabel{font-family:var(--mono);font-size:8px;color:var(--neutral);text-transform:uppercase;margin-right:1px}
  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(10,31,23,.4);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:440px;max-width:92vw;background:#fff;border-left:1px solid var(--line);transform:translateX(100%);transition:transform .22s cubic-bezier(.16,1,.3,1);z-index:61;overflow-y:auto;padding:28px}
  .drawer.open{transform:translateX(0)}
  .drawer .close{position:absolute;top:18px;right:18px;border:1px solid var(--line);background:#fff;border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .drawer .dkind{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--forest)}
  .drawer h3{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:-.02em;margin:6px 0}
  .drawer .drute{font-family:var(--mono);font-size:12px;color:var(--muted);word-break:break-all}
  .drawer .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;margin-top:10px}
  .dnote{background:var(--sand);border-radius:10px;padding:12px 14px;font-size:13px;margin-top:16px;line-height:1.5}
  .dhaker{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px}
  .dhaker .item{display:flex;align-items:center;justify-content:space-between;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:7px 10px}
  .dhaker .item b{font-weight:600}
  .dsec{margin-top:20px}
  .dsec h4{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12px;padding:4px 10px;border-radius:8px;background:var(--sand);color:var(--ink)}
  .chip.modal{background:#EAF2FF;color:#1e40af}
  .chip.action{background:#E9F5EE;color:#075440}
  .chip.detail{background:#F3EEFB;color:#5b3a9e}
  .hidden{display:none!important}
  @media(max-width:820px){.app{grid-template-columns:1fr}aside{display:none}main{padding:0 16px 100px}}
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand">AK Golf HQ<br><span>Skjermplan</span></div>
    <div class="sub">spec-modell</div>
    <nav class="navlist" id="nav"></nav>
    <div class="legend">
      <h4>Vis status</h4>
      <div id="legend"></div>
    </div>
  </aside>
  <main>
    <header class="top">
      <span class="ey">Levende kart · spec-modell</span>
      <h1>Hver skjerm, hver tilstand</h1>
      <p class="lead">Alle flater i AK Golf HQ — generert deterministisk fra <span class="mono" style="font-size:13px">MASTER-SKJERMPLAN.md</span>. Klikk en skjerm for å se den utledede spesifikasjonen: tilstander, modaler, handlinger og detaljsider.</p>
      <div class="meta" id="meta"></div>
      <div class="summary" id="summary"></div>
    </header>
    <div class="toolbar">
      <input id="q" type="search" placeholder="søk skjerm eller rute…" autocomplete="off">
      <span class="hint" id="hint"></span>
    </div>
    <div id="content"></div>
  </main>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer"></aside>

<script src="./data.js"></script>
<script src="./spec.js"></script>
<script>
(function(){
  var P = window.PLAN, SPEC = window.SPEC;
  var STATUS = {
    ferdig:   {label:"Ferdig",        color:"#1A7D56"},
    delvis:   {label:"Delvis",        color:"#B8852A"},
    planlagt: {label:"Planlagt",      color:"#9C9990"},
    droppoff: {label:"Tegnet, ubrukt",color:"#D1A93A"},
    mangler:  {label:"Mangler",       color:"#A32D2D"},
    system:   {label:"System/internt",color:"#2563EB"},
  };
  var HAKER = [
    {k:"design",label:"Design",solo:true},
    {k:"_resp",label:"Responsiv",parts:["mobil","desktop","ipad"]},
    {k:"adresse",label:"Adresse",solo:true},
    {k:"flyt",label:"Flyt",solo:true},
    {k:"data",label:"Data",solo:true},
    {k:"funker",label:"Funker",solo:true},
  ];
  var active = Object.keys(STATUS).reduce(function(o,k){o[k]=true;return o;},{});
  var query = "";

  // ---- meta + summary ----
  var totalScreens = P.modules.reduce(function(a,m){return a+m.screens.length;},0);
  document.getElementById("meta").innerHTML =
    '<div><div class="k">Skjermer</div>'+totalScreens+'</div>'+
    '<div><div class="k">Moduler</div>'+P.modules.length+'</div>'+
    '<div><div class="k">Kilde</div>'+P.meta.source+'</div>'+
    '<div><div class="k">Oppdatert</div>'+P.meta.updated+'</div>';

  var counts = {};
  P.modules.forEach(function(m){m.screens.forEach(function(s){counts[s.status]=(counts[s.status]||0)+1;});});
  document.getElementById("summary").innerHTML = Object.keys(STATUS).map(function(k){
    return '<div class="sc"><span class="dot" style="background:'+STATUS[k].color+'"></span>'+
      '<span class="n">'+(counts[k]||0)+'</span><span class="l">'+STATUS[k].label+'</span></div>';
  }).join("");

  // ---- nav ----
  document.getElementById("nav").innerHTML = P.modules.map(function(m){
    return '<a href="#mod-'+m.id+'">'+m.name+'<span class="c">'+m.screens.length+'</span></a>';
  }).join("");

  // ---- legend (status-filter) ----
  document.getElementById("legend").innerHTML = Object.keys(STATUS).map(function(k){
    return '<div class="lg" data-k="'+k+'"><span class="dot" style="background:'+STATUS[k].color+'"></span>'+STATUS[k].label+'</div>';
  }).join("");
  document.querySelectorAll(".lg").forEach(function(el){
    el.addEventListener("click",function(){
      var k=el.dataset.k; active[k]=!active[k]; el.classList.toggle("off",!active[k]); render();
    });
  });

  // ---- haker-strip ----
  function hakerStrip(h){
    if(!h) return "";
    return '<div class="haker">'+HAKER.map(function(g){
      if(g.solo){
        return '<div class="hgrp" title="'+g.label+': '+h[g.k]+'"><span class="hlabel">'+g.label.slice(0,1)+'</span><span class="h '+h[g.k]+'"></span></div>';
      }
      return '<div class="hgrp" title="Responsiv (mob/desk/iPad)">'+g.parts.map(function(p){
        return '<span class="h '+h[p]+'" title="'+p+': '+h[p]+'"></span>';
      }).join("")+'</div>';
    }).join("")+'</div>';
  }

  // ---- render ----
  function rowHTML(s,mod){
    var sp = SPEC.specFor(s);
    var st = STATUS[s.status]||{color:"#9C9990",label:s.status};
    var nm = s.navn + (s.key?' <span class="star">★</span>':'') + (s.datakoblet?' <span class="dag">†</span>':'');
    return '<div class="row'+(s.child?' child':'')+'" data-rute="'+enc(s.rute)+'" data-mod="'+mod.id+'" data-search="'+enc((s.navn+' '+s.rute).toLowerCase())+'" data-status="'+s.status+'">'+
      '<span class="sdot" style="background:'+st.color+'"></span>'+
      '<span class="name">'+nm+'<span class="rute" style="display:block;font-weight:400">'+s.rute+'</span></span>'+
      '<span class="kind">'+(SPEC.KIND_LABEL[sp.kind]||sp.kind)+'</span>'+
      hakerStrip(s.haker)+
    '</div>';
  }
  function enc(x){return String(x).replace(/"/g,"&quot;");}

  function render(){
    var html="", shown=0;
    P.modules.forEach(function(m){
      var groups={}, order=[];
      m.screens.forEach(function(s){
        if(!active[s.status]) return;
        if(query && (s.navn+" "+s.rute).toLowerCase().indexOf(query)===-1) return;
        var g=s.gruppe||m.name;
        if(!groups[g]){groups[g]=[];order.push(g);}
        groups[g].push(s); shown++;
      });
      if(order.length===0) return;
      var n=order.reduce(function(a,g){return a+groups[g].length;},0);
      html+='<section class="mod" id="mod-'+m.id+'"><div class="mod-h">'+
        '<h2>'+m.name+'</h2>'+
        (m.tema?'<span class="tema '+(m.tema==="mørkt"?"dark":"")+'">'+m.tema+'</span>':'')+
        '<span class="c">'+n+' skjermer</span></div>'+
        '<p class="mod-desc">'+m.desc+'</p>';
      order.forEach(function(g){
        html+='<div class="grp"><h3>'+g+'</h3><div class="rows">'+
          groups[g].map(function(s){return rowHTML(s,m);}).join("")+'</div></div>';
      });
      html+='</section>';
    });
    document.getElementById("content").innerHTML = html || '<p style="padding:40px 0;color:var(--muted)">Ingen skjermer matcher filteret.</p>';
    document.getElementById("hint").textContent = shown+" av "+totalScreens+" skjermer";
    bindRows();
  }

  // ---- drawer ----
  function bindRows(){
    document.querySelectorAll(".row").forEach(function(r){
      r.addEventListener("click",function(){openDrawer(r.dataset.rute,r.dataset.mod);});
    });
  }
  function findScreen(rute,modId){
    var m=P.modules.find(function(x){return x.id===modId;});
    return m && m.screens.find(function(s){return s.rute===rute;});
  }
  function openDrawer(rute,modId){
    var s=findScreen(rute,modId); if(!s) return;
    var sp=SPEC.specFor(s); var st=STATUS[s.status]||{color:"#9C9990",label:s.status};
    var hakerRows="";
    if(s.haker){
      var labels={design:"Design",mobil:"Mobil",desktop:"Desktop",ipad:"iPad",adresse:"Adresse",flyt:"Flyt",data:"Data",funker:"Funker"};
      hakerRows='<div class="dhaker">'+Object.keys(labels).map(function(k){
        var v=s.haker[k]; var c=v==="ja"?"#1A7D56":v==="delvis"?"#B8852A":"#C4C0B8";
        var t=v==="ja"?"✓":v==="delvis"?"~":"–";
        return '<div class="item"><b>'+labels[k]+'</b><span style="color:'+c+';font-family:var(--mono);font-weight:700">'+t+'</span></div>';
      }).join("")+'</div>';
    }
    function chips(arr,cls){return arr.length? '<div class="chips">'+arr.map(function(x){return '<span class="chip '+cls+'">'+x+'</span>';}).join("")+'</div>' : '<div class="chips"><span class="chip" style="opacity:.5">—</span></div>';}
    var d=document.getElementById("drawer");
    d.innerHTML='<button class="close" id="dclose">✕</button>'+
      '<div class="dkind">'+(SPEC.KIND_LABEL[sp.kind]||sp.kind)+' · '+modId+'</div>'+
      '<h3>'+s.navn+'</h3>'+
      '<div class="drute">'+s.rute+'</div>'+
      '<span class="pill" style="background:'+st.color+'22;color:'+st.color+'">'+st.label+'</span>'+
      (sp.note?'<div class="dnote">'+sp.note+'</div>':'')+
      (s.note?'<div class="dnote">'+s.note+'</div>':'')+
      hakerRows+
      '<div class="dsec"><h4>Tilstander</h4>'+chips(sp.states,"")+'</div>'+
      '<div class="dsec"><h4>Modaler / paneler</h4>'+chips(sp.modals,"modal")+'</div>'+
      '<div class="dsec"><h4>Handlinger</h4>'+chips(sp.actions,"action")+'</div>'+
      (sp.details.length?'<div class="dsec"><h4>Detaljsider</h4>'+chips(sp.details,"detail")+'</div>':'')+
      '<p style="margin-top:22px;font-size:11px;color:var(--muted)">Tilstander/modaler/handlinger er utledet av skjermtype i spec.js. Bespoke tillegg er merket på nøkkelskjermer.</p>';
    d.classList.add("open"); document.getElementById("scrim").classList.add("open");
    document.getElementById("dclose").addEventListener("click",closeDrawer);
  }
  function closeDrawer(){document.getElementById("drawer").classList.remove("open");document.getElementById("scrim").classList.remove("open");}
  document.getElementById("scrim").addEventListener("click",closeDrawer);
  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeDrawer();});

  document.getElementById("q").addEventListener("input",function(){query=this.value.trim().toLowerCase();render();});

  render();
})();
</script>
</body>
</html>
