<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    padding: 24px;
  }
  h1 {
    font-size: 18px;
    font-weight: 700;
    color: #e6edf3;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .subtitle { color: #8b949e; font-size: 12px; margin-bottom: 28px; }

  .legend {
    display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #8b949e; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .dot-marketing { background: #1a1200; border: 1.5px solid #d29922; }
  .dot-playerhq  { background: #0f2d1a; border: 1.5px solid #3fb950; }
  .dot-shared    { background: #1a1432; border: 1.5px solid #8b5cf6; }

  .flow-container { position: relative; width: 100%; overflow-x: auto; }

  .node { cursor: pointer; }
  .node rect { transition: filter 0.15s; }
  .node:hover rect { filter: brightness(1.3); }
  .node text { pointer-events: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  #panel {
    position: fixed; top: 0; right: -360px; width: 340px; height: 100vh;
    background: #161b22; border-left: 1px solid #21262d;
    padding: 24px 20px; transition: right 0.25s ease; z-index: 100; overflow-y: auto;
  }
  #panel.open { right: 0; }
  #panel-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: #8b949e; cursor: pointer;
    font-size: 20px; line-height: 1; padding: 4px 8px; border-radius: 4px;
  }
  #panel-close:hover { background: #21262d; color: #e6edf3; }
  #panel-title { font-size: 15px; font-weight: 700; color: #e6edf3; margin-bottom: 6px; padding-right: 32px; line-height: 1.3; }
  #panel-route { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 11px; color: #3fb950; background: #0d1117; padding: 8px 10px; border-radius: 6px; margin-bottom: 12px; word-break: break-all; border: 1px solid #21262d; }
  #panel-desc { font-size: 12px; color: #8b949e; line-height: 1.6; margin-bottom: 12px; }
  .panel-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 3px 8px; border-radius: 12px; font-weight: 600; margin: 2px; }
  .tag-done    { background: #0f2d1a; color: #3fb950; border: 1px solid #238636; }
  .tag-partial { background: #2d2000; color: #d29922; border: 1px solid #9e6a03; }
  .tag-pending { background: #1c1c1c; color: #8b949e; border: 1px solid #30363d; }
  .panel-divider { height: 1px; background: #21262d; margin: 14px 0; }
  .panel-section-title { font-size: 10px; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .panel-hacks { font-size: 11px; color: #8b949e; line-height: 1.5; }

  .col-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase; font-family: system-ui;
  }

  .step-badge {
    font-family: 'SF Mono', monospace;
    font-size: 9px;
    font-weight: 700;
  }
</style>

  document.getElementById('panel-route').textContent = s.route;
  document.getElementById('panel-desc').textContent = s.desc;
  const tagsEl = document.getElementById('panel-tags');
  tagsEl.innerHTML = s.tags.map(t => {
    if (t === 'done') return '<span class="panel-tag tag-done">Fullt ferdig</span>';
    if (t === 'partial') return '<span class="panel-tag tag-partial">Delvis ferdig</span>';
    return '<span class="panel-tag tag-pending">Ikke startet</span>';
  }).join('');
  document.getElementById('panel-status').textContent = s.status;
  document.getElementById('panel').classList.add('open');
}
function closePanel() { document.getElementById('panel').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
</script>
</body>
</html>
